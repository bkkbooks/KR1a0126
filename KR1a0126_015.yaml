body:
  text: 仲氏易卷十五翰林院檢討毛竒齡撰艮下乾上聚卦四陽二隂遁亨小利貞彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉遁者避也違而去之也天與山相望而不相接往往違而去之有似乎退避然者則謂之遁顧四陽二隂陽衆隂寡似隂宜避陽而無如隂少在內陽衆在外在內者有日進之幾而在外者有日消之勢進從內升消向外退則以卦言之謂之天遁山而以爻言之即謂之陽遁隂蓋遁在十二辟中為六月之卦六月者未月也午月一隂生未月二隂生才二隂耳而一進為否再進為觀三進為剝至亥月而六隂成矣故詩曰蟋蟀在堂嵗聿云莫夫蟋蟀以季夏居壁月令季夏之月蟋蟀居壁逸周書曰小暑之月溫風至又五日而蟋蟀居壁計其在堂時即居壁甫六月耳而見幾者聞之遂以為嵗忽已暮遁何獨不然故曰遁亨謂遁則亨也剛當位陽在上也應者初應四二應五也時行者相其時可以行矣遁也小利貞謂小者當利貞也是何也隂浸長也小者隂也遁以時行而以大遁小此其中有義焉鄭康成曰艮為門闕乾健德而互體有巽巽則有進退之象故君子一出門而行有進退謂之遁遁之取象固如此此聚卦無所分者自侯果謂本乾卦來既已非例而朱子作變卦又以為變自大壯則變易非推易矣若侯果又謂殷之父師可當二爻潁濵巢許可當上爻即宋衷亦有太公遁殷四皓遁秦之喻而宋後為說者遂競引諸史以實之嗟乎于易義乎何有晉渡江後宣城太守殷祐以郭璞為參軍㑹有物如牛足卑類象大力而遲行到城下祐將伏取之而令璞作卦遇遁之蠱其辭曰艮體連乾遁下艮上乾其物壯巨山潛之畜蠱上艮為山互兌為潜非兕非虎坤為兕虎以坤間二陽不成故也身與鬼并三隂為鬼蠱三陽三隂合并成卦又乾鑿度以艮為鬼冥門貞悔兩見艮故曰鬼并亦可精見二午離五月卦為建午三至上為大離是倍午也或用火珠林法謂二四俱屬午俱動為見二午非是法當為禽離為雉巽為雞兩翼不許謂無兩翼遂被一創遁四陽傷其一為一創還其本墅謂遁祗傷乾一畫而山仍如故故蠱上之山還本墅也按卦名之是為驢鼠乾為馬艮為鼠遁上乾下艮而艮體連乾則合四乾已變馬形為驢是驢鼠也按是占晉書無解今以推易之法解之則與周太史解斷無異諸詞有韻正古法說見蠱卦卜竟伏者以㦸刺之深尺餘遂去不見郡綱紀上祠巫云廟神不悅曰此䢼亭驢山君鼠也偶詣荆山暫來過我何容觸之其驗如此象曰天下有山遁君子以逺小人不惡而嚴惟遁故不惡惟嚴故遁初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也遁在四陽初與二則皆以隂制遁者上為首則初為尾况遁者外向而我追之是尾之也隂本欲逐陽而其勢未盛則第從而羈縻之因之有尾遁之象謂隂躡其後而使之止也艮者止也內卦而厲也欲往躡勿可往也蓋四陽尚衆以初長之隂而思躡之非其時耳六二執之用黃牛之革莫之勝說象曰執用黃牛固志也二亦隂之欲止遁者而不可止也夫以下艮之指拘艮為指為拘當互巽之繩巽為繩自當有縶縻之象則從而執之固其志也且艮體半坤坤為牛為中色中色黃而體半未全有革無膚則即用此黃牛之革作韏靽以執遁者誰曰能脫而無如巽為倒兌二正當兌口毁折而去雖以艮止之而早已脫矣遁矣莫之勝脫猶言不勝其脫耳九三繫李氏易解陸氏釋文俱作係通字遁有疾厲畜臣妾吉象曰繫遁之厲有疾憊也畜臣妾吉不可大事也三以卦言則山當為止遁者而以爻言之則固四陽之首遁者也第遁位居下與二隂鄰而其體則究與艮止為始終則于此而繫戀焉容亦有之夫繫戀則有疾矣厲矣艮剛為半坎故有疾坎為疾而幸而艮為閽寺居闈闥之間初以艮男之下柔而為人臣二以巽女互巽之下柔而為人妾而我以門闕之剛從而畜之則隂固羈陽而陽亦因以羈隂可與語小利不可與語大事何勿吉乎所謂以不遁為遁而深于遁者此遁始也九四好遁君子吉小人否象曰君子好遁小人否也四與初應好仇也而我從遁之彼君子兮不與我好兮未為否也初雖長三陽尚未消也三陽變則為否小人不然也九五嘉遁貞吉象曰嘉遁貞吉以正志也五與二應嘉耦也而我從遁之其新孔嘉未可與偕隱也雖二五皆中亦皆處正而志各有在遁者以之不遁者不以也四陽惟四五與二隂應而上下相遁一如夫婦之違背然者故曰好曰嘉其象如此俗以好嘉為贊美之詞則何以恰在四五也上九肥淮南子作飛遁無不利象曰肥遁無不利無所疑也上九當四乾之末而與四乾之首為相應並無尾之而執之者則乾首尚繫乎遁而此則裕乎遁者也夫浸長利極小遁亨利極大四剛至此用乾斷而却巽疑矣謂互巽按張平子思𤣥賦欲飛遁以保名曹植七啓飛遁離俗凡李善吕向諸注皆引易上九飛遁無不利則在唐以前原有易本作飛遁者而朝以道輩作僞古易反不及之何也又諸注引淮南九師道訓云遁而能飛吉執大焉明焦竑又引金陵攝山碑緬懷飛遁以證飛字大抵不繫即肥亦不繫即飛别無二義楊用修謂古肥作􅖦故因􅖦誤蜚因蜚誤飛則古文􅖦字反不可考恐是臆見知者詳之乾下震上聚卦四陽二隂大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣大壯者遁之反也遁以隂在內故隂雖少而不以為少曰小浸長大壯陽在內故陽已盛而猶幸其盛曰大者壯然而遁利貞大壯亦利貞夫猶是四陽二隂之卦乾行上下無非利貞而遁貞利小而不謂之正大壯利大正亦大而即謂之為大正是何也則以大者壯故大者正也蓋遁為六月卦大壯為二月卦隂陽中正兩俱有之而惟大壯則行見乎天止見乎地繫詞大壯則止倒艮之止上震倒艮豫之隂消剛動之行乾剛震動又喜其陽長故震動在下而坤柔在上地雷復也謂之見天地之心復彖傳乾剛在後而震動在前則謂之見天地之情心存乎內而情現乎外所動有淺深故所見有隱顯也舊謂三畫卦以初為少二為壯三為究六畫卦則以初二為少三四為壯五上為究則此壯字又以陽至三四得名然另是一義象曰雷在天上大壯君子以非禮弗履禮者天秩也而以震足下闕初九壯于趾征凶有孚象曰壯于趾其孚窮也震為足而初在下則趾也四陽之壯以趾為始初者壯之始也然而過也天下無趾大于足而可以行者雖四為我應而四陽五隂適當半坎相孚則有之矣以言乎征則未也夫孚者信也信于行亦謂其可以行也苟不可征則雖其孚亦窮矣而况于行乎孚窮非征窮也按春秋傳趙簡子論季氏出君事史墨謂在易大壯曰雷乘乾以震雷諸侯加之乾君之上天道有然則此所云大壯者正尾大不掉壯趾之謂也大象曰非禮弗履而傳以越禮犯分者當之推易占易其變化不一類如此九二貞吉象曰九二貞吉以中也大壯之所以利貞者以此二也故但稱九二而即可曰此正而吉者何也中故也九三小人用壯君子用罔貞厲羝羊觸藩羸王肅本作縲鄭𤣥虞翻作纍蜀才作纍皆作係纍解其角象曰小人用壯君子罔也三以下乾之終當互乾之中此正壯之至者而不可用也夫壯亦何不可用而自用其壯則不可蓋恃强而往小人則然若君子則安用哉君子所用者無壯而已故卦之全體為兼畫之兌而三又適當三五互兌之初兌為羊而以乾震之剛成之則為羝羊羝羊勇于進而不能退有藩在前即觸之夫觸之亦何損于角而厲矣角且羸矣欲用壯反失壯矣夫壯之不可恃也如此羸瘠也震為竹為葦故曰藩九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也四雖以偏位居偏剛而陽窮于此惟懼不進則幸其進之曰貞吉哉向在三時以為在前有藩耳今陽盡而藩撤矣兌為附決今決矣三五為互兌四兌剛適盡矣向以抵藩故或羸今不羸矣壯矣其壯也于何見之夫坤為大輿而以坤之初而索之為震是輿輹也輹者輿之根車下縛為輹震者坤之氐也坤有氐成震夫欲尚所往而觀所壯壯此而已四為乾健之中當震動之始其象如此六五喪羊郭氏舉正作午誤于易鄭氏音亦謂佼易陸績本作場易場通字漢食貨志本作易可今音異無悔象曰喪羊于易位不當也陽已壯矣于此又進則此隂當并喪者夫此喪者羊也全兌未終而此當三五互兌之口兌為羊互兌亦為羊而適當兌口則兌脫矣第此一喪羊在無意之間直易易耳時應遞代即偃玩翕忽而得失循至事已如此亦又何悔夫以易喪之勢抵大壯之時雖曰五位本正中能相當乎易與埸同音亦同義然于象無疆埸之證仲氏嘗言解經不宜改字良然上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也體兌則為羊而三當內終上當外終則皆有及藩而觸之之象況震動之極則尤躁妄之至者而第此震柔為諸陽侵逼之際雖觸藩之羊仍名羝羊而實與三異三可退而此不能退以諸陽在後也三可遂而此不能遂以前無所之也夫如是則何利乎亦惟艱以自守以聽壯動之及焉已矣蓋躁妄抵觸絀于進退亦惟不自量以至于此不詳不審度也然而雖不能詳亦不久困自此以往則全乾之後繼以姤遁仍反覆事耳咎不長此壯遁之相因而君子於此所當詳壯罔而審所用也坤下離上四易卦易觀五來四往小過三往上來又易頥初往四來萃五往上來虞翻曰觀四之五蜀才日此本觀卦九五降四六四進五此但從正推言者若朱升㑹通及本義亦謂從觀來則指變卦耳晉孟喜本作齊陸德明云齊子西反義同則躋字矣躋猶進也康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉者日出也進也下坤上離則日出乎地而因而進之是之謂晉然不曰明而曰進者以推易言則觀以六四一柔進而上行因之填五位而為卦主是卦之得明全藉乎進乃因而轉推則頥以下震而易為坤小過以上震而易為離上震下震皆康侯也震為侯康侯猶考工記稱寧侯也或曰民功曰康坤為民故有康象康侯已覲日而萃以巽之命令易離日以君臨之是下之覲上者有升進之名而上之臨下者則又兼晉接之義此如諸侯朝天子而天子又從而禮接之坎馬美脊三五互坎為馬為美脊比之坤衆之蕃庶用以敷錫坤為衆而以一晉晝而下三坤日三接焉雜卦曰晉晝也說卦離為日坤三爻在下為三接是非明出地上以坤順而麗大明何以至此大行人職曰諸公三饗三問三勞諸侯三饗再問再勞子男三饗一問一勞即天子三接諸侯之禮也又王接侯禮覲禮延升一也覲畢致享升致命二也享畢王勞之升成拜三也見何氏易象曰明出地上晉君子以自昭明德明德離德也出乎地則自明矣大學皆自明也即此義初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也初本以頥之震剛而升之為四因之作二四同功之艮是我甫欲進而跬步當前頓成丘阜艮為丘為阜適當二四然且為我所應者指四一剛上臨四為艮剛儼如山之傾壓而下之摧何如也雖四居坎中坎可下孚而時命未至誰則能信亦惟獨守其正以俟命之自至已耳六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也二欲進而三五同功者為坎是甫跬步間而坎險相接又如汙窞之隱伏而加憂焉愁何如也所幸位居正中以坤順而應離柔在尊之隂儼降福于我而我受之差無愁耳周禮有享先妣之禮爾雅云父之妣為王母蓋指五也或曰乾為王坤為母王母者王者之母也上離為中女故有母象六三衆允悔亡象曰衆允之志上行也三以小過之艮易之為下坤之首是我一為坤而諸坤皆信之然而初為艮剛今乃為艮柔豈能無悔而悔亡者衆信則可行可行者吾志也進也坎當中剛相接處則為孚為信以符使信合得名況三四內外交際與初之稱四孚正同是初摧二愁三信五失必不能稍有假借而晉後說易彼此籠統三可愁如二可衆允易道亡矣或曰坤為衆則三坤俱有之然初二尚未衆耳九四晉如鼫子夏傳作碩聲誤鼠貞厲象曰鼫鼠貞厲位不當也四進而居互艮之剛艮為鼠而上逼離中晝不能出此其為位較于離麗晉晝俱不相當者故曰位不當如鼫鼠然蔡伯喈云鼫鼠五能不成一技此即舊所稱五技而窮者說文云能飛不能過屋能緣不能窮木能游不能度谷能穴不能掩身能走不能先人九家易解此直指五窮謂體離欲升體坎欲降游不度瀆不出坎也飛不上屋未至上也緣不及木不出離也穴不掩身五坤薄也走不先足外震在下也此解之至確者鄭康成謂鼫鼠即大鼠碩鼫通字誤矣若廣韻以為螻蛄玉篇謂形似鼠頭類兔尾有毛則但是鼠類恐于艮鼠之象又未合耳六五悔亡失孟喜馬融鄭𤣥王肅諸本皆作矢虞翻云矢古誓字九家易云五從坤動而來為離離者射也故曰矢皆不可解得勿恤往吉無不利象曰失得勿恤往有慶也五為離中是當麗大明者故甫稱六五而即曰悔亡然而五在觀為巽剛巽利有得而今已失之矣在互體為坎柔坎憂有恤而今幸而出恤矣雖無得然亦無恤進亦何害故爻曰吉曰無不利而夫子直加之曰此其往將有慶焉誠喜乎其為進也此晉主也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也至上九而進止矣離為牛上者離牛之角也進乎此而前無所往則進之以角或抵或觸以之作開先之具固己非分然且恃離之戈兵離之甲胄轉而伐夫坤之下邑雖曰以之為振厲本無咎乎而非其正也正則吝也蓋離為明德上處尊位不能降康侯之錫分王母之享而徒以戈兵甲胄轉而陵下道未明矣何光之有仲氏易卷十五
