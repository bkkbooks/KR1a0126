body:
  text: 仲氏易卷二十四翰林院檢討毛竒齡撰巽下巽上四易卦易遁四來二往中孚初往三來又易大過四往上來大畜初往五來巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人重巽仍名巽正以二陰所易並卑遜而居二陽之下由小陰通大陽謂之小亨故巽有兩利一則以退為進而可以尚往由下至上曰往一則由小通大而可以見大人二五為大人蓋巽為命令大人之事命以行巽而重以申之誠以中外推易凡陽剛諸爻皆得巽入二五而行中正之志中正勿分二五陰柔兩爻則專歸之初四而不拂乎剛而順乎剛是攸往者其行而見大人者又其順也陸績曰陰為卦主故小亨胡仲虎曰旅曰小亨離之一陰也此小亨巽之一陰也王氏易是曰剛巽乎中正言剛遷入于二五也巽者入也二五皆中也而正兼之或以中為二正為五非是何氏易謂剛巽中正為九二巽乎九五則無理矣象曰隨風巽君子以申命行事隨者兩巽相逐之義初六進退利武人之貞象曰進退志疑也利武人之貞志治也初居重巽之下進則剛在前而退又無地夫巽為進退說卦原有猶豫不決之意而位當極巽猶豫甚矣獨不曰巽為躁乎為躁卦履以互巽之陰而名為武人履六三武人為于大君此亦巽陰也剛中之命師武臣為政荀爽曰二者軍師三者號令不過軍中之事借張皇之師以振其猶豫之志則其本互震承乾之治大畜之五中孚之三皆互震震者承乾出治者也李氏易解曰乾為大明故志治乾元用九天下治是也以去巽疑之不果巽為不果此行事之至貞者也而何有勿利九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也初陰之易未成重巽也自遁二易四大過之上又易四而重巽象成是此四者固二柔與上柔所相合而成之者也乃巽為木以二陽木架一陰而為之牀見宋衷說而所易之四適巽而居于牀足之間是自坐牀上而坐客牀下不巽極矣第二上俱剛而二在剛中獨有所用用是實字禮王前巫而後史前後記告紛紛若若若若多也史綬若若而王獨中心無為以守至正則二五大人與上迥别舊解多作祭祀說此據周禮太史讀禮協事司巫取祝以孝告嘏以慈告語若苟爽謂史以書勳巫以告廟征伐既畢巫史並用此承武人來以用兵言至周官又有史掌卜筮巫掌祓禳卜筮占吉凶祓禳除烖害則通可用耳以此申命彼方以得見為利又何止上牀下牀之間哉故曰吉也夫重巽惟恐過于巽故九五先庚後庚以制巽也此之前巫後史者以行巽也有巽在彼者而我能守中以行巽則不患不巽耳若爻有史巫象者二在中孚本兌剛而今易為互兌之剛是終始以言說為事況兌為巫為口舌說卦今兩兌矣其為巫為史固有然者巽為牀象而二在牀中上在牀上東指西畫無一得當非推易仍夢夢耳九三頻巽吝象曰頻巽之吝志窮也三當下巽之終而接上巽之始以巽承巽巽之頻者也夫下巽至三而巽窮上巽至上而巽又窮雖三在過巽上在不巽而其巽之窮則一也此曰志窮上曰上窮吝也六四悔亡田獲三品象曰田獲三品有功也此則善處巽者矣故一稱六四而即曰悔亡蓋四居上卦之陰坤陰為田而互離以網罟戈兵合之為春獵之名榖梁傳曰春獵曰田夏曰苗秋曰搜冬曰狩巽固利倍而此以巽位當巽爻之實倍而又倍遂準卦畫之數而全獲三品誠以位居離中適當心腹而陰又復成巽股之髀上中下殺悉于所獲有相孚也三品一為乾豆二為賔客三為充君之庖注云上殺中心乾之為豆實次殺中髀骼以供賔客下殺中腹充君庖廚此以離為心腹巽為髀骼正復相合故兼三品若翟子𤣥謂初巽為雞二兌為羊三離為雉則杜撰矣俗之言象而不當者大率類此蓋師中之命可用較閲而三品之獲正兼隨巽傳曰五多功而此則重巽之成全在乎四非二上兩陰合為順剛不能有此則即以九五之功歸之六四豈有過焉九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也九五即剛之中正者故一稱九五而即曰貞吉又曰悔亡又曰無不利此巽之利見者也但巽恐太過便涉卑薾巽木荏苒故當以剛金勝之大抵十幹之周始于甲而更于庚故蠱惡惰始則以震互于巽而治以甲木說見蠱卦巽慮終萎則以兌互于離而治以庚金蓋甲乙丙丁為十幹之上上者始也庚辛壬癸為十幹之下下者終也以甲木為主木可以克土則用木之剛而去土之柔故不用戊巳而但用甲木所謂終則有始也庚辛之終以甲木為始以庚金為主木為金所克則去木之柔而用金之剛所謂無初有終也去甲木則無初用庚金則有終故曰先庚三日者丁戊巳也後庚三日者辛壬癸也所不用者獨甲乙耳甲乙為木正巽方所屬行巽令者必去之故易內傳曰凡災異所生各以其政變之則除消之則亦除此後漢陽嘉三年郎顗上公車拜章所引之語夫變取其克我者消取其我克者克我者如失火令則行水令以克之我克者知失火令則行土令以消之消之者泄之也今欲行其令而顧以泄之者消之可乎故甲去戊巳庚去甲乙凡以惡其消之也漢儒解此多以納甲為說亦頗近理特于用庚制巽之義未合王輔嗣以蠱卦先甲後甲引漢制甲乙之令為解則令有甲乙非謂甲即是令也且漢令非周制也至巽為命令則于申命頗相合然曰申命令謂之庚則杜撰無據不可訓矣此以庚制巽但可曰行巽命令則取庚先後以為巽木所最忌耳若朱本義云先庚三日為丁所以丁寧于其變之前後庚三日為癸所以揆度于其變之後則游氏有云丁癸二義譯作隱語豈所以為易乎其㫖良然上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也上以陰與四猶之二也二之所巽在牀下則上之所巽亦在牀下也若非推易則上既無牀下之象而欲以巽諸初二三四五爻則爾推我委無了期矣三曰窮此亦曰窮也第巽在上爻巽極必反且又當倒兌之末將巽之資離之斧見前而盡毁脫而喪之以兌故而尚以貞固自命夫貞者正也正乎吾第見其凶而已乎助詞見九正易因按資斧諸說見旅卦漢魏解易多作齊斧而齊義不同若漢書王莽遣王尋屯洛陽將發亡其黃鉞其士房楊曰此經所謂喪其資斧者也應劭云齊利也資如齊衰之齊資齊音同誤作資則齊斧本黃鉞巽固無礙恐旅人不宜有耳兌下兌上四易卦易大壯三往五來中孚上來四往又易大過三來初往無妄上來二往兌亨利貞彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉說文以兌為說而當時注者即以易說卦為巫為口為據則說者說也非悅也而或曰不然不觀說命之為兌命乎書說命禮記作兌命說命本為悅𫝊說名音悅說者悅也然而去心則為兌猶之咸卦本為感咸者感也然而去心則為咸其例同也而或曰不然夫兌則焉能為悅哉兵以聚名兌荀子仁人兵兌則若莫邪之利鋒注兌猶聚也水以聚而亦名兌毛晃曰水所鍾聚曰兌則兌者不過以聚物為義而澤能聚水則兌名焉然而兵聚則斯析也水聚則滋天下有澤潤于人而不為之欣然者乎是兌之為悅實本于澤之為悅然且以言悅人者澤其言以貌悅人者澤其貌既以澤悅人而又必自澤以為悅澤曰悅兩澤亦曰悅理固然也故兌可悅人人未有不受其悅者此所以亨也而悅人以兌即未有能出于正者此所以又利于貞也是以兌者悅也就卦名言之也而移剛于二五而為中謂之剛中易柔于三上而為外謂之柔外又以推易言之也悅以柔為主而悅而利貞則又以悅之得正者為主故易有天道以上兌而處天位則順乎天焉指上六易有人道以下兌而居人位則應乎人焉指六三順天應人則悅而正順天應人則悅而又大而不特此也人亦知夫坎與兌之分名也哉猶是水也而一則名坎一則名兌一陽居中而以兩陰導其傍川流下泄則謂之坎半坎上瀦而以一陽窒其底障坎下流即謂之澤是坎為勞卦而塞之以兑而勞以亡坎為死位坎位北曰朔月死之名離四居大坎而曰死如是也而兌以閼之而泯其死是不特兌為毁折可以祛憂兌為附決用能致快也夫先民興作不得不勞導民犯難不得不死而乃以勞民之故而致傷民以死民之故而致民怨人之不應何有于悅而有如悅以先之不求民勞也而民卒相勸而忘其勞悅以導之非以死民也而民卒相勸而忘其死是柔外而利貞者悅之正而應人以順天者又悅之大也說卦傳曰兑以悅之又曰兌正秋也萬物之所悅也則夫子解兌悅原以兌秋能成物而物遂因以悅之此義今人不識久矣要當以傳為正解耳豫注是彖畢始得傳解急欲更前說而以不礙各見故已之因附志此象曰麗鄭𤣥本作離云猶得也澤兌君子以朋友講習麗兩也禮麗皮納聘注兩皮也朋友者兩兌也講習兌口兩相向也見李氏易解此以麗字解一卦之體說見後初九和兌吉象曰和兌之吉行未疑也重卦有中外而惟兌不然以悅無淺深也六爻有次第而兌又不然以悅無可為先後也故演卦至兌創作偶體上下貞悔無應敵而有比儷一如大象之所謂麗澤者初四一偶則皆調所悅悅之始也二五一偶則皆準所悅悅之中也三上一偶則于以為悅悅之成也故卦凡四易易大壯大過以為三而易無妄中孚以為上是三上二陰固為卦主與巽以初四二陰為卦主正對而于是分其所易則初從三來以大過九三易為初九是以大過之下巽而易為兌也四從上來以中孚上九易為九四是以中孚之上巽而易為兌也初九以巽為兌而九四亦以巽為兌是初四二爻天然一偶而巽為順為協有調和之義焉蓋惟恐所悅之有不正也故吉也若傳曰未疑亦惟疑故調若調而行則亦未之疑耳疑亦巽象為不果曰巽初六曰志疑此去巽未疑正相對者九二孚兌吉悔亡象曰孚兌之吉信志也二五則皆準所悅者悅道甚大而善處悅者則必中外孚合有若符節故二從上來以無妄上九易為九二是以無妄之上乾而易為兌也五從三來以大壯九三易為九五是以大壯之下乾而易為兊也九二以乾為兌而九五亦以乾為兌是二五兩爻天然一偶而二居離位純乾則見五居坎位亦純乾則見是以離坎之相印孚合若信有準量之義焉蓋惟恐所悅之有未大也故吉且無悔也傳曰信志信即符信之信信志亦離象說見前六三來兌凶象曰來兌之凶位不當也三與上則皆兌之陰悅之成者也夫成悅則不可道矣故曰佞人來矣相引而至矣蓋三易自大壯與大過一來一往而皆謂之來上易自無妄與中孚兩皆上往而總謂之引雖三多凶上不曰凶而凶同傳曰位不當以上居兌位而三居艮位此又以爻位言一震二離三艮四巽五坎上兌此上爻正值兌位而三不值上位正當則三不當耳虞氏易謂從大壯來失位故來兌凶此以推易解來位字亦通九四商兌未寧介疾有喜象曰九四之喜有慶也商者度也書曰我商賚汝又協也周禮司商協名姓掌賜族受姓之官人始生則吹律合之李氏易解以互巽為利市三倍故稱商兌此作商估之商若章本清云兌屬正秋商音用事故為商兌此為宮商之商一說商傷也以悅必傷也皆非義然而商則不寧展轉調劑豈無營心所恃間隙小疾究得喜悅耳四居大坎之中坎為不寧見屯豫卦為疾傳曰憂悔吝者存乎介介指上下相介言九五孚于剝有厲象曰孚于剝位正當也孚于剝即孚于兌也以悅固剝我者也剝者陰消陽之名且兌秋之終九月為剝剝九月卦為兌未厲者坎象耳四五俱大坎中若傳曰位正當則以五居坎位二居離位上下偶對正得相當此與三上二爻以位不當作一照顧正同上六引兑象曰上六引兌未光也牽引來悅非善悅者此自中孚之巽來巽為繩故引兌𫝊曰未光以自三至上皆大坎上尤坎仄耳坎下巽上三易卦易否四來二往又易損初往五來益初往二來渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川郭京本此下有利貞二字乘木有功也風行水上則水散故曰渙渙者散也第巽為命令坎為險難風行水散則命令一出而險難以平有勿亨乎虞氏易謂否四之二成坎巽天地交故亨此以推易解詞者顧世之秉號令而平險難者非他人必王也王則不特號令所自出而曽孫祝告由下達上者皆其所秉王則不特險難于以平而險難初來其形未著者亦期有濟彼夫互艮為宗廟而陳坎豕以薦之然且倒巽為兌申以嘏祝是格有廟也虞氏易謂乾為王乾四之坤二為格廟亦推易法格廟無渙解若謂鬼神魂散而祭以聚之則不特無理且于涉川之義何居故漢儒祗以分卦為渙象極是有理下坎為大川而浮巽木以乘之然且風檣雨楫坎又為雨冒險而濟是利涉大川也蓋乾四之剛散來坎二而坎則通而不窮坎為通坤二之柔散升外四而一坤與兩乾則比而上同朱本義謂渙自漸卦九來居二而得中六往居三得九之位而上同于四此主變卦說說已見前祗就此論二往居三並非外卦不可言外且三乾本同故四可上同若祗就四言則三四兩爻何關同異耶是王之在坎中者雖初四皆中而乘巽木而有功不必二祗有譽五始有功也荀爽謂陽來居二為在中虞氏謂二止應五為有功皆推易法此渙之所為亨也按盧氏曰此本否卦乾之九四來居坤中剛來成坎水流而不窮坤之六二上升乾四柔得位乎外上承貴王與上同皆推易法考盧氏無名惟北史儒林傳云魏末大儒徐遵明講鄭康成易傳之范陽盧景裕即北魏國子監博士胡氏震亨謂即是其人則在北魏時傳鄭學者猶能識推易如此始寧徐仲山與仲氏論假廟謂漢儒取象務盡夫互艮為廟下坎為豕為牲可謂當矣虞仲翔必曰乾為先王享祭者也震為帝互震艮為廟乾四之二殺坤大牲坤為牛為大牲四之二則變坤矣變則如殺之然何其密也仲氏曰未也夫上爻祖考之位也祗上爻為先王若如虞氏說則本卦已無乾矣不合有三男之卦在前坎互震艮為三男則侯之大小官之崇卑昭穆之長幼也王與少男同體者五為艮剛同體昭穆愈繁則王之世次愈卑也禮嫡長分必卑小仲山為咋舌書之去見𫝊是齊日記象曰風行水上渙先王以享于帝立廟初九用拯子夏𫝊作拯與􅶚同馬壯吉象曰初六之吉順也初以震馬之剛升之二而為坎馬之剛是馵足之馬移而為美脊之馬馬綦壯矣顧是馬雖壯然必散損之三坤而拯乾而後得之依然順也坤者順也拯拯􅶚同即承也有承上之義見明夷卦九二渙奔其機音几從几或作杌音兀非是悔亡象曰渙奔其機得願也二從乾四來是散三乾之一而奔之坤橫一陽于缺陰之上而艮肱憑之艮為手適互于二上如機然是其奔之者其坎也乎哉其機也夫離其類而他奔豈能無悔顧動得憑依實所深願機几也周禮五几通作機左傳設機而不倚故舊注易者皆作依據之物宋禮部韻引易奔其機注承物者是也諸本作杌則檮杌之杌非其義矣若來氏梁山易注謂機出蜀中似榆山海經云大堯之山多松柏多機說文單狐之山多機機指五則誤認木名已非易注舊義且曰機指五則二何必奔五也誤矣六三渙其躬無悔象曰渙其躬志在外也卦三易三散散否之三乾與損益之三坤而三總不及則三何散乎亦散其躬而已矣躬內坎之末而外之互震互艮皆分之則是惟無散散則其志在外耳六四渙其羣元吉渙有丘姚信本作近以丘下畫迤引致誤匪夷荀爽本作弟形誤所思象曰渙其羣光大也此正否乾之下奔者也𫝊曰物以羣分此則其分羣者矣故分健為遜乾元未散風行自上有命即吉祗四當艮中渙散之後真不信巋然獨聚如此丘者艮為丘此非等夷所念及也𫝊曰光大以艮從乾分左氏所謂有山之材而照之以天光者其為大不待言耳按盧氏曰自二居四離其羣侶渙其羣也得位承尊故元吉也皆推易法九五渙汗其大號渙王居無咎象曰王居無咎正位也五則當巽之剛中真王之主命令者而散自初來不復再易是王以柔豫之下而未嘗反也夫大號無反渙之必汗之此之人液之去體有出無入上無悔言而下無違命所謂無反汗者非與且夫艮為門闕雖宗廟實王居也冥門可棲神鄭氏說艮為鬼冥門而王居為正位否四未易則艮剛在四損初未易則艮剛在上皆非正位而今散諸艮而為互艮之剛是散諸所居而獨居正位一若分三塗九術千廬八衛而合而歸之中央之帝居將彖之所謂王乃在中者以二之中而此之所謂王居正位者不又以五之正與然則渙亦何負于王哉九家易曰此本否卦體乾為首來下處二成坎水汗之象也陽稱大故曰大號此亦推易法上九渙其血去逖出無咎象曰渙其血逺害也此亦無渙者坎為血為逖逖憂也見李氏易解小畜六四以離反坎則血去惕出此之上九以巽極而却全坎亦血去逖出故曰此何散亦散其血而已矣夫子傳文以血句故此亦斷解蓋血為陰澀象多隱憂隱憂則害生有如散其血而血去則中之所憂隨之而出亦又何害逖本惕字與惕同漢書王商𫝊無怵惕憂可驗𫝊以血去惕出為渙其血不及惕出此與小畜有孚血去惕出為有孚惕出不及血去正同仲氏易卷二十四
