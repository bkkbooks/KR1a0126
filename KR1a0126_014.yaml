body:
  text: 仲氏易卷十四翰林院檢討毛竒齡撰周易下經艮下兌上子母易卦易否上來三往又易恆二往五來此卦虞氏易蜀才朱升諸說皆有推易之法略見辭內惟本義云咸自旅來則先分後聚是變易非推易矣咸恆子母卦從否泰來若旅則又從咸恆來耳咸亨利貞取女吉亨字連利貞句勿斷彖曰咸感也柔上而剛下二氣感應以相與止而說悅同男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣上經首乾坤下經首咸恆者乾坤不與六子對祗取六子之化體以相比見若所謂乾坤定位者既為倡首則但以咸之山澤通氣恆之雷風相薄既未濟之水火不相射以應之于下前分篇對易之說有云以四配兩者正指此也第夫子序卦以乾坤屬天地為天道之始以咸屬夫婦無恆卦舊謂咸恆為夫婦誤為人道之始人道但指此卦舊謂上經皆天道下經皆人道誤見韓康伯說故乾坤以六乾老陽六坤老隂為天地而咸以下艮少男上兌少女為夫婦而又山氣下降澤氣上升艮男居下兌女居上王肅曰山澤以氣通男女以禮感有類乎男下女者故鄭康成謂三十之男下二十之女正以男女皆少者婚之時而男下于女者則婚之禮也夫天地一大夫婦也大夫婦則全有四德元亨利貞夫婦一小天地也小天地則亦有四德之三利亨貞此在彖傳不曰大亨以正則四德之三也是以康成又云嘉㑹禮通亨和順于義利幹事能正貞具此三德而用以取女所為吉也蓋咸者感也謂男女相感也卦從否易以否坤六三之柔而升之為上是桑上也以否乾上九之剛而下之為三是剛下也然且轉從恆易以恆之震男上巽女者而易之為艮男之下兌女是二氣相與而艮止兌悅男止無他感而女悅有正應天道以感應而生萬物人道以感應而生父子君臣以及于上下見序卦此其中有心焉坎為心卦體大坎則即以心感而情應彖傳有心字情字志亦應焉爻詞有數志字所謂感應而相與者有如此夫以分卦言則艮內為夫兌外為婦以分爻言則三四五為夫初二上為婦以卦爻合體言則三陽為身心三隂為首足而合隂陽男女而總象乎人之一身蓋天地以氣感夫婦以形感感之有形者莫如輔頰口舌以下至股足而爻之自初而上自拇腓以至頰舌四體百體無不相感二語本焦弱侯說又咸皆也謂皆感也蔡中郎協和昏賦有云乾坤和其剛柔艮兌感其股腓此說易之最善者况男女兩心居六爻之中而四又適當三陽之中不言感而無不感大傳所謂何思何慮同歸而殊塗一致而百慮者于是乎在此萬物之所以生而天下之所以和且平也蜀才曰此本否卦案六三升上上九降三是柔上剛下二氣交感以相與也此推易之法若元儒朱升作㑹通亦有云卦自否來此皆一隟之偶通者然亦未易事也晉元帝初鎮建鄴王導使郭璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者其井當沸後晉陵武進人于田中得銅鐸六枚一作五枚誤見郭璞洞林歷陽縣中井沸經日乃止此事載晉書郭璞傳然世終莫解嘗以此詢仲氏仲氏曰此最淺近者銅鐸之出以貞咸也井之沸以悔井也咸內為艮艮東北之卦也其名武者以上兌在右武位也其出鐸者兌為金與互乾金合而乾數六故得六鐸然且互乾為天互巽為命此天命也故曰此受命之符也若夫井則二四互兌三五互離離兌為西南郡縣而南為陽方故宜有陽名乃以下巽與互兌為金木之交上坎與互離為水火之際木間金得火而上承以水此非薪在釡下得火而水乃沸乎且四正相纒乾麗坤域非中興受命何以得此凡此皆前人占筮所未及者洞林略有占注無此明確且所志變怪事不經故不載象曰山上有澤咸君子以虛受人虞翻曰坤為虛謂否之坤虛其三以受上剛之來曰虛受人此亦以推易為說者又曰艮山在地下為謙在澤下為虛今稱謙虛本此初六咸其拇子夏傳作􅡑荀爽本作母云隂位之稱俱誤象曰咸其拇志在外也此相感之始也下以足為始拇者足之將指也艮為倒震震為足而初當震之下柔則足拇矣六爻互相感而感必有應感者其情以應而感者則其志耳坎為志見前四與初應在外卦故曰外六二咸其腓荀爽本作肥云尊盛稱肥誤凶居吉象曰雖凶居吉順不害也腓者腳膊即俗所稱腳腨肚者上于拇而下于股正下體之中倒震之二也第二以恆之九二升之為五而自居于柔若有不安于居腓者此凶象也獨不思腓不自動隨股而動詩所謂君子所依小人所腓者隂隨陽而轉小人隨君子而行未有陽剛既遷移而隂柔猶不安其居者苟能居而又何害也艮止而巽順二居止之中互巽之末且上有正應順者順所應也惟順應故不惟不凶抑且得吉九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也股䏶則髙于腓者此倒震之剛下體之上也第三以否之上九降為三剛而猶志在上亦若有不甘于處股者此吝道也獨不思上降為三將必有隨之而下降者非陽剛耶夫猶是陽剛而以上言之則謂之隨人以三言之即其隨也以為隨人猶不可不執以為其隨而可不執乎執者持也謂持所處也雖上本三應所志在上而既隨而下則處之亦下曰所執固然蓋股以腓為下腹又以股為下詩所謂邪幅在下者謂腓以下而所謂無以下體者謂股以下也傳曰男下女此正艮男之下兌女者其特稱執下非泛語也若其又曰往吝者以處下則吉往上則吝易例凡自上至下謂之來自下至上謂之往九四貞吉悔亡憧憧京房本作􅚸云遲也往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也此心感也卦體下二隂象足上一隂象口中三陽象身四又當三陽之間則心位也心之官則思故言思而感在是焉第四與初應自有正感徒以位在陽中上下三隂均伺之則于此不能無朋從之擾所謂憧憧者擾在心也故曰爾自有正應貞者正也正則吉吉則亡悔不然則下往而上上來而下其連隂為朋而爾是思者皆擾心之具也朋者隂類即坤之所為得朋蹇之所為朋來者從者朋之與也體為大坎坎與離反故未光大大抵憧擾者中未明耳九五咸其脢無悔象曰咸其脢志末也五與二應而所感漸厚且由心而上至脊背之間而亦感之是感固在心而其感之者則其脢也蓋三以上降否上降三而曰志下五以二升咸二升五而曰志末論卦體則五六為上論行卦則五六為末此即大過之所為本末弱者卦凡三言志而皆以應言第初則隂應陽而惟三與五則皆以陽剛而為他所應應之者即志之者也然則五之志末非二之志五而誰志焉上六咸其輔頰孟喜本作俠古通字舌象曰咸其輔頰舌滕九家易作乘誤口說也感而逾上則為口為舌而口傍有輔口外有頰一舉口而無不相感有似乎送口說者虞氏易云滕者送也蓋口說雖淺感送則深以否之三乾易為兌柔是兌之所移本乾之所送雖其所移者祗兌之口舌而其所送者實乾之言說也乾為言鄭康成以滕作媵然亦作送解以為咸道極薄徒送口舌言語相感而已不復有志于其間此别是一說然其解作送則漢儒俱如是耳巽下震上子母易卦易泰初往四來又易咸五來二往侯果蜀才虞翻及朱升諸易俱有推易法見辭下惟本義謂卦自豐來此是變卦與此不同恆亨無咎利貞利有攸往彖曰恆久也剛上柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恆而天地萬物之情可見矣雷風為恆不知其何以恆也但曰亨而已無咎而已且中有兩利一利乎守一利乎行亦不知其何以守何以行也但曰利利而己夫子解之曰恆者久也是何也夫恆自泰來以泰之初剛易為四剛是剛上也以泰之四柔易為初柔是柔下也乃又自咸來以澤山之不相與者而易為雷風之相與雷動而上風入而下是上震動而下巽順也夫剛尊柔卑恆一兩長相配震長男巽長女恆二上動下順恆三剛柔皆應三隂應三陽恆四此彖傳解義如是謂四者皆常道蓋泰之地上于天天下于地者為偶道而易之而夫長在上婦長在下則道貞而可常守也利貞也咸之艮男終于陽兌女終于隂者為有終而易之而為震男之始又易之而為巽女之始是終則有始也利攸往也夫互乾與上震皆行也則皆往也况天地萬物日月四時其有藉于久道為何如者而謂聖人有異乎第恆則惟懼其不恆故卦曰恆亨而其為爻則若有鑒于不恆之不亨者匪悖也象如是也泰為地天而坎離卦位純爻則見故從泰推易則有天地有日月若震巽兌艮周歷四時則咸恆俱備焉虞翻曰乾為聖人此又以互卦言恆傍從亘字書皆然說文所謂從舟在二之問是也唐人書法因避穆宗諱故或去下一畫而來氏梁山易注謂易恆字無下畫左旁立心右傍一日所謂立心如一日者則笑話矣來注多近理然猶有牽合如此類者故指出之象曰雷風恆君子以立不易方朱升曰以時則久而不已以位則定而不易初九浚鄭氏本作濬恆貞凶無攸利象曰浚恆之凶始求深也以泰之全乾而一索得女甘使剛上進而柔下居是不求之髙而求之深也其能久乎夫終則有始而可求之深乎求索也必如此則求字有解不然突言始求無理九二悔亡象曰九二悔亡能久中也此三陽之始也乾已變巽則一見互乾之陽而喜之曰悔亡實不知其何以亡也蓋二陽本泰乾之中而咸以五之剛中而易為二中皆中也夫子曰中亦久矣故象曰九二悔亡而傳亦即曰九二悔亡其所為亡者以此或曰此卦主也九三不恆其德或鄭氏本作咸非承之羞貞吝象曰不恆其德無所容也九三居三乾之中而在泰為乾終在咸為乾始是不常于終與始也然且當大坎之中全體為大坎而在下為巽終內卦在上為兌始互卦上下終始並無常位是于乾于坎于巽于兌俱無所容也夫乾為健德而居于坎心坎心為亟見說卦亟則不可以長久况乎以巽德之躁巽為躁卦值兌德之决兌為附决亟躁與决無非不終日之計其于德之不恆為何如者向以為不恆者其位耳今而知不恆者乃其德曽德之不恆而不引之為愧乎德不常則愧亦不常所云或也夫不知愧之進之為何人而謂非德之不常不可也夫不知進愧者為何人而何可以不常也內巽女故有羞象朱氏㑹通以羞為庶羞薦羞之羞謂婦不能主中饋則他人有代之饋者其于巽義于羞義俱得之矣然安見不恆其德為不能主饋食也按聽齊雜記云明土木之變南冢宰魏驥集同官上監國疏㑹錢唐客陸時至善易請筮之得恆之解即九三爻驥曰帝出之不恆而承之羞固也乃變而負乘寇將復至解六三負且乘致寇至貞吝如之何客曰既已負帝且乘矣再至何害所慮者貞之則吝惟恐徒守反吝耳驥曰善乃易疏去次日客過驥驥曰昨筮無大凶乎曰大吉曰何謂曰夫恆為大坎而三當坎中所以陷也然而恆互為乾三以一乾而嵬然居三乾之間若無往而不為君者乃一變為解則已解矣且解之辭彖辭曰利西南西南者所狩地也又曰其來復則還復也夫恆者久也日月得天而久照此恆彖辭今解之互體則正當兩坎互離之間坎月離日非日月幽而復明乎此用姜維語大明吾國號非返國乎祗解有兩坎兩離而上離未全上震缺上九此似指監國者尚有待耳後寇果再至以戰得勝而英宗卒返國復辟若先見者九四田無禽象曰久非其位安得禽也夫以全坤之田而為九四大坎之豕則宜田有禽而試觀此何田而能有禽乎坤易為震則田已為塗震為大塗以兌易兌則有禽皆脫以咸之上兌易為互兌皆有毁脫之象蓋初升為四陽居隂位在彖詞則謂之剛上而在象詞則謂之非位也况以兌易兌本初位非二位也咸之兌為初九今之互兌為九二六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也五自咸來向之柔居二中者而今居五中猶是位謂巾即猶是德謂柔恆也可守也謂貞第五宜陽位以咸之九五甘遜而易之為六以應乎二向使五而婦人也耶則應二為吉所謂從一而終也使五而夫子則宜以義制而下從婦乎凶也上六振虞張本皆作震說文作榰誤恆凶象曰振恆在上大無功也上為震之三振者震也公羊傳曰震之者何猶曰振振然也故舊儒易本多以振作震震則動動則不恆矣夫震之攸往而能有功者謂其恆也謂其終則有始也若竟以震終則但知有終而不知有始而欲其有功也得乎夫三為巽終巽女則羞而上為震終震男則凶蓋恆固能亨而震已不恆而猶曰恆曰震恆此恆之所以難亨而不恆之所以內有羞而外有凶也象如是也仲氏易卷十四
