body:
  text: 仲氏易卷八翰林院檢討毛竒齡撰艮下坤上二易卦易剝上來三往復初往三來謙歸藏易作兼子夏傳作嗛亨君子有終說苑此下有吉字山形一何髙而居乎地下劉表曰地中有山以髙下下謙也謙則必亨是以君子有終也夫君子剛象也三終象也艮者萬物成終之象也夫以君子之剛處內卦之終而又當萬物成終之艮則有終矣蓋萬物之所以成終者莫如艮見說卦傳訓此以九三為卦主以九三爻即此卦詞故也彖曰謙亨天道下濟而光明地道卑而上行天道虧馬融本作毁盈而益謙地道變盈而流謙鬼神害盈而福京房本作富後漢劉修碑同謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也夫謙自剝來者也夫上與五天道也夫以剝之上而降為三是天道下濟而成光明也謙又自復來者也夫初與二地道也夫以復之初而升為三是地道雖卑而氣上行也天自光明然以互坎言之則坎月有光矣苟爽曰陰去為離陽來成坎故光明以彭城蔡景君說剝上來之三即侯果亦言之然即剝之六三上升乾位為地道上行此皆舉推易之法而未全者且夫三與上卦之終也亦卦之盈也謂兩卦之盈數剝降上之陽而豫之下是天之所盈者虧矣復升初之陽而豫之三是地之所盈者變矣天道虧上盈以益下之謙地道變內之所盈而流其謙于外然且三為神四為鬼而三盈之神居坎險而近于害三居互坎中以險近害三與四統為人道而三盈之剛詘坤下而近于惡三艮詘坤四之下一若鬼神人道亦惟謙是福而謙是好則夫謙之在天固尊而光而謙之在地雖卑而不可以踰非君子之終而何三為神四為鬼見虞翻說象曰地中有山謙君子以裒鄭荀董蜀本作捊多益寡稱物平施字書引易掊多益寡掊者尅也即剝也上從剝來是裒多也益者愈也不虧也下從復往是益寡也損益備則施豫平矣初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也謙之初即復之三也夫三在下卦謙也復遜位以居于初人謙也山在地中謙也而初又為山之足又謙也謙又謙非君子乎雖然互坎在前川也而通視之為大坎則大川矣是惟柔降而剛升者能涉之而何勿吉六二鳴謙貞吉象曰鳴謙貞吉中心得也二為正位而居中則其謙正而出自中心不必自鳴其謙也有鳴之者也鳴者聲也誦也按復為地雷則下卦本震震善鳴而前有互震則又有遙鳴之象所謂鳴也若姚信曰三體震為善鳴而二親承之故曰鳴謙則隔一位矣三四五為互震與二無涉故隔一位九三勞謙君子有終吉象曰勞謙君子萬民服也三以一陽居互坎之中坎為勞非勞謙乎且以剛統柔相其互體與地水之師無二而又据艮之三履震之首則謙讓憂勞或動或止以之成萬物而服萬民固其所也互坎為勞內艮為有終互師互復為萬民服六四無不利撝謙象曰無不利撝謙不違則也三之前後皆順剛不二有何勿利而特其所居位髙有似乎三之謙反聽其指撝然者然而未嘗違度也九家易撝猶舉也陰欲舉三使居上五也去楊簡曰六柔四柔坤體人柔恐過乎謙故使之撝其謙焦竑曰撝裂也開裂坤艮為二之義俱未合六五不富以其鄰利用侵王􅛫本作寢誤伐無不利象曰利用侵郭京本謂爻象俱是征字則下征字復見矣伐征不服也已無所利而惟臣鄰之是利君之謙也然而猶有不服者夫三處剛位而上六則應剛而傲五六二則承剛而不合五皆不服者也夫爻具師象以敵二也命三率師以敵上也九三震之剛有鐘鼓之伐也六五震之柔無鐘鼓之侵也夫五陰見坎而成互離陰爻見坎位為上互之離離主兵戈而人適當此不服之象形于比應則夫仁者之勇或侵或伐光明震動以出之何勿利焉上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也陸德明作征國無邑字謬夫六二之為鳴謙也以本震也此非己鳴之而人鳴之也若上六本艮而倒震且又乘上互之震乃欲效震鳴而自鳴其謙豈得志乎第上六以坤極而加互坎之上地與水互師象也師則居髙而統衆舍虧盈之謙而恃剝艮之剛容或有之然以之為利則不可蓋坤順其性也尊而光者其德也乘剛而應剛乘柔而比柔者其位也以至謙至順居應剛比柔受侵受伐之髙位而以之行師縱曰可亦第自征其邑國已耳張杉曰邑國者采食之都明勿驚逺略蓋上六之謙其配乎有終而思以善成其終有如此坤下震上二易卦易復初往四來剝上來四往豫利建侯行師按公羊傳孔子欲作春秋卜得陽豫之卦宋氏云夏商之卦名王氏易辨云舊易豫上原有陽字如習坎類而周易刪之然不可考矣彖曰豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動故刑罰清而民服豫之時義大矣哉豫有二義早計也爾雅豫叙也郭璞曰事預備則有敘樂也即悅豫之義蓋先物而動則莫如雷之出地而雷既出地則物以生成而樂然而曰建侯曰行師者震為侯坤為土建侯象也以一陽統五陰為地為水三四五為互坎而以上震之長子帥之行師象也此義見鄭𤣥諸說若韋昭注國語以坤為居樂為建侯震為外威為行師皆通雖剛非中位然一剛而諸柔應之四非中故不止與初應與剛中而應不同且合三五之互坎與體之大坎坎中為志見前剛得應而志自行下順上動此與天動于上地順于下者相同而況君之撫有此衆乎故其在天地則日月不過互坎大坎皆與伏離為背合坎月離日無過差也四時不忒上震正二月卦下坤六月卦又四月卦互坎十一月卦互艮二三四為互艮十二月卦遞四時而順序之不少僭也其在聖人則坎為律而互艮而止而刑清坤為衆而居下而順而民服則是剝與復為時卦復陽生之時十一月卦剝陰長之時九月卦乃易而為豫而長陽絀陰之義皆見焉一陽帥五陰何其大也按國語晉侯將入秦筮之得屯之豫初四五三爻皆動占法爻動多則占彖故司空季子占法謂屯豫彖皆利建侯得國之象也詳見屯卦若占此彖則曰坤母也震長男也母老子彊故曰豫坤為大母故老震為長子故彊其繇曰利建侯行師居樂出威之謂也居樂坤內出威震外居樂故利建侯出威故利行師此皆以兩卦內外及說卦互象為斷與推易之法正相表裏若晉史郭璞傳所載晉元筮興復事晉史元帝為晉王時使郭璞筮之遇豫之暌家璞曰會稽當出鐘以告成功上有勒銘應在人井泥中得之繇詞所謂先王以作樂崇德殷薦之上帝是也及帝即位太興初會稽剡縣果于井中得一鐘長七寸二分口徑四寸半上有古文竒書十八字人莫能識則近乎狡獪且第有案驗而無占斷驟覺難測及以推易之法衍之則瞭若指掌非畸事也豫上震下坤震為龍為首出之子而下連坤土此奮而出地之象也悔為睽上離下兌嚮明而治而金以宣之體離互亦離暌二三四為互離此重明重光中興之象也震為鳴為聲見前故先王以作樂崇德而合暌之兌金以升于暌之離火是坐明堂向南離而考擊鐘鏞以作樂之象也祗兩卦皆有坎水以陷之豫暌三四五皆互坎則尚在陷中未經出土而豫坎互坤豫三爻為坎坤互用則當在水土之間況豫之震為東方離為南方見說卦會稽者東南郡也豫有互艮二三四為互艮艮為成萬物之所以成終者也見說卦則非告成功乎若曰鐘有勒銘有古文則睽離為文兌為言以文為言非勒銘乎至若長七寸二分者南北為縱縱即長也南離之數天七地二此大衍之數宋儒誤以為河圗者下同則七寸二分也大數陽小數陰也東西為衡衡即徑也西兌之數地四天九則四寸半也陰數四折陽數之九而半分之則四寸有五也象曰雷出地奮豫崔憬以雷出地句奮豫又句先王以作樂崇德殷薦之上帝以配祖考易通曰樂樂也初六鳴豫凶象曰初六鳴豫志窮凶也豫上為震震當鳴說卦而初自復來向時之震鳴今已易為坤喑矣乃復倚虛震而為之鳴夫無實而有聲者為妖五行占法稱鼓妖是也況震鳴在四而我故先之是太早計也計之太早則似豫而實窮矣窮則凶凶又何樂六二介于石不終日貞吉象曰不終日貞吉以中正也此以不豫為豫者也二處坤之中以陰居陰而五不我應乃復當艮山之初而介艮剛以與五相阻是介于石也說卦艮為石且離象為日下卦本離位純陰則見一二三離位說見前而二當離位之中離象未竟離象終于三爻以三為下卦終也是不終日也夫前有所介而其所自處者復為不終日之計可謂豫乎然爻處坤中順而守正與初之妄動者反可謂不豫乎夫初與二同為地道而一動而凶一順而吉此無他順動之致殊由中外之勢異也以一卦言之則二為中初亦為外六三盱豫悔遲有悔象曰盱豫有悔位不當也向秀以盱為盱睢亦承視貌三多悔介亦多悔見繫詞蓋以坤迷之盡當艮止之半不能早計徒仰視上震羡其所得而悔之則亦晚矣悔恨與改悔同義夫離為目說卦三四半離而從上則為盱目盱者張目上視也三隂四剛得離半目而三陰從四上剛有上視象徒盱目以觀雖曰悔晚然不可謂無悔也何也位使然也九四由豫大有得勿疑朋盍簮象曰由豫大有得志大行也此其為豫則有所自者也由自也自復為震震則先事而動自剝為艮艮則後事而成先事而動則早計後事而成則樂此豫之大有得者故互坎為疑而互艮止之曰勿疑也夫西南得朋五陰皆朋也而合而總乎此矣盍合也簮總也以一陽括衆陰而貫乎其中如簮之括髮者然非得坎志而大震行不至此玩辭困學記曰或謂古無簮字按鹽鐵論神禹治水遺簮不顧列女傳姜后脫簮家語孔子聞哭蓍簮皆是六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也坎為疾說卦疾與豫反書所云王有疾勿豫是也夫四五皆互坎而體之大坎通體中實為大坎則君獨受之第坎象為月而五當坎上正弦滿之時所謂縆也縆與恆同即詩所謂如月之恆者雖恆有半魄而中明未亡實未嘗死月魄謂之死書曰旁死魄則為久長計仍有類于不終日者此則豫仍未豫者也五與二應正上坎下離相對之位而上爻不純且四剛逼而多亢遂致坎憂說卦離樂南為凱凱者樂也南方長養萬物故樂坎月之恆明反不如離日之暫麗如此上六冥豫成有渝無咎象曰冥豫在上何可長也上自剝來剝上剛為艮而今易四柔而冥艮之跡是豫之有成者莫如艮所謂成言乎艮者見說卦而今已變而渝矣渝則冥冥則不長然而猶無咎者天下難與圖成者未必不可與慮始既已遇豫而敗其所成則變動方開正謀始之事所謂以毁為成以變為正者豫道有焉几一陽所推之卦俱自剝復則俱從初上對易然特于此卦發其例如初既變震則鳴震為凶上既變艮則冥艮為無咎第于九四所易之爻直揭由字以明推必有由而初揭震鳴上揭艮成與一陰推自姤夬而履揭夬履同人揭姤遇正同特姤夬分揭二卦而此從一卦並揭之則亦陰陽竒偶之微意耳蓋推卦之顯著而精核如此震下兑上三易卦易否上來初往又易咸三來初往益上來四往隨元亨利貞無咎彖曰隨剛來而下柔動而悅隨大亨舉正謂此下脫利字謬貞無咎而天下隨時王肅本時作之本義從之隨時之王肅本作之時本義從之義大矣哉隨者從也震動乎內而兌悅乎外動則將為人所從而悅則因而從之則以悅從動以兑從震以陰柔從陽剛隨義固然第震位正東為初春之卦雷動水隨則陰本從陽而兌位正西為秋盡之卦雷收澤中則陽又從陰所謂時也蓋隨自否來以上剛與初易又自咸來以三剛與初易又自益來以上剛與四易皆剛來而下乎柔則原是以陽從陰而既易之後下動上悅則然後以陰從陽是必動而能通不詭隨而一以正按左傳襄九年穆姜筮艮之隨有元者善之長也數語與乾卦同是舊易几元亨利貞皆作四德如坤之元善屯之立元與此傳可驗自孔子贊易始斷以四德豫乾而餘皆解作大亨以正詳見乾卦及鄭康成注此卦仍曰能長之以善通其義禮和之以義幹之以正則功成而有福是必漢時古易未亡其斷法原如是耳則陰陽相隨惟時所從所謂天下隨時者此其義豈細故也宋時金主完顔亮入冦筮蠱之隨此正相反之卦六爻俱動然仍占遇之兩卦彖朱子謂六爻俱動則占遇卦者益謬矣說見乾卦占者曰我有震威震為出威見國語而外當毁拆兌為毁拆見說卦敵敗之象也內我外敵蓋隨自否來又自益來皆以上剛填下柔而蠱之所變亦復如是艮上變柔蠱艮上九變隨兌上六巽初變剛蠱巽初六變隨震初九乾元在上下填坤初斷金主之首而墜于地矣且兩互為漸三五互為巽二四互為艮合之為風山漸漸之辭曰夫征不復其何能返後果驗象曰澤中有雷隨君子以嚮晦入宴息翟𤣥曰王者嚮明視事嚮晦宴息時也九家易曰雷藏于澤八月之卦正天下隨時之象初九官蜀才本作館有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也夫初以否上咸三為震剛是今之為長男為出帝帝出乎震所稱官者皆從初柔之變而得之者也渝者變也第四為正應兩剛不交唯出當互艮二三四互艮為門闕則二與四同功見繫詞二柔四剛似乎可交而特其所交者功焉耳非其應也夫出門者隨也隨而得陰不能無失顧變柔得剛則自處者既已正而在前所隨復陰陽同功則彼之所有亦即官之所有何失焉蓋同功為互體此三聖所共演而其說不明乃此曰有功而四爻之所應者即曰明功猶不明乎合此與四爻對照其義倍著觀易者審諸明功非明其同功之謂此但借以明推卦說有如是耳六二係小子失丈夫象曰係小子勿兼與也三陰固當隨謂之婦隨而特此婦人之足羇絆不前猶圈豚然每隨男子輒若為男子所係纍者況二三兩爻聨袂相隨又復前當少男互艮少男而後遇長子正震長子夫少男者小子也孟子子男同位長子即大夫也長子稱丈夫猶師長子稱丈人也今二之所隨本近大夫而忽與小子同體二居震之中而互艮之體即始于是所謂同功一體者長者足未展而小子之手已拘之震為足艮為手前後牽曳勢不兼與是前所見係者為小子而後所失者在丈夫也六三係大夫失小子隨有求得利居貞象曰係大夫志舍下也乃若三甫入艮門而震足已追及之三居艮中當震足之末小子之艮背尚未依而丈夫健足一若連雞之不可解是後所見係者為丈夫而前之所失者在小子也夫力求上進猶懼不前志在居下安望有及舍居也特是三自咸來當在咸時居剛為巽六二九三九四為互巽而今易為柔柔亦為巽六三九四九五為巽是我之所隨雖已受巽繩之係而未必不足邀巽利之得巽為繩為近利市三倍惟恐小子在前豔其多獲四爻隨有獲忘向之所失而于此復求其有得則前後長少牽曳何已故曰三位不正惟正則吉也蓋惡三之多詭隨也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也九四居巽中而利有獲見上爻自此以往將必凶幸身居坎孚二至上為大坎坎為孚當離明之旁一至五為大離離為明而震行隨之震為行為塗則我之有孚已在道塗即當六二同功之始而其義已明雖凶何咎蓋四與初應兩剛不交故藉二以為功而四亦藉二之同功以為應其相隨而相照如此九五孚于嘉吉象曰孚于嘉吉位正中也此全卦之君上大坎而下大離得負陰向明之治而坎孚離嘉文言亨者嘉之會也為南方離卦之位故為嘉祗位當正中而上下應焉隨之主也上六拘係之乃從王弼以此句維之王用亨與享通用于西山象曰拘係之上窮也此陰之見係于五者也凡隨皆以後從前而係則有與後隨者上之係五猶三之係丈夫也苐此之所係固結不解係之又係之來易曰維與係同詩曰縶之維之但重係之耳乾鑿度亦云上六九五拘繫之又維持之則以隨至此而極上窮也無可解焉蓋此爻在益原居巽剛益上為巽今變為三五互巽其巽繩所係與二三同而倒巽尤甚至隨之之盡內動外悅天下皆隨于是告名山而升享祀一如我周之肇西土者自非隨時之極大亨以正焉能有此兌西方之卦連艮為山而此當兌口象為饗食當其時者非王而何何氏訂詀云兌為巫凡卦有兌者多象祭祀如萃之王假有廟損之祀事遄往困之利用祭祀升之王用享于岐山皆是蜀才曰此本否卦剛自上來柔自初升亦推易一法仲氏易卷八
