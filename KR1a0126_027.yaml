body:
  text: 仲氏易卷二十七翰林院檢討毛竒齡撰繫辭上傳此十翼文也舊以上彖下彖上象下象上繫下繫文言說卦序卦雜卦為十翼而此二翼者從釋彖釋象後専釋周文當日作易屬辭之意故曰繫辭繫者屬也第屬辭指文王如辭中早有繫辭焉而明吉凶與繫辭焉而命之諸語豈夫子自指之故舊以此為繫辭𫝊如王肅本李鼎祚本皆作繫辭上𫝊繫辭下𫝊按侯果亦有下繫冇天道地道人道語先于王弼宋人謂上下分自弼注非是惟史記引此辭同歸而殊塗一致而百慮作易大傳說者謂史遷曽受易楊何何自為𫝊或作遷自為𫝊謬故特加大𫝊以别之大抵二𫝊並發明推易分聚以屬之為卦辭爻辭之例雖重言彖爻大義并蓍筮布揲諸法而大㫖在屬辭則繫辭名焉若轉易之義則雜卦言之對易則序卦旁及之至說卦則藉以釋經與爾雅釋詩同一義例詳見傳下天尊地卑乾坤定矣卑髙以鄭康成本作已陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣乾坤定位而全易見焉六子之本乾坤與周易之首乾坤皆以是也夏易首艮商易首坤異是乃即以位之卑髙即尊卑也其曰卑髙者以卦爻從下起也而定為因重之法或下或上互相區别而卦位爻位之貴賤亦以是定卦位如剝復分死生否泰分君子小人類爻位如二譽四懼三凶五功類乃又諦觀諸六十四卦中其為變易者幾何交易者幾何變易者以陽變隂以隂變陽變者為動不變者為靜如乾變坤則陽動隂靜坤變震則隂動陽靜類交易者以下卦交上卦以八卦交六十四卦上交者為動下受交者為靜如下乾上乾則上動下靜下乾上坤則坤動乾靜類此申言羲畫以起推易詳見二卷就其或動或靜者而反覆審測令有常度則其中有剛者有柔者有柔而剛者有剛而柔者而剛柔斷乎其中剛柔者隂陽也隂陽既斷可以屬辭矣乃于是倡為推易之例曰方以類聚取此六十四卦三百八十四爻中其上下方位隂陽合并者謂之聚卦除乾坤成列外如否泰為三隂三陽合并剝復為五陽一隂合并姤夬為五隂一陽合并類夫陽與陽類隂與隂類而從而聚之是類聚也乾卦所謂亦各從其類者是也乃即此卦畫之類聚者物為隂物陽物即卦畫也說見二卷而于以推移而分易之謂之分卦亦謂之易卦如移泰二爻于上則為賁移否二爻于上則為革類易卦者以移易為卦與變易交易不同變者陽變隂隂變陽此但移之耳未嘗變也交者隂陽各出其一對待交易此止移其一爻無對待也此例從來言易者皆未之及夫聚陽為陽羣聚隂為隂羣而此為分之是羣分也否卦所謂大人否亨不亂羣是也而于是乃為之辭就分所自來而依象立言在彖有彖辭如訟以遁三易二而彖曰剛來而得中既未濟以泰二易五否五易二而皆曰柔得中類在爻有爻辭如訟初移中孚之兑兑為言則爻曰小有言既未濟三四爻移損益之坤艮坤為方艮為鬼冥門則爻皆曰伐鬼方類餘見二卷并各卦下雖卦自羲畫文未嘗推即羲但畫卦重卦亦未嘗移易而文王以推易為屬辭之法而審其美惡著其休咎遂屬之為吉凶之辭以為司筮司占推易定繇所自始使列國史氏就辭論事疑鬼疑神斯世所相傳而驚且怪者而皆本諸此何變化也然且辭義之博震雷巽風離日坎月以至艮山兑澤乾金坤土震竹巽木牛馬甲兵井繘牀胏凡天地間有象有形者皆得以變易造化而為之辭其屬辭也如此専指繫辭言故謂之贊周易不然則涉羲易矣畫卦無隂陽分聚之法自不曉推易卦爻俱晦至于辭則開卷䝉昧兩漢至今其同在漆室久矣小年讀易疑憤滿胸至讀繫則廢卷纍月日方物分聚豈無實指而漢儒就卦爻推測則或水或火鄭氏云類聚羣分謂水火也或陽或隂九家易云陽道施生為方隂主成物曰物或坤或乾虞氏云坤方道靜故類聚乾物動行故羣分或姤或復九家易以姤卦陽爻聚于子為類聚復卦隂爻羣于子為羣分全無把鼻而王弼矯枉槩以混沌施之但曰方曰物不立義疏致宋人憑臆無所捉摸以方為情曰情向以物為事曰事物又以方為理曰事理以物為形曰物形如程氏謂事有理物有形事則有類形則有羣又總以方為事理總以物為事物如本義方謂事情所向下又總云事物善惡周章蔑略東投西驀而至于分聚則全不問何等為聚何等為分何故言及聚何故言及分朦朧冒昧迷悶不釋而近之言易者且援及康成樂記之注以方為行蟲行蟲識道理故稱方以物為植物植物不識道理故僅稱物且引楊慎以方為虸蚄張有復古編以虸蚄為子方作據嗟乎經學之晦蝕一至于此尚不痛自振拔而動狃成說轇固不解亦獨何矣是故剛柔相摩八卦相蕩或作蕩義同鼓之以雷霆潤之以風雨日月運姚信本作違形誤行一寒一暑乾道成男坤道成女乾知大王肅本作泰始坤作虞翻姚信本作化成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而馬融王肅本而下皆有易字成位乎其中矣剛柔相摩即推隂推陽也摩者推也兩物相推為摩八卦相蕩從八卦之已重者而移易之蕩者移也如移舟為蕩舟可見此時隂陽已成故稱剛柔畫卦已成故稱八卦夫震艮巽兑即雷霆風雨也坎離即日月也今乃以推移摩蕩之法而鼓之潤之運行之以此推彼以彼推此一往一來如寒暑然而總要之于乾坤之成列成男成女即成列也故曰乾坤成列而易立乎其中矣夫乾坤成列則止一知能祇一易簡而萬事萬化皆從此出其有體有用如此乾知為知坤作為能大始即資始其云大者以八卦始乾坤而坤又始于乾也何氏曰易知則不逺人以為道故有親易從則聖人夫婦皆能故有功聖人以德業配久大而成六位見乾𫝊以守寶位見下繫參天兩地豈外是焉本義分章句以此上為第一章非是聖人設卦觀象繫辭焉而明吉凶虞氏本有悔吝二字誤剛柔相推而生變化夫所謂類聚羣分而生吉凶者繫辭也前未明言繫辭故此以繫辭直揭之所謂成形成象而見變化者即推易也前未明言推易故此以推易特指示之蓋三易之法文王倡之惟夫子能知之然不欲明言但以隱微相㑹悟如雜卦明有轉易然閟不一及序卦補言對易然若不解對易者可驗也設者倡施也已成之卦文不再畫而乃曰設卦則明明以推易為文所設矣設推易之卦觀其象而繫以辭吉凶之生生以此矣天地即剛柔推剛柔為辭而變化見此即變化矣仲長統傳曰雖周物之智不能研其推變以推能變化故以推變合言此皆善解處按李鼎祚謂文王觀六十四卦三百八十四爻之象而系屬其辭則爻辭皆指文王與史記同嘗集徐仲山許講推易之法其子東謂說經必有據向疑輔嗣說易啓宋人杜撰之習以少據也推易何據耶仲山厯引焦贑虞翻侯果蜀才九家易諸家以示之時方說上繫東誦類聚羣分語曰得之矣仲山曰未也試訖誦之至此二語仲山故朗聲以和其誦曰何如東拜曰聖人明指之而世不察何也此見康熙丁卯𫝊是齊録是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也虞本作晝夜者剛柔之象六爻之動三極之道也是故君子所居而安者易之序虞本作象也所樂虞本李氏易解俱作變而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利元吳澄本刪是以下十字從吉凶變化而申言之悔吝與吉凶為類剛柔為變化所推此總卦爻辭也若獨言爻辭則六位具而三才備焉陸績曰初二下極三四中極五上上極何氏訂詀曰三極者天地人也六爻初二為地三四為人五上為天三爻一為地二為人三為天故以此為筮揲所始則靜用所次之卦辭動用所占之爻辭居止也安也即靜也樂者動也論語曰知者樂又曰知者動可驗序次也即居次之義居玩卦之次而又曰玩辭則知玩卦辭也動玩爻之辭而又曰玩占則知玩所占之爻辭也彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭而彖辭爻辭因之以分故第以吉凶言不及變化而悔吝無咎皆可類見蓋卦有卑髙大小之位見前著為推易而總存之于辨吉凶之繫辭則所謂類聚羣分而吉凶生所謂繫辭焉而明吉凶者如是其三致意也憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之若夫前所云憂悔吝者祇存乎介介者吉凶之間也震無咎者祇存乎悔震者厲也悔者變也見乾卦但從吉凶之辨推暨之而于此為辭者指上言乎其失得諸語即于此為占存乎介諸語雖卦辭爻辭各有小大險易而辭各指之其以辭為占如此易與天地準故能彌綸天地陸德明本作下之道仰以觀于天文俯以察于地理是故知幽明之故原始反鄭氏虞氏李鼎祚本俱作及終故知死生之說精氣為物遊魂為變是故知鬼神之情狀是何也則以易本乾坤而天地之道皆彌綸其中焉彌滿也說文云開弓也謂弓開則滿也王肅云綸者纒裹也統之為包絡之義故虞翻曰易在天下包絡萬物故仰觀俯察則乾坤成列而隂陽以分幽明即隂陽乃推其隂陽之初聚者曰原始九家易曰隂陽交合物之始也隂陽之既分者曰反終九家易曰隂陽分離物之終也原始則隂精陽氣聚而為物王弼曰精氣絪緼聚而成物亦以聚言又朱漢上曰氣聚為精精聚為物反終則魂升魄降散而為變遊散即推移皆指卦言故京房易有遊魂歸魄之卦雖說與推易不同然其為卦則一也又鄭康成以精氣為七八遊魂為九六七八木火之數九六金水之數木火用事則物生故曰精氣為物金水用事則物變故曰遊魂為變雖其理有之然與詞義不合若後魏正光厯推四正卦術焦延夀用卦氣值日皆術數别學與易無與矣凡隂幽陽明始生終死鬼歸神伸之說由推易以為彖象而玩辭玩占厯厯知之物即方物舉物而方在其中變即變化舉變而化在其中與天地相似故不違知周乎萬物而道鄭𤣥本作導濟天下故不過旁行而不流京房本作留樂天知命故不憂安土敦乎仁故能愛範圍馬融王肅本作犯違猶裁成也天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體以此參天地周萬物雖行權反正旁行側見而未嘗流失在天為樂天在地為安土是天地為我範圍萬物于以曲成通于寒暑運行晝夜往來之道而厯見其知者也然則方以類聚而分之則無方物以體分而易之則無體屈平曰聖人不凝滯于物而能與世推移無方無體雖物也何凝滯焉前以分屬物而此曰精氣為物以聚言前以聚屬方而此曰方無體反以分言此皆互言之以見變化處一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮鄭氏本作鮮矣顯諸仁藏鄭氏本作臧云善也諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成古蜀本作盛象之謂乾效陸德明本作爻蜀才本作效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神夫物與方即隂陽也隂陽即道也向所謂由易簡以推知能而盛德大業皆由此出者以為繼道者善也乾元坤元皆善長也乾健坤順皆隂陽之德故可以善言繼善而成之者性也成已成物皆性生也此性單指人言故可兼成已成物性成于善故孟子謂性善然且得陽之性者曰仁得隂之性者曰知仁見則謂仁知見則謂知隨其見于人者而稱之彼百姓日用何嘗非道特不知故道鮮耳知字應上知幽明以下數知字有如仁顯乎外而用藏乎內震動萬物而不假聖人憂世之憂此正向所謂盛德大業而各得其至者有如是也然則由盛大以見推易而屬辭應占變化不測夫豈無所謂而云然者乎生生推易之法效法者呈其法也韻㑹曰效呈也進也韓信𫝊願效愚忠唐書持衆美而效之陽之變隂從坤始故推移轉變其法首于坤見之而後推極其三百六十四爻之數以為彰往察來占卜之事吉凶變化皆本于易夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也専陸績本作蟲其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德則何其廣大也是乾坤之大生廣生推遷不窮者即天地也即四時日月也即至德也大生廣生即生生之謂易所謂推易之法子曰易其至矣乎吳澄本以此句割系至德下刪子曰二字夫易聖人所以崇德而廣業也知崇禮蜀才本作體卑或作俾崇效天卑法地天地設位而易行乎其中矣成性存存道義之門是故盛德大業斷自乾坤成列始成性即成之者性性善在中此隂陽道義之門户也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻易學四同以此五十六字與後重出刪去然後以六十四卦三百八十四畫之賾且動者為彖為爻彖者言乎象者也故象即彖也羲為爻畫文為爻辭就物之形象物即隂陽說見前以各有所宜曰物宜形容即形象所云成形成象也推移㑹通立法典禮即法也立法說見前而于焉屬辭所謂類聚羣分而吉凶明者既明之可斷之也此繫辭也此又致意也言天下之至賾而不可惡荀爽本作亞云次也也言天下之至動鄭氏虞氏本俱作頤鄭云當作動虞氏云動舊誤作賾九家易作冊而不可亂也擬之而後言議諸家及鄭氏本俱作儀之而後動擬議以成其變化易學四同移此三十五字置後極天下之賾者上不通繫辭者言也乃其所言有善繼之者善無惡鄭康成注作烏落反則不可惡靜正不禦見前則不可亂擬議推移而變化成焉所謂剛柔相推以生變化者既生之當成之也此推易也此又致意也鳴鶴在隂其子和之我有好爵吾與爾靡古一作縻京房作劘之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎此下七節本文言傳文而脫誤于此者吳澄本竟刪此七節同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭漢晉諸家易皆以諸所贊屬互卦言如中孚互艮震震為言行又艮為門故曰樞震為動故曰機此則同人互乾巽乾為金巽為利又巽為草木為臭後謙與節皆有互震故有德言禮言及言語為階語按之良是後漢郎顗疏奏臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲斷金之利此以二人指君臣言與文言斷節取義正同漢人易傳與韓嬰詩𫝊皆倣此體初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎一作順斯術也以往其無所失矣勞謙君子有終吉子曰勞而不伐有功而不德鄭氏本作置云當作志厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也此見乾卦文言傳不出户庭無咎子曰亂之所生也則言語以為階姚信本作機君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也虞仲翔以節本泰卦故坤為亂互震為言語乾坤為君臣此亦推易法子曰作易者其知盜乎易曰負且乘致寇古本作戎宋衷謂戎誤至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨虞氏本作悔云坎心為悔盜冶鄭氏及諸家本作野太平廣記作蠱容誨淫易曰負且乘致寇至盜之招也仲氏易卷二十七
