body:
  text: 仲氏易卷二十六翰林院檢討毛竒齡撰離下坎上三易卦易泰二往五來又易咸四來初往益上來三往既濟亨句小虞翻本誤以此作句朱本義遂謂亨小是小亨之誤大謬利貞初吉終亂彖曰既濟朱本義謂此下脫小字亨郭京謂此下脫小字俱大謬小者亨也利貞剛柔正而位當李鼎祚本作當位則與亨終窮韻不協矣非是也初吉柔得中也終止則亂其道窮也上經終坎離下經終既未濟說者謂坎離為乾坤之用既未濟又坎離之用又謂轉易之卦至坎離而窮坎離與乾坤皆無倒易之法兩互之卦至既未濟而窮既未濟上下兩互俱仍是坎離而互卦以窮實則文王推易以全經為首尾乾坤者聚之始既未濟者分之終隂陽渾聚始于乾坤隂陽等分極于既未濟蓋六十四卦中無有一隂一陽循次間析如二卦者也故夫子闡易于十翼之首倡曰方以類聚物以羣分而于六十四卦之終即以未濟一卦統之曰君子以辨物以居方所謂方即類聚之方也居方者陽與陽居隂與隂居也所謂物即羣分之物也辨物者一陽分一隂一隂又分一陽也故以全經觀之則乾坤為居方既未濟為辨物而以終卦言之則隂陽相間為辨物隂陽各見為居方推易之法實于繫辭開其始于大象收其終焉夫水火者本相反而實相需者也相反者既見之火澤之睽澤火之革彼火上澤下則火不及澤澤不及火睽而已耳澤上火下則火必及澤澤必及火而于是有更革之行若相需則不然火上水下則炎上者益上潤下者益下火水不交未有利益而苟其坎在上而離在下則水火互入炎潤交契于此不能無相資相助之用若此者所謂濟也即春秋傳所謂寬以濟猛猛以濟寬者也第卦兼坎離坎獨利涉繫詞有云舟楫之利以濟不通則又以濟渡之名當利濟之目是坎在外而離在內者雖水火相交原自有濟然亦以坎水在外則自此涉彼濟之可盡以盡于水也盡者既也離在外而坎在內者雖炎潤未接本未有濟然亦以坎水在內則自此涉彼濟之未可盡以未能盡于水也未盡者未也況卦合正互皆具兩離兩坎之象而坎上離下則以二四之坎而接外之正坎上下皆水而濟至于盡離上坎下則以內之正坎接三五之坎上下雖皆水然阻于上九而濟不至于盡則雖同此濟而既濟未濟分于其間故曰既濟之亨小者亨也以隂皆藉陽以通也三陽濟則三隂亦濟也小利貞者以隂皆藉陽以得其正也三陽踞剛位一三五則三隂自得踞柔位二四六剛當位而正則柔亦當位而正也凡易剛柔正者一十六卦若當位而正則惟既濟一卦耳特其間有初終焉初之吉以陽始也陽在始則隂在次而得中所謂柔得中也初吉之初俗指以為二中誤甚若夫終則止于柔也止于柔則隂陽道窮一隂一陽之謂道隂陽道窮則易亂以明周易言道未有得止以隂者也此以既濟言至若未濟而亦亨以陽終也陽在上則隂當在五而亦得中所謂柔得中也俗以柔居五為得中而亨非是若夫終則止于剛也止于剛則不可不續不績則無攸利以明周易言道亦未有僅止以陽者也此指未濟言蓋易無終窮道惡其盡其不終于既而終于未以為窮則不通不續則將終續耳雜卦𫝊曰既濟定也未濟男之窮也男之窮者陽終也惟終故窮惟男之窮故續終蓋陽為剛為男陽在上則為終為窮宋人不善言易妄以三陽失位為男窮之證則三隂不失位乎宋人傳程頤講易成都有桶匠過之指未濟曰三陽皆失位頤遂有省按未濟六爻皆不當位何止三陽且不當位何可言窮觀彖傳以終止為道窮不當位為剛柔應則其以終為窮可驗矣既濟亨句小利貞又句與小利有攸往同自虞仲翔誤以亨小作句而朱元晦遂改作小亨誤矣張杉嘗曰既濟亨小未濟亦亨小幸而狐汔濟不可句耳此雖諧語然至當之言既未濟亨字相對侯果謂此本泰卦六五降二九二升五此推易法楊廷秀云泰者既濟之純既濟者泰之雜泰分三乾之中于三隂之中遂為既濟象曰水在火上既濟君子以思患而豫防之易或曰既濟即是患徐仲山曰預防者防濟後也恐其終止則亂也初九曳其輪濡其尾無咎象曰曳其輪義無咎也車輪所以濟行也二四為互坎坎為輪說卦而初迣輪後是曳之也坎為水在前而初涉之上為首初為尾是濡其尾也夫車行而曳之水行而濡之其何以濟然而無咎者以既濟在初則義未可以濟也此既濟而嘗恐其不濟者也既未二濟皆取象于濟水然而既之初未厯坎也而曰濡尾未之終踰坎矣然仍曰濡首以上下互坎皆水也既濟濡首尾未濟亦濡首尾者以求濟則無論己未無不濡也祇未濟之彖則僅濡尾而止耳故謂之未言此時猶未續耳六二婦喪其茀子夏傳作佛苟爽作紱堇遇作弗勿逐七日得象曰七日得以中道也離為中女而二當離之隂爻隂位則又婦也顧是婦本泰乾之陽移入坤五為坎中方在泰時乾為首互震為髮俱見說卦而今易為坎而首髮已喪是其喪之必有先為盜之者盜之者坎也易乾二之首震初之髮為坎故坎盜之王肅曰坎為盜離為婦空其茀鄰于盜也坎盜之則當逐坎而勿逐也夫二五皆中道也以中易中合二五而為七數則七日當得之所謂二五應而七日得者王肅曰勿逐自得履中道也二五相應七日得也雖不濟不其濟乎茀佛通首飾也虞仲翔曰謂鬒髮也乾為首取乾二之坤為坎坎為盜故婦喪其髮王輔嗣亦曰茀首飾也故子夏傳直作佛字可驗若荀氏作紱此由茀誤芾虞氏謂俗說以髮為婦人蔽膝之茀非是至他儒以車笰為解則茀亦原可通笰祇首飾在婦身可専稱婦茀若車茀則凡巾車皆有之如蒲笰藻笰類婦所乘者獨翟笰耳是當稱婦之車笰或翟笰為辭豈可單單以茀之一字屬之婦者況漢晉前儒從無以茀為車笰者也或曰笰與茀不同爾雅車前謂之鞎車後謂之笰笰即蔽也故周禮作蔽而毛晃增韻以茀通笰則熊忠舉要即指為誤此亦說之最可據者若七日之解則夫子象傳明言之此與震六二勿逐七日得故自不同九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊陸績作備云當為憊也三自益上之剛來為九三夫上者髙位剛者君象也方在益時三在互坤之間而當互艮之初坤為方艮則鬼冥門也見鄭注夫西北之戎有云西落鬼方者在殷武丁曽伐之武丁髙宗也以上剛之尊下伐鬼方豈曰無濟然而自上至三已經三年三當坎間坎為勞則亦憊矣第坎夾兩隂自今伊始寧無小人從而覬覦之者此勿可用也彖曰小者亨勿使亨也漢匡衡疏云成湯化夷俗而懷鬼方西羌傳云殷室中衰諸侯皆叛至髙宗征西戎鬼方三年乃克此是實事蓋鬼方本商先王屬國而髙宗乃伐叛者程𫝊云髙宗必商之髙宗似乎設為其事以為象非也又九三以離三而當互坎之中離為戈兵而坎為寇盜故有此象若鬼方在北而又稱西落西北者正乾三位耳髙宗伐叛此正中興賢主所為而宋人動輒以好大喜功目之致小人勿用亦以為髙宗誤用小人之言故伐鬼方夫小人勿用此在克鬼方後與師卦上六開國承家小人勿用正同乃以小人為興師之由則必如宋之國破君亡而必不興師乃為君子乎漢武自訟尚以齊襄復九世之讎為辭況西落本成湯所服而中衰叛去則非髙宗聖主必不能為之振興者徒以拘儒黷武之說橫據胸臆遂欲以此升降古王何其妄也如此言濟世之難此六四繻釋文作襦子夏王廙本作襦說文作需王弼云繻當作濡有衣袽說文作䋈潔緼也京房本作䘫子夏傳作茹終日戒象曰終日戒有所疑也咸為大坎而三剛連比如舟之濟水者然自九四來初一陽中虛而舟之罅漏生矣舟漏則濡此四之所以為繻也繻者濡也見王氏注特衣有敝䋈可塞舟漏故敝䋈名袽而四在咸時所云居三剛之中而連比若舟者即互乾也乾為衣而去乾中畫而示以罅則衣已敝破乃即此敝破之衣而填之互乾之中一如敝䋈之塞舟漏者則雖濡而有衣袽矣顧衣袽可恃乎釁舟用臭䋈一釁再三顧雖幸濟亦安可不戒也繫曰四多懼懼即戒也象傳曰有所疑也疑亦有懼意蓋離為日四處互離中而又當下離之盡故曰終日其又曰疑則以四居咸互巽之三巽固有疑象耳繻繒采也即漢制以帛邊繻頭為關門符信者故舊說以終日戒為關防戒嚴之意則是以漢制解周易矣若直釋作衣則衣又有衣無理且與濟義不合虞氏易謂伐鬼方三年旅人訴勞衣服皆敗鬼方之民猶或寇竊故終日戒之則以振旅之際而猶慮敵人竊其敗衣非笑話乎按說文引易作需有衣䋈需濡便文而王輔嗣注直曰繻當作濡則猶是漢晉人師承有據之言若夫袽䋈帤同音同是敗絮塞舟漏之物故徐鍇云帛臭臭者敗也黃庭經云人間紛紛臭如帤亦指臭敗而尚書盤庚篇有云若乘舟汝勿濟臭厥載則竟以臭為敗漏之義似乎帛臭之名原以治臭為臭者此正與濡舟之說更相發明學者審之九五東鄰殺牛不如西鄰之禴漢書作瀹祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也九五以泰乾中陽推之填坤之中隂隂陽易而東西分焉坎為水與西金伍曰西鄰離為火與東木伍曰東鄰虞氏易以震為東兑為西震動五殺坤兑動二體離是以五為東鄰二為西鄰大謬雖既濟之世國無兩大而第以水火敵應觀之儼鄰比之相分峙者彼夫百物俱濟各主饗祀而其在東者變乾畜而為離牛且加之坎刑之刃坎為刑律是殺牛也在西者移坤牲而作坎豕且承之夏離之禮是禴祭也禴夏祭名離為夏為禮奢不如儉衰不如盛冬蒸之用牛不如夏禴之用豕所謂時也得其時則吉之來且大矣豈止小者亨而已哉按坊記云君子不以菲廢禮不以美沒禮苟非禮雖美不食焉易曰東鄰云云又應邵有云泰山不受季氏之享而易美西鄰之禴此但以不如立說非解易義李氏易解載崔憬說以有周受命之日為言且云按尚書克殷之嵗厥四月哉生明王來自商至于豐丁未祀于周廟四月殷之三月春也則明西鄰之禴得其時而受祉福也繹其意似謂此四月克商之後來祭周廟向使在商則時尚三月為春春當郊祀殺牛以祭而今為周之四月四月惟夏則禴祭矣商之殺牛不如周之禴祭者一失時一得時也其說甚巧但崔氏原文則以上坎為月月出西方謂之西鄰下離為日日出東方謂之東鄰此本康成舊說即以東鄰為紂國中西鄰為文王國中亦係康成坊記之注朱氏既祖鄭氏說以東為坎以西為離反謂九五居尊不如六二之得時其于卦義爻義全不可解乃又曰當文王與紂之事則是以九五為紂六二為文王與康成舊注又不合矣且驗之象傳吉大來句周章難明未有吉在二爻而五大來者若程傳于大來之注曰亨小初吉是也則以亨小為吉大其可通乎且六二喪茀猶吉大乎東海世子母病郭璞筮得明夷之既濟曰不宜封國坤為國坎折之即此爻也上六濡其首厲象曰濡其首厲何可久也上易益巽之首而為坎窞勿謂既濟也首濡矣吉且厲矣故曰柔不可止也濟亦不可久也所謂終亂如此坎下離上三易卦易否五來二往又易恆三往上來損初往四來未濟亨小狐汔濟濡其尾史記引作狐涉水濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也反既濟則未濟矣既濟曰亨未濟亦曰亨以未濟終濟也既濟以陽始而內柔居中曰柔得中未濟以陽終而外柔居中亦曰柔得中以內外一中也第得中無內外出中有內外而既之與未從此判焉中者極也我所守也濟者由此以達之彼也方既濟時水在外而火在內由中以濟水而已出乎此今乃未濟火在外而水反在內一涉足而水已濡之求其由此而濟之以出乎中勢乃甚難故內坎為水而此非水也必假物以象之則坎當為狐見九家易且又不止狐也內坎為狐三五之坎當為小狐見何氏訂詁乃小狐之濟則正丁坎剛之外離剛之內所云一柔得中者而究未能出未出中三字正未濟之未絶大關鍵從來未經拈出則幾濟而仍未濟焉所云汔也汔者幾也汔濟非濟也故曰未也蓋隂不可終隂終則道窮見上卦陽不可終陽終則隂與陽無不窮雜卦曰男之窮也指陽窮序卦曰物不可窮也物該隂陽言窮則續之曰續終苟能續則未濟終濟雖曰濡尾曰無攸利何害焉雖既濟六爻隂陽皆當位未濟六爻隂陽皆不當位而剛柔內外尚能相應何勿終焉既濟求濟未濟亦求濟既濟不可窮未濟亦不可窮而易義已備文王以未濟終全易者如此狐善涉水且尾長故涉必濡尾古語狐欲渡河無如尾何可驗餘見前卦史記春申君引易狐涉水濡尾以為始易終難韓嬰詩𫝊云官怠于宦成病加于小愈引易小狐云云皆續終之義象曰火在水上未濟君子以慎辨物居方物者隂陽也猶云坤隂物乾陽物也方者位也猶云初率其詞而揆其方也辨則物自解所云分也居則類自合所云聚也此正文王推易一法而夫子于繫詞發其始方以類聚物以羣分于大象六十四卦之末直明揭而終結之一篇之中三致意焉故乾坤聚之始既未分之終聚始為居方分終為辨物而即此一卦六爻之中竒偶分列即辨物也竒自為竒偶自為偶即居方也故夫子于說卦一𫝊皆該以方如震東方離南方乾西北方類于敘卦一𫝊皆該以物如物生必蒙物稚不可養類而其于雜卦曰否泰反其類也于序卦未濟曰物不可窮也則以否泰者為既未推易所自來而于否泰揭類字見其類聚于未濟揭物字則見其羣分也嗚呼微矣初六濡其尾吝象曰濡其尾亦不知極也初在損居四未出中之時也見摧于陽剛而易居水裔與中逺矣而乃居坎窞之中而思以求濟尾則濡矣濟于何有夫中者極也廣韻極中也屋極曰中按李鼎祚解易亦以極為中但指四為濡尾不同中極甚遙相望未可及而褰裳濡足則亦不知極之所在為何等矣按既濟之初亦有濡尾曳輪語而此卦初二分見之以爻義各有在也王輔嗣不明象數而自為義例概以君臣比應强合卦位而言易者悉遵之易焉得不長晦乎九二曳其輪貞吉象曰九二貞吉中以行正也互坎輪在前而迣而不進與既濟曳輪同而陽居正中中以行正則惟否五之易為能貞耳卦三言貞吉皆以能守為義未濟不急濟是以終濟九二有焉六三未濟征凶朱氏本義疑利字上有不字誤利涉大川象曰未濟征凶位不當也三以恆乾之中陽易以震隂雖乾震皆剛勇于征行而此固未可遽濟時也但內坎之川則已逾險中矣涉矣前征雖凶所利者此耳位不當謂處正互兩坎之間非當濟之位與上雖不當位義又别未濟六爻不當位豈止三乎朱子疑利涉上有不字此亦意及之耳易學四同遂增一不字著書之宜慎如此九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也未濟總須貞而四以貞濟此正守中將出時也特未濟之四即既濟之三雖勞逸不同功過亦異而其為振興而圗濟世則事一也故四在損時居外艮互坤之間取初剛而填之坤方艮鬼之門謂之伐鬼方此與既濟亦何異而特其時當震動四之所履為互震即震也時當行賞四填互坤為大國開國承家即賞也則猶是三年初至四亦三位而一憊一賞勞逸功過頓殊矣坎為志功成而有賞故志行六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也五自二往作離日于天中而下使坤衆為坎以受日光是君子之光也是離中與坎中交相孚也是得中而濟者也吉也坎離中合如符信然故凡坎離皆有孚象其稱君子以五本陽位陽者君子也若𫝊以暉頌光者暉光之本也此推原言之以此離之五本否之乾中遡日光以見天光故曰其暉吉言其暉已早吉矣按周禮視祲以十暈為十輝輝即暉字皆以光氣內斂為言故詩曰庭燎有輝言向曉則其光將斂管輅云日中有光朝日為暉正以日中光散朝日光斂耳程朱以為暉者光之散則相反矣且詞無證據亦何可杜撰如此晉史孫登謂嵇康曰火生而有光不用具光而果在于用光人生而有才不用其才而果在于用才故用光在乎得薪用才在乎識貞此亦貞吉為光之說上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也此終濟時也而狃于必濟仍未濟矣故卦以未終而爻亦終以未然之意以為如是可續終耳上以恆乾之中而易之加互坎之首此時下坎與互坎均出險矣以此求濟更無所為水也向之離坎相孚者本孚以水火而今已出險而踞髙位坎有樽酒見坎卦而離鼓歌而饗之則其有孚者又在飲酒飲酒何咎乎需時求濟假以宴樂正貞守者所有事而無如亦濡其首也濡首畢竟屬飲酒言觀𫝊飲酒濡首連出可驗本義反云如狐之涉水而濡其首是夫子𫝊文為無理矣夫首者乾也說卦乾為首恆乾之體加于坎上一若舉乾首而埋之坎酒之中溺于川猶可救溺于酒不可救矣所云有孚者失于是矣夫初以急濟而不知極今以必濟而又不知節節者時也在中為時得時為節始濟終濟其不可自恃如此虞仲翔極舉推易之法而不能遍推以盡其致如此上九亦知乾在坎上為濡首然第知未濟為否所推不知又為恆所推因但舉否推之例曰乾為首五動則首在酒中是以否三乾為首而降五為二則以上乾之首而埋之下坎之酒中其為說非不極精甚確與俗之言象言數者十倍有進而不知此是五爻之解與上何涉乎世之欲得其理者以此諦觀則思過半矣否是二五推恆是三上推損是初四推故三上只推恆卦不及否損他倣此仲氏易卷二十六
