body:
  text: 仲氏易卷一翰林院檢討毛竒齡撰仲氏者予仲兄與三也古以伯仲為兄弟詩仲氏吹篪是也仲氏名錫齡與三其字仲氏在崇禎之季避難得錮疾授生徒以說經自娛而尤長于說周易或勸之註周易不答當予出亡時仲氏泣送予謂曰古賢處憂患者必明易汝知之乎予拜而受言暨予歸被徵而仲氏病至乞假而仲氏已不可見矣顧其說易實有西漢以還魏晉六朝遺法為宋元諸儒所未及者予哀其志就兄子即文輝口授諸說易大旨暨各卦詁義而擴大之為仲氏易雖然使仲氏為易而止如是乎仲氏之言曰易有五易世第知兩易而不知三易此與周禮三易之法不同故但可言易而不可以言周易夫所謂兩易者何也一曰變易謂陽變隂陰變陽也如乾變坤坎變離類一曰交易謂陰交乎陽陽交乎隂也如乾坤交為泰否坎離交為既未濟類此兩易者前儒能言之朱子本義首猶載其說然此祇伏羲氏之易也是何也則以畫卦用變易重卦用交易也說見後畫卦重卦伏羲之事也若夫三易則一曰反易謂相其順逆審其向背而反見之如屯之轉為蒙咸之轉為恒類然此與重卦交易不同若交則矣此水雷屯反之為雷水解澤山咸反之為山澤損專取爻畫不取卦象者一曰對易謂比其隂陽絜其剛柔而對觀之如上經需訟與下經晉明夷對與下以地對天以火對水上經同人大有經夬姤對以五陽對五陽一隂正變占對對一隂類然此與後儒正變占對不同若則需訟自對不對晉明夷夬姤自對不對同人大有矣此兼取象數不專取形次者一曰移易謂審其分聚計其往來而推移而上下之如泰為隂陽類聚之卦移三爻為上爻三陽往而上隂來則為損而初否為陽隂類聚之卦移四爻為初爻四陽來隂往則為益類然此與十辟卦變及朱子而順卦變之說又不同若諸卦變則皆從兩卦遞變逆相接以變占不以推演矣此取推前演爻辭不取變後占象數者此三易者自漢魏迄今多未之著而周易之所為易實本諸此是何也則以序卦用轉易分經用對易謂上下經演易繫詞用移易也夫序卦分經者文王之為易也演易繫詞者則亦文王之為易而或云周公之為易也說見後夫文王周公之為易則正周易也今既說周易而曾不知周之為易也而可乎然則何以知變易交易為伏羲氏之易夫世信以為伏羲畫卦如陳氏所授先天之說邵子先天圗為陳摶所授故稱陳氏由兩而四而八而十六而三十二而六十四為畫卦之終始乎先天圗凡六層第一層一陽一隂為兩儀第二層二陽二隂為四象第三層四陽四隂為乾兌離震巽坎艮坤之八卦第四層八陽八隂為十六第五層十六陽十六隂為三十二第六層三十二陽三十二隂為六十四卦所謂八卦成列因而重之之義如此夫兩儀四象者生卦之序非畫卦之序也八卦由太極兩儀四象所生原有四層今去太極而以兩儀為伏羲之第一畫則早有兩畫非一畫矣且去太極一層無理因而重之者以三重三非謂二可重一四可重二八可重四也陳氏祇以倍法為重法此正程子稱邵子為加一倍法者不知以三重三不過以卦重卦耳若謂八可重四則八卦亦重卦非純卦矣故就其成卦而觀之則由兩而四由四而八由八而至六十四未為不可而就其畫卦而觀之則不然夫伏羲但畫八卦耳何曾畫六十四卦乎繫辭曰乾坤成列易立其中則先畫乾坤又曰八卦成列象在其中則次畫八卦又曰因而重之爻在其中則于是不再畫也第因其所畫而複配之為六十四卦而易象終焉故周禮經卦皆八揚雄謂宓羲經以八卦孔安國曰伏羲氏之王天下也始畫八卦皆以畫八卦為一截未嘗一及重卦而重卦之起舊有歸之神農者京房引孔子之言曰神農重乎八純謂取伏羲八純卦而重之為六十四卦史記亦云神農始作重卦有歸之大禹者周禮三易一曰連山即夏易謂以重艮為連山也晉孫盛曰夏禹修用連山以艮之重卦為夏易首雖其說不可深信然亦以見八卦與六十四卦縱成自伏羲亦必不連次而加畫之斷可識矣故先天之圗其誤有八一畫繁自一畫為陽二畫為隂三一為乾三二為坤而其畫已畢未有畫至六十四卦者今圗取巧便但以黒為隂白為陽耳此非羲畫法也若羲畫原法則黒皆兩畫是六十四卦在陽有一百九十二畫在隂有三百八十四畫太不憚煩矣此非自然因重之數也其誤一也二四五無名四象分四畫為太陽少隂少陽太隂今増至十六畫又増至三十二畫則可名十六象三十二象乎抑仍名四象乎若仍名四象則八卦又生四象矣其誤二也三三六無住法惟只有三畫並無四畫五畫之加故三畫而止便可名之為八卦如連翩加畫則何以三畫有名四畫五畫祇空畫更無名也且何以見畫之當止于三當止于六也其誤三也四不因乾坤成列始畫八卦八卦成列始作重卦故曰因而重之因者因成列之卦也若一連畫去何所因乎其誤四也五父子母女並生乾父坤母合生六子此繫詞明言次第也今八卦並生其誤五也六子先母女先男少先長六子俱先坤兌離先震巽先坎兌又先離離又先巽于一索再索之叙俱失盡矣羲畫次第必不如是其誤六也七卦位不合說卦卦位千古不蔑今以遞加之畫而環圗之乾一右轉巽五左旋以乾南坤北離東坎西為象此實本魏氏參同契乾坤運軸坎離匡郭之圗而妄名先天致邵子以雷風相薄水火不相射為証夫說卦上文既言六畫成卦則此時卦位已定第言其參互為推卦之時故曰八卦相錯若伏羲畫卦則焉有卦未成而早相錯者且相薄相迫也相對不可言相廹况坎離正對而曰不相射則明是相反之語而引以取証可乎其誤七也八卦數杜撰無據卦原無數但以大衍之數推之則乾西北卦正當地六相成之數故曰乾六坤西南卦正當天九相成之數故曰坤九今無故而有乾一兌二離三震四之數此何據乎其誤八也具此八誤而以為伏羲畫卦次第如是不可通矣故伏羲畫卦先畫三陽參天也參天之謂乾故始乎乾也然後以三而兩之兩地也兩地而得坤所謂效法乎坤也此陽之變隂者也于是以三坤而變一陽謂之震所謂震一索而得男也以三乾而變一隂謂之巽所謂巽一索而得女也夫然後二陽二隂再變三變而于是再索三索之坎離艮兌以次成焉此隂陽互易乾坤之變為八卦者也此變易也至于八之乗八則因而重之謂之交易以乾交乾則為乾以乾交坤則為否以坤交坤則為坤以坤交乾則為泰而于是以乾坤二卦遍交之六子之卦而隨以六子之卦反交之乾坤而六十四卦成焉此因而重之也此真兼三才而兩之者也以兩乘三則為六便可知六爻連畫之謬此交易也不讀史記乎神農觀曰中交易之象始作重卦夫交易者固觀象之所由成然而專屬之重卦則明明以六十四卦為交易一法而其他無與則因而曰重卦用交易豈無謂也然而周易無是也伏羲八卦圖乾父一震長男三坎中男五艮少男七坤母二巽長女四離中女六兌少女八伏羲六十四卦圗兼卦不另畫祇取八卦因重之故圗無六十四卦之畫乾乾乾坤否震无妄巽姤坎訟離同人艮遯兌履坤泰坤復升師明夷謙臨震大壮豫震恒解豐小過歸妹巽小畜觀益巽渙家人漸中孚坎需比屯井坎既濟蹇節離大有晉噬嗑鼎未濟離旅睽艮大畜剥頥蠱蒙賁艮損兌夬萃隨大過困革咸兌若夫周易則文王取已成之八卦與六十四卦而先為次第曰序卦蓋前此未嘗首乾也商以坤為首夏以艮為首夏易名連山首艮商易名坤乾首坤詳見乾卦而文王斷然以乾為之首既已隱然具天統之象矣商以地為正故首坤夏以人為正故首艮艮者物之所以成始也若周取天正斯時尚未定三統也而文若先之乃由乾而坤由坤而屯而蒙則又創為反易一法取諸兼卦之已成者而相其畫之順逆向背而故為顛倒不以名如水雷屯不以坎震之名對雷水解不以義如水雷屯不以天一為坎長男為震之義繼乾坤後專以畫數為對待而次第之故繫詞曰數往者順謂前一卦順也知來者逆謂就前一卦逆視之而已知為後一卦也前卦為往後卦為來正視為順倒視為逆此往來以卦言不以爻言如屯為前一卦倒視之即知為蒙類是故易逆數也謂夫易之以轉逆而成數者也雖前後分逆順然兩卦皆可倒見如屯倒為蒙蒙倒又為屯類故曰逆數故孔子序卦假以義而故匿其㫖以為義亦有如是者孔子雜卦假以名而并示以義以為即名與義而亦且有兩相待如是焉者而世顧未之理也第漢魏言易祇列序卦于彖首九家虞氏諸易皆列孔子序卦惟虞翻以觀反臨明夷反晉為言而王弼直曰卦有反對致孔穎逹以二二相偶為反對疏義且曰正卦列兩為對者謂之變卦反卦轉兩為一者謂之覆卦變卦者乾變坤坎變離也覆卦者反為屯覆為蒙也顧在唐以前有說無圗有標㫖而無繪象至趙宋儒生竊其說而擴大之于是創六宫之圗謂乾坤坎離無反對而震艮巽兌有反對遂合震艮巽兌為兩卦伏羲卦八周易卦六增先變之象以反對為後天變卦増先天變卦三十二合作一圗分宫交卦分六十四卦為六官如頥小過合震艮宮大過中孚合巽兌宫類又将上下經交互列象如上經夬下經剝類繪圓畫方圎圗以乾坤定子午坎離定東西而姤與復對蒙與革對方圗以乾居西北坤居東南而否與泰對咸與損對不過逞狡儈伎倆另創作參互諸法以為巧妙而不知聖人演易之㫖全不在此蓋序卦分篇非闗祕㫖祇一次第焉而已無他也夫兩卦者一卦之析也覆卦者變卦重卦之則也文王就一卦以測兩卦而即就變卦重卦以推覆卦故乾坤為變卦屯蒙為覆卦需訟為交卦如水天為需天水為訟以卦名顛倒先以立三易之則而就其中計之則變易者八異學以此名飛伏匹對兼變者八名飛伏升降對兼交易者十二反易兼交從來未發而反易之數成焉名升降反對故有合三易而列上經者泰否是也此天地之用也泰否體天地者也合三易而終下經者既未濟是也此水火之用也既未濟體水火者也况上經卦三十下經卦三十有四舊儒以為合竒偶隂陽之數而不知以覆卦推之其數均等上經反對者十二合之六變對而成十八下經反對者十六合之二變對而亦成十八兩十八三十六也三十六者天數也然而分篇無是也文王序卦圗變易乾坤反易屯蒙兼交易需訟兼交師比小畜履泰否兼交兼變否兼同交人有大謙豫隨蠱兼變蠱臨觀噬嗑賁剝復无妄畜大變易頥大過變易坎離咸恒遯壮兼大交晉明夷家人睽蹇解損益夬姤萃升困井革鼎震艮漸妹歸兼歸變妹豐旅巽兌渙節變中易孚小過既濟濟兼未交兼未變濟至于分篇則孔子大傳早已有二篇之䇿之語謂上下篇也故序卦于坎離作一截而以咸恒為另序之首易乾鑿度云孔子謂陽三隂四位之正也分六十四卦而上下之象隂陽也即前漢孟喜受田王孫易有云分上下二經而後人述子夏所傳易亦有云分上下二篇則明明以上下二篇為文王作易時所自分矣孔穎達疏云上下二篇文王所定第分篇之意原無祕㫖祇以上下相對舉而宋程氏作上下篇義曲求其說至千數百言而究竟不合元泰定間泰和蕭漢中作讀易考原全書專釋上下篇象數名義論隂陽主客進退贏縮至數卷合五十餘板而終不得其要領至如晁氏所云後人妄分而朱子謂卷繁必析並無義理則于周文分篇之大意仍昧昧焉間嘗繙繹其概知判一為兩但用對舉而對舉所始預以八純分上下使乾坤坎離列之上篇震艮巽兌列之下篇則已無偏畸之意此泰和蕭氏所謂上經以乾坤坎離為主下篇以震艮巽兌為主雖其云主客之義未為深確然而八純之所分已如是矣顧乾坤父母不當與六子相對而欲以六子而上配乾坤則又無雷風山澤與水火該并之卦于是以八經卦分屬上下篇者使俱無所對而第取六子之化體如咸恒兼震艮巽兌四卦者為首卦既未濟兼坎離兩卦者為末卦而六子之數以全若云六子之自為對則以全坎對震艮皆一陽也而三男之類歸焉坎震艮皆一陽卦而震長坎中艮少為三男以全離對巽兌皆一隂也而三女之類歸焉離巽兌皆一隂卦而巽長離中兌少為三女此則六子之自為對者而乾坤以兩而對下四謂咸恒既未濟坎離各以一而對下兩謂震艮巽兌則祇此六十四卦而總以上四而對下八就中分之半而各就寡多上篇得三十下篇得三十有四是因此所得而即分之為上下之數雖若有虧贏而仍無畸致何其均也乃綂而計之除八純之外上篇餘二十六卦下篇餘二十六卦合之得五十二卦各兩兩相對而咸恒既未濟四卦但為之首尾則正與序卦反易之數適相合焉序卦除八變易外反易者五十六卦與此正同此豈無故而云然者哉故曰此對易也故曰分篇用對易此之謂也然而演易與繫辭俱無是也文王分上下篇圗乾坤無對咸恒首尾合六子化體所以隱答乾坤也屯䝉四陽剝互對姤四隂遯壯大八隂復互對夬八陽需訟八陽乾變對坤八隂晉夷明四隂坎變對離四陽師比除四坎卦外家人睽上三隂下三陽小畜履除四離卦外蹇解上三陽下三隂泰否六陽上分聚六隂損益六隂下環聚六陽同人大有十陽陽合八乾十陽夬姤二隂隂分三女二隂謙豫坤變對坤萃升坤變對坤隨蠱六震艮陽坎離六隂困井六㢲兌隂㢲兌六陽臨觀四陽剝互對姤四陰革鼎八隂復互對夬八陽震艮無對噬嗑賁火六震艮陽㢲兌六隂漸妹歸六坎離隂坎離六陽剝復此地火與雷風豐旅山澤合并之卦㢲兌無對无妄大畜此天水與雷風渙節山澤合并之卦頥過大六陽變變六隂中孚小過六隂對對六陽坎離無對既濟未濟仲氏易卷一
