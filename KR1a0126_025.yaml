body:
  text: 仲氏易卷二十五翰林院檢討毛竒齡撰兑下坎上三易卦易泰三往五來又易損上來五往益上來二往節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通郭京據王弼注有然後乃亨也五字謂是大文誤入者是以後人注本增經文也謬之極矣天地節而四時成節以制度不傷財不害民坎水兑金秋冬斂藏之卦也斂藏必有節而況坎水泛濫瀦之以兑澤如節縮然第兑口上向合有甘苦而互震二四互震為反生之稼稼穡作甘見書共範篇下同大離一至五為大離離為火炎上作苦則各有甘苦分乎其間故節之為亨三剛三柔互相推易而兩剛特峙于二五之中未嘗過也而其節甘焉甘則通而苟或過節厯澤水之盡而尚蹈坎窞居上位而受炎苦則雖貞而其節苦焉苦則窮蓋下悅上險二五當位既中且正不窮而通誠以卦自泰來既分陽分隂而震離兑坎之四序無不備焉是天地節而四時成也坎為法律可裁以制度而下收兑澤而倒以㢲既不傷財巽為利塞兑之下畫而不成坎又不害民也坎為害初為民位胡雲峰曰天地之數六十故卦六十而為節日有中氣有節氣節以抑其過而歸之中也鄭康成曰空府藏則傷財力役繁則害民二者奢泰之所致奢泰者正節之反盧氏曰此本泰卦分乾九三上升坤五分坤六五下處乾三是剛柔分而剛得中也此推易法象曰澤上有水節君子以制數度議德行數者備數如十百千萬類度者審度如分寸尺丈類備數審度見漢書劉歆條奏俗以制度當數度是誤以節制之制為制度矣德行則中庸喜怒哀樂中節皆是若何氏毅庵說易謂數度如名族品目禮樂制度德行如忠靖廉清貞亮髙介其下皆著得一節字族目制度節字在上餘節字皆在下則推類言之而其說巧合如此又趙氏胥山易說謂厯節儀節樂節旌節臣節婦節于財曰撙節于學曰不凌節皆限制之義初九不出户庭無咎象曰不出户庭知通塞也澤之能節全在初畫否則皆坎矣是其一剛自守不出户庭者正其知節之通在乎塞而後有此也户庭者户外之庭門庭者門內之庭古室有户戶外為堂堂下階前相直曰庭門者庭之外闢者也互艮為庭而初二兩陽鍵若關牡故不出況卦凡三易而初並不及故吉凶與二亦稍異焉九二不出門庭凶象曰不出門庭凶失時極也二與益之上九相易向固震也而今始得為澤中之節則其不出門庭雖較户庭稍通乎而其為中節固屹然者而無如其為互震剛也向為震柔今為震剛則澤動必溢如震澤以澤動得名雖二之多譽而並無凶者而亦以為凶蓋惟恐失時中之節也極者中也屋極為中漢儒易注皆以極訓中可驗節卦六爻皆取節惟上以過節為戒其餘則與奢寧儉未有節而反凶者況初二相比初既以節為知通塞為無咎曽幾何時而二頓欲其不節世無是理舊說以不出門庭為過節之戒則于卦詞兩不出同卦象兩陽同卦候初二同候俱紊甚矣此之為凶正戒其不節非戒其節也是何也則以震動者正不節所自始也故三在震中則直以不節若繼之六三不節若則嗟若無咎象曰不節之嗟又誰咎也以澤口而受外水則易于泛溢況在震動之間乎不節之嗟誰咎焉三易自五則乾之為澤坤之為水皆三一爻變成之其不節可知耳六四安節亨象曰安節之亨承上道也坎水就下自能受節況以震動之未而當艮止之中其止也中心安焉蓋卦惟初四不易故初四俱能節者又上卦坎位而適填以坎則下窞正承坎中所謂承上道者惟上窞則坎陷之極窞而又險為過節耳餘皆取節說見前九五甘節吉往有尚象曰甘節之吉居位中也兩易俱抑過就中謂易三易上以就五中正所謂中正以通者則其以節為甘而不以節為苦斷可知也二四為互震震為稼穡為甘見前則五為甘節二五為大離離為炎上為苦見前則上為苦節若其云往有尚者猶坎云行有尚謂以震行當艮髙節而能通蓋盈坎後進必尚盈而後可行今既節且有尚矣所謂中正以通者如此按三國吳志虞翻𫝊關羽既敗權使翻筮之得兑下坎上節五爻變之臨翻曰不出二日必當殞首以水澤為節客受主制變在外不利于客五為主將變陽為隂為首項喪亡之象三陽止留二故不出二日果如翻言此専以象占與朱氏啓蒙占例截然不同上六苦節貞凶悔亡象曰苦節貞凶其道窮也上居卦位重窞之中過于節縮而大離炎上薰炙作苦所謂不可貞者貞則凶也道窮也然而猶悔亡者天下豈有過于檢儉而猶膺大戾者哉易是曰澤所以節水者也三為澤口翻以不節為戒而上為水口翻以過節為戒何也曰施者易不足而受者易有餘理固然也若何氏毅庵說易謂瀦水易泄陷水易竭尤為明切蓋節苦而猶悔亡者即夫子之云寧儉貞凶而猶悔亡者即夫子之云寧固也貞者固也兑下巽上聚卦上下環聚中孚二隂間四陽小過二陽間四隂皆非聚卦然二陽聚者不能移之為小過四陽聚者不能移之為中孚則亦聚矣蓋上下環轉原一聚例子母十卦皆以相環為聚母然仍為子者以皆有所來耳小過倣此中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚郭氏本無豚魚二字謬也利涉大川乘木舟虛也中孚以利貞乃應乎天也夫天下無形之感莫如風水風入水而不知水藏風而不見風水相遭則原有冥合之義況兩形相向彼此均等上下比觀有若合竹夫合符曰信合竹亦曰信風水既合而信生其中則名曰中孚夫豈或謬第兩形一體不可顯見則將舉一風水合并同體並形之一物以為觀象夫巽象為魚見李鼎祚易解坎象為豚豚風物也豕受風而生故食豕生風而麗乎水魚水物也而翻見乎風則即此兩物而已各具一合并之象則或指曰豚或指曰魚亦無不可然而猶兩也乃有非水不生非風不見乘乎風而拜乎浪見必向風風靜即滅若所稱豚魚者即江豚也一名猪魚東風則張口向東西風則張口向西風起而見風止而滅天下有彼此轇結混然無跡冥冥之中牢不可解如此物者乎則言中孚者不必言何以孚也且不必言孚之何以及乎人不及乎人也但曰豚魚則已吉矣然而澤水也澤而有風則猶川也澤有風固難涉也澤風各相向則涉大川也而往而利焉不止豚魚善涉矣是何也蓋剛雖居外得位之中柔雖相比克安乎內內兑悅而外巽順有不孚乎孚可以化國信足及之豚魚信及之一驗也且其所為涉川者吾知之矣夫巽木也坤方也方者舟也二坤連巽木以乘兑澤而又體麗乎大離之中離中虛有似乘木舟而虛其中然蓋結信必固貞者固也信而貞固則可以化國即可以應天況涉川乎後漢陽嘉三年郎顗上公車拜章引中孚𫝊曰陽感天子不旋日諸侯不旋時大夫不過朞言報應之速指應天言感者應也象曰澤上有風中孚君子以議獄緩死風行于上而澤流于下皆信及之事況論語片言折獄甫刑忠信折獄議獄而緩其死尤信及之大者兑為說坤為死見虞氏與九家易大離中虛有囹圄之象故君子以此初九虞吉有他不燕象曰初九虞吉志未變也陸德明蘇軾本他作它義同初與四合三與上合天然匹配但三四在中各隔二五以為應則兩陽夾迫去就難決故在隂二爻俱有向背未定之意此孚之將合而反齟齬者然則初之為應者可知矣虞安也燕亦安也安之當吉也敵有在也然而介于中也指九二有他也有他則不安矣若其曰安吉者以四當初時其志應未變耳九二鶴鳴在隂其子和之我有好爵吾與爾靡埤倉作縻云散也陸績本作䌕即縻字改體者京房本作劘猶分也若楊慎謂靡音磨與和叶則靡與和原是支微齊歌麻無入聲同用一例而妄云叶此由不識韻故云說見豫古今通韻之象曰其子和之中心願也二與五則剛之得中而能孚者也二位大離而又當互震之初離既為鶴見虞氏易震又善鳴則其象為鶴鳴固已與五有相孚之意乃兑震相向兩口互對則不惟嗚之有和之者顧此鳴之和之者非夫婦也父子也以二與五皆陽也且二互當震剛五互當艮剛震為長男艮為小子則長兄若父固有父二子五之象而倡和次第亦復如是則二雖應五而實父父我也五雖尊于二而實子子爾也二五正位無非好爵我與爾共之而已靡者共也此中孚也張杉曰兑隂地故曰在隂六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也三以柔而應上剛是得敵也敵即應也他又以隂陽相從為應並隂並陽為敵見艮卦敵者對也然而間于五也間則不決故或之張杉曰鼓震象罷艮象或泣或歌大離象說見前六四月幾京房本作近荀爽本作既望馬匹亡無咎象曰馬匹亡絶類上也四與初相對猶日月也乃離為日坎為月坎不可見而相反而為大離比之月無體以日之體為體離在而坎之體皆具焉顧月當望時月體本黑得日光而白此亦孚象然而全體皆離而四偏近上如幾望然上滿而下缺夫上滿者受上之光下缺者不受下之光則夫四之上孚于五而不下孚于初亦可知矣夫乾馬也初陽也六四者馬之匹也馬有匹謂所對也對者類也今四已親上而馬之匹亡矣馬之匹亡是對類之在下者與上已絶雖咎之亦何有九五有孚攣如無咎象曰有孚攣如位正當也孚而如攣孚之至也夫孚貴乎固轇結不解化邦應天冥然無跡一如豚魚之所為則兩絲交纒罥手如一亦孰有如攣象者此二與五之所為中孚者也蓋二五位正而又相當攣顧之孚位固有然漢書李夫人𫝊上攣顧念我巽為繩互艮為手攣象如是上六翰音登于天貞凶象曰翰音登于天何可長也上與五同為剛而上位不中不能攣孚譬則雞與禽同為羽族而徒曉步啄不能髙飛乃欲效化邦而登于天雖有貞不幾凶乎蓋剛中則利貞剛極則貞凶利貞則應天貞凶則不能登天中孚之象貴冥感而不貴强合有如此巽為雞雞曰翰音上為天爻故又有登天之象世說以朱博驟至三公為翰音登天即此義後漢封事引易𫝊曰有貌無實佞人也有實無貌道人也易稽覽圖曰有實無貌者屈道人也鄭注謂屈道事暗朝也所謂有貌無實者指此爻言艮下震上聚卦上下環聚小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也郭京本作是以可小事吳澄據石經本同剛失位而不中是以不可大事也有飛鳥之象焉程𫝊以此句係解者之詞誤入彖中吳仁傑僞造古文易經隂承其意遂去此句及明陳氏作捷解則直注曰古文無矣聖經之遭厄如此飛鳥遺之音不宜上宜下大吉上逆而下順也小過小者過也大陽也小隂也大過以四陽并列為大者之過則此四隂環列非小者過乎然而亨利貞者以隂居二五正也正則中正中所在而時生焉蓋四隂所據雖柔得中而兩剛卦主反失其二五之位而聚居三四三四為中行而實非正中夫小得中而可小事大失中而不可大事理也此其間有飛鳥之象焉此句正彖之釋卦且以明取義于鳥之意而程𫝊以為誤入妄矣蓋震為動為鵠出九家易物之動者莫如鳥而鵠又鳥之最動者飛則愈動矣況兩震相背絶類飛鳥而諦觀其體則兩陽居中有似腹背而四隂分張而為之翼實有其象焉實詮飛鳥之象句夫小人輕浮翕忽不測比之飛鳥亦復何吉特是卦之體上震下艮震固主動而艮實主靜上動而下則止之四隂雖夥幸不并列如大過四剛之聚而又分處于上下兩卦之傍如飛鳥然止則鳴飛則不鳴今既已飛矣而猶存止意恍遺其音于飛後而止而不去則上動下靜上飛下止上逆下順張杉曰烏上飛則逆下飛則順雖動逆勢成而猶有順止之意正如宵人雜處事權不一上下牽掣依回莫定苟于此而察其宜焉則宜下而止不宜上而動棄上取下順逆分明何勿吉之有繫𫝊曰震善鳴宋𠂻曰二陽在內上下各隂有似飛鳥舒翼之象震為聲音鳥去而音止象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉所謂小者過也初六飛鳥以凶象曰飛鳥以凶不可如何也四柔皆鳥翼而初與上則翼之翰也翼之强在翰翰舉而身即從之此以臣制君以末制本之象凶象也然而無可如何也春秋傳曰能左右之曰以六二過其祖過其妣不及其君遇其臣無咎象曰不及其君臣不可過也六二進與剛非應而退與柔比夫剛體從乾乾為君為父祖猶父也即大父也柔體從坤坤為臣為母妣即母也母死稱妣今三四兩剛可為君祖反相承而不相應一若尊髙太過任其濶絶而獨返而比乎妻四而臣剛之初柔初本四之應故妻四是過在祖而所親遇者在妣不及在君而所親遇者反在臣也然而無咎也以柔中也夫過猶不及也過在彼則不及在此也然而不曰過曰不及者夫子曰臣不可過君故諱之此傳語不釋義而釋詞與有飛鳥之象語同一變體九三弗過防之從或戕之凶象曰從或戕之凶如何也九三當艮剛之末有所防止而不謂其身入坎中兼畫之坎三四為中坎為隱伏或不能無在下窺測之事謂二隂下伺惟恐防之太密反致以猜嫌而起隱禍故曰勿過防之也過防恐或有戕之者戕則凶矣可如何徐咸清曰此如魯君欲去季氏而反為所逐者二四皆君象小過之時大不可過故各以勿過戒之九四無咎弗過遇之往厲必戒句勿用句永貞象曰弗過遇之位不當也往厲必戒終不可長也夫以震剛居兑中動而能悅何咎乎特兑悅善附而五以震隂而據尊髙之位逼臨君側恐于此又不能無降心相從之事儻過為禮遇而由是而往則不正之厲反從此生故又戒之曰勿過遇之也往必有厲而當戒故勿可用也夫四之所以為此者徒以其位不當耳春秋大居正永以正之何厲之有若夫君下于臣必戒也漸不可長也徐咸清曰自新莽典午以後多有以隆遇而致勸進者六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上鄭𤣥本作尚上同郭京據王弼本作止不通按王注陽已上故止也此止字解不雨其述經文仍是上字而京妄據此遂啓宋儒改經之漸京之罪何等矣也五過而無比合之情有如密雲不雨者虞氏曰坎在天為雲墮地成雨今已出大坎之中而反居水上則雲而不雨一如水雷屯之稱雲雷者乃位當互兑之口兑為西此西郊也然而四隂分列而即有分據之意初為二翼上為五翼故二爻皆稱飛鳥羽翼一分而角立之勢成焉蓋坎為狐艮為鼠皆與飛鳥為小人之象雖浮雲之蔽見于天象而事權自上動無過舉儻能奉公家之令而以我震矢下連巽繩而弋之弋之何在乎夫小過之震上下皆震也其為艮上下皆艮也上為倒艮艮為山穴在山下而今以倒見而在前皆穴指上六則從而取之何難焉夫二比初而遇初五承上而反弋上何也曰此所謂不宜上宜下者也上動而下靜上逆而下順其穴在上則且從而上取之故曰五之已上不止密雲不雨矣已上謂雨已收上上六弗遇過之飛鳥離之凶是謂災眚象曰弗過過之已亢也四隂至此羽翼成矣勿謂君遇之過也而亢之飛鳥將離之矣言當謝去也坎為多眚此坎之盡也故災眚亢者過髙之象仲氏易卷二十五
