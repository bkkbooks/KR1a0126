body:
  text: 仲氏易卷十八翰林院檢討毛竒齡撰坎下震上四易卦易臨初往四來小過三來二往又易升三往四求萃五來二往虞氐易以臨初之四為解本義謂卦自升來三往居四皆推易之法解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也李鼎祚本此下有无所往三字其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆鄭𤣥讀懈坼也甲坼馬融鄭𤣥陸績本俱作宅鄭註皮曰甲根曰宅宅居也解之時大矣哉反乎蹇則解矣上震下坎動出乎險而免乎險則謂之解第蹇以艮位東北而利西南今坎位正北震位正東而亦云利西南者非謂東北之不利也故無不利東北語但蹇難初解創痍未復則必藉長養之地以休息之夫致養者莫如坤而坤位西南則蹇之利西南者以其行而解之利西南者又以其養也葢坤衆也養則得衆得衆則不可以不往顧推易之法各有往來蹇不利于往而利于來以險在前也解則不然可以來而亦可以往來吉往亦吉浸假无所往而必來也耶則其來也復也復則吉也浸假有所往而不來也耶則其往也夙也夙則又吉也此但述卦詞下發彖傳故小過以三剛而來居二中萃以五剛而亦來居二中是來也然而解之剛來而得坎中者祗以復夫蹇之剛往而得坎中者也惟復也乃得中也臨以初剛往居四而成震升以三剛往居四而亦成震皆往也然而解之出乎震而動有功者震動有功實早具乎蹇之以倒震而成艮功者也蹇下艮倒震艮為成功惟夙也乃有功也原夫序卦之法以畫反對則解為蹇之反而以卦反對則解又為屯之反水雷屯與雷水解反屯不云乎雷雨之動滿盈雨在雷上草木句曲而成屯今天地解而雷雨作雨在雷下則水澤解散百果草木皆甲坼雖蹇難已解無藉于用然此時何時而尚得以往來細故小視之哉不曰時用大而曰時大可見象曰雷雨作解君子以赦過宥京房本作尤罪赦過宥罪即解難也初九无咎象曰剛柔之際義无咎也解之初尚未解也而即曰无咎曰有解之者也夫解在兩剛二與四也而四之剛従初往初之柔従四來祗剛柔往來之際而解生焉葢初四相應者其位而剛柔相易者乃其義也義何咎焉九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也此解之主也二四以坎震兩剛出乎險而為之解而二位地道之上地上為田則田者固二之所有事也乃二當萃時居互艮之初在小過時居下艮之中其在臨時則又居倒艮之三艮為狐狼此狐也然而為初為中為三則三狐也自推易為坎而三狐盡亡是三狐皆為我獲然且二四互離離為矢而二以離初而居離位之中下卦離位中為黄離則又為黄矢以黄矢而射三狐三狐既獲矢將焉往是矢本我有而一若得狐而並得之其解難之功有如此彖之所為得中者得此而已諸註坎為狐無據且三又不合季本以田禮三殺當之則未聞三殺之禮皆殺狐者程朱傳義俱指二隂則六五獨免亦屬不倫若易或易捷解専指六三則一爻獨當三狐亦未允合其他亦知艮為狐狼而不得推易則又何處得艮耶長夜漫漫至今始旦此亦其一也六三負且乗致宼至貞吝象曰負且乗亦可醜也自我致戎又誰咎也三以隂柔處兩剛之間上以剛與四以升之三剛而與之四而反承四剛如負然下以剛與二以小過三剛而與之二而反乗二剛如乗然世有以肩背負荷而乗車輿者乎則寇之奪之非利之乃醜之也醜之誰咎焉坎為輿為寇為盜三前後皆坎故象如此此所當解去者九四解而拇荀氏易作母朋至斯孚象曰解而拇未當位也四亦解主也推臨之初剛升之三剛而盡踞而成震之初震為足初則其足之拇也足將指夫蹇難以震動而解解而能動則必自汝拇始矣且夫二與四位不同而其解同也四之遜于二者徒未當位而要其解則一也向蹇五與三同濟蹇而謂之朋來今四與二同解難而即謂之朋至兩相助則兩相合焉斯非坎與離交實有以孚信之不至此蹇之三五倒之即解之二四也二四為互離六五君子維有解吉有孚于小人象曰君子有解小人退也五藉二四以為解而二則與五相易者也以相易者而且為之應則其相維繫為何如者夫君子解之小人孚之而五則従而並有之有解亦有孚斯豈特而拇之解與朋至之孚已哉上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也乃以解之至而羣隂之聴命者皆能解焉夫解之六爻自二至五皆與四卦有移易而上獨不然此巋然自峙者也公也尊者也當夫初為地道本地親下則為田為獸而今以轉上而為天道本天親上則為射為飛鳥此固解難之各至者乃以離鳥夾兩剛之間離為飛鳥見前如髙墉然而公用互坎之矢射髙墉之隼以為離在我後有似乎悖我也者而因而獲之攻逆解悖何計利鈍夫蹇難方平所貴休養而驅除難者猶且倉皇振動以解之其攸往而夙吉如此故曰蹇以往蹇而解不止以來解也兌下艮上子母易卦易泰三往上來又易益五來二往損有孚元吉无咎可貞利有攸往曷之用二簋蜀才本作軌字聲之誤可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行夫艮與兌而何以謂之損哉原推易之法文王有之伏羲未嘗有之也其因重命名或取卦義如山在地下得謙義類或取卦象如山與雷合得頥象類未嘗移卦畫而上下之也惟此損益兩卦則于象于義俱無所取而獨取卦畫上下移易焉而為之定名一若伏羲畫卦早于名六十四卦時示移易之意而文王演辭則始従而盡發之故文王于乾坤之後閱十卦而至泰否十者天地生成之全數咸恒之後亦閱十卦而至損益上下二經兩相對易然且上經十卦合得陽畫三十隂畫三十三十者天地生成之積數五十去天五三十増天五使隂陽均等而後泰否以三隂三陽開聚散之門下經十卦亦合得陽畫三十隂畫三十使爻畫齊一而後損益以一子一母立推易之準子母説見前而為爻詞者若猶恐後人稍昧其説乃獨于六三一爻明指三畫曰所謂損者損此三畫之一也又明指一畫曰所謂推移者亦止移此一畫以為上下之交也三交上曰得友上交三曰得臣而至于夫子為傳則又明示上下惟懼舛貿于損曰其道上行言移而之上于益曰自上下下言移而之下其于推易一法致意如此故漢儒自荀爽九家易曰損泰乾之三以居上蜀才謂本泰卦坤之上六下降乾三乾之九三上升坤六虞翻泰初之上損下以益上也諸易皆明言従泰卦三畫移為上畫而名之為損至益卦亦然是以唐後諸儒自李鼎祚易解後至宋儒朱子本義指定其説本義云損下卦上畫之陽益上卦上畫之隂又云下卦本乾而損上爻以益坤三人行而損一人也一陽上而一隂下一人行而得其友也而元明以後凡為易説者類百家皆不敢有所同異即不信變易如程氏伊川亦云下兌之成兌由六三之變也上艮之成艮自上九之變也三本剛而成柔上本柔而成剛其諄諄再三且有然者是故損下益上損乾三而益坤上也然而懼其朘于民也其道上行進下剛而易上柔也然而慮其行之亟也是必上下相信體大離之孚以合其志離坎皆為志為孚而後乾元之吉可以无咎且必守其正固協互坤之貞以慎其出而後互震之行可以攸往則其所以損之者于何用之夫以下之奉上者比之諸臣之享君古者享禮陳簋以八簋為盛四簋為中二簋為簡乃以供獻之禮而此之陳簋已為至薄而又取陳簋之至簡者以當之問曰曷可用曰即二簋可以用矣然二簋亦何可遽用以時用可矣是以損有時益有時損剛益柔有時夫損剛者損盈也益柔即益虚也此不特損卦然也即以益卦言之其盈虚損益上行下行亦何者不與時偕而謂損獨無時哉孔子讀易至損益喟然而嘆子夏避席而問答曰夫自損者益自益者缺吾是以嘆也此皆與雜卦盛衰之始有相發者又淮南子引孔子讀易至損益喟然而嘆曰或欲利之適足以害之或欲害之適足以利之利害禍福之門不可不察震為盂為木為竹而合之成簋二者初與二兩陽數也至若下兌口食上艮門闕而致互坤之養于其間其享禮之象明切如此象曰山下有澤損君子以懲古文作徴陸徳明云止也鄭𤣥劉瓛云清也皆與懲同史記荆舒是徴可驗惟蜀才本作撜與拯同誤忿窒鄭劉本俱作懫云止也孟喜本作恎義同惟陸績本作瘠不可解欲孟本作浴聲誤夫内乾剛忿易六三而成兌説是懲之也外坤柔欲易上九而成艮止是窒之也又艮為少男故多忿兌為少女故多欲初九已虞翻本作祀别一義不同事遄荀爽本作顓誤往无咎酌損之象曰己事遄往尚合志也夫卦之名祗以三與上相易而三為損下上為益上則上與三為卦主而諸爻無與然而初與二則皆在所損之列以皆下也四與五則皆在所益之列以皆上也況初尤下之下者顧勿謂下可損也夫下之奉上特故事耳急公之誼分所固有而速于往應即已无咎若夫損則未可遽也如酌然嚌之啐之審其深淺而裁啜之葢享之用簋以其薄而享之需酌又恐其厚也此上志也九二利貞征凶弗損益之象曰九二利貞中以為志也二則近損矣三損則二将及矣故守正貞也則利遄往征也則凶此其勢有弗可損者不惟弗損即二従五易益以五剛易二柔似乎益之而亦弗可益葢益之則必有従而損之者故曰益尚不可況損乎夫上下相孚亦各有志徒事驩虞為小補而朘民實多非中也即非志也九二従益卦九五所易故曰益之非汎設語貞正也猶正供也禹貢厥賦貞六三三人行則損一人一人行則得其友象曰一人行三則疑也此損之實也三人行三陽進也損一人一陽移也一人行三獨升也得其友獲上應也其推易之法如此若夫三陽並行疑于無隂三隂並峙又疑于無陽自一陽既動而偶形成焉象曰一則得傳曰三則疑非合觀焉能知之三居互震之中為行為足為大塗故有行人之象來註不識推易止曉反易故以益下三爻反于損之上三爻為三人行則不特損下三爻反于益之上三爻亦當為三人行即六十四卦三十二對何一非下反上上反下者三爻上行當不止此一卦矣且其以一人行為六三往上而居四夫三四皆隂居上居下何従見之祗强解反易而不顧情理何也六四損其疾使遄有喜无咎象曰損其疾亦可喜也四與五皆受益之地益又何損夫以無損者而觀其損則其所損必其所不喜而必欲去者則惟疾而已夫四與初應初既遄往則四以遄使報之説文往來數曰遄離者坎之反坎有心疾而今以大離反坎而去疾得喜則是惟弗損損豈有咎乎六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也此則有益之者然不知其誰益之也且益亦匪利也天下有得之不為富而損之不見傷者則莫若納錫之龜見禹貢九江納錫大龜夫龜棄于地得而獻之雖實之為十朋亦龜耳非其利也然弗之却也弗求弗却一似鬼神所錫自天祐之者此在民不費而在上不貪彖之所謂元吉者非與夫下之所損止于二簋為宴享之需而上之所益不過一龜為卜筮之用其取予之正而不過如此五在益卦則二與五易然損五益二此于五非益而亦曰益者以互坤叠隂如龜甲然雖所損在陽而叠隂相餉隣于納龜故曰此所益者龜也又卦象離為龜而升艮之門闕之間則正宗廟所蔵者漢食貨志元龜長尺二寸直二千一百六十為大貝十朋註兩貝為朋言直重也但兩貝係新莽所定在古則五貝為一朋直五十貝為尤重若鄭康成引爾雅説謂龜有十名則十龜非十朋矣非是爾雅十龜為神龜靈龜攝龜寳龜文龜筮龜山龜澤龜水龜火龜上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也損以三上為卦主而上尤受益之主也三既損其剛以與之上而上即以柔應之則不惟弗損抑又何益彖之所謂无咎貞吉而利有攸往者則惟此爻能當之葢三以所損為所得則所得者友也並行者也上以所益為所得則所得者臣也奉我者也夫臣各有家既已得臣則天下之家皆其家雖剛柔相應隣于家室而視若無有如此則不謂之大得志不可矣彖言有孚即爻言志也皆大離中合之象但初九合志九二中志上九大得志皆以志歸陽其重泰三陽如此震下巽上子母易卦易否三來初往又易損二往五來益利有攸往利涉大川彖曰益損上益下民説无疆自上下下其道大光利有攸往中正有慶利涉大川木程頥傳本謂木乃益字之誤為益道大行或以為上巽下震為木道非也則以私臆改經文妄之甚矣道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行損泰之三畫以益之上謂之損損否之四畫以益之下即謂之益夫同有損益而一名損一名益者雖曰損泰將成否益否又將成泰然亦以下不可損損民以益君則雖益而亦名損上不可益益民而損君則雖損而亦名益理固然也向秀曰明王之道志在恵下故取下謂之損與下謂之益是也第益従外至而反曰利有攸往者夫四剛之従外至者來也然而初柔之従内出者即為往也攸往従來不解往而利則即隂上行而亦謂之往即偏于為下而亦謂之中與正況夫來之利則更有不可言者此利涉之利夫卦位之在内者坎也一二三否以純坤而見坎則大川也否内純隂則坎見説見前乃四剛之來特涉大川以成震而初柔之往亦遂涉大川以成巽巽木震木皆為木道則自此一來而方春布徳木道乃行其為涉川之所利方未既也利涉川亦従來未解故彖傳曰損上益下猶之損下益上也而升損兌二之畫以見倒兌是兌多悅亦多也自上下下猶之其道上行也而降否乾四之畫以體大離是離大光亦大也若夫巽順震動天施地生蘇軾曰天施乾為巽也地生坤為震也則在損行已有時而況乎益焉此卦推易則正従否來移上之初凡蜀才干寳虞翻荀爽輩皆知之即本義亦云損上卦初畫之陽益下卦初畫之隂自上卦而下于下卦之下其言歴然若兼従損來則子母推易他人不解耳餘見損卦象曰風雷益君子以見善則遷有過則改遷改二義本推易之法以推遷改易即推易二字也損上四而可以益下是所遷者善矣益初畫而無損于上則所改者無過矣初九利用為大作元吉无咎象曰元吉无咎下不厚事也夫上之益下不必真有所予也夫予下何㡬而使下自益則無盡故自益之道莫如農事彼夫耕植方興即謂之作猶書曰東作是也耕植具舉即謂之大作猶史曰大興農功是也葢初二皆地道而初又民位則正小民力地之際子不云乎神農氏作斲木為耜揉木為耒耒耜之利以教天下葢取諸益則在周易未演時亦即于益象見農事焉此説易最闗係處觀漢儒皆以此爻為耕植可驗後儒胡指臆度妄以大事當之夫下不厚事而大事也乎況初為震剛震于卦為稼其于稼也為反生于方為春東方于時為三月三月卦而以全象言則坤土在中前巽入而後震動有如耒耜且以震巽之木大離之牛而耕之三坤之土間艮手持耒互艮震足動耜進退田間巽為進退無非耕象而初以震剛當之則彖所謂自上下而利攸往此其利也不然康功田功本無艱重可以為大作而不可以謂厚事葢不竭民力而大有功上之益下者益是而已或以厚事為厚事上是増一上字矣不通六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也益之二即損之五也其位同其所益亦同然而十朋之龜在下錫上本為無益之物而以上益下則元龜敷錫夫亦賚予之最尊者也第二自五來損二剛易五柔叠隂相餉而二即報之以兌剛一若推兌牲而上享之者兌羊為牲葢農功大作則卜郊祈穀無非享祀況五出下震則又為出震之帝而二以坤國而進享之享従内出則益自外至也虞翻謂二為帝五為王以出震在二爻也不知出震在二故二能享帝不必二即帝也此與隨之兌西在上故上稱享于西山不必上自為西山正同六三益之用凶事旡咎有孚中行告公用王肅本有桓字謬圭象曰益用凶事固有之也三亦在所益者第三本多凶繫詞而又處三坤之中與穿土交陷而成凶象者正相合焉説文凶字象地穿而交陷其中夫民飢為凶孟子曰河内凶周官凶事即荒政也周禮以委積待凶荒以荒禮哀凶札但凶事用圭凡王者憂凶之禮出鎮圭以致王命使恤凶之地或去其征或弛其政周禮珍圭以徴守以恤凶荒註珍作鎮王使人徴諸侯憂凶荒則授之以致王命焉此即益下之最變而最厚者故曰益之何用用凶事也凶事必信民而三在大離之中則有孚者也況以分卦言之則二五稱中行三畫之中泰之二九二得尚乎中行夬之五九五莧陸夬夬中行无咎是也以合卦言之則三與四稱中行六畫之中此之三復之四六四中行獨復是也以必信之凶事而奉信圭以作信使禮曰大夫執圭而使所以申信也又君用圭以通信則此所稱中行者或亦周官之所稱大行者乎乃坤土之國多連諸公震雷之鳴用申布告秉坤艮重土之圭互坤上兌為重土圭象行巽上風行之令此固以上益下所自有者而有何咎焉六四中行告公従利用為依遷國象曰告公従以益志也此正以推易為卦辭者也夫推移者遷也易之為道也屢遷而四以否之坤柔遷而為益之巽柔而此巽柔者然且仍居之坤土之間是遷者國否之下坤為國所遷者亦國益之互坤亦為國専以遷國為益下者也夫殷王五遷無非為民向使遷之而民不以為利則告在民也乃遷之而實與下為有益則所告又在君也今四與三處卦中同為中行説見前爻則已有告君之責乃不敢斥言告君而姑告君之従者曰告公従以巽順坤亦順皆従也然而遷國何利其所用以為利者非依也乎周之東遷晉鄭是依見左傳今以柔居上將必有依之為剛者初是也初本四所來亦四所應以所來之方而居之所應之地則向之以四易初者下之所従益而今之以初應四者又上之所由依也夫損無可損則損其疾益無可益則益其志今志在益民而以遷國者益之一若徒告公而益以志者葢大離中孚其為信為志毎如此九五有孚恵心勿問元吉有孚恵我徳象曰有孚恵心勿問之矣恵我徳大得志也大離本為孚為心為志而以巽剛而降順命巽為順為命凡受我益者無不有孚信而順其心恵亦順也無庸問矣顧其有孚信而順之者徒心也與哉夫上之與下為損益者分也下之與上為投報者其徳也今五以柔與之二而二即以剛上之五兩易而兩無所怨情深矣是豈止有孚而恵心也乎其恵我也以徳矣損曰大得志益亦曰大得志亦以為上下相益君人之志也而乃今而大得之上九莫益之或擊之立心勿恒凶象曰莫益之偏孟喜本李鼎祚本俱作徧虞翻曰徧周布也則直另一字矣辭也或擊之自外來也此不益之戒也上乗剛踞剛而無以益下則下誰為益之者夫下之受益者震也震主擊無以益之則或將擊之矣且下之恵心每視乎上之立心原夫轉易之法見卷首以益與損對者就卦畫言也若以卦名則風雷之益當以對夫雷風之恒夫雷風為恒則反之而非不恒乎此無論上卦體巽巽為進退已原有不恒之象而即以卦名推之風雷盡而不恒見是上之與下者無恒産而上之自立者遂無恒心上之自立者既無恒心而責下之有恵心也能乎夫有孚在中偏即不及上之不孚以其偏也下之無恵心亦以其偏也若夫擊則不敢斥言下也故或之乃或之而反曰自外來一似過欲避下而反佯指一在外者非也夫上已盡矣何有于外仲氏易卷十八
