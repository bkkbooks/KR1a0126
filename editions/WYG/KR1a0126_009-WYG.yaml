body:
  text: 仲氏易卷九翰林院檢討毛竒齡撰巽下艮上三易卦易泰初往上來又易損初往三來恒四往上來虞翻以隨為否上之初剛來下柔以蠱為泰初之上剛上柔下皆推易之法蠱元亨利渉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也蠱壞也器不用則壞春秋傳曰皿蟲為蠱人不事事則亦壊說文曰蠱事也盧氏曰不事事也尚書大傳云乃命五史以書五帝之蠱事以太古之時无為无事也夫以内巽之行而復外艮以止之宜其壊也然而大亨者豈非以其蠱也哉不事則蠱而蠱必有事誠能事其所不事則治亂之功勇于治治雖大坎在前自一至五為大坎而震互于巽自三至五為互震雷既動謂震而風自行謂巽大川之涉有何勿利特事貴及時彼夫巽與止而猶可以事事者所賴有震動之時在也故震為木為甲震東方卦屬甲木而甲為幹始甲乙丙丁戊己庚辛壬癸十幹以甲為首凡天時所周将有所終則必有所始今已得始甲則凡先乎此後乎此而皆得以甲周之所謂終則有始者雖曰幹有十數而前三後三厯七日而十已周葢先甲為辛為金為壬癸為水西方庚辛金北方壬癸水後甲為乙為木為丙丁為火東方甲乙木南方丙丁火合木火金水而四時悉備東南西北即春夏秋冬所不用者獨戊已耳故子夏傳曰先甲三日者辛壬癸也後甲三日者乙丙丁也夫第言辛壬癸乙丙丁而不言戊已則明以戊已為不用矣葢戊已屬土分王于八幹土分王四季而所行特遲言震甲者必去之先甲後甲說各不同馬融謂甲在東方艮在東北為先甲巽在西北為後甲其于艮巽則合矣然與三日無涉鄭𤣥謂令甲之首必先令三日後令三日以示取信且前三用辛取更新之義後三用丁取丁寧之義則又與卦彖取義無與若虞氏易謂下卦變乾為前三甲上卦變乾為後三甲甲者乾也則純取變動全無定準且何以為三日也胡氏謂先天甲在東之離由甲逆數離震坤三位為艮先甲三日也由甲順數離兌乾三位為巽後甲三日也則與繋詞及坤卦方位不合且徒協艮巽亦無義至蘇傳謂陽生于子盡于已先甲子戌申陽極生陰之時陰生于午迄于亥後甲午辰寅陰極生陽之時則子反陰生午反陽生戌申反陽盛辰寅反陰盛尤謬若漢武冬至立泰畤于甘泉詔曰先甲三日後甲三日朕甚念年嵗未咸登飭躬齋戒丁酉拜況于郊則以此當三日之齋斷節取義與易理不同若是者何也夫蠱自泰來者也以泰之初剛而升為上剛又自恒來者也以恒之上柔而降為四柔則是剛使上而柔使下也且又自損來者也損内卦本兌而今改為巽損外止可脫而今加以順是向之說而止者今巽而止也朱本義亦註卦所自來謂此卦一自賁來一自井來一自既濟來則凡卦可來不勝舉矣若程傳亦見及此謂自泰變來以乾之初九上而為上九坤之上六下而為初六此是卓見然但知自泰不知恒損終是偶然見及與本義一多一少正其有見而未達處然則推演之言其早為二子所許久矣然第患不事事耳苟能事事則治亂之功勇于治治雖以治天下可矣而況于涉川葢涉川之往貴有事也自甲至癸終而復始所事者急也夫人事盡則天行亦見按秦伯伐晉之筮詳見左傳少時讀其文而不得其解嘆易義已亡三聖所傳之㫖茫然不曉即周漢相距曽無㡬時而周史占法至漢盡失縦或晉唐諸儒偶有觸發終不得要領及聞仲氏推演之說印之三聖之所傳戃怳相合因復返而觀周史之易知推易之法即占易之法而惜當時所傳兼卦謂兼之卦多而専卦謂専有遇卦少也夫兼卦則義在動變兩卦比校不全用本辭然猶有本辭可按驗者若専卦則所演所占皆是物也然而不觀之所推則其義不見如秦伯伐晉筮之得蠱左傳僖十五年秦伯伐晉卜徒父筮之遇蠱曰涉河侯車敗詰之對曰乃大吉也三敗必獲晉君其繇曰千乗三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓戰于韓晉侯車敗獲之以歸夫蠱彖與蠱象具在也即宣聖所賛今所謂大象小象者其辭亦未嘗亡也然而涉河之師三進之勝侯車之敗雄狐之獲于卦于象于爻于辭何曽有是而印之推易則曠若發蒙瞭若指掌剨然嗒然若霧捲若冰釋踊躍而不可已然後知周史之占宣聖之賛文周之推演掩抑數千年而今日而始暏之也夫所謂涉河者何也夫河者水也坎也凡爻之踰剛中而成坎象者即為涉川以一剛在中即為坎此通易之例也今蠱自泰來以泰之初九越二三之剛而為上九又自損來以損之初九越二之剛中而為九三是皆踰剛爻而成坎象所為踰河之師是也然而未嘗三去也三去即三驅謂三進而三敗之夫相筮之法内我也外敵也以我向敵而一則以泰之初剛進為上剛再則以損之初剛進為三剛是三進之師既已有二而又且一自恒來皆見卦首以恒之四剛而進為上剛三陽遞進無非勁卒而皆足以制其險一曰三去一曰三敗向非此推易而何以有是三也且夫侯車何以敗也夫坤者輿也見說卦泰易外卦之坤輿以為艮止泰外坤變為外艮外為敵固将止敵之車矣乃震亦車也見虞氏及九家易恒又易外卦之震以為艮止恒外震變為外艮夫震為動木視若仰盂此車箱之象也今易為艮止而又倒震象以覆其車震為車倒震為艮非車敗乎震為侯見前非侯車敗乎故曰千乗三去言我本千乗之侯也三剛並進是三去也三去而覆其車則雄狐獲矣何也艮為狐狼見虞氏易艮之陽一爻即雄狐也雄狐陽狐也陽狐而蠱者必其君蠱者君父之惡也故又曰夫狐蠱必其君也此以推易為占易者也至于卦本辭則貞風也其悔山也貞巽木而悔艮土以木尅土以風落山誰曰不克此則占本辭者耳夫既占推易又占本辭推法可驗占法亦可驗葢其以専卦而見三聖之易者有如此周史几繇詞皆筮時當前斷語非古詞也杜註以為古太卜詞而今亡之焦贑直造為易林以代繇詞妄矣象曰山下有風蠱君子以振民育徳王畿曰風言振山言育初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也夫天下之以不事事而致壊事者豈少哉晏安之習積之有漸葢自其祖父而已然矣此其際不可不有以幹之幹者事也幹蠱者事事也仲氏曰蠱為事幹亦為事猶亂曰亂治亦曰亂也不事曰事猶昭昭之多不多曰多也夫事事而豈止于一家已哉然請觀之家夫泰之以三陽為乾也是父也乾為父今與上易位而成艮剛是父亡矣父亡稱考書如喪考妣離騷朕皇考皆註父死之稱也上爻有宗廟之象初推而入有考象而無如其有遺事也蠱也此非他之蠱父之蠱也夫言父則謂父不可以死也乃猶幸其幹之也曰有子矣今而後可以瞑矣故曰是考也无咎者也在父則有蠱而在考則无咎子雖厲亦何傷乎故厲終吉按子夏傳曰臨事専故厲成其志故无咎有事然也鄭𤣥曰子改父道始雖厲而終則吉事若不順而意則順也葢巽為命令見說卦父有命而子承之亡則不然今曰意承亦曰吾承之以意所謂従治不従亂者此耳漢志平帝元始元年廣牧女子趙春病死復生自言見夫之死父引京房易傳曰幹父之蠱有子考无咎謂子三年雖不改父道然亦當見前人之非不則為私私則其妖為人死復生則亦以考為死父之稱雖死亦當幹蠱與此正同九二幹母之蠱不可貞象曰幹母之蠱得中道也父為考則所存者母也父蠱母亦蠱所謂蠱矣蠱在母則當以不事事之所謂善事也可以貞乎葢二以剛爻居中正之位似乎可貞然下體位巽而又當互兌之始則其所以為中者乃巽之中也巽而悦則不可貞不可貞即中矣此六爻皆幹蠱之子其所為父為母者本無定位夫亦隨象而名之此之為母以初爻而言也初與二同為地道如兄弟然初既承考則二當将母唐鶴徴曰二爻獨言母者對五柔而言也猶晉之稱王母也仲氏曰蠱従三卦所推初三四上皆有對易惟二五無易故二五自為相應則下剛為子上柔為母似亦可通特此與初爻一隂一陽同才共道則又不在應而在比矣九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也蠱事也又惑也伏曼容曰蠱惑亂也三爻本損澤之陰移陽為風是以少女為長女此則蠱之所由來也左傳秦醫和謂晉侯近女室疾如蠱在周易女惑男風落山謂之蠱杜註艮少男而悦巽之長女非匹故惑第三為互震之始正幹蠱者徒以四上兩陽不能相應而又居坎中故小有悔耳夫幹蠱又何咎焉六四裕父之蠱往見吝象曰裕父之蠱往未得也四本震陽而移為艮陰上下無應乃又互于兌以兌折之終當艮止之始此大不能事事者且夫父之蠱以長女也今復易恒之乾剛而為兌之少女兌為妾見說卦是既惑長妻而又以少女當下妻之惑漢書以妾名下妻裕其蠱矣夫艮止也惑且止将安往乎六五幹父之蠱用譽象曰幹久用譽承以徳也外卦為受蠱之地而亦幹蠱者重幹也二與五應用二之令聞以承前之徳此善幹者繋曰二多譽上九不事王侯髙尚其事象曰不事王侯志可則也上之剛一自初來初之所承事者二也二臣象也侯也一自四來四之所承事者五也五君位也王也今皆不事矣以言其位則至髙以言其志則可尚孟子尚志與此志字同此雖在幹蠱之外者然泉石之癖亦一蠱也要之事有不同幹蠱者事所不事髙尚者不事而事故曰艮雖止而出險之剛上爻已出大坎往可有事即不事亦其事耳兑下坤上聚卦二陽四陰臨元亨利貞至于八月有凶彖曰臨剛浸而長悅而順剛中而應大亨以正天之道也至于八月有凶消不久也地臨水曰臨如臨深然故以卦言之則為坤臨兌而以爻言之則為陽臨陰第是卦體當大震兼畫之震震體従乾故一以乾徳予之雖不訓四徳而卦詞則同所謂大亨以正者則以震主行爻内言志行中行皆以此二陽方動由漸而長内說兌外順坤剛中九二而應六五此固天道之自然而祗其所為陽長者不可久恃従來消長之㡬循環無窮既有長則必有消故取象于臨以為臨則不行左傳宣十二年邲之戰知荘子曰不行之謂臨有帥不従臨孰甚焉而無如陽日以升隂日以轉今以十二辟卦計之臨之為卦祗二陽生地不過建丑十二月耳自復一陽建子十一月起臨二陽十二月泰三陽一月大壯四陽二月夬五陽三月乾六陽四陰月而陽數已終所謂陽絶于已也乃自姤一建午五月起遯二陰六月否三陰七月月觀四陰八月剝五陰九月坤六陰十而陰數已終所謂陰絶于亥也漢儒以此為十二辟卦而試一反觀則臨觀對見臨觀自乾坤至末凡卦皆對即此臨之十二月已至于觀之八月觀即在臨中故但言至八月不然何以不至九月十月耶雖同是二陽而陽之所為長者亦即陽之所為消臨長至二陽觀消至二陽況坤位西南時在六月兌位正西時在八月見說卦此又是一義以明八月之義皆本象所有故推及之非汎汎也上坤下兌原有所臨非時之憂而倒兌為巽従外視内則以觀對臨更有反觀而得之之象且文在商時確守商正二陽建丑此正一王端朔所由始也商徳浸衰史記至帝乙而商道衰至是己見作易者其有憂患矣殷建丑以十一月為嵗首商書所稱十有二月乙丑是也但臨文多改朔不改月故仍寅月為一月卯月為二月則従泰一月起至觀為酉為八月此十二辟卦所定非謂従臨卦數起得八月也但即従臨卦數起至觀亦是八個月且臨下為兌兌又八月卦故取象如是耳鄭康成既以臨卦為建丑殷正月又云臨自周二月至八月而遯卦受之則遯本辟卦六月而以為八月誤矣且此時安得有周制也虞翻亦以遯為旁通之卦夫臨觀倒對仍是臨卦而旁通則陰陽俱反與臨何涉若蜀才謂自丑月至申月凡厯八月而成否則又連臨數起不従臨前數起是以丑月為一月又與詩易臨文不改月之說不合至程朱二子既遵虞鄭遯卦之說又故為小變以復一陽月數起則遯正八月不是六月以為巧合而不知以子月作一月未月作八月則既非辟卦月數且仍是周正非夏商之制文王時豈宜有此況此是臨卦辭臨之至于則即欲遞數亦應自臨始乃自復何也象曰澤上有地臨君子以教思无窮容保民無疆君子臨民法地之臨水洪範以五思屬五土坤卦徳合无疆皆是初九咸臨貞吉象曰咸臨貞吉志行正也以陽臨陰則初與二皆臨也咸者皆也夫二為正臨初與偕則志行正矣九二咸臨吉无不利象曰咸臨吉无不利未順命也二與初皆臨則不惟得吉且得利焉夫巽為近利市三倍又為順為命令見說卦二與初既同居倒巽之剛而二又剛中則一為利市一為順命兩宜有之特此時以陽臨陰不以上臨下恃剛中之應而上臨諸陰利市則有之矣以言順命則未也六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也三當兌口之未而上承坤土之甘洪範土爰稼穡故味甘是以甘說為臨者夫身處陰位既不能下臨二陽而又同在四陰而已獨别于下位下又難以臨上是其所居之位兩不相當若甘心臨人而為人所臨而亦甘之何所利乎且卦所為倒觀而得八月者指觀四也臨之三即觀之四則此爻雖甘殊為可憂葢坎為憂兌上為半坎是也三在兌口但既能憂之反甘為苦反說為憂則觀之四終是臨之三位非正當何咎之有六四至臨无咎象曰至臨无咎位當虞氏易荀九家易皆作當位則與上長韻不協非是也臨至此而八月矣従臨上數至此八個月即觀卦二陽亦消至此爻止所謂至于八月者此則其至之者也三地内臨至此見臨二陽外消亦至此見消時實為之又誰咎焉故以卦位言則以陰居陰位固相當以四應初位又相當而況従臨象反觀則今之臨四即後之觀四其于八月之位抑又相當如此所以與向之以臨三為觀四者有别耳不然三與四同為失位而一曰當一曰不當何辨焉六五知臨大君之宜吉象曰大君之宜吉行中之謂也上柔應下剛五原不足以臨二而無如五中君位則即用中以臨之然亦智矣中庸曰惟天下至聖為能聰明睿知足以有臨也此大君之宜也上卦坎位以純爻而見說見前五居坎中坎水于五徳屬智故有是象上六敦臨吉无咎象曰敦臨之吉志在内也敦如覆敦見爾雅地之髙者也上坤至此髙矣夫澤上有地以髙臨深故謂之臨則此據髙地正臨之本分而特其所居者非正中之位身雖臨而志有在葢志在五也上在五外則五在上内詩曰如臨深淵又曰如臨于谷皆以髙臨下艮之敦艮亦此義坤下巽上聚卦二陽四陰觀古無四聲平上去同用故漢易皆無音註後人分平去二音非是盥而不王肅本作觀薦有孚顒若按盥祼通字與郊特牲瓘論語灌同謂酌鬯降神也馬融鄭𤣥虞翻荀爽諸家皆無異義苐或作朝會或作貢士或作祭祀則祼同而所以用祼者不同耳程傳泥盥字謂潔手以灌則祼盥雜出不明若朱本義潔手以祭則直是穨水矣祼薦皆禮中大節故對待言之潔手㣲文豈可對舉且盥而不薦亦以祼本大禮故一祼可已若祗穨盥則母論祭祀與朝會天下有一潔手而可以云禮畢者乎觀者審之彖曰大觀在上順而巽中正以觀天下觀盥而不王肅本作觀今按爻中皆觀薦之文則不字本觀字之誤惜别無他証且本文不可易耳薦有孚顒若下觀而化也觀王弼以此字句天之神道而四時不忒聖人以神道設教而天下服矣觀為大艮六爻皆兼畫之艮而三五同功則又為互艮艮者門闕之象見前故曰觀爾雅觀謂之闕春秋傳所稱兩觀是也第朝有觀廟亦有觀皆門旁雙闕而是卦下坤上巽以地上之木巽為木而巋然髙峙謂之鬼門見鄭康成易鬼門者宗廟之象故卦詞盥而不薦鄭康成謂諸侯貢士于天子卿大夫貢士于其君皆以賔禮祼獻酬酢而不必設俎此據爻詞利用賓于王一語而妄以周禮賔興當之其說頗無據郝京山曰周禮有賔興之文無飲酒之禮儀禮有鄉飲之禮無賔興之文況禮惟鬯稱祼惟天子有鬯諸侯錫鬯乃有不錫則資鬯于天子若諸侯于大夫賔興安所得鬯且王者賔萬國惟諸侯稱大賔客士興自鄉可稱賔至天子所豈有稱賔之禮有謂諸侯相朝灌用鬱鬯無籩豆之薦見禮器又諸侯朝天子在始至時天子使大宗伯祼以鬯酒無籩豆一獻而罷見周禮大宗伯之職此庶與盥而不薦義合然考大行人掌大賔客禮儀亦原有饗禮食禮諸獻參差不一且殷以前未必即用周禮況貢士朝會皆與聖人神道設教本義殊不相涉惟馬融王肅諸家直指祭祀言謂灌地降神此是正㫖第引論語既灌而往為証以為王道可觀莫大乎祭祭事可觀莫盛乎灌及神降薦牲而簡畧至矣見馬融說王弼註亦然則直以魯之郊禘說易豈有此理且祭禮之誠全在祼薦所謂殷薦上帝禮以薦重故従時祭言則薦韭薦黍春薦韭秋薦黍有羞無牲周禮籩人掌薦羞之事穀梁傳註無牲而祭曰薦薦而加牲曰祭而以大祭言則薦牲薦酒薦幣薦璧皆謂之薦凡有藉曰薦豈有薦禮盛大而反簡畧不足觀者葢觀有兩義以門闕為樓觀之事則以上觀下三輔黄圖云登之可以逺觀而往往懸法以示垂象則又為天下人所觀孫炎云宫門雙闕舊懸法象使人觀之謂之象魏故在朝在廟皆有觀象而此屬宗廟則上之與下皆将于是乎觀禮乃巽當夏令巽四月卦時值禮行四五半坎四陰爻陰位五陽爻陽位為半坎有孚在衆坎孚象坤衆象則即以祼薦大禮觀之而以艮手搴巽茅祼鬯薦藉兩皆有象毋論祼薦相仍不可闕一而第當祼初斯時尚不薦也而相信之至即已秩然其可觀如所謂上顒顒爾雅顒顒君徳也下顒顒者廣韻顒顒仰也況既薦乎葢上為大觀下為觀化下順上巽五剛居中正以觀天下而天下化之所謂殷人尚鬼文在殷時親見夫有殷聖人法天之神道以為嵗時之序祭而周流不忒傳云聖人以神道設教而天下服此之謂也象曰風行地上觀先王以省方觀民設教初六童觀小人无咎君子吝象曰初六童觀小人道也夫觀則合上下中外男婦大小而皆可為觀雖宗廟之中未必容童豎婦女之窺伺而人卑地遠則遙望不及有斯象焉艮為少男初則尤穉矣此童也夫五上二陽為君子則此童小人也夫以小人而作是觀亦曰道在則然固無足咎儻君子出此而不其吝乎六二闚觀利女貞象曰闚觀女貞亦可醜也兼畫之艮既為闕于廟門之前而三五互艮為之重門然且坤為闔戸見繋詞此重門又闔者也乃下卦離位純陰則見見前而六二以中女離為中女之目離為目加之重門半闔之間戸為門之半非闚觀乎雖二陰小人不必果皆女流然幸當大觀之世不入廟駿奔同于助賛而僅僅以觀女自居女雖貞不亦羞乎六三觀我生進退象曰觀我生進退未失道也三與五同功既已升階當饗薦之位所謂盥而不薦者此則其當薦時也葢生者進也即薦也說文謂草出土上以漸進長曰生而集韻廣韻皆以薦進同字如列子王進而問之作薦而問之之類以薦用草藉凡薦食薦物皆有所藉而藉必用草故以草土之生作進餽之薦進為薦生亦為薦此按之說文諸書而厯厯可驗者今三與四當臣位而廟祀之際原有大夫賛幣卿大夫従君之文見禮器則君薦而卿大夫隨之以薦雖曰此君之薦然實我薦也以臣固有従君之道故也乃下卦之終既值内外之交而同功伊始又適當升降之際則以之進薦而乾為金玉坤為布帛見春秋傳註艮為菓蓏巽為茅苴見說卦及諸家易皆當薦之物而我為之進退乎其間不特人當觀我我亦當自觀所謂自我薦之亦自我觀之道也何失乎六四觀國之光利用賔于王象曰觀國之光尚賔也六四近君而加于臣三四民初二之上此助祭之賔書所謂作賔于王家者是也第虞賔在位殷士祼将皆稱覲光覲者觀也而二陽以髙明踞艮髙之上則又合坤離而為國光坤為國離為光此正載見之詩羣公助祭所云休有烈光者而賔且觀之則其觀之所尚為何如者也鮮于子駿云六四處巽順之下以陰居陰故以祭祀明之如二王之後作賔王家助祭宗廟其説頗合按左傳陳敬仲初生筮之遇觀之否太史以為利用賔于王為代陳有國之象正以陳為三恪之後為賔故云然莊二十二年陳厲公生敬仲周史筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光遠而自他有耀者也坤土也巽風也乾天也風為天于土上山也有山之材而照之以天光于是乎居土上故曰觀國之光庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王猶有觀焉故曰其在後乎風行而著于土故曰其在異國乎若在異國必姜姓也姜太岳之後也山岳則配天物莫能兩大陳衰此其昌乎其後陳亡陳成子得政風為天于土上言風變乾于坤之上也中有互艮故曰山也艮為門闕乾為金玉坤為布帛諸侯朝王陳䞇幣之象旅陳也百者物備也史記註内卦為身外卦為子孫若其云庭實旅百則兼諸侯朝王之說葢筮法隨象取義與解易不同至唐人定命錄載天寳十四年王諸入解筮遇乾之觀謂己及賔王而大人未見以乾五未動也遂遇祿山變而返此與鄭𤣥賔興之説又適相巧合然亦筮法如是耳九五觀我生君子无咎象曰觀我生觀民也此大觀也五處君位當在上之觀則凡進薦之禮我之所以必觀者以為此非人之薦而我之薦也禮所謂君親制祭者也葢巽禮可觀本欲以示觀于民今大觀在上而我之所自觀者皆為民之所觀化然則其觀我薦者觀我也與哉觀民也夫民能觀則小人无咎君能觀己以示觀于民則君子无咎上九亦然上九觀其生君子无咎象曰觀其生志未平也上與五同居巽剛其禮巽與五同而位非正中此諸父諸舅合同異姓之尊而居髙而觀不必盡厠之牽牲賛幣之列則其所觀者凡王之薦與諸臣之薦皆其薦而非已薦也夫非己之薦而猶觀之者以觀之在上而必先觀之在下葢惟恐民志之有未平也故觀之也従來宗廟之禮貴在平志故商頌湯孫之祭一曰綏我思成既和且平又曰既戒既平時靡有争此則神道設教殷人尚鬼之顯然者大觀君子不于是之觀而何觀已後漢楊宣策災引京房易傳以觀其生謂大臣當觀賢人之性行然後貢之則漢儒亦有以生訓性者漢成建始初封王氏五侯大風西北起黄雲雜土四塞若暝及哀帝封外戚丁傳六侯亦然故楊宣引京房傳謂大臣之義當觀賢人性行以貢于庭否則聞善不終厥異黄厥咎聾厥災不嗣嗣虞氏易以生為生民荀九家易作教化之生王輔作自觀其道合之性生凡四義皆不確當且與康成貢士説合總是占驗家各有師承不礙同異至宋後則茫無依據耳仲氏易卷九
