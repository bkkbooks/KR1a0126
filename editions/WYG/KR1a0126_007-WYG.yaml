body:
  text: 仲氏易卷七翰林院檢討毛竒齡撰乾下坤上聚卦三陽三陰此周易聚卦之首以乾坤禪而為否泰否泰者分聚之樞要也故移易者自一陰一陽至五陰五陽止而此以陰陽中分定為聚卦之首觀者詳之泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外陰内健而外順内君子而外小人君子道長小人道消也此聚卦也夫猶是天地設位乾坤成列之卦而必天與地並設乾與坤同列然後往來之象見焉故曰獨不見往來乎否泰是也往者自内而達之外也來者自外而達之内也小大者陰陽也小者陰大者陽也夫陽本在上陰本在下而今顧反之何與曰所謂交也交則上者有時而下下者有時而上内外亦然夫内即下也外即上也下陽上陰即内陽外陰故陽為健為君子陰為順為小人健與君子則嘗欲其居于内順與小人則嘗欲其居于外而以交言之則内健而往往則仍外外順而來來則復内似乎君子小人迭為消長内外往來本無一定而在此時則不然君子也内也道長也小人也外也道消也故曰泰也内外以卦言往來以爻言若宋魏文靖進講泰卦曰内君子外小人固為泰道第在外而腹心是寄不為外在内而情意不浹不為内是直以地分内外矣此講義非易理也本義不知推但知變以為此卦従乾來又従歸妹來不知従乾來則諸卦盡然若従歸妹來則顛倒矣歸妹従泰來泰不従歸妹來也象曰天地交泰后以財九家易作裁義同成天地之道輔相天地之宜以左右民初九拔茅茹以其彚句征吉象曰拔茅征吉志在外也郭璞洞林以其彚句鄭註以彚征句謂引類而仕之三陽與三陰為交故三陽連類以進而陰即翩翩以應之如茅茹然葢卦有互兌即倒巽也巽為茅見諸家易雖互在二四與初無涉而茅根為茹虞翻曰茹根也根必下生茅在二則根在初矣拔茅者以其根進賢者以其類彚類也征進也二三之征自有連初陽而並彚者不其吉乎彖曰上下交而其志同葢陰陽上下亦各有志今初征之彚亦曰其志在外耳惟陽志在外故陰志在内一曰中心願一曰中以行願葢同之也九二包荒鄭本讀康虚也用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也九二為卦主合三陽而居三乾之中則儼一天矣夫三坤地也地曰荒猶四方之稱四荒也而二能以廣大之量包之上卦居坎位四五六即陰陽陰坎位也純陰陽則位象見說見乾卦河也二身居互兌之初亦河也乃乾健之徳足以馮之然且遠邇同觀中外一體三陰雖遐而不遺其志有在三陽並征而非比朋黨盡消其得乎剛中進乎行健為何如者此无他身居離位一二三即離位也説見前則髙而倍明而旁有兼陽則光且益大也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也夫以三陽之終交三陰之始此正往來之機消息之會若所稱天地際者如概言其理則天下無有平而不陂往而不復者平陂以上下言往復以内外言而君子于此則一以人事持之修盈保大艱而能貞有何咎乎縦或其志在外将與陰交如六四之以孚即其孚也而任其自然勿以為慮則雖飲食之間亦且獲泰交之福所謂寝食俱安也故曰保泰者持滿之道也兌口為食離合為孚離坎俱有孚象三爻居離位之上故云往楊廷秀曰勿謂時平其險将萌勿謂陰其復反掌六四翩翩陸徳明本作篇篇不富以其隣不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也夫四之翩翩而來者以交陽也第陰能廣生則必先有資于陽而後孚之以其心今四居互巽之倒是巽近市利而四則反之况位當坤首坤亦吝嗇雖欲富其隣而莫之以也且四之欲孚陽也當有戒矣信以心必信以言而四居互巽之倒是巽為命令而四則反之況位當兌口兌盡則口脱雖欲孚以言而亦莫之以也然富可不以而孚則必以是何故葢富之不以則以似巽而實非巽故似富而實非富失其實也若夫孚則中心願之信雖在言而願之在心夫在心而有不能以之也乎雖不戒猶能以之所為上下交而志同如此六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也乃交之至五而為婚姻夫五與二應固也五為陰而二為陽以陰従陽不待言也何也中心願也乃二四同功為互兌三五同功為互震震為長子兌為少女震為兄兌為妹合震之與兌而歸妹之象成焉所為雷澤歸妹是也夫當紂之時帝乙為尊殷王帝乙紂之父也易直引之如髙宗箕子類亦是易例故春秋傳曰㣲子者帝乙之元子也左傳哀九年晉救宋伐鄭陽虎卜之遇泰之需曰宋方吉不可與也㣲子啟者帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止荀爽傳對策易曰帝乙歸妹婦人謂嫁曰歸言湯以娶禮歸其妹于諸侯也此據乾鑿度云易之帝乙為成湯書之帝乙六世王同名不害以明功又曰湯以乙生嫁妹本天地正夫婦諸語但史稱湯為天乙稱紂父為帝乙此據左傳㣲子為帝乙元子則正指紂父故虞翻曰震為帝坤為乙帝乙紂父乾鑿度以為成湯此易緯之文故是妄語不足據也且髙宗伐鬼方箕子明夷俱是實事此屢言歸妹則必當時原有帝乙嫁妹一節傳偶不載故亡之耳而程傳謂帝乙制下嫁之禮此何據乎且下嫁何必妹乎若本義云帝乙歸妹時亦嘗占得此爻則歸妹之六五亦云帝乙歸妹當又占得彼爻矣儒者說經何可臆斷如此以帝乙之尊而歸六五之妹于九二則陰之従陽順之従健小人之従君子皆得之矣以願而見諸行矣既濟之受福坤五之元吉兩無愧耳上六城復于隍子夏傳作堭姚信作湟義同勿用師自邑告命貞吝象曰城復于隍其命亂也然而泰至此而否象生焉夫城土也隍去土者也向取隍之土以為之城今且復傾城之土以塡之隍此平之无不陂而往之无不復也葢坤當外盡而坎位上形上位坎見前坤為土為城而坎為隍為窞坤坎之合象固有之則雖坤衆水亦衆地水相比變而為師而亦何所用則雖坤為國邑見前兌為口語見前邑之不戒治以告命而究近于亂何則往復之㡬介于俄頃即守之甚固猶且不免于吝何況征也保泰者視此矣坤下乾上聚卦三陰三陽否之匪人不利君子貞大往小來否之匪人言否卦中之小人也本義疑之匪人三字為衍以為従比之匪人所誤則彖曰否之匪人不宜又誤矣易無秦火原不應漫指脫誤然本義但擬議及之而呉澄朱升註本竞去此三字一何妄也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内陰而外陽内柔而外剛内小人而外君子小人道長君子道消也否則與泰反矣象曰天地不交否君子以儉徳避難不可榮以祿書慎乃儉徳謂以貶損為徳也初九拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也夫猶是茅茹之拔而不可征也貞則有守有守則志不在彚而在君矣互巽為茅位在三五而其根在下故三為茅初為茹與泰同仲氏曰陽能進則志在陰陰能守則志在陽健順之理殊也六二包承小人吉大人否亨象曰大人否亨不亂羣也亦将用其包并之量而欲上包陽而必不可包乃徒包其承已之小人以為羣在小人則吉矣大人當此肯亂其羣哉不亂故否亦不亂故亨小人都不可與作緣也諸解皆以包承作兩事則單一包字與前後爻辭俱不通矣朱升易註以承作脀牛牲也謂苞苴餽遺之事乘來氏易註以承指初爻謂承二者即承之乘亦通六三包羞象曰包羞位不當也包羞則凡可耻者俱容之矣朱升易註以羞為饍羞謂腥胾膾炙醢醤之屬非食品之正較脀抑末矣百按左傳陳厲公生敬仲筮之遇觀之比有庭實旅奉之以玉帛諸語以卦中互艮互巽艮為門庭巽為果蓏乾為金玉坤為布帛俱有庭實之象與朱氏苞苴餽享諸説甚合惜承脀二字尚須更易故不従耳九四有命无咎疇離祉象曰有命无咎志行也此復泰之始也乾剛在上雖與下不交而大君有命常伸于下葢艮為門闕巽為命令二四互艮三五互巽布乾剛之徳以加坤衆縱使小人茹彚不利大人而既曰有命則大人自有羣在泰之時則朋欲其亡而在否之時則儔又欲其離祉初以彚見志此以儔見志也疇儔也離罹也初與四應故皆有志字王文成答朱侍御守忠書曰疇祉盈朝志行于衆九五休否大人吉其亡其亡繫于苞桑象曰休否之吉位正當也否従此休矣休未至于傾而稍休息焉故曰前者大人否今大人吉矣然而消長之理循環無端安危之幾間不容髪雖或否運初開泰期将轉而國家存亡自此政未可定也故嘗念曰其亡乎其亡乎繫于苞桑乎夫九鼎之重不懸縷絲萬來之絇難縶弱木今以叢生之桑而繫奔亡之轡我知其危矣上卦位坎見前坎為叢棘而五當互巽巽為拘為繩見説卦故有司象若苞桑之喻舊稱堅厚荀氏九家易以苞為包謂乾坤相包桑者上𤣥下黄象乾坤也京房曰桑有衣食人之功聖人亦有天覆地載之徳故以為喻李陸績曰包木也言其堅固不亡如以巽繩繫也鼎祚謂五二包繫根深蒂固若山之堅如地之厚按苞為木之叢生枝細不能繫物此正與堅厚相反熊過曰苞桑桑柔之方苞芽者與詩苞杞同故唐陸贄收復河北後請罷兵狀有云邦國之杌隉緜緜連連若苞桑綴旒幸而不殊者縷矣此亦以苞桑細弱難以維繫為解舊過泥苞字遂認作堅厚實非義也上九傾否先否後喜象曰否終則傾何可長也否終則傾天下豈有長否之世哉離下乾上二易卦易姤二來初往夬二往上來蜀才曰此本夬卦九二升上上六降二則得位得中而應乎乾矣此正推易之法之所始特蜀才祗發其端不令全著如姤初六升二九二降初亦得位得中而應乾便不並及以俟後人類推之耳同人于野亨利涉大川利君子貞彖曰柔得位得中而應乎乾曰同人同人曰王弼曰所以能同人于野而利涉者非二之所能也以乾行也故特加同人曰孔穎達曰同人曰猶言同人之卦曰也自程子作羡文朱子作衍文後遂去此三字如朱升易註類大謬同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志同人者同于人也獨陰不同于衆陽而反曰同人則以六二之應九五初亦但同于衆陽而厯久而後應之九五爻詞所以曰後笑曰相遇故卦詞曰同人于野初與二為地道故稱野野者衆處之地也而彖則曰柔得位得中而應乎乾九五為六二應應乎乾則所以同之者祗此人也繋詞稱二人同心故是卦以二為主而六二之詞但曰同人于衆與卦詞同而九五之應則曰先號咷而後笑葢先違而後遇之又曰大師克相遇與彖義同第是卦六二一自姤推則在初一自夬推則在上故爻言同人凡四其在二與五則正中相應其各稱同人固也初與上何與而亦曰同人若曰以言乎推則此亦其可同者耳故初曰同人則不出門而早已同之然而非相應者也上曰同人則昔同而今反違等之在野汎汎然不我應也若夫九五曰相遇則儼以姤與之矣曰師克則儼以夬決之矣至于乾健中正則九五君子居正而應雖坤應而實乾行焉故上卦坎位以純爻得見説見乾卦而離有伏坎復相背不解離背為錯坎則即此爻位原有川象況姤夬未推則初上兩陰而夾中陽為大坎大坎大川也今既推之則已滅坎象為利涉矣反姤初之豖蹢姤初六羸豖孚蹢躅變夬上之滅頂夬上兌缺為滅頂此非應乎乾而乾行不至此故離中為志而乾行中正可以通天下之志焉按石晉髙祖以太原拒命廢帝遣兵圍之勢甚急命馬重績筮之遇同人重績曰乾健而離明健者君之徳明者南面而嚮之所以治天下也同人者人所同也此其時将必有同我者焉易曰戰乎乾乾西北也又曰相見乎離離南方也其同我者自北而南乎乾九十月卦也此以卦位言乾西北卦位在九十月戰而勝其九十月之交乎是嵗九月契丹果助晉擊敗唐軍晉遂有天下象曰天與火同人君子以類族辨物王弼曰君子小人各得所同蘇軾曰同人以不同為同初九同人于門无咎象曰出門同人又誰咎也初不及同而上過乎同初以姤之六往而居二則連九三而艮象成矣艮為門故爻曰于門以本爻言也象曰出門則連二言也葢出門而即求同人何同焉然出門而不即同人何咎焉六二同人于宗吝象曰同人于宗吝道也二本與五為同人而尚未同也尚未同則同之者衆矣傳曰人盡夫也諺曰一女留百家求也夫至一女當衆求而不其羞乎吝者羞嗇之義按廣韻宗衆也荀氏九家易亦以宗訓衆徐咸清曰同于宗與同于野同此漢儒説易與隋唐字書無一不合今為字書者如字彚正韻類妄有引類而特遺此訓遂使易義俱晦一何陋也九三伏戎于莽升其髙陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也三與四則求同而不得者也夫三居離剛離為戎兵説見前而背有伏坎坎者伏也坎為伏伏其戎于互巽之木間二四同宫為互巽巽為草木則已伏戎于莽矣然而自姤推而連艮象見初爻艮為山艮之上剛即髙陵也互巽為股為髙則升而髙也伏戎而升髙将以敵五即敵剛而艮止矣雖厯離三之終㡬三嵗而弗克興矣夫巽順艮止則固所當安行者而欲其乾行不亦過乎九四乘其墉弗克攻吉象曰乗其墉義弗克也其吉則困而反則也離剛堅乎外為墉三為二墉而四則乗之乗者乗三也其墉者二之墉也弗克攻者順也互巽也然乾為天則弗克攻則又以互乾而反天則焉九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也夫五之所應者二也則其所同亦二也然二以一陰而所承所乘所比皆陽焉能遽遇哉夫先反側而後友樂闗雎之義也同人亦然然有升陵者有乗墉者是必用乾行之衆借離應之兵而出剛金以克之則始可相遇姤者遇也凡推卦者亦曰此所同者則亦従姤來者也按卦主離火火無定體故易例凡遇離則皆有笑咷之象如離不鼓缶而歌則大耋之嗟出涕沱若戚嗟若中孚為大離或鼔或罷或泣或歌旅上卦離先笑後號咷類説見來氏易及何氏訂詀故舊說以號咷笑皆離火之聲非無謂也虞翻曰同人與師反故亦稱師或曰師五陰稱師同人五陽稱大師上九同人于郊无悔象曰同人于郊志未得也葢従此是路人矣徐咸清曰同于郊與同于野同乾下離上二易卦易姤五來初往夬五往上來大有元亨彖曰大有柔得尊位大中而上下應之曰大有其徳剛健而文明應乎天而時行是以元亨大有者多也春秋傳豐年多黍多稌為大有夫以一陰踞五中而諸陽之大皆為所有易以陽為大陰為小故凡稱大壯大畜大過皆以陽多為名不既多乎況上離互兌三至五為互兌以乾之天行當夏秋成物之候長養矣夏為離五月卦為長養稔矣秋為兑七八月卦為稔不又多乎故曰大有者多也苐是卦所推以姤之下柔與夬之上柔同易五剛是上下兩柔俱得尊位居諸大之中大中者諸陽之中也而夬上與姤下皆應之上下應則夫内為剛健下乾外為文明上離剛柔相應應乎天即柔應剛而乗時以行時行凡四徳之所謂元善而亨通者亦皆于天火見之元亨而何勿多之有象曰火在天上大有君子以遏惡揚善順天休命初九无交害匪咎艱則无咎象曰大有初九无交害也初之所有本自五來則向原與五有交而今无矣是何也則以五之交如者自有在也謂應二但六五為離中為日日行交道或自外而内或自内而外而惟當正交之地則不無陰亢陽月揜日之害見别傳如三當内外之交而曰小人害是也如此推説則三爻害字五爻交字俱有着落今既無交則亦無害而特其所為無交者匪以害故葢害者咎也大有之初四陽遞行但稍為難進則已无咎吾所謂無交害者亦大有之初如是焉耳故象特申之曰大有初九従來无交害無咎俱不可解即象詞加大有字又加初九字俱無謂此推易之發所未發也九二大車蜀才本作輿則坤為大輿矣非是以載有攸往无咎象曰大車以載積中不敗也二則陽多矣居下乾之中當互乾之首重剛而中比積載之時也小畜徳積載乾為大車見虞氏易行健有攸往而離牛離為牝牛前之此大有之所積者而何有于敗九三公用亨虞氏易作亨以鼎餗為解古亨享通用春秋傳占此爻謂戰克王饗饗即享字或以亨解通非是于天子小人弗克象曰公用亨于天子小人害也以乾三而踞下國之首三公象也大有至此已衆多之極而身居互兌進為容悦兌為悅則将絀所有以享于君時固有之第三當内外之交與初之无交不同而又不能為六二交如之應則過于容悅反為小人小人則弗克享矣何也以害故也按左傳晉文侯将納王筮之遇大有之睽曰戰克而王饗吉孰大焉左傳僖二十五年秦伯師于河上将納王晉侯筮之遇大有之睽曰吉遇公用享于天子之卦也戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有之暌而復亦其所也則享君固大有事其害者以弗克享耳若其變乾天為兌澤而以當離日謂之天子降心以逆公則此卦乾下離上降心亦然故傳又曰復亦其所大凡占卦既有動則貞悔俱占無有舍之卦而仍占遇卦如朱子用九所云者畧見乾下九四匪其彭韻會曰彭多也易音旁子夏本作旁至程傳解盛引詩彭彭為証則彭彭本作騯騯非單字解矣无咎象曰匪其彭明辨晳也四則陽之多従此而極嘗恐以衆陽逼一陰曰陽多矣則陽雖五有而非五所有乃其有也其有則咎矣故于此改大有之名曰彭彭者多也猶大有也葢居四者能不以為彭而其所為衆多者若非其彭則處髙不危處近不偪處極盛而不盈滿自非得離火之明而辨而能晳何以至此六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也五居離之中孚象也乃下應乎乾親賢惇信若與之相交者然是能以孚中而發通志雖一陰自守簡易無備而其威儼然是非不戒而孚不怒而自威者乎左傳閔二年成季将生筮之遇大有之乾曰同復于父敬如君所夫乾為父以離變乾為同復于父則此亦君象矣或以上為主以此為攝位之佐泥下祐字非是上九自天祐之吉无不利象曰大有上吉自天祐也夫五之交孚既已應乎天而承上剛而不知此上剛者即向之自天而助成之者也上與五俱為天位而夬以上柔而易五剛則實借天以助之雖一陽與四陽同而此有所自凡所謂尚賢所謂履信見繋詞所謂元亨而无不利者上與五共之矣大有之終莫盛乎此故傳又申之曰大有上吉仲氏易卷七
