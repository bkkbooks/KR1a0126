body:
  text: 仲氏易卷三十翰林院檢討毛竒齡撰説卦傳按漢史秦火後漢初易亡説卦三篇至宣帝時河内女子伐老屋得之隋經籍志所載亦然但其云三篇今祗一篇或云合序卦雜卦為三或云其二已亡觀漢儒説易多有補傳所未備者可驗大抵是篇初釋繫辭而其後分説諸卦則如爾雅釋文類但説諸卦所有而辭中釋義已見此解經之最肻綮者宋儒狂妄如歐陽修輩動輙云非夫子之書可云無忌憚之至者矣朱氏本義増註九家易文附各節下兹更廣他儒所註以資考索儻更有聞見不妨陸續附入耳昔者聖人之作易也幽賛古文作讃於神明而生蓍參天兩地而倚周禮註作竒蜀才本同數觀變于隂陽而立卦發揮于剛柔而生爻和順于道徳而理于義窮理盡性以至于命蓍者筮也生蓍者作筮也猶前所云生吉凶生變化也舊解作生蓍澤中似畫卦反從生蓍後起誤矣參天兩地依以立數曰倚數以畫卦言則三陽畫參天也中分而為兩兩地也以重卦言則純卦三畫參天也重卦兩其三兩地也以爻數言三其三畫而為九故陽稱九參天也兩其三畫而為六故隂稱六兩地也以䇿數言則三變三竒而成陽參天也三變兩竒而成隂兩地也以扐數言凡四十九䇿中扐十三為陽則賸三十六以三乘之三其十二䇿參天也扐二十五為隂則賸二十四以兩乘之兩其十二䇿兩地也推之而至乾䇿二百一十六坤䇿一百四十四乾䇿六千九百一十二坤䇿四千六百零八其參兩皆然有謂一數不用者陽以一包二而為三隂以兩兼一而為兩故陽從三起隂從二起此唐孔氏説而阮逸作僞闗朗易𫝊龍之與崔憬一四不用之説大同小異若謂一二三四五者天地之生數天生居三一三五也地生居兩二四也用生數不用成數故曰參兩則萬一用成數将參地兩天矣此説在蘓𫝊亦有之然極是無理至朱子云天圓地方圓則徑一圍三故參天方則徑一圍四故兩地則何不云參天四地乎况實推宻率徑一不必圍三也他如建安丘氏謂陽一畫而三分之則隂得其二分以隂中缺一分也則萬一畫隂者中稍寛稍窄有時兩有餘有時一不足矣此皆巧説之難通者分隂陽而立卦發剛柔而成爻與生蓍倚數皆一時事無次第先後者故象立而義生其間如一隂一陽之道與乾易坤簡之徳各歸于義理因之盡義理以究其繼善之性而馴至于達天知命之命先聖之作易如是也道徳性命皆兩繋所已言者故命兼吉凶變化為立卦生蓍者言與他處不同昔者聖人之作易也将以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位一本亦作畫而成章乃後聖以之而繋辭則知隂陽剛柔其本三才而立極者在畫卦之時已然故以之推易復取隂陽之類聚者而分之剛柔之變化者而迭用之即卦畫而成辭章焉按乾鑿度云物有隂陽故三畫成乾六畫成坤其稱物亦就分聚言天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以烜一作􅷺之艮以止之兑以説之乾以君舉正作居之坤以蔵之則以乾坤二聚卦定位而已不相易也故曰不易之卦其可易者聚凡十二卦祗有山澤有雷風而並無水火剥復臨觀否泰大壯遯夬姤中孚小過共十二卦皆無坎離者即推之為子母易卦凡十卦亦祗有山澤有雷風而並無水火咸恒損益萃升頤大畜无妄大過共十卦亦皆無坎離者是何也則以山澤可通氣自剥臨通地氣遯夬通天氣外咸損則兩相通氣若以卦位言則艮東北兑正西不相通矣雷風可相薄自復臨與地廹壯姤與天廹外恒益則自相廹薄如以陳氏先天位言則震東北巽西南不相廹矣薄廹也近也而水火則必不相射坎離一與四子交則隂陽分矣射者相對發也自不曉推易欲以卦位南北當之而不合致鄭𤣥虞翻輩皆以射訓入謂相對而不相入而陳氏作先天圗位反指此數語作証然相薄非相對若不相射則顯然與圗位離東坎西相反于是解射為犯為厭為侵害展轉悖謬焉知有確然不易如是者也以相射則不可易也故觀推易者不必八純與八重相序順也只相錯而移易生乎其間盖從既往之卦而數之則因純得重純在雜先從未推之卦而欲知之則重反生純純後于雜故錯之為雜以逆作順凡為易之義皆然不止轉易對易一反一正為逆易已也故六子為乾坤所生而推卦逆易則六子可以先乾坤此固與畫卦次第變易交易之序順有不同者帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治盖取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮故卦通乎時時見乎位假如以大衍之數觀八卦時位而考其道徳則位從東起時從春首由是而周之以示諸推移之法按震巽離坤兑乾坎艮此文王所演夫子所傳之卦位文所演見各卦如坤之西南得朋蹇之不利東北類夫子所傳如大衍之數配位及此諸節類萬古不可易者故夫子于此凡三復言之朱子信陳邵先天之説妄指為伏羲所畫反以此文王孔子所傳卦位註曰未詳何也及後節仍如此序又註曰未詳何也豈真未詳耶抑必如陳氏者而後能詳耶至他日又曰文王八卦有些似京房卦氣則顯相牴牾矣帝者天也崔憬曰天之王氣也如震王于春離王于夏類若指王者言則聖人南面而聴天下為複見矣乾坎艮震四卦皆陽巽離坤兑四卦皆隂隂疑于陽必戰故遇乾而戰此秋冬相交之時隂陽相嬗之候也天氣轉環于物見之故復言物何氏訂詁曰潔齊即姑洗之意致役者坤為天養物如效役然勞者養物至此有成勞矣艮陽盡于上而震復生陽于下故艮止震起比之剥復其次第如此仲氏嘗曰八卦方位其理多端即以相生論之火不能生金故離火兑金必間坤土此人所曉也水能生木矣而坎水震木又間艮土天下有水木不夾土而可以自生者乎若震木取離火必藉巽風兑金化坎水煅以乾陽此亦一節之可驗者又曰天地西北髙而東南下山水皆從西至東故乾起西北直領三男坤起西南間領三女又曰乾得隂數西北于大衍數六坤得陽數西南于大衍數九正隂陽交互化生六子之所始故易緯謂陽始于亥而形于丑隂始于已而形于未乾祖始而坤正形者以陽之生物無形而隂之生物有形也此為至理乾坤鑿度以乾坤巽艮四隅卦為四門坎離震兑四方卦為四正皆以為伏羲所定有云庖犧氏畫四象立四隅以定羣物發生門而後立四正則在兩漢時無不以此為羲畫原文即强名文王八卦猶非實録况可别作羲圗乎神也者玅王肅本作尠董云尠成也萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯徐本作暵云熱暵也説文同乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火陸徳明本有不字誤相逮雷風不相悖山澤通氣然後能變化既成萬物也乃復就六子之及物觀之而知乾坤即六子也故推易者自乾坤不推外不易之卦凡以之玅物而羣分者水火不相射而相及故聚卦無水火分卦有水火而況雷風山澤之通氣而不相悖其變化及物固如是也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兑説也故欲明易例請究觀八純之名物與象類而遍指之以為文王推易屬辭之用盖方位時氣如前所云則周易次第也自乾坤父母順生六子如後所云謂乾天也節則羲易次第也伏羲畫卦次第如此必欲强作先天之名則此正先天也今但釋八純而不及重卦則未可移易自當以羲易次第為八卦先後故自此及終凡十二節皆用此為序此正漢儒所傳虙羲作十言之教曰乾坤震巽坎離艮兑消息无文字謂之易者審此則先天之圗可不作矣風善入火必附物以為體故曰巽入曰離麗乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊此逺取諸物也唐孔氏曰巽主號令雞善知時坎主水瀆豕處汚濕鄭康成謂狗以善守能止人禮羊曰柔毛史記弱如羊或謂兑金生于土羊亦生于土如西域土可生羊而土怪稱羵羊可驗則離之鱉蟹龜蚌皆生水者豈離火為坎水所生故耶乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口此近取諸身也坤善蔵為腹巽則股順隨足其義也上連下坼其象也唐孔氏曰坎北方主聴故為耳離南方主視故為目何氏訂詁曰横亘而在上能止物者手也開坼而在上能悦物者口也按孔氏亦以為西方卦主言語此以五事配五行者然與書洪範所註不同又手能止物止即拘也故虞仲翔以後文艮為狗作為拘可驗乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女此羲易次第也以乾坤為父母六子為男女始此乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠京房荀爽本作柴馬為駁陸徳明本作駹馬為木果朱氏本義云荀九家易此下有為龍為直為衣為言為按虞氏易又有為徳為王為人為神為盈為甲為施嘉為好剛何妥有為健按荀慈明集九家易解十卷見諸史志而文獻通考引陳氏説謂漢淮南王所聘明易者九人荀爽嘗爲之集解蔡介夫云淮南九人撰道訓二十篇號九師易但陸氏作釋文其序録列九家名氏明有京房馬融鄭𤣥宋衷虞翻陸績姚信翟子𤣥荀爽九人其但稱荀氏者或慈明總集之未可知也胡震亨云淮南自云九師有道訓二篇並非荀爽九家陳氏誤矣但其書已亡朱氏據釋文所引數語耳崔憬云天體清剛故為金玉孔穎達云寒氷西北地也大赤盛陽之色楊升庵謂明堂位商之大白周之大赤皆旂名左傳分康叔以少帛旃為大赤註云大赤通帛周禮象路建大赤以朝皆是第此但言色不必是旂盖旂名本易非易取旂名也老馬行乆瘠馬多骨説文駮馬踞牙能食虎豹木發于春而果成于夏皆陽物坤為地為母為布為釡為吝京房本作遴嗇為均為子母牛為大輿為文為衆為柄其於地一作色也為黑荀九家易有為牝為迷為方為囊為裳為黄為帛為漿為按荀氏又有為邑九家易又有為亂虞氏易有理為事為大業為臣為民為鬼為虚為乙為拇為喪為終為害為死為萃為土為器為晦為國為暑為兕虎干寳有為順盧氏有為師為左傳杜註有馬布者播也釡者孔氏曰化生成熟也吝嗇者受而不施也均者土勻勻也子母牛者孳牛也九家易曰萬物相雜故曰文柄者生物之根黑隂色震為雷為龍虞氏干寳本俱作駹虞云蒼色干云雜色李鼎祚本作駀亦云蒼色震東方故為駀為𤣥黄為旉古文又作専姚信云専一也虞翻李鼎祚本同李云陽在初隠静未出觸坤故專即其静也專為大塗為决躁為蒼筤古或作琅竹為萑葦其於馬也為善鳴為馵京房本作朱荀爽同云陽在下也足為作足為的説文作馰顙其於稼也為反虞翻本作阪云陵阪也生其究為健為蕃鮮荀九家有為玉為鵠為鼔臆按吳澄謂玉當為圭鵠當為鶴不知何據此豈可以見改舊文者何妄誕至此虞氏易有為侯為主為兄為夫為言為行為樂為出為作為麋鹿蜀才有為喜笑左傳杜註有為木為諸侯國語韋註有為車震初得天地之氣以生故天𤣥地黄仲氏曰赤黑以陽陰言就燥赤而流濕黑也𤣥黄以天地言積氣𤣥而積塊黄也得間合以成東方之蒼色觀此則上文為龍舊本有作為駹者是複見也旉者花也古花本荂字荂即旉字亦作􅞉音敷木榮也大塗者一竒甫動而兩偶開通如塗然徐仲山曰震與巽皆初得隂陽之氣而賁奮以生故震曰决躁而巽為躁卦蒼筤陸農師曰幼竹也萑葦亦竹類皆本末孤生無附椏者震之怒生類似之善鳴以雷作足以動馵足的顙則皆以色白而動而易見爾雅左足白馵秦風有馬白顛若作足則雙足齊舉魯詩思馬斯作是也反生謂萌芽自下而生反勾向上宋衷云即枲豆之屬帶甲生者乾鑿度云物有始有壯有究言究極也蕃鮮孔氏曰草木之生蕃育而鮮明巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭虞翻本作嗅云嗅氣也風至知氣李鼎祚本同王肅本作為香臭其於人也為寡古本作宣云黒白雜為宣鄭𤣥本同謂四月蘼草死髮在人體猶靡草在地虞翻云為白故宣髮馬君以宣為寡髮非也李鼎祚本亦同與按考工記車人之事半矩謂之宣註頭髮頽落曰宣寡同義髮為廣鄭𤣥本作黄顙為多白眼為近利市三倍其究為躁卦荀九家有為楊為鸛為按吳澄云鸛當為鴻不知何據虞氏易有為妻處為隨為魚為號為包為杞為白茅為舞木王東方而巽以東南而與震同屬然亦以木可矯輮巽順之義也又巽以命令齊物如繩之直木而工則操之正所云巽為徳之制者記曰白受采白者質也巽以二陽蔽一隂内隂為文外陽為質故色白長者短之反風長且髙巽則進退不决臭風所發也寡髮者隂血不上行也廣顙陽上盛也眼以白為陽以黒為隂何氏訂詁曰離目上下白而黒居中巽目上中白而黒掩在下是白眼多也隂主利欲凡利必于市曰利市言利者以三倍為率詩如賈三倍是也巽木乾體而主利于内凡乾之金玉皆有之故近利如此躁卦見前坎為水為溝瀆為隠伏為矯一作橋輮宋衷王􅘙本作楺京房本作柔荀爽本作橈為弓輪姚信本作倫其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟荀爽作極云中也心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心荀九家有為宫為律為可為棟為叢棘為狐為蒺藜為桎梏按荀氏又有為志為虞氏易有為孚為疑為後為蹇為臀為酒左侯果有險干寳有為法為夜盧氏有為車傳杜註有為衆隠伏水藏地中也矯曲使直輮直使曲水流似之惟險故憂惟憂故心病其曰耳痛者坎為耳也血與水為類赤者血色坎陽在中象馬脊以心堅故亟第水流必首先就下而馬首似之水廹地而行而馬蹄之不能作似之水漫衍如牽曳而馬之迣後似之其於馬也至此皆指馬言與震同或曰坎之象馬以馬興龍類龍水中馬故推龍及馬不通坎為中男尚得陽性之純者多眚謂輿不任載也通者水空明也月水之精也盜者水潜竊如盜也堅多心剛在内也離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃京房本作螺姚信本作蠡為蚌一本作蜯為龜其於木也為科虞氏本作折上槁鄭氏本作槀干寳本作熇荀九家有為牝牛罔按九家又有為飛鳥矢虞氏易有為隼為鶴為夏為馬融王肅俱有為侯果有為黄牛何妥有為文明杜干寳有為晝為斧左傳註有為鳥為諸侯甲胄戈兵鼈蟹蠃蚌剛在外也大腹者中虚也乾者躁也科亦中虚意木中虚則上必枯槁艮為山為徑路為小石為門闕為果蓏京房本作墮為閽寺一本作䦙為指為狗虞翻本作拘云指屈伸制物為拘李鼎祚本同為䑕為黔鄭氏本作黚云虎豹之屬貪冒之類喙之屬其於木也為堅古一本無堅字多節荀九家有為鼻為虎為狐州按管輅有鼻為面山之説虞氏易亦有之或謂宋漳陳安卿麻衣易以艮為鼻此又後起者子虞氏易有為背為皮為尾為篤實為求為宗廟為小為僮僕為城為狐狼鄭𤣥有為鬼㝠門左傳杜註有為言一陽象山二隂則徑路也木實為果草實為蓏俱陽實之表見者䑕與黔喙則皆陽剛之在口者周禮閽人掌王宫中門之令寺人掌玊之内人及宫女之戒令皆止人出入之官故取此作艮止義然其象則又以門闕而推及之若吳幼清謂外一剛閽人無足内二柔寺人無陽則又過鑿矣夫子作傳時恐見不及此耳兑為澤為少女為巫為口舌為毁折為附决其於地也為剛鹵為妾為羊鄭氏本作陽陽養無家女行賃炊㸑賤于妾者郭璞引魯詩曰陽如之何又曰巴濮之人自稱阿陽即此虞氏本作羔李氏易解本同虞云羔女使皆取位賤故為羔舊讀以震駀為龍艮拘為狗兑羔為羊皆已見上此為再出非孔子意也荀九家有為常為輔頰按常不知何象陸徳明引舊註云常西方神也若吳澄謂常者九旂之一下二竒象通帛下垂上一偶象分繋于杠杜撰無理虞氏易有為妹為孔穴為刑人為小巫口舌之官兑秋殺物故毁折一隂上升行将决去兑乾之所以得夬也夬者决也説文西方曰鹵李氏易解曰乾陽在下故剛澤水潤下故鹹序卦傳二篇分上下名曰對易此文王周易所謂三易之一者其例有對待而無聨屬夫子故創為聨屬之説以寄意焉然仍不明註對待者書不盡言也黙而成之存乎人也有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也物郭京作始生必䝉故受之以䝉䝉者䝉郭京本此下有昧也也物之穉一作稚也物穉不可不養也故受之以李鼎祚本無以字需需者飲食之道也飲食必有訟故受之以訟僧一行易纂引孟喜序卦曰隂陽養萬物必訟而成之君臣養萬民亦訟而成之今傳無此訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者郭京本者下有親字比也比必有所畜一作蓄故受之以小畜物畜然後有禮故受之以履吳澄云此下宜有履者禮也四字今韓註有之而王弼略例引此四字當是後人誤以正文書作註字者履而泰本義引晁氏云鄭無而泰二字然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨韓康伯曰順以動者衆之所隨也故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也荀慈明曰陽稱大謂一陽動升故曰大也項平甫曰以大臨小曰大凡稱臨皆大者之事物大然後可觀説文引地可觀者莫可觀于木今傳無此故受之以觀可觀而後有所合故受之以噬嗑李鼎祚本此下有噬字嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然李鼎祚本作而後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復淮南子引云剥之不可遂盡也故受之以復與此不同復則不妄矣故受之以无妄有无妄然後可畜故受之李鼎祚本無之字以大畜物畜然後可養故受之以頥頥者養也不養則不可李鼎祚本此下有以字動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也王昭素本于此下増麗必有感故受之以咸真狂妄無忌憚者上下分篇此文王舊文故夫子于上傳至此而止有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必决故受之以夬夬者决也决必有所李鼎祚本無所字遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革韓康伯曰井久則穢濁宜易其故革物者莫若鼎故受之以鼎韓康伯曰鼎所以和齊生物成新之器也主器者莫若長子崔憬曰鼎所烹飪享于上帝主此器者莫若冢嫡以其為祭主也故受之以震震者動也物不可以終動李鼎祚本此下有動必二字止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兑兑者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過韓康伯曰守其信者則失貞而不諒之道而以信為過也故曰小過有過物者必濟故受之以既濟韓康伯曰行過乎恭禮過乎儉可以矯世勵俗有所濟也物不可窮也故受之以未濟終焉雜卦傳文王三易一曰轉易反對卦也反對之説發于漢晉儒者而宋後陳邵易興反棄置不道遂致後儒朱升來知徳輩逺承漢易以反對立説世争以為創義而傳奉之可笑極矣夫子于兩繋説卦切指推易之法而以序卦釋對易雜卦釋轉易三易之賛至此始全第序卦並不及對易一字祇聨絡而對在其中雜卦並不及轉易一字祇對待而反對在其中所謂書不盡言也黙成之存乎人也雜者錯也乾剛坤歸蔵易作奭何氏訂詁曰按古歸蔵易今亡惟存六十四卦名而又闕其四與周易不同今取其名異者附識于此又有瞿欽規夜分五卦岑􅨡林禍馬徒三複名卦不知當周易何卦也柔比樂師憂臨觀之義或與或求屯見而不失其居䝉雜郭京本作稚而著震歸蔵作釐起也艮歸蔵作狠止也損歸蔵作員益盛衰之始也大畜歸蔵作􅬦畜時也无妄歸蔵作毋亡災也萃聚而升歸蔵作稱不來也謙歸蔵作兼輕而豫怠京房本作治虞翻本作怡也噬嗑食也賁无色也兑見而巽伏也隨无故也蠱歸蔵作蜀則飭鄭𤣥王肅本俱作節也剥歸蔵作僕爛也復反也晉晝也明夷誅楊慎云古誅字有之繇切見韻補與晝相叶則晝亦音周按韻學至宋而亡元明龍宋人之舊數百年中無一人識韻遂有疑周易毛詩失韻者如升庵此説俱極不通之論彼第知誅必讀周始可與晝叶晝亦必讀周始可與誅叶不知魚虞尤三韻並通誅不必讀周且平上去三聲並通晝亦不必讀周也此如國風三星在隅與見此邂逅叶大雅無聲無臭與萬邦作孚叶逅與臭即晝也隅與孚即誅也幾見隅必讀牛逅必讀侯乎故張衡西京賦取殊材于八都豈稽度于往舊淮南子縱志舒節以馳大區可以步而步可以驟而驟皆如此叶古聖知之俗儒不知也詳見予御覽古今通韻也井通而困相遇也咸歸蔵作諴速也恒久也渙歸蔵作奐離也節止也解歸蔵作荔緩也蹇難也睽外也家人歸蔵作散家人内也否泰反其類也大壯則止遯歸蔵作􅋟則退也大有衆荀爽本作終也同人親也革去故也鼎取新也小過過也中孚信也豐多故李鼎祚本有也字親荀爽本以此作句非是寡旅也離上而坎歸蔵作犖下也小畜歸蔵作􅳧畜寡也履不處也需歸蔵作溽不進訟不親也已上皆反對卦雖無序而實相聨者大過顛也此下并反對相聨而亦亂之使隠其轉易之象所謂雜也此句宜與頤養正也對顛無韻以正為韻與下女之終男之窮叶姤遇也柔遇剛也此宜在男之窮也下與夬决也四句對剛無韻以剛决柔也為韻與小人道憂叶漸女歸待男行也此宜在正也後與歸妹對頥養正也説見前既濟定也此宜在女之終下與未濟對歸妹女之終也未濟男之窮也夬决也剛决柔也君子道長小人道憂也説總見前序仲氏曰此非錯簡者乃故亂之以使之雜既非次復非反對其名雜卦者以此嘗按其韻則正錯俱叶故知有意為此者此聖人之文也古韻宫聲七部則東冬江陽庚青蒸七韻俱通故以本文叶之則剛行正定終窮一叶柔憂一叶以更正之文叶之則正剛一叶行終一叶定窮一叶總是七部之通至柔憂則另韻耳盖正定為庚之去聲古平上去三聲並通故正與剛叶如小雅憂心怲怲庶幾有臧類行與終叶如楚詞身既死兮神已靈魂魄毅兮為鬼雄類定與窮叶如伊訓爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗類剛與行叶如吳鐃歌寒露沾衣裳鳩鳥化為鷹類剛與終窮叶如焦仲卿妻新婦起嚴粧事事四五通九歌魚鱗屋兮龍堂紫貝闕兮朱宫類凡易中有韻文皆有法度如此仲氏易卷三十
