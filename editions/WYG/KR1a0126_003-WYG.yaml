body:
  text: 仲氏易卷三翰林院檢討毛奇齡撰周易上經凡卜筮書皆稱易周禮太卜掌三易之法是也特此名周易者易緯云因代以題周謂文王作易故取其代號題之此與連山稱夏易歸藏稱商易正同或云連山係神農時易歸藏係黃帝易夏商持取而修用之者然神農稱連山氏即列山氏黃帝稱歸藏氏則亦代號也鄭𤣥解周為普遍非是祇周易以移易為義說見二卷而乾鑿度有去入二音因有易本易知之解乾鑿度云易者易也音異又云變易也不易也音亦此由三國以前不設四聲齊中郎周顒始作平上去入四聲故去入並音而誤解之者今北人仍作異讀然經祇讀亦如大傳日新之謂盛德與生生之謂易協是也若唐孔氏曰經字為後人所加世昧所始則前後漢傳俱有之如前孟喜傳分上下二經後朱穆傳易經龍戰于野類其來舊矣分上下篇說見前乾下乾上聚卦一名不易卦此以不易為易卦之始所謂乾坤成列者乾元亨利貞乾者卦名也三畫名乾重之亦名乾者以所重亦乾也乾下乾上本舊文故三畫名乾乾以下皆文王繋辭演辭為繋辭繋演聲轉見大傳今以大傳為繋辭則後人所加者所謂卦辭卦下之詞與爻詞别亦所謂彖辭彖辭亦見大傳今以孔子彖傳為彖辭則誤去一傳字耳而或以乾是舊名祇元亨以下為辭則習坎履虎尾同人于野諸辭皆連名為文不可通矣第乾本首卦為伏羲畫卦之一而前此易書皆不以為首首之自文王始說見一卷乾天也此以義不以字易緯妄為字易說謂即天字即乾字諸卦皆然此無理妄語又健也見說卦傳則是天者乾之名健者乾之德也夫乾健之德豈易名哉雖健祇一德而分之有四元始亨通利和貞固見子夏傳乾元建而健德備焉四德又以乾元為首然總名健德唐李鼎祚謂天為體乾為用非是此帝王之象也易解曰三皇五帝乃聖乃神保合大和而天下自治成王氏易是曰就六爻而言隠顯各見固六位之分合一卦而言本末兼資乃一王之極事元亨利貞文言稱四德有元者善之長也諸語此是明註而朱子作本義作大亨而利于正後人多非之易見曰以元亨作大亨則大哉乾元可曰大哉乾大乎夫元之訓大始自彖傳如屯之大亨貞隨之大亨貞類且古亦間有之易見謂元訓始不訓大尚書元子非大子春秋元年非大年其說甚辨然尚書有乃命元龜語恐非始龜矣第在乾卦則㫁屬四德而必不可更有所訓按易卦詞用元亨利貞者六坤屯隨臨无妄革舊皆訓四德而文言之所引則春秋傳穆姜所筮隨卦語也左傳襄九年穆姜薨于東宫始往而筮之得艮之隨姜曰是在周易曰隨元亨利貞无咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事有四德者雖隨无咎隨卦筮詞與文言諸語一一相同文言以體之長為善之長體仁上加君子二字故或謂文言非孔子所作焉有穆姜此事先孔子生時十有餘年而反得引孔子之言以為証者但晉于寶論此辭謂四行者道德之門猶春秋之備五始也故夫子留意焉則明明以四德為孔子贊辭又無可疑者大抵舊易所訓原有成書文言用易訓不必左傳用文言故元亨利貞皆訓四德穆姜所筮之隨卦特其一耳嘗考子服惠伯筮南蒯之叛則坤之元亨亦訓元長昭十二年南蒯将叛筮之遇坤之比曰黄裳元吉子服惠伯曰忠信之事則可不然必敗黄中之色也裳下之飾也元善之長也衛史朝之筮立君晉司空季子之筮反國則屯之元亨亦訓元長昭七年衛孔成子将立靈公筮屯之比史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣以靈公名元係康叔見夢所名故也國語晉文侯筮反國得屯之豫司空季子曰主震雷長故曰元衆而順嘉也故曰亨每疑易彖元亨不止乾卦凡坤而屯而隨而无妄臨革皆當以四德為訓而孔子贊易首重乾元懼其與諸卦相埓故自乾而外或易為大亨以正使德獨歸乾以為德之有四即四象八卦所由始故干寶曰猶春秋之備五始是四德之訓舊詞啓之孔子又從而更定之他卦可易在乾則斷斷不可易者乃必曰大亨而利于正然則孔子非與初九潛龍勿用此為爻辭史記日者傳故伏羲畫卦文王演象凡三百八十四爻皆指文王無指周公者說見二卷亦為象辭見大傳若孔子象傳則贊象者耳初始也卦從下始故下曰初曰内无妄剛自外來而為主干内又下卦曰内卦曰本大過本末弱也謂初爻為本獨其以陽為九以陰為六則老少之說不可為訓朱子本義云陽數九為老七為少老變而少不變故謂陽爻為九按老少之說起于崔憬謂乾為老陽數九震為少陽數七坤為老隂數六㢲為少隂數八後儒推求多不解陽何以无一隂又何以无四即曰參天兩地然三兩何必非數况憬又有坎五艮三兌二離十之數其次第别出且與鄭𤣥大衍配卦之數全不合故蘇軾謂老少之說未之聞也特杜預韋昭俱有商易占七八周易占九六之說則老少諸名從來有之故左傳國語筮卦俱有艮之八泰之八貞屯悔豫皆八諸語推其意大抵老則動變少則不動變其曰之八謂占其隂之不動變者以周易占法占動爻商易占法占不動爻耳則是老少之說專為占卦者言若但以爻之隂陽便分老少則安見商之隂陽皆少周之隂陽皆老也若謂老取動變則何以周之隂陽皆動變商之隂陽皆不動變也况商易皆八則凡隂皆八矣何以又曰之八且無卦無八矣何以又曰貞屯悔豫皆八則是商易七八周易九六皆指占變不指爻位斷斷然者惟老少之解則唐一行以蓍䇿四十九數核之老陽十三餘策三十六為四九少陽二十一餘策二十八為四七老隂二十五餘䇿二十四為四六少隂十七餘䇿三十二為四八雖十五二少仍推數所不及然總以占卦言揲蓍者占卦之事老少八九者動静之分耳後朱子亦襲一行說以先天方位老陽位一則餘九少隂位二則餘八少陽位三則餘七老隂位四則餘六此誤襲偽圖位數杜撰其乾一坤八震四㢲五諸數又與乾九坤六震七㢲八老少原數不合此皆不必然者詳見予易帖大抵畫成于三三其三則為九兩其三則為六所謂參天兩地者也舊以參天兩地為一三五參而為九二四兩而為六則何以獨遺七八也或謂陽兼陰共九畫隂祇本體故六畫則未免杜撰矣乾為龍見九家易龍所以象陽也見子夏傳天下之物莫健于龍故借龍以象在天之陽見馬融說而無如其尚在地也大傳三才以初二為地道鄭𤣥曰初在地下二在地上潛也葢其時尚勿之用耳按後漢魯恭封事曰潛龍勿用以陽氣潛藏未得用事此勿用之義也若賈誼新書云潛龍入而不能出故易曰勿用勿用者不可也陸佃埤雅云勿用戒使勿為也如勿用取女小人勿用之類若然則非潛龍之勿用也勿用潛龍矣漢五行志京房易傳云潛龍勿用衆逆同志至德乃潛厥異風行不解物不長所謂厥異風者以初爻變陰成巽故也此以變卦解占驗不以變卦解爻辭也幾見潛龍一久有㢲象乎九二見龍在田利見大人當九二時爲出潛離隱之際見王弼說此不在地下而在地上矣鄭𤣥曰地上即田夫龍德君德也即大人也龍見即大人見矣第初三四上或隱或亢或過或不及以爲盛德則利于此時見之以爲大業則利于九五時見之大人無二非此大人見彼大人也亦非天下見大人也易通曰見大人只是大人見猶春秋書龍見同九三君子終日乾乾夕惕若厲无咎郭京舉正以夕為句惕若厲又句則象傳終日乾乾爲誤讀矣且古皆以夕惕若厲四字為句如班固曰尸禄負乘夕惕若厲張衡思𤣥賦夕惕若厲以省愆兮類雖若字亦可斷如豐之發若巽之紛若類然此又不同以詞法如是耳三于三才為人道雖秉天德必盡人事此君子自修之時也第以乾剛居剛位而又當兩乾之間乾而又乾羅彛正曰三居二乾之間有乾乾之象居下乾之終有日終而夕之象若惟恐内外相際畧有所間而無間也其惕若厲也葢自朝而至夕矣淮南子曰終日乾乾以陽動也夕惕若厲以隂息也夫乾以為動而惕以為息雖厲何咎之有九四或躍在淵无咎四雖人道而近乎天矣淵者下不離田而上可與天接淵似下于田然淵者水也地天相接處皆水如大瀛環地可見躍則可上可下正由田而天之際文言曰中不在人管輅曰龍陽精而居于淵故能興雲以此九五飛龍在天利見大人此為剛健中正以天德乗天時而進據天位龍至此飛矣然而離羣絶人已極乎天盛德大業不宜于此全見之乎故又曰利見大人上九亢龍有悔上雖天道而位過乎中龍之亢者也夫窮居曰亢亢則知進而不知退蔡澤所謂亢龍有悔此言上而不能下信音伸而不能絀往而不能自返者也夫悔者變也見何氏訂詁洪範曰貞曰悔悔者則變之名也謂卦變夫能悔即能變文中子曰平陳之後隋德亢而卒不悔悲夫彼亦以不變為不悔矣蓋四德循環貞復起元此正窮則變變則通之際故此為盈卦又為極卦象傳盈不可久文言與時偕極皆指此夫月盈則仄物極必反用九見羣龍无首吉據春秋傳此當與上九合作一節此亦上九爻辭說見後以每卦通例而兼寓全卦推易之法夫所謂每卦通例何也大凢每卦終爻俱有通變而特于乾坤開其端以為諸卦類推之例蓋乾九既亢而思所用之則行返乎藏飛歸乎潛有羣龍无首之象統為飛潛則一龍各為飛潛則羣龍矣故傳又稱六龍龍陽物首又龍一身之陽物身動必首先之无首則動不可見張杉曰神龍見尾而不見首舊皆倒誤今人多見龍第見尾耳首必不可見故以六爻樹觀則上爻爲首首藏而六爻之為羣龍者若无首然此正貞復起元之時所以斡旋上九之過亢者故文言直以乾元用九四字並指用九謂用九即乾元也所謂貞元也此卦終必變也此通例也若夫寓全卦推易之法則以周易一書無非乾坤之用傳曰顯諸仁藏諸用又曰精義入神所以致用用乾坤以為諸易故六十二卦皆無用字而獨于乾坤二卦發之此正乾坤成列而用之為往來推易之法傳曰分陰分陽迭用柔剛故易六位而成章蓋曰諸卦皆從乾坤來乾坤不從諸卦來也夫首者來也先也謂所生者也人物之生必先之以首故物來亦先以首今以易之體言之則乾坤之生必有所來如云太極生兩儀者而祗以用言則剛柔相生無有先于乾坤者故六子之生本于乾坤不待言也乃演卦之法即從類聚羣分以推至于極則自剝復臨觀否泰以及于姤夬無非由乾坤剛柔展轉推易而惟乾六爻則無所來惟坤六爻則無所往無來則無始故曰無首無往則無變故曰永貞見坤卦此即象傳之所謂天德不可為首宋衷曰萬物之始莫或先之與永貞以大終事者坤象傳詞是用九用六之法即文王演易繋辭之法所謂易以易為義不易者推易之始也此全法也按此與亢龍有悔相接不分亢之則悔用之則吉皆上九爻辭其說在春秋傳蔡墨見龍之對有之而世儒不解遂致脫誤據蔡墨對云其夬曰亢龍有悔其坤曰見羣龍无首吉左傳昭二十九年龍見于絳郊蔡墨曰龍水物也水官棄矣故龍不生得不然周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍无首吉坤之剥曰龍戰于野其血𤣥黄若不朝夕見誰能物之夫墨為此對非謂夬有亢龍坤有羣龍也又非謂夬之上六可以亢龍為之占坤之上六可以羣龍為之占也墨欲引龍見之多以為乾初有之乾二有之乾五乾上俱有之乃其稱乾初乾二乾五不曰初與二與五也但曰乾之姤與乾之同人大有而初二五以見以初可變姤二可變同人五可變大有也其稱上九不曰上九也但曰其夬其坤而上九以見以一爻變則上可變夬六爻變則上又可變坤也惟引經之意專主龍見故亢龍羣龍雖共一爻而故為分之實則其夬上九其坤亦上九無可分者亢龍上九辭則羣龍亦上九辭無有異者若謂用九自變無闗上九則天下無非爻而可云變者用九非爻焉能變坤能變坤則非上九不可矣若謂用九另變當另立爻辭則天下無七爻之卦因兩變而分兩爻則七爻矣第其說從來不解惟宋王介甫有云用九八字當合上節然不知所據若蘓氏易傳謂一爻一變各指其一惟坤則六爻皆變當通六爻是以墨說為變占既屬可笑至朱子本義又云使遇此卦而六爻皆變者即此占之則既誤解墨說而又因誤而創為一變六變仍占本辭之法見啓蒙變占是誤之又誤夫天下無既變而仍只占本辭者古人占法貞悔並重兩卦既定則必先舉所遇卦而後雜及于所變之辭如單以所遇占所之則墨所云乾之大有猶之大有之乾也乾之大有當占飛龍則大有之乾當占厥孚也大有六五曰厥孚交如威如吉乃春秋成季所筮祇占變乾有云同復于父敬與乾同閔二年成季将生筮大有之乾曰同復于父敬如君所以乾為君父今變離為乾則仍復爲父敬與君同也未嘗占交威何也若六爻俱變古亦罕見然考唐時耳目記載王庭湊事則正六乾變六坤然斷之者但云坤為土地當有分胙則正以土地河山為坤隂得位之解何嘗以羣龍為占唐長慶中成德兵變殺節度使田𢎞正而擁立部将王庭湊先有筮者得乾之坤謂坤土也地也大位當臨節旄不逺兼有土地河山之分夫墨所引經亦但倣筮家狡獪辭例如所謂歴家記度以退作進筮家名爻即以變名正此與子太叔引易稱復之頥王子伯廖引易稱豐之離正同襄二十八年鄭游吉使如楚歸曰楚子将死矣其在復之頥曰迷復凶及冬楚子果卒宣六年鄭公子曼滿欲為卿王子伯廖曰無德而貪其在周易豐之離勿過之矣蓋取上六閴其無人三嵗不覿語也後鄭人果殺曼滿夫太叔所引不過取復之上九迷復一語未嘗筮也即王子所引不過取豐之上六三歳不覿一語未嘗變而之離也夫墨與太叔王子俱未嘗筮其所引乾與復與豐俱未嘗變而之坤之頥之離則其曰之坤之頥之離不過乾與復與豐之爻名已耳而據以解占妄矣若本義用九用六以用老不用少為言尤屬非義略見潛龍節下彖曰大哉乾元萬物資始乃綂天此孔子贊易文也舊名十翼以上彖下彖上象下象上繋下繋文言說卦序卦雜卦為十篇宋邢璹稱七翼晁以道偽造古易謂孔翼八篇非是第漢田何易原離二經與十翼為十二篇至東萊費直始合十翼附之經以代章句今本乾卦是也其後鄭𤣥倣馬融周禮註例就經列註于是復分彖象諸傳附之經下今本坤後六十三卦是也特文王演易凡于卦下所繋辭原名彖辭其在爻下者原名象辭故孔子彖象則皆加傳字别之謂之彖傳象傳在魏晉以前不知何時又脫去傳字或謂韓康伯刪之按魏髙貴鄉公有彖象連經之詢魏髙貴鄉公問博士淳于俊曰今彖象不連經文而註連之何也俊曰鄭康成合彖象于經者欲使學者尋省易了也則但稱彖象已無傳字謂康伯所刪繆矣但彖字難解傳曰材也劉瓛曰斷一卦之材也亦無義王輔嗣曰謂統論一卦之體則知材者體材耳元者德之始也然而萬物資之以為始九家易曰元者氣之始也又曰六十四卦萬一千五百二十䇿皆受始于乾則所綂不惟德矣王安石曰分為四德綂惟一元故綂天雲行雨施品物流形所以亨也大明終始六位時成時乗六龍以御天偽古本以大明至此次乃利貞後謬夫能明乎元之綂乎終與物之資乎始則始可貫終終亦可原始即此終始而時生乎其間焉位以時得龍以時駕綂天者其德御天者其時也此德位時兼至之候也亨之至也乾道變化各正性命保合太和乃利貞人第知利和貞固徒處常守正以為利物幹事之本而不知易貴變化即此純乾之道一變一化推致無窮而自人而物凡本之太和以為性命者皆有以保合而使之各正此乃所謂利貞也首出庶物萬國咸寜可以為天下王矣象曰天行健君子以自强不息趙氏輯聞謂健本乾字以􅪫訛健謬此孔子卦象傳也連下爻象陽在下也諸辭俱名象傳今脫傳字乃以卦象傳為大象爻象傳為小象詳見彖下潛龍勿用陽在下也見龍在田德施普也不曰在地而曰在田原田畮畮何汎􅇴也張孟竒曰田則耕稼利益俱見終日乾乾反復道也反復乾道或躍在淵進无咎也飛龍在天大人造也造聚也陸氏釋文云劉歆父子作聚以乾聚卦也咎聚合音亢龍有悔盈不可久也用九天德不可為首也張杉曰非天德不可先物物莫或先之文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也此亦孔子十翼之一以為繹文王所言故名文言若梁武帝云文王所作誤矣劉瓛曰作文而言其理曰文言宋人僞造古易謂王輔嗣取文言以附乾坤二卦因加文言二字以别之則漢儒姚信說易有云乾坤為易之門户文說乾坤而六十二卦皆倣焉又何妥曰坤文惟一章者以一心奉順于主也則乾坤文言與文言章次皆舊所定何待輔嗣餘見彖下在天四德與在人四德相合獨貞幹或以為信見何妥說或以為智見李鼎祚說大抵四德不及信以信屬土土王四季無位故也餘見乾卦辭下君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞初九曰潛龍勿用何謂也子曰龍德而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也體仁京房董遇本作體信誤夫乾無交錯守其初位而不與有位之爻相易是不易乎世也假使初化柔而得㢲則有聲感物亦可以自成其名而不爾也夫不易乎世則遯世矣不成乎名則有敗其名而非之者矣于此而並無悶焉用行舍藏其不易其初若此九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也以位言之則正而且中但信言謹行以初與三為之閑使外邪不得入而獨存其中孚之誠則德在天下而與之相忘乾為君見說卦此其基也九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣進德修業皆乾惕中事夫内卦至此已至已終而能知之而與為至與為終是介于内外之交而已得其幾當截然有界限有裁制之時而能獨存其義也則雖處内卦之上外卦之下而何勿得焉上位自是君公下位自是士庶但是處則以上下交接而帶及之易例如此九四或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進德脩業欲及時也故无咎時至此則上下進退俱無所定矣夫所以朝乾夕惕進德脩業者為此時也九五飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也此則天開地闢萬象昭呈山澤雷風各相效順之際故以天德言則為聖作物睹以易例言則正櫽括衆卦變通諸爻使知類聚羣分之法皆從乾坤成列中一一推致故特以相求相應相從相就者彚示六子而一以類字概之此易例也夫天地定位則雷風相薄山澤通氣水火不相射夫然後八卦相錯見說卦辭此天德亦天則也乃大人一出而彌綸所及動静剛柔皆有以變化而各正所謂雷風即震㢲也相薄則聲應也張璠曰同聲謂震㢲也雷風者天之聲山澤者艮兌也通氣即氣求也虞翻曰謂艮兌為山澤通氣故相求水與火則坎與離也水坎就濕火離就燥所謂水火不相射也乾卦中變則通體皆離旁變則通體皆坎不變則下離上坎以爻位陰陽本如是也六爻純隂陽則可以六位為斷此亦易例荀爽以陽往坤成坎陰來乾成離則亦指變後說各不同四爻位者一二三四五六也一二三即陽隂陽為離五六即隂陽隂為坎此一定數位然且山澤通氣併之為雲記曰山出雲易斷兊上未成雨為雲震㢲相薄合而為風雷動則風生故震㢲皆風而乾龍坤虎見虞氏易各相感契則是乾坤為震㢲艮兌坎離所從出而雷風山澤水火凡以求以應以就以從者無不相準是即此六子中而生乎天者親上生乎地者親下方之聚物之分變化而徃來所謂類也外此可推矣上九曰亢龍有悔何謂也子曰貴而无位髙而無民賢人在下位而無輔是以動而有悔也在上則貴失位則无位上而失位則髙而不能君其民三之君子二之大人皆隔處下卦乗而不應而不能為之輔故有悔潛龍勿用下也何妥曰此第二章以人事明之見龍在田時舍也次舍也言暫次于此終日乾乾行事也修行之事或躍在淵自試也将用未用之際以疑故試之飛龍在天上治也亢龍有悔窮之災也窮與極義俱見前乾元用九天下治也貞復起元故以乾元用九合稱之此與坤卦以用六永貞合稱正同潛龍勿用陽氣潛蔵何妥曰此第三章以天道明之數按漢儒多以此辭配十二月之以初九為黄鍾建子十一月大呂建丑十二月九二為太蔟建寅正月林鍾建卯二月于是推至上九九十月止孔穎達又以九五建申上九建戌為時候太晚不合欲移九二當丑寅之間則究竟參錯且于易理無涉故不及之見龍在田天下文明六位之數竒偶相間下三位一二三即陽隂陽離位也他卦六爻不純則位數不見惟乾坤俱純則上坎下離相對顯然故繋詞者偶于此爻發其例以示易理之一前云閑邪存誠亦其意也離為火為麗文明之象九二位離中故取諸此終日乾乾與時偕行或躍在淵乾道乃革上卦之始為革之時飛龍在天乃位乎天德位乎德猶召誥云王位在德元也亢龍有悔與時偕極乾元用九乃見天則乾元者始而亨者也利貞者性情也乾始以生物為性情故物成乃見乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也不雜陰柔則純不變則粹剛則精六爻發揮旁通情也旁通正推類以盡之意陸績曰發揮變動將旁通于坤以成六十四卦時乗六龍以御天也雲行雨施天下平也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子勿用也行即用也夫初以剛德之成入居陽位豈非君子君子則自可即見諸用而勿用者以其潛也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君德也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎本義以四非剛位不當言重剛謂重字衍考虞氏易九三以剛爻剛位為重剛九四以上乾接下乾為重剛與九三乾乾同則不當衍矣侯果曰案繫詞兼三才而兩之初二地道三四人道五上天道今四本人道而與三兼為一才非正故曰中不在人夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天勿違後天而奉天時天且勿違而况於人乎况於鬼神乎乾鑿度曰聖明德備曰大人也與天地合德者以六陽統六隂也與日月合明者上位坎下位離也說見前坎說卦云離為日為月與四時合序者四德即四時也元春仁亨夏禮利秋義貞冬智見易解與鬼神合吉凶者乾神合吉坤鬼合凶見虞氏易三神似厲而非厲四鬼有咎而无咎也三為神爻四為鬼爻見易解謙卦乾德綂乎天而天不能違其德上治繼乎天而即承天以乗時是大人之見固合天地日月鬼神以為造而天尚如此况生於天地而為人比之日月四時而稱鬼神者亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎王肅本以前聖人聖字作愚字是以貴乎用九也乾元用九則貞而元矣知之者明之者也知始知終所謂大明終始者如此仲氏易卷三
