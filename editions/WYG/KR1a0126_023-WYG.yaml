body:
  text: 仲氏易卷二十三翰林院檢討毛竒齡撰兌下震上三易卦易泰三往四來又易恒三來初往損上來四往歸妹征凶无攸利彖曰歸妹矢地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也元攸利柔乘剛也此則男女不相配而别取象者夫長男為震少女為兌男長女少匹配不當因有序長少為兄妹之象盖卦従泰推坤乾一變虞氏易曰泰三之四遂以損上來四改少男為長男恒三易初變長女為少女雖男仍為男女仍為女而男女不交第排長少凡震動悦隨並非男女相悦夫婦倡隨之義誠有如徐氏仲山説易所云震兄歸妹似桓王下姬春秋傳齊襄公逆王姬為桓王之妹孫權嫁妹者但女子有行不容征邁無父之女遲歸終吉盖嫁女之家夜不息燭況干寶曰歸妹為哀落之女父既殁矣兄主其禮亦又何利祗以陰陽聚列必需交媾王肅曰男女交而人民蕃天地交而萬物興雖震兑不交而乾首得震坤終成兌即借此陰陽交索之情為歸妹婚姻之義曰此亦生人之終始也其所以男動女悦而不為過者以所歸者妹也若位在中閨志存征進動而得凶即曰柔之乘剛従夫類然然亦何利焉柔乗剛如屯之乗馬女子嫁夫之通稱象曰澤上有雷歸妹君子以永終知敝翟𤣥本作擬不可解干寶曰雷薄于澤八月九月将藏之時知崔憬曰始則征凶終則无利故以永終敝為戒初九歸妹以娣跛能履征吉象曰歸妹以娣以恒也跛能履吉相承也初以恒巽之柔易兌初之剛是以長女而改少女此長庶之為娣者也天子諸侯一娶女君則其餘皆娣是歸妹以娣亦恒事可第兌本二剛一柔而二剛自為一類然而二剛則于女德有不合矣且俱在地道揣其象俱有于不合中寓相合之意如媵娣之非妻而妻非嫁而嫁者所謂跛能履眇能視是也然初何以履二何以視初與二何以有此跛眇之履視則以初本震爻震索陽在初二本離爻離索陰在二又下三爻即離位震為足離為目則初本能履二本能視而震為外卦則四又為震之足且互當坎中坎為曳是四與二為兩足而坎従而專曳之牽戾成跛其何能履然而猶能也本震故也如是則征亦吉耳征有二義初當進跛亦當進俱與二有相承之義九二眇能視利幽人之貞象曰利幽人之貞未變常也而離為互卦則二雖位離而反居離目之側側為半目近乎眇者然而猶能視也何也本離故也大扺歸妹六爻皆為女象但以其一為女君作此卦之主則餘皆輔爻乃不以二為卦主而仍以五者二雖女道臣道而以剛爻處柔位則位反不當與初四等故第可孤處而為幽人之貞幽者幽閑貞者貞靜幽閑貞靜婦道之常故曰未變常娣道猶婦道也六三歸妹以須荀爽陸績作繻字聲之誤反歸以娣象曰歸妹以須未當也六三本泰之乾三而降為兑三是剛夫而降少女之末此賤女也則此歸妹亦第用以為須而已須者媵妾之稱熊過曰天官書須女四星賤妾之稱也故子夏傳孟喜易皆作媵娣之妾解以所降之位實未當耳然此六三者又以恒之巽初而進為兌三今巽初既已為娣矣則此兌三者萬一不容于女君而反歸故位亦第如巽初之為娣焉斯已耳勿過賤也盖三與初本同類而三嫌近君故又有反歸之象九四歸妹愆期遲歸有時象曰愆期之志有待而行也九四之剛本泰損柔爻所易外剛内柔志意不決加之居坎埳之中而逼近君側遲囘不前則従媵雖有期而不無愆之所謂待年之娣也坎為月離為日合月與日而為期四當互坎中而踰于互離之外故愆期六五帝乙歸妹其君之袂不如其娣之袂良月㡬荀爽本作既朢吉象曰帝乙歸妹不如其娣之袂良也舉正本無也字其位在中以貴行也通卦皆妹而不及兄第于此爻合見之帝出乎震甲乙皆木遂借殷王成號為震兄之稱其云歸妹者或殷王當日原自有嫁妹一事亦未可知詳見泰卦然亦帝震本君兄則其所歸者必帝妹也第帝妹貴主位又正中然且遜處在上主家輿服有不及姪娣而不為嫌者則其婦道終始如月之将朢而未有已何其吉也盖衣口為袂乾為衣兌為口初三兩娣以二乾爻成一兌而五比乎四以一乾爻成半兌是五君之袂不如初三兩娣之袂良也乃若坎月離日合璧在中上互坎下互離如合璧上震下兌東西相對震東兌西相對有如朢然其曰幾者以五位坎中于離日之光稍偏耳卦従泰來故泰六五曰帝乙歸妹此六五亦曰帝乙歸妹雖推易之法全不在此然此亦一驗也上六女承筐鄭康成作匡云宗廟之禮主婦奉匡米无實士刲羊无血无攸利象曰上六无實承虚筐也上加五之上而非正位則女将于歸欲承筐以薦而无所薦也士家娶婦欲刲羊以祭而无可祭也何也非正配也盖上従損来艮剛居上原象傾筐今既改為震則身麗震筐似乎可承而位出坎滿虚而无實坎中滿以過坎故虚若虞氏易曰坎為虚不知何據且震為士兌為羊離為刃坎為血見説卦及漢諸家易刲羊薦血其象皆見而上位過髙不惟超兌兼越離坎則承筐既无實刲羊又无血矣何利乎夫歸妹本不利而此尤不利之甚若此者寧勿行可也征凶也按左傳晉獻公筮嫁伯姬于秦遇歸妹之睽正此爻也史蘇占之曰不吉其繇曰士刲羊亦无􅎺也女承筐亦无貺也西鄰責言不可償也歸妹之睽猶无相也其繇即截取此爻詞而相雜成文非謂易爻原詞如是也詳見蠱睽兩卦中離下震上三易卦易泰二往四來又易咸五來初往恒二來初往豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃孟喜本作稷月盈則食陸德明云或作蝕非天地盈虚與時消息而況于人乎況于鬼神乎夫豐者大也夫震與離明與動雷與電皆無大理而曰大夫子解之曰明與動何足以大然而所以致大者或在是也故此大非他王大之也出乎震嚮乎離皆王也則皆大也假者大也音檟音格皆作大解詩烈假不瑕言烈之大者不敝也然而疑之天下幾有人君而可以大自居之者乎夫大則必減猶夫盈必虧滿必損此其中有憂焉卦處大坎焉能無憂而勿然也離以日之中而可照天下此大之當然者也宜也能保此大則正當乘此日中中宜照亦宜也乃夫子于此又従而推解之曰夫所謂憂者非日中也日中何足憂夫亦謂日既中則即此日中而已昃焉耳福不再至盛不常有盈必虧滿必損惟月亦然然且天地盈虚與時消息炎寒遞代山澤成毁無事不然而況于人之當乗此消息鬼神之能主此消息者也舊説初二為地下三四為人間自初至三有日墜地下之象故曰昃則凡下離皆明夷矣此言象而無理者也惟錢國瑞云下卦離為日中爻互兌為西昃象自二至上大象坎為月中爻互兌為毁蝕象此解得之第仲氏則尤有進者同邑徐徽之嘗講學留軒問曰豐象何以見日昃仲氏曰乾之中爻易而為四是離光射地之左隅日昃之日也上卦坎位受光于日乃光不能滿而祗以下爻一陽為近離之照缺蝕之月也一座快然見留軒講義所易假字多作至與格解惟此釋作大以夫子傳不敢易也易是曰天地消息亦指泰易為言象曰雷電皆至豐君子以折獄致刑雷電與豐無與此言折獄致刑與雷電噬嗑明罰敕法相對初九遇其配鄭本作妃主雖旬荀爽本作均劉􅷶本作鈞俱通字无咎往有尚象曰雖旬无咎過旬災也初為咸五與恒二所易而此二與五則皆以陰處人位三畫卦則以二五為人位而可為我配是其與我為主客者我従彼来我為客則彼為主也夫上震下離合以成卦而二五兩主則各分居于上下卦之中以納甲言震納庚離納已自庚至已適周十幹為十日夫兩主相尋雖延十日而不以為咎何則以二與五皆在上志在尚往不厭多日也若因而過之則盈旬之後鄰于日昃天下有留連浹日不為乆而一旦稽遲坐生他變往往而是也過時之憂毖之在初矣十日為旬堯典三百有六旬註六十日是也惟周禮公旬註均此通字耳若鄭康成謂十日者朝聘之禮又曰大禮曰旬不知所據六二豐其蔀鄭𤣥薛仁貴本作菩註云小席日中見斗孟喜本作主往得疑疾有孚發若吉象曰有孚發若信以發志也豐至二有漸大之幾而前當坎棘自二至上為大坎坎為叢棘互以巽草二四互巽諸家易以巽為茅草曖曃靡宻斯何豐也必求其豐則豐者其蔀耳蔀者􅫟蔀草名廣雅云魚薺也意豐但以大言従無因豐見蔽之若以豐其蔀為蔽日之象則豐其屋不通矣若以蔀為雲日之蔽則蔀其家又不通矣總是豐不可居日中則昃一意而分見不相串合従來誤解且豐必有時日中者豐之時也二與四相易而居離中正離日正中之會彖之所云宜日中正此爻也而無如所易者為震剛震仰孟象斗而離日見之是日中也而已為日昃天下有仰頭見斗而猶然日中者乎不惟日昃且已昏時雖欲前往而巽疑進退不果坎疾心病轇結不果所藉離為孚坎亦為孚以孚中而發外震二四之交或因之以得啟其志焉已耳九三豐其沛子夏傳作芾云小也鄭𤣥干寶同云祭祀之蔽膝日中見沬漢書及字林子夏傳鄭𤣥馬融本俱作昧字林云斗杓後星子夏傳云星之小者薛云輔星也服虔云日中而昏也折其右肱姚信本作股无咎象曰豐其沛不可大事也折其右肱終不可用也三亦坎巽之間則豐與二同三之沛即二之蔀皆水草也水草兼坎水不止坎為業棘也劉熙曰沛者水草相生之名公羊傳草棘曰沛齊侯田于沛是也崔駰達㫖云蝱蚋之趣大沛且離在上剛将盡之日昃尤易見向已見斗今且見沬矣沬者斗杓後星見九家易正指震上二陰言言細小也夫三以咸之下艮泰之倒艮而其易之為下離互兌之剛艮為手肱者手也今以兌之毁折而折其肱矣卦例上右而下左見前今為離之上非右肱乎人亦第見為豐耳而豐者其沛則何可大事況大期有用右肱之折較甚他體夫本欲豐大自居而徒大而不可用乃至如此鄭康成以三為艮爻此以位言第折義不解九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉舉正此下有志字行也四與二易二曰豐其蔀此亦曰豐其蔀二曰日中見斗此亦曰日中見斗而夫子曰不然夫猶是坎巽之間同此豐大亦同此􅫟蔀而一在離中一在坎中位不當也亦猶是離震之間同此離日亦同此震斗而由日以仰斗其象明踐斗以去日其象幽明者不幽幽者不明也且夫四之剛従二來也來者主也乃我奪其剛而予之以柔是夷主也夷主者傷主也彼傷則我吉矣彼傷而往有疾則我不傷而行得吉矣故初柔易剛而目所易者為配主就彼柔言也此亦以柔易剛而稱所易者為夷主則就我剛言也夫以不當之位處不明之地而我剛彼柔我吉彼傷其相同而不同如此世之以履豐為保大者宜何鑒焉六五來章有慶譽吉象曰六五之吉有慶也五則従初來者也初曰往往有尚則此當曰來況初陰之來而下始得離則其所來者非離章乎夫初與二五共易在五為有慶在二為有譽今慶譽俱矣此非來章有之誰有之上六豐説文作云大屋也其屋蔀其家闚説文作窺其户闃姚信本作閲孟喜本作窒其无人三嵗不覿凶象曰豐其屋天際翔鄭𤣥王肅孟喜李鼎祚本俱作祥孟云天降下惡祥也也闚其户闃其无人自藏鄭王木俱作戕也上居倒艮之末艮為門闕而巋然而據其上則其所為豐者祗屋焉耳即向所云豐其蔀今觀之蔀也乎哉其家焉耳夫艮為人見前艮卦故凡所云艮其身與夫不見其人者皆以艮言也今巋然而髙者屋也其曖曃靡宻望如􅫟蔀者其家也則雖家有屋屋復有户而既已為家為屋為户則不能又為人将自上至四歷震三之數震東方卦天三生木已滿三嵗而欲借下離之目以闚艮人其可得乎夫如翬斯飛天際之翔者其屋也髙明鬼瞰深藏而不出者其人也揚子雲曰炎炎者滅隆隆者絶觀雷觀火為盈為實天収其聲地藏其熱髙明之家鬼瞰其室正指此也豐不可居大不可極是故彖言豐而爻則無豐彖有日中而爻則並無日中亦以為豐與日中有必不可居者在也而況上為豐之極乎左傳鄭公子曼滿欲為卿王子伯廖語人曰其在豐之離弗過之矣豐之離者正豐之上六言曼滿必亡将如此爻所云也此非筮豐而之離者但以此爻變可之離故以此爻為之離之爻傳中引易多如此而啟䝉引以為占法誤矣説見乾卦用九下艮下離上三易卦易否五來三往又易咸五往上來恒二往上來旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅者衆也周禮五卒為旅而説文謂軍旅五百人為周制一鄙之衆見徐氏註是旅本以衆為義而特衆行者必客居因之以師旅陳行之目反之為羇旅寄託之名孔穎達曰失其本居而寄他方謂之旅孟子註託寄也此與豐大之一反而為旅瑣其情同也是故震與艮明與止火與山皆無旅理而夫子解之則曰豐大也旅小也豐大故亨旅則小者亨也且亦知旅之所以得名也哉以否之三柔升之為五而得居外卦之中是客外也徐仲山易説以得中乎外為旅所由名正此義以否之五剛降之為三而順為互巽之剛是順乎剛也巽為順故順剛以互巽言此亦夫子指互卦釋經之一証也夫客乎外而順乎剛旅也然且明止上下各得所亨山火北南並不失正是艮與離遇者旅之時而以止而麗明者即旅之義也夫亨雖小而時義甚大按漢儒釋此卦並主推易之説如姚信曰此本否卦三五交易去其本體故曰客旅荀爽曰陰升居五與陽通謂之小亨蜀才曰九五降三降不失正為旅貞吉是卦名卦詞皆推易法姚信為九家易中之一家蜀才即范賢三國人見華陽國志象曰山上有火旅君子以明慎用刑而不留獄艮為居而火不留是旅之又一義也王張杉曰體大坎為刑律而離以明之艮止以慎之畿曰旅皆逆境莫甚于囚之在獄獄者不得已設豈可留滯乆淹也初六旅瑣瑣斯舉正據王本作㒋謂㒋賤之役按王註斯賤之役仍是斯字以斯與㒋廝本通字也改㒋則易字矣其所句取災風俗通引易曰其亡斯自取災正節取此文而稍増減者象曰旅瑣瑣志窮災也此窮旅也旅人本猥屑而此當艮止下柔尤纎細之至者鄭康成云瑣瑣猶小小艮小君之象虀鹽包裹瑣瑣然然且寄居櫩牖所踞纔尺寸而與同行者較量彼此必至分析其處所而後已此何如旅也夫寄跡天涯固已偪仄所恃廣大自處與同行相親庶足慰藉而瑣瑣如是此豈能免患者其窮而致災必耳按斯本作分析解其又作語詞者借焉耳故説文以斯為分爾雅以斯為離毛詩斧以斯之以斯為析薪之義且傍通廝㒋正以析薪為㒋賤廝養所有事故王輔嗣註此爻以寄旅不得所安而為斯賤之役所取災而應劭風俗通怪神篇引此云凡變怪皆婦人下賤愚而善畏斯自取災此皆稍辨斯字頗知易義與他解作語詞者極為卓越第斯必改㒋且其所二字無著耳考易例凡其字不下百十俱有實指並無憑虚作轉詞者如屯之屯其膏賁之賁其趾類此明明卦名固無足論他如大有之匪其彭同人之乗其墉大過之過其祖既濟之曳其輪類上下二字皆有實義此易例也況豐旅二卦合十六其字其指住止者凡六如其家其屋其户其所其次其巢類此云斯其所正與蔀其家焚其次同盖云析其所在也且所之為義世亦不解乆矣所者旅寓也又曰行居之名故鄭詩獻于公所謂茇舍之所而漢制車駕所在曰行在所蔡邕獨斷云天子以四海為家故指行在為所是也是明明一斯字一所字字義易義無不一轍而俗儒淺薄安陋就簡經文稍艱便不能解因不能解反欲改經聖言受侮已極矣又此爻以瑣所為韻正哿語之協又初為艮之下柔艮為門闕下柔薄外門正旅寓之下者又此旅初爻即豐上爻也在豐上則為蔀屋在旅下則為斯所其反對確切又如是又所字易文曽用之即艮止其所之所趙氏易或解斯所字亦略見及但云離所止而不安其所不合六二旅即次懐其資得童九家易李鼎祚本俱作僮通字下同僕貞象曰得童僕貞終无尤也二由外以居于内且因之得艮門之中是就所宿也左傳凡師再宿為信過信為次夫旅既有宿将必有齎持以為宿者聘禮問幾月之齎即資也二以艮中當互巽之末則已能懐其資巽為利而且艮為小子為童為閽寺為僕而二居中而剛柔長少俱得之周叔夜曰唐人詩漸與骨肉逺轉于童僕親又何尤焉九三旅焚其次喪其童僕貞厲象曰旅焚其次亦已傷矣以旅與下其義喪也三従五來而五即為離火之中是焚其所居也三居艮剛而反之即為倒兌之剛是脱其艮之所得也艮所得童僕見前兌為脱夫旅惡過髙亦忌太下今乃由上五而寄居下三是以旅與下也而求其不喪得乎九四旅于處得其資斧子夏傳及諸家易並作齊斧張軌云齊斧者黄鉞斧也張晏云整齊也虞喜志林云齊當作齋齋戒入廟而受斧説各不同我心不快象曰旅于處未得位也得其資斧心未快也卦凡三推易而四獨不及是人皆旅行而四獨得所居處也夫處者居也旅者寓也昔者公劉之遷豳也以乆處者為處處而以旅寓者為廬旅見篤公劉詩今旅也而于處矣然且以巽剛之三合離剛之一既懐巽資復得離斧離為戈兵餱糧戚揚正旅遷者所有事所慮者以于處而當大坎之中坎為亟心恐于其心有未快耳斧為旅衛之物王弼謂斫除荆棘以安其舍或謂斧釡通即齎糧也非是六五射雉一矢亡終以譽命象曰終以譽命上逮也五以三乾之中乾金合巽木為矢否上卦為乾三五為互巽合金木為矢而抽其一矢以射離雉否五降三而成離離為雉雉得而一矢亡矣幸三五同功為兌為倒巽而五正當巽兑兩口之間以兌悦之口出之成譽而又加巽口以為之命是羇旅之臣所至揚誦傳所謂出亡之子文而有禮非與否三與五易三為與下則五為上逮夫子于推易一例致意如此上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易陸德明本以于易作之凶二字不知何據終莫之聞也旅固恥下然以二與五各棄其中德而並爭而合棲于上則未免好髙此非旅人所宜有也義者宜也夫旅之覔宿猶夫鳥之覔棲也烏鵲繞樹祗求一枝乃以離之飛鳥巢離之科木其于木為科上稿翹然特出此逆旅之宿上舎今北地所稱上房也衆方指目以為非義而乃際炎上之火加巽風之揚三之焚次在離傍不過野火所延燒耳而此之焚巢直當離上一若薪燭不戒并主人屋樹而盡焚之何罔罔乎夫旅勿好髙人第知旅名為客而不知實指之即人也旅人無親雜卦傳曰同人親也惟同人為親故先或號咷而終必笑何則以親故也又曰親寡旅也惟旅為親寡故先或笑而後必號咷何則以寡所親也見何氏訂詁離火之聲笑號皆有説見同人卦無親之旅終致哀惻況離火易焚兌脱多喪三之焚次而童僕亡此一焚巢即其所牽之車牛亦皆以漫易喪之酒誥肇牽車牛逺服賈同行雖多誰肻相告離牛坎耳卦體大坎至此爻俱盡矣按漢成帝報許皇后詔云迺昔之月鼠巢于樹野鵲變色五月庚子鳥焚其巢太山之域易曰鳥焚其巢旅人先笑後號咷喪牛于易凶言王者處民上如鳥之處巢也不顧卹百姓百姓畔而去之若鳥之自焚也雖先快意悦笑其後必號而無及也百姓喪其君若牛亡其毛也故稱凶此鳥焚其巢為當時實事故就事引易而釋其義與易解不同乾鑿度卷末載仲尼生不知易本偶筮其命得旅請益于商瞿氏曰子有聖知而無位孔子泣而曰鳳鳥不來河無圖至天之命也停讀禮止史削五十究作十翼按漢史自魯商瞿子木受易孔子以授魯橋庇子庸五傳至齊田何子装何為漢儒傳易之始則商瞿子木本孔子弟子受易于孔子反曰請益商瞿氏不合乾鑿度本東漢人作託言鄭𤣥註易緯書並亡惟此書世多有之仲氏易卷二十三
