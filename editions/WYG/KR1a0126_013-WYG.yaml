body:
  text: 仲氏易卷十三翰林院檢討毛竒齡撰坎下坎上四易卦易臨初往五來觀上來二往又易萃四來二往升三往五來習坎歸蔵易卦名作犖劉瓛本作欿郭氏舉王習上有坎字誤有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉習坎重坎也習者重也猶尚書云不習吉也第八純皆重而此獨以習名者古卦名多加字如夏易以艮為連山商易以豫為陽豫類獨周易不然故祗于坎卦八純之首特加習字以為卦名有如是者耳郭京于習坎上欲更増坎字以為坎是名習坎是義陋矣第坎離相對離樂坎憂此本憂危卦而坎體旁陷以重坎言之則亦中爻平而兩旁陷雖初為憂患之始上當憂患之終終則必變而惟恐以出險之後或易險而反入乎險故坎六爻皆少吉而初上尤凶以為坎之形與坎之義固如是也然而四无咎何也原坎之卦辭以中為主所謂有孚維心亨皆中象也雖坎以險中以剛中指兩坎中言而以全坎觀之則三四中也且所謂行有尚者指中爻言大傳自二至五為中爻中爻即互卦有云非中爻不備今中爻自二至五下互震而上互艮震為行而艮則以髙山居上位所謂行而有尚者非三四兩爻不足當此故三猶勿用而四即无咎亦以三主行四主尚水尚則盈盈則出險故三不如四不止三多凶四多懼也夫坎者孚也即信也凡卦之上下相合而中虛中實者皆謂之孚以為可相合作符信也今以形言之則兩體中實信也全體中虛又信也上下與内外皆得印合如使竹又信也而以義言之水附于坎其流也盈坎而後行然盈則必行無徒盈者故曰不盈可信也盈坎而行則行乎險矣然而猶此盈即猶此行前坎之行無以異于後坎之行也可信也此其間獨心為之維獨也坎為心為通見説卦是為心亨乃心在中而坎以兩剛而居實中又復以一行而居虛中是其往也三行而四通三无功而四有尚則即以多功有尚而推四爻為卦主豈有誣乎夫險凶徳也然而上合乎天下合乎地中合乎人故后王君公因險設險而即有以用其險所謂生憂患而死安樂者此險也所謂危者使平易者使傾者此險也故曰險不終險而終乎險惟終乎險故可無險也此處險之道也象曰水洊京房作臻于寳作薦皆聲轉義同至習坎君子以常徳行習教事洊即習也爾雅云再也劉氏云猶仍也習教之習閑也重之故閑之初六習坎入于坎窞凶象曰習坎入坎失道凶也習坎在外因重之卦皆由下而上而此亦曰習坎者以上下言之則重又在下也窞者坎又坎也初為坎之隂坎也然又為臨兌所易兌為澤又坎也故先言習坎者以兩坎之重而繼言坎窞者則又以坎兌之複也失道失處險之道也九二坎有險求小得象曰求小得未出中也此險中也然剛能處險雖未出乎中而初有失此反可求得特小耳葢二自觀來移觀巽上九而為坎中巽多利故有小得猶隨卦互巽之稱有求得也六三來之坎坎險鄭𤣥向秀本作撿鄭云木在首曰枕在手曰檢如桎梏之類坎為桎梏此正與上六之徽纆相對較似有理但須改險為撿則擅改經字故不可従耳且枕入于坎窞勿用象曰來之坎坎終无功也以升之六五移來為坎是其坎為來之坎也今以來之坎而逼重坎又坎也坎之又坎而且安之有如枕入于坎又入于窞是初之坎窞以坎兌之複而此之坎窞則仍以兩坎之重也夫往有功者以行之尚也今以震之盡而當艮之首行未尚也三雖終何功之有坎坎勞貌詩坎坎伐檀是也故傳曰勞乎坎又曰坎為勞卦今勞而无功矣六四樽酒簋貳用缶納約自牖陸績本作誘聲誤終无咎象曰樽酒簋貳剛柔際也此行尚時也前險既過則盈坎坎行將必有尚而出乎險者當其時以三位之剛與四柔相接三四剛柔以位言宜有宴衎酬酢為遵養之藉此如需之遇坎而需酒食困之遇坎而困酒食者則飲食相歡夫亦處險者之不得已也夫以艮木之堅兼震竹蒼筤之細木可為樽而竹可為簋比之王臣之㑹諸侯享之樽而副以簋所謂樽酒簋副者亦燕禮也而不特此也險者儉也漢劉修碑以險為儉故君子儉徳避難于險時用之其為樽也不必木其為簋也不必竹用缶而已所謂汗樽而土簋門内樽而門外缶此其時也爾雅盎為缶虞氏易曰震為仰缶今樽與簋交用之凡此者所為約也約者儉也然且以至約之物當相見之歡而又以三四剛柔相接之宻乃不納于户而納于牖户在室東南牖在室南艮為門闕見説卦而四當艮門之半比之牆牖爾雅在牆曰牖如云陳之牖下者此約之又約亦以四自升來却巽剛而受坎柔猶之坎與坎交居艮柔而受坎約其情同也貳與副同本義引周禮三貳謂益酒之副遂以簋貳不合引晁以道説謂先儒以樽酒簋為句既又以夫子象詞樽酒簋貳四字連讀又不合又引晁氏據陸徳明本欲去貳字則以解經之故而至改經不可矣夫子象詞自無誤句晁氏古易多出偽造况唐時郭京陸徳明諸本私臆穿鑿明屬乖舛可輕信耶陸徳明釋文亦明註簋貳句未嘗以簋句九五坎不盈祗説文京房本作禔禔祗通用猶史記祗取辱作禔取辱類皆作徒與但解若鄭𤣥本作泜則又一義耳既平无咎象曰坎不盈中未大也五雖剛中而仍未出險坎者科也水必盈科而後進内坎稍終而外坎未既是未盈也彖之所謂水流而不盈是也葢互艮為止止水不行且臨初升三俱為兌澤澤又瀦水故五従兌升則皆有不盈之意以止水瀦澤皆不能溢而出也故曰此不盈者也但已平耳莊子曰平者水停之盛停亦止也盈則行平則停夫二不出中而此云中未大者猶是坎中而以險而出則必以大而行也上六係用徽纆寘劉瓛本作示云衆議于九棘之下于叢棘三嵗不得凶象曰上六失道凶三嵗也若夫上六則可以出險之時所謂險極必變者而萬一恃為必得失處險之道則前坎之終既在坎窞習坎之終猶是也雖曰已出水矣可以無坎窞矣然獨不有叢棘在乎坎雖為水而實為叢棘以觀巽之繩為徽為纆係而寘之叢棘之中向之六二在險中者祗求小得而尚不即出今以出險之際而一或不戒反致出險而仍居于險當其時雖欲如疇昔之求小得尚可得乎故曰我亦不知得在何時三嵗陽數以坎為中男故數三言不得者已三周陽矣夫處險有道初失之今又失之初失之而凶今失之而又凶然則坎豈終險乎故曰此憂危之卦也可戒也劉表曰三股為徽兩股為纆皆索名虞翻曰獄外種九棘故稱叢棘九家易曰司寇公卿議獄上罪三年舍中二年舍下一年舍不舍故不得鄭康成曰終不自改而出諸圜土者殺故凶離下離上四易卦易遯五來初往大壯二往上來又易无妄五來三往大畜二往四來離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土王肅本作地重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也張氏玩辭以離麗也下即接柔麗乎中正三句後接日月麗乎天四句似較與諸卦辭例相合當備參考離以麗為義麗者附也以一柔附兩剛而命名為離亦以離體為火火隠無形必著物而後能形如附麗然故以重離之體言之五上本天道以五隂附上陽而兩離成日大坎成月自二至五為大坎日月見説卦如日月之麗乎天初二本地道以二隂附初陽而互巽為草木互兌為百穀二四互震三五互兌草木百穀見説卦如百穀草木之麗乎土三四本人道以下離接上離而三陽一明四陽又一明如人道之上兼天下兼地跨兩離以踞六爻之正上下皆明而化成天下則是所謂利貞亨者亦惟火柔之麗于中并麗于正故云然也且夫離者中女也以中女而兼互巽則為長女其又兼互兌則又為少女以兩離兼三女而三隂備焉此全坤也夫乾為馬則坤為牝馬今坤為牛而離不為牝牛乎九家易離為牝牛乃以坤為人腹與離為大腹而畜之向亦不知畜之為何以而其麗如是然後知麗之而亨者亦即其畜之而吉者也是之以也離與坎對然坎内勝外離外勝内坎四吉上凶而離四凶上吉者卦位内離而外坎純爻則見説且前坎易四卦皆以純隂見坎離則内坎以離位相逼而外坎不然自内不如外離易四卦皆以純陽見坎離則外離以坎位見尅而内離不然自外不如内况離下卦互巽巽為木為風風以助火而木以生火皆麗之有益于火者也上卦互兌兌為澤為金澤以滅火而金以仇火皆麗之有損于火者也夫如是而吉凶内外瞭然矣故二五君臣同為柔中而二反為卦主者亦内勝有然不止卦位不合耳象曰明兩作離大人以繼明照于四方郭氏舉正云以字下有明照二字今本脱去原其意以明照二字連則以字無著故也不知繼明二字連而照字連下請所謂繼明即重明也以者以繼明也因誤讀誤解之故而反欲改經唐宋後儒罪過何如矣今諸本引舉正又云無繼于二字則又非郭氏原本郭氏不受也初九履錯然敬之无咎象曰履錯之敬以辟咎也辟避通字火主禮禮者履也然而禮為履初亦為履以人之行必自履于地者始也乃初従遯來以遯之五剛下移為初一似避尊而趨卑避崇髙而趨汙下者然且履蹈之間儀文錯然即紛錯也凜于中而習于外所云敬也夫敬則宛然左辟即在尊髙且避之而何有于咎六二黄離元吉象曰黄離元吉得中道也離以中女見前受坤索而二為坤隂然且當互巽之末坤順巽亦順卦所謂畜牝牛者指此爻也夫坤色黄牛為土見九家易又黄而以互巽東南之木生正南之火火既盛而土生其間又黄則名此離為黄離不大吉乎六二以大壯上九大畜六四移之為中此以推易得之者故曰得中或曰離為日日行道黄而居中故云九三日昃之離不鼓鄭氏本作擊缶而歌則大耋京房作絰蜀才作咥俱聲誤之嗟凶鄭薛本無凶字象曰日昃之離何可久也九家易曰初為日出二為日中三為日昃故曰此離非他日昃之離也夫光景何常毋論石火電光難以久恃而即以離日言曽㡬何時而遂至于昃人生行樂耳桑榆在前何足把玩故曰何不日鼔缶今者不樂逝者其耋矣嗟何及矣三従无妄來其下為震為仰缶風俗通曰缶瓦器可以節歌此即淮南子所云小人鼓缶戰國䇿所云秦王擊缶者鼔即擊也又鄭康成以此為艮爻離従遯來則下卦是艮艮位在丑丑上值弁星似缶此與坎之互震而云用缶正同震艮皆東北方丑位而上星如此則又不止作震坎形似己耳耋者八十之稱九四突如其來如焚如死如棄如象曰突如其來如无所容也四以火繼火厝火在下而通火于上有如突然突者竈囱也廣韻竈堗通作突諸字書皆然近世字彚謂从讀森大謬囱烟牕也今俗呼烟囱讀葱予别有辨証兹不載當四在大畜身本柔也移乾二之剛而來為離剛若火之延來者然然且以上火接下火而四以陽體而居互巽之上巽風揚之如焚然夫離者麗也即附也火以附物為義而今以附物而反焚物及物焚而火亦無所容矣是其焚之而物死非物死也火也焚之而物死而棄非物棄也火也火以麗為體而乃失所麗如死然如棄然膏以明自煎火以焚自滅誰為為之葢四居兌中兌為澤為金金為火所滅而澤又足以滅火故象如此荀慈明曰隂麗于陽相附麗也然而有别離之義焉離者火也託木而生是附麗也烟焰飛升而灰炭降滯是别離也占法載隋煬帝幸江都筮離之賁正此爻也後果驗六五出涕沱若戚子夏傳作嘁咨慙也嗟若吉象曰六五之吉離鄭康成作麗王公也五位坎中坎為憂而又當重離之目出互兌之口則従而涕沱従而戚嗟亦時㑹使然然而終吉者彼其所附麗皆后王君公處尊髙而負艱大若所謂袁安之念王室自然流涕者此非婦人之泣與孤士之嘆已也火上為災故上九殺人九四自殺而五亦尚在憂危之間此即外氏説易所謂水欲其上火欲其下者坎卦行有尚亦如此不止前説如内巽外兌之有異見前彖下而本義謂迫于上下兩陽故有憂虞則黄離元吉獨非兩陽之間乎何前後不顧如此上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也王肅本此下有獲匪其醜大有功也二句則小象于象詞原不必周到者此孺子妄増語也離為戈兵故終以征伐與坎為法律故終以刑獄正同然此乃王者之事嚮明出治命將出師皆王之所為故其有嘉者第折取其魁首而不及其類醜者類也尚書所謂殱厥渠魁脅従㒺治漢陳湯傳所謂第誅其首惡之人而諸不順者皆従之真掌邦政以正庶邦之事也大壯之易以二剛加上首是折上六之首也五上皆六皆隂類而易上而不及五是不及類也坎與離對然往往相反者坎者陷也以兩隂陷一陽故終陷離者附也以一隂附兩陽故終附若胡仲虎謂坎水内明而外暗上六暗外故陷刑離火内暗而外明上九明外故出征其説亦通然于坎陷離麗外又一義矣若周易首乾坤而次坎離以乾坤為隂陽之純坎離為隂陽之中不若震艮巽兌之各居于偏也且坎離為上經之終坎離互體為下經之終以坎離為乾坤之用二濟又坎離之用不若震艮巽兌所重卦之各異其用也凡此皆易理所自有者然専見及此便為京焦陳邵所濫觴而易義亡矣仲氏曰易有真義請自思之仲氏易卷十三
