body:
  text: 仲氏易卷十九翰林院檢討毛竒齡撰乾下兌上聚卦五陽一陰夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬者缺也環之有缺者名玦而玦形為故説文釋夬為決从以形缺得名而今以五陽而戴一陰其形上缺所謂兌上缺者則因象名夬而義亦隨之合五陽之力而決去一陰此與左傳賜之玦則決白虎通君子有決斷則佩玦其義正同兌上缺故為附決若云澤上于天則澤必決㡬見澤有上于天者此妄釋也此不以卦名而以卦形者故大象澤上于天祇以澤氣上騰言以為氣騰于天則澤降成雨故曰施禄及下此另是一義第夬之為決原始于缺而其為卦則專以陽剛決陰柔為義故直曰夬者決也剛決柔也乾健而兌悦健為決而悦為和以決歸健若忘乎決之始于缺而本于兌者以決屬乾健不屬兌悦従来渾侖不能解以為缺在兌而其所以決之者仍在乾耳且夫五陽餘一陰而何用去哉五陽遞升既已揚于王庭矣揚者舉也書曰揚側陋是也王庭者純乾之地也揚舊指播告解與下告字重出且明正其罪揚于王朝則聲罪致討與不利即戎又礙矣羣賢滿朝既已升進祇此宵小一綫亦何難少為姑息而必従而決去之以為一綫未除所憂方大此其中有戒心焉所謂有厲也夫小人可分而不可合君子可合而不可分孚也者同合之謂也五剛既齊則合為號令號教令也平去兩讀不分使各告于所自來之邑以為諸陽之自來者坤也自邑也五陽皆従坤遞變故曰自坤為國邑古者車甲出于邑繼自今自邑幸勿出車甲出之不利彼窮寇可追耶但申嚴令無興戎事則以次遞往彼将自退所謂不決即決耳凡卦位皆上坎下離純爻即見說見前今五畫純陽止餘上畫而上又陰畫適當坎上陰之位則坎離兩位顯然全現兵車戈甲兩俱有之坎離所有俱見前祗以六爻外蔽現不終現故勿即戎即傳所云其危乃光亦以離言言厲則光也若以乾金兑金便指為戎則坐失正象矣俗儒謂變離為即戎則此夬彖中将取何爻為變象凡言變不通類如此象曰澤上于天夬君子以施禄及下居徳則忌澤升于天則降澤及下居則不得矣故禁之忌者禁也言禁使勿居也凡此皆于卦名外别是一義初九壯于前趾荀爽本作且義同往不勝為咎象曰不勝而往咎也夬自大壯之四陽而進為五陽夫四陽尚為壯而此不壮乎但卦以上為首以下為趾壯在初則壯在趾矣大壮以四陽而壮于趾此大壮初爻詞則此進于前而加一陽壯于在前之趾焉前字従来未解夫初逺于陰而勢未可往壮亦何用且趾巨于足壮往所忌卑居自大多見其不勝任耳丁氏易東曰前趾者因大壮之趾而加前以别之舊多以勝為不勝敵未經即戎何冇勝負誤矣九二惕荀爽翟𤣥本作錫云賜也不可解號莫諸家皆作暮惟鄭𤣥讀如字謂无也无夜非一夜也夜有戎勿恤象曰有戎勿恤得中道也二則當任決者但逺未可決因僅取共申之教令而怵惕之而無如宵小勢窮乗間伺隙每思以暮夜之間作興戎之計壁人腹刃投以不測而不知能守中正便已無慮盖二處離中離日中闇所謂闇虚也而又當外蔽之際戈兵隠伏乗暮竊發象所當有但蔽即不顯且坎者離之反坎為恤離則勿恤矣像抄曰兌西于日為暮乾西北于時為夜小人所以稱宵人也此解暮夜亦有見但既失正象且諸爻皆通何獨于二爻見之若九正易因謂五陽為日一陰為夜則杜撰矣又他以日乾夕惕解惕暮者皆屬私智且二爻非三爻不合以惕去恤所謂其危乃光者夫猶是離戎而君子勢盛尚戒勿興彼何人斯乃敢作賊有戎與即戎正反按五代史唐明宗時路晏夜如厠有盜伏焉晏心動取燭照之盜告晏勿驚某稟命雖有自来然察公正直不敢妄害匣劒而去後召董賀筮遇夬九二曰難已過矣變革六二曰已日乃革之但守中正請釋憂心晏亦終無患九三壯于頄鄭𤣥本作頯六夾面也蜀才本作仇字聲之誤若明張氏晉王本作凥此必臆會三不宜頄而以九傍同故妄改之者有凶胡瑗本謂此下當接獨行遇雨若濡有愠八字程頥傳本又謂止宜接獨行遇雨四字皆不知所據然不知何故爭相改易如此真不可解君子夬夬程頥本謂此下即接若濡有愠四字獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也三于重卦為腹于單卦為首頄者首頬骨也特三當中外相承之際未宜健決且宻戒興戎難以顯斥而乃悻悻然見于顔面意未行而形先露顴髙頬厚豈非凶象但三與上六為應者也使以六為妃匹耶則三為夫夫者君子也使以六為僉人耶則三為正人正人亦君子也既名君子則夬之又夬初壮難行二惕未行而三獨行之雖上六相遇正當坎窞坎位見前坎之在上水也非澤也而自天而下則易水名雨易凡稱雷雨既而皆指坎乃遇雨而亦有似乎澤濡然者澤為濡故稱濡澤此豈真與小人有湔淹之意哉垢濁相侵却之若凂天下有形乎面則有凶而拂于心則无咎者有无二字俱見不惡而嚴其夬夬本如是耳九四臀无膚其行次説文及鄭𤣥本作趑云倉卒也馬融云却行不前也一作􅯓且馬云語助也一作趄李鼎祚註作趑趄牽子夏傳作掔羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也四于重卦為腹于單卦為足臀者足上體也第臀下有膚膚本柔肉而乘剛却柔有似乎无膚然者則其行不前趑趄焉豈堪往哉季本四同誤以趑趄為恣睢引申子有天下而不恣睢索隠註恣睢猶放縦也為解反謂无膚輕捷放縱可行誤矣此欲急決故以趑趄為遲與下卦姤懼陽消反幸其趑趄之遲兩爻反對正同若喜其易行則于下卦何解且趑趄王肅明註行止之礙此另是兩字韓文所謂足将進而趑趄者與恣睢何涉牽强附㑹耶但既不能決則姑従而羈縻之既不能前則且従而退挽之故曰汝第牽羊盖兌之在前者羊也兌為羊羊躁狠不馴凡牽牲者必牽之在前而惟羊則牽之使前東谷鄭氏謂羊性狠居前而力挽之則忿而不行却行而使之前則行矣此與駕馭小人之法正同今四與上尚隔位而任其前行陰相控制則既可不前而亦不失之不決如是則悔亡且夫兌口之張彼此共之其従兌剛出者謂合四五則謂之號以王者命令従喉舌出也其従兌陰出者謂上六一爻即謂之言以小人語言祇僅僅從口出也今人言亦可畏矣彼以兌口出我以坎耳入坎為耳不能使不言而能使不聞且不能使不聞而能使聞而不信雖耳曰聰目曰明各有所司然耳苟失聞雖聰亦等之不明伏坎在上猶之伏離之在下而何勿決焉此方是聰不明不然是不聰矣九五莧陸蜀才本作睦云親也夬夬中行无咎象曰中行无咎中未光也五叠五乾為髙岡而上㣲露以兌羊之角象澤菜之生阪上者曰此莧陸也夫以髙平之大陸而棲此絲㣲細草于其間大地一莖何用決去而為君子者必戒之戒之夬之又夬若惟恐坎水外闇中德加蔽而未光象之未光恐未光也而中行斷然此乾健之極互乾至此已盡所謂健而決者非與莧本菜名舊註夬三月卦莧以三月生姤五月卦瓜以五月生亦近理漢儒謂莧葉柔而根堅故象九五陸者地之髙平者也荀爽謂陸亦草名而鄭康成謂即商陸澤草則于象義反不明矣若説文謂莧為山羊而吳澄襲其説且謂莧不讀現當讀桓則許慎之説當因易誤而吳澄之音則又従虞仲翔莧讀莞陸讀睦以彖詞和悦為解而陰竊其音而又誤之者也詳見予易小記中上六无號終有凶象曰无號之凶終不可長也決至此无庸號矣此長終剛長乃終則彼凶終耳終不可長余銘缶曰一陽之剝曰終不可用慮其變為純坤也一陰之夬曰終不可長恐其不得為純乾也巽下乾上聚卦一陰五陽姤鄭氏本作遘馮椅云王洙易改今文為姤按雜卦傳石經亦作遘張氏明晉王本作媾義俱同女壯勿用取陸徳明本作娶女舉正无女字謬彖曰姤遇也柔遇剛也舉正此下有女壯字勿用取女舉正无女字誤不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉夬與姤同五陽一陰之卦而夬為剛終姤為柔始反視截然故姤止一陰而以形言之則一陰而反接衆陽之壯以為壯謂之女壯而以義言之則今雖一陰而従此将漸侵漸長由姤而遯而否而觀而剝以馴至于坤女自此壯矣亦謂之女壯夫此女壯者乾巽不敵天既不可配長女而又五陽齊亢勢難獨使四應成偶以助其方長之勢則曰此女也勿取之非勿取之勿用取之晉叔向之母所謂深山大澤必生龍蛇恐取之而多不利者盖夬為上缺上缺者兌口決也兌為口為附決少女口決則一陽再上而其缺已滅故易決姤為下缺下缺者巽股撓也巽為股為撓物長女已壮大長女非即壮女舊解誤而下股虚撓則上陽既不下取而下徒恃其一缺以冀為升進即古詞所云老女不嫁只生口者此上古重卦所為特予以姤名而不之顧也夫姤者媾也重婚也曾壮女也而重婚也乎曰女壮類婦賤之故媾之且亦誰與為媾者夫婚媾者取女者也天下有不取女而可為婚媾者哉且取女者男下女者也天下有女下男而可以為取并可以為嫁者哉故夫子解姤不曰媾也而曰遇以為姑遇之焉耳且不曰剛遇柔也而曰柔遇剛以為此非剛之所欲遇也柔来而遇之焉耳然而遇合何常惟時之行一陰乍生雖拒之絶之有必不可與相長之勢而究之坤之所始即乾之所終天地相遇時至則然況姤辰在午五陽丁夏以仲夏恢台之候加之南離長養之時品物咸章天下于是乎觀姤遇焉且夫乾健非不行也巽風下播不止命令之細也姤而未遯則二尚為陽姤而未剝則五尚為陽従来陰長陽消迭為盛衰二五雖中正亦何易得此並據陽剛之世自遯至復為六二者六自剝至大壮為六五者六若二五皆九惟乾與夬姤而已在一陰而遇五陽則為詭遇此柔遇剛之遇以二五而並據陽位則又為殊遇此剛遇中正之遇日雖易仄而中亦難逢古語日中則仄此姤之時與姤之義所謂其繫頗大者惟其可懼所以可幸也後漢魯恭以盛夏斷獄疏諫曰易五月姤用事東觀記曰一陰初生五月之卦也經曰后以施命誥四方言君以夏至之月施命令止四方行者所以助㣲陰也此以養陰言與天地相遇意合其于扶陽抑陰正㫖稍有不同象曰天下有風姤后以施命誥鄭本作詰非四方月令夏正之日施命令誥四方本此初六繫于金柅子夏傳作鑈蒼頡篇作栮王肅本作抳从手蜀才本作尼云止也俱非貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也此一陰也而可使之前進哉巽陰為繩則繫之而繫于何所夫不有以乾金合巽木而為金柅者乎金柅木名實如梨而黄故名金柅漢儒訓止車之木則但可止車而不可繫物若子夏傳作鑈訓絡絲籆子則不特難以繫物且别一字矣子夏傳偽書耳金柅本弱木故木弱口椅柅而可以繫物却縶則吉行前見凶見凶猶得凶也何氏訂詀以往見連讀不通以柔道相牽本如是耳且其所繫者非即居坎半而為羸豕者哉初六九二為坎之半坎為豕而半則羸之向見其欲進而惡其壮者今見其受縶而又哀其羸彼夫瘁然而羸者正其欲求遇而不得者也身居坎半而坎位之在上者純乾難揜見前而與之相對坎位雖殊交孚則一坎為孚則雖金柅之繫過于杙枒而踢蹶不前蹢其蹢躅其躅較似乎欲就而不能者是何如遇已巽為股為進退而初當股陰故象如此九二包荀爽本作胞明晉王本作庖俱非有魚无咎不利賔象曰包有魚義不及賔也此姤遇之始也古士大夫相見各有䞇獻即民庶相遇亦必有包苴之物彼此餽餉此國風之所以有包麕也國風野有死麕白茅包之此証包字耳若虞仲翔謂巽為白茅則直以周詩解易大無理矣且包為相遇所遺而諸作包容并包謂五陽以此包陰不通今二在倒兌之中兌為澤水故有魚然猶幸其有之萬一陰再進而剝巽成艮則艮為丘阜便無此矣故易言魚二中孚豚魚則上巽下兌喜其有之剝之貫魚則五剝至艮惡其無之此明徵也今幸而有魚則遇與不遇任之自然而又何咎焉至于二為士位士苟上進則作賔王家别有䞇獻魚非所利且吾亦極畏夫進之耳陽進則陰躡及之義之所在何必作賔善言遇者自曉耳九三臀无膚其行次且厲无大咎象曰其行次且行未牽也以上卦言則臀為下體故夬四為臀以下卦言則臀為上體在股足之上故姤三為臀然而夬之四爻即姤之三爻反對故姤之三爻詞亦即夬之四爻詞但彼厭其遲此喜其緩耳无膚亦以乗剛言不與柔牽則不遇然不遇无咎九四包无魚起凶象曰无魚之凶逺民也四與初為應極宜遇而必不與遇則絶之倍嚴故直曰包无魚盖此時倒兌已脱雖身居坎傍而坎水非澤不必有魚則无之誠喜乎其无之也然而可虞也一陰儻進豈無剝至四而成觀象者觀四變陰遂為利用賔于正二以有魚而惡其為觀此又以无魚而反慮其成艮觀為大艮艮山阜无魚見前則三之趑趄不足憂而此之起之誠凶事也夫初本四妃也其謝而起去亦欲與之逺之也乃起之未㡬而躡者循至則其止之也不曰妃而曰民初為民不曰惡其近之而反曰惡其逺之其隠相諱避有如是者九五以子夏傳作作舉正作似俱謬杞包瓜子夏傳作匏瓜薛虞記云杞杞栁也杞性柔刃宜屈撓似匏瓜無理含章有隕自天象曰九五含章中正也有隕自天志不舎命也此則有所包而不必遇者姤五月之卦五月瓜生而五尤姤之當時者水楊澤蒲即杞栁澤草裹以白㼐不必艮之蓏巽之楊而祇取應時之物以之包之比諸獻瓜削穀瓜肉也有所掩覆為貽贈之用此其待遇為何如者且五月南訛夏離長養彖傳所謂品物咸章者于是乎在故離火有章而五以伏坎而為之含之光大中正此其乗遇之時又何如者而無如其不必遇也陰漸進則陽漸隕今所恃者祇五上天道去初尚逺耳乃無㡬而有隕自天觀剝之至豈所豫料夫遇合升隕各有天命君子第抱此定命之志以為升隕遞行不舎吾志然亦何遇焉上九姤其角吝无咎象曰姤其角上窮吝也遇至此窮矣角者首之盡于此求遇則吝可知耳所謂寧為隕勿為遇姤義如此坤下兑上子母易卦易觀上來四往小過三往五來萃亨馬融鄭𤣥陸績虞翻本俱無亨字此偶遺耳程頤傳本謂此係羨文而本義遵之至吳澄纂言直剛此字何其妄也王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以悦剛中而應故聚也王假有廟致孝亨也利見大人亨舉正此下有利貞字謬聚荀爽本作取誤以正也凡家易及李鼎祚本此下有利貞字亦謬用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣孝亨與享同澤上于地則不聚散決故不聚地中生木則不升連長故不升然而名聚者此在重卦命名時亦豫知推易之法有子母聚者曰此雖非聚而猶聚也以陰雖間而陽未間也陰亦上下環聚其名升者亦豫知分卦之中有上下移者曰此雖有降而猶之升也以陽可上而陰亦可上也升卦臨初升三小過二升四一以陽升一以陰升惟聚非卦義故其為聚也不以義而以形專取互觀二至五為互觀大艮又體為大艮作門闕之象鄭氏曰互巽為木艮為闕又艮為鬼㝠門宗廟之象而以坎神鄭氏曰坎居尊位而隠伏為鬼神坤牲坤為牛大牲也合羣族同姓異姓内外助祭而駿奔之以隠合乎名聚之義且曰四五并乾此其中有大人焉觀上九易四小過九三易五并之則上卦為純乾下位離目以一見為利下卦離位純坤則見二四倒震此其際可攸往焉震為行三五巽命又復以順行為利順天命也則雖順以悦剛中而應其所為聚不在此而即以聚觀萃以正孝享以順命将傳所謂方以類聚者未免冇情誰能遣此此犧之命名文之演辭孔子之賛傳三聖之為易共此義也升亦猶是也王制天子假廟羣工肆朝諸侯薦碩牲以相肆祀此即用大牲之義若假廟之假音格至也與王假有家不同象曰澤上于地萃君子以除荀爽本作慮戎器戒不虞除如除舊更新之除言更置也伏離見則戈兵甲胄皆戎器聚則慮有不虞耳初六有孚不終乃亂乃萃若號一握傅氏作渥鄭氏謂讀如夫三為屋之屋不可解為笑勿恤往无咎象曰乃亂乃萃其志亂也聚在陽而不在陰以陰多于陽且分其一也然而坤為民初又為民民則聚時易而散時少且三坤猶未析也故欲觀聚象則必于坤初觀之乃聚必有信而初固有之離為孚下位見也㐲離位以純坤見聚必有終而初則不然坤為終初方始也坤无成有終初始則未終也當其未聚則有時而散亂散也上陰隔也及其未散則有時而聚二三比也且夫聚之象果何為者耶羣情蛹蛹合并而動有號召者有持搤而捉搦者有譁且笑者有吁恤者乃初居倒震之側震有聲可以號也身與艮手鄰搤之便也上口與初相對兌悦笑也位離初而去坎逺憂與恤所未及也一若上悦下順見若號召者而思以應之無俟推引即一捉搦間而笑而従之别無悔恤此何如聚也盖四坤并列漸上則漸分而初當羣聚之始勢猶未散故象如此若夫其初或散者以初方聚時其志或多未定耳易隨象取義變化莫測然一定之義詞理鑿鑿而陋者妄以比應二字傅㑹牽强謂四不附五初不従四四握五號其象安在若此者思之骩心言之詘口觀者詳之握者搤持也程傳以一握為一團註經何事可杜撰至此六二引吉无咎孚乃利用禴蜀才本作躍劉瓛本作非是象曰引吉无咎中未變也此聚之稍進者坤類尚合則借巽繩艮手以牽引之巽艮皆互卦以上坤下亦坤也然而二固士也位離中孚身入艮闕則當借彖之格廟以為之聚而離丁夏令則因而用禴應有孚者禴夏祭名周禮宗伯以禴夏享先王是也鄭康成曰禴夏祭名舊註作春祭則名礿見王制祭統且係夏商禮與禴不同王弼誤以禴為春祭名且曰四時祭之省者以時祭較他祭省約故耳宋儒祖其説謂禴為薄祭固已可笑至本義更謂薄物可祭則變祭為物更屬少理毋論時物無厚薄即據此卦此爻有一字一畫與薄物相干否吳澄作纂言更竊襲其説謂秋時物多故盛夏時物少故殺何謬劣至此六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也三則聚将盡而上又相隔則返而觀之雖若萃而實非萃也如萃然則如嗟然然則何利乎所幸互巽在前猶可順則猶可入耳巽為順為入巽為互卦陋儒謂易不及互則夫子曰上巽非耶九四大吉无咎象曰大吉无咎位不當也四與五皆陽聚者雖以觀之上而易之四位皆不當然聚則吉矣此乾吉也九五萃有位无咎匪孚元永貞悔亡象曰萃有位志陸德明本无志字謬未光也五則有位矣以小過之三而易之五伏坎未見不孚亦不光然聚則无咎矣元永貞者乾吉亦坤吉也上六齎咨虞翻李鼎祚本作資咨同涕洟无咎象曰齎咨涕洟未安上也若夫上六則獨陰不聚齎咨而涕洟齎咨兌口聲也即嗟咨虞仲翔謂齎持資財以作賻謬甚涕洟兌口澤也夫聚則歡而散則悲者人之情也當其聚時則執子之手兮咥其笑矣不知其嗟如也乃忽當間隔而嘆息不已繼之以泣所謂悲莫悲兮生别離者此非聚散之間有難言者哉此夫子賛萃所為不言時與義而獨言情也仲氏易卷十九
