body:
  text: 仲氏易卷四翰林院檢討毛竒齡撰坤下坤上聚卦一名不易卦乾坤為卦首凡六十四卦皆二卦所變如乾變坤坤變震類而周易所演則偏使二卦無易法以别于畫變與占變所謂不易之謂易是也此真焦贑蜀才虞翻諸儒所傳三易遺祕與宋人變卦諸說正復相反餘說見前坤元亨利牝馬之貞君子有攸往先迷句後得主利句西南得朋東北喪朋安貞吉程傳朱子本義俱以先迷後得為句主利又句誤呉澄易纂言又以後得主句利字連下讀亦誤夫兩儀並生為萬物所始則乾曰元坤亦曰元而特貞之有健順也夫乾為龍為馬坤亦馬也干氏易曰乾以龍繇坤以馬象而牝矣故乾元之德謂之元亨而坤元亦然但其所利者不僅僅曰貞而曰牝馬之貞一若以柔順為安貞者夫牝馬之貞而何以利也原夫君子攸往牝馬何嘗不可往第牝馬之往必所趨有時而所向有方所謂時先後是也凡行必求先而隂不可先是何也先必迷也所謂坤為牝為迷是也見九家易凡行不可後而隂則必後是何也以陽為隂主後乎主則得所主也所謂先失道而後順常是也見彖傳夫牝馬之貞而以云利此其利矣乃以其趨時而揆其向方則其為時也可以後而不可以先其為方也可以東北而不可以西南夫西為兌南為離兌為少女西方卦離為中女南方卦皆陰類也隂類吾朋也得吾朋而何以不可往東為震北為坎震為長男東方卦坎為中男北方卦皆陽類也陽類非吾朋也喪吾朋而何以可往夫天下得喪何嘗惟貞是安今兹所行亦惟欲得吾主耳先則失主後則得主西南則失主東北則得主然則西南之所得者不過朋耳非主也雖得之有何利也東北之所喪者祇朋耳非主也雖喪之又何害也葢以順為正妾婦之道第得主而不得朋攸往之正崔憬曰女在室非正出嫁為正苟所行得主而順安于正此即彖之所為順承卦之所為利貞者何有勿吉據九家虞氏漢後說易諸家皆以先迷斷句後得主利又句惟程傳本義俱以先迷後得斷句而以主利又句此不惟與本文得主得朋兩得字比較相峙之文一聯一析偏畸不合且與文言後得主而有常得主二字蟬援並出為矛盾矣及註文言亦以得主之文與前註有礙又謂得主下脫一利字竟欲增此一字以曲全主利之說至元時呉澄作易纂言又謂後得主斷句利字連下讀夫三聖經文何容割裂即謂有脫誤處當藉補救亦必令其可安毋論聖經義理定無差誤可勿煩補救而即以辭例言之古人行文首重辭句况易本筮繇有類賦頌尤為辭句所最先者文言後得主而有常含萬物而化光讀之有句按之有辭儻于主下増利字其能讀乎至于利西南得朋東北喪朋則尤拗戾之甚者若然則彖傳何以不曰利西南得朋乃以類行也易不經秦火幸無剝蝕然不意訓故家又復為割裂如此漢後諸家易皆有西南得朋東北喪朋之說然皆以枝幹雜方位論易總屬旁義荀氏九家易謂隂起于午至申三隂得坤一體為西南得朋陽起于子至寅三陽喪坤一體為東北喪朋馬氏謂孟秋之月隂氣始著而坤之位同類相得為得朋孟春之月陽氣始著隂始從陽失其黨類曰喪朋虞翻謂陽月三日變而成震出庚至月八日成兌見丁庚西丁南故西南得朋二十九日消乙入坤滅藏于癸乙東癸北故東北喪朋惟崔憬以兌離為西南震坎為東北此按說卦方位與男女少長為言此斷可信者程傳稍為移易謂西南隂方東北陽方不指卦位則南隂北陽方位不合然程猶指喪朋為從陽得朋為此隂故一曰類行一曰有慶若本義謂東北雖喪朋然反之西南乃終有慶則既非程氏方位之意且以反從隂類為吉其于卦彖辭義俱悖蓋矣若西南果慶何必于東北先贊之也若反之始慶則何地不可反也彖曰至哉坤元萬物資生乃順承天夫坤元合天而即能以發萬物者資始育萬物資生是其合之乃所以順承之也至與大對大者無外至則無間坤厚載物德合无疆含𢎞光大品物咸亨此所謂亨也厚又兼四德含者能容光者能徹𢎞則不陿大則不細牝馬地類行地无疆柔順利貞君子攸行能得所往則利貞矣此釋利貞連君子有攸往句先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安吉之吉應地无疆先迷何也以失道也後順何也順則得隂之常矣婦道之常從陽不從類故文言以得主為有常象曰地勢坤君子以厚德載物初六履霜堅氷至象曰履霜堅氷魏志作初六履霜郭京舉正據王輔嗣韓康伯本作履霜无堅冰字謬隂始凝也馴致其道至堅冰也六爻皆隂則隂已至盛而開其盛者初也初不即盛而有馴致乎盛之勢纔履霜也而堅冰至焉則陽消隂長所宜惕然者正此時也象傳履霜堅冰郭京舉正據王輔嗣韓康伯本作履霜無堅冰字朱子本義引魏志作初六履霜亦無堅冰字遂謂二字宜衍按後漢魯恭傳封章全引象傳明曰履霜堅冰隂始凝也恭在和帝時先于魏晉則必古本原有二字可知矣若魏文帝紀太史許芝所引偶然遺脫此皆漢後文而郭京以臆見妄稱古本何足據乎六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也夫地之坦衍而不衺曲者直也其中正不偏方也遍六幕而無所于虧大也直方與大地道總然然惟于六二之動見之象傳所以有六二之動語葢坤象一體而二以坤爻六為隂爻坤位二為隂位且又當三坤之間則坦衍中正既含𢎞而又光大象傳地道光也若非六二之動不為歸者當爻者謂之動爻以必動而得此爻非謂動而之他爻也動之他爻則變矣鄭康成謂動者生動即廣生萬物之意非是葢乾坤無往來其爻辭純以時位為據若非時位則三可直方五可括囊矣他爻倣此夫爻貴因重所為習也以純坤之爻而為重坤習之者然也習者重也坎卦以重坎為習坎尚書以不重吉為不習吉皆易書字義人但知牝馬之利重坤有之得主之利亦重坤有之以為坤重則厚厚則无疆見彖傳坤重則積積則内可直而外可方見文言今三坤之間特單卦耳不習也不習則不大然而二已大不習則不直不方然而二已直已方則是二雖單卦而其所為利攸往利得主无不然也若地道之光則以坤象至此當隂氣成物之候萬類燦著出地有光其時固然然以位言之則内為離位純陰則見說見乾卦所謂離為火為光者見虞氏易其位象如此六三含章可貞或從王事无成有終象曰含章可貞以時發也或從王事智光大也時至三爻物已成章矣坤能以含𢎞之德蘊其菁華含章而又發之以其時以時發則三位雖不正而由是以安于貞不亦可乎含章以時言可貞以位言葢坤為臣道即以臣言縱或勞于王事不居成功然光大之智必能終事葢三居重坤之半其于全卦固未成也所謂无成也然而内卦之坤于此終焉則有終者也此臣道即坤道也光大義見上節康熙乙已宣城施閏章講學廬陵白鷺洲時湖廣楊洪才至問難間曰某最不能讀易如坤之无成有終在諸儒言之非不娓娓然此係臣道六爻皆然何獨于三爻發之衆皆嘿然仲氏曰不觀謙之九三睽之六三乎一曰君子有終一曰无初有終然皆在三爻何也此可悟矣洪才俯首間吉安詞林張貞生方鄉居湘潭舉人王岱為湖西道客紛然而起曰謙之卦辭亦曰君子有終何也豈亦三爻耶仲氏曰謙以三爻為卦主故卦爻同辭卦辭所指正三爻也洪才起揖曰言易至此得矣曠若發矇矣仲氏之易其言簡而確如此洪才字恥庵楚儒時又言曰宋儒說易多不顧前後順文說去如謙之君子有終言終謙也本義謂詘于始必伸于終以詘始為謙将必以伸終為不謙矣此皆善于說易之言六四括囊无咎无譽象曰括囊无咎慎不害也坤主受有囊之象故坤為帛又為囊見九家易六爻至四則已三分受其二可以括矣括結也後漢書括囊大典謂結而藏之葢陰相比多咎而四能承五則无之陰在二多譽見虞氏易以陽位尊五隂位尊二也而隔而居四則无之蓋括囊則慎慎則利且不言何有于害故曰慎不害六五黄裳元吉象曰黄裳元吉文在中也黄土色裳為下飾以臣妾自居此坤中之君王宮之后下國之侯也宋史郭雍傳曰坤雖臣道五實君位雖處柔德不害為君則直以坤五為君位若程傳以媧皇武氏目之則更鑿矣元吉者坤元之吉左傳昭十二年南蒯将叛筮之得坤之比亦以元吉為元善之長也詳見乾卦若小象曰文在中則以坤為文見說卦文在中即黄中與含章不同上六龍戰于野其血𤣥黄象曰龍戰于野其道窮也隂盛則必與陽争戰者争也但盛隂爭進戰在坤六而反曰龍戰者臣不可與君戰故曰戰之者龍也胡氏所謂春秋書王師敗績于戎天王狩于河陽是也乾為龍乾者戰也又曰戰乎乾見說卦則非乾不戰矣蓋二氣相薄雖必兩傷而隂道之窮至此必變戰之者亦即其變之者耳其血𤣥黄句解見彖辭侯荀氏易謂消息之位坤在于亥下有伏乾故相薄果說亦然此仍以枝幹時氣言易皆非卦義說文戰鬭也龍鬭古有之近說易家有以龍戰為不馴解戰作動言陽動于野則其血為不通矣漢盧芳傳贊天地閉隔野戰羣龍野戰行陳之辭也若朱穆傳龍戰于野言陽道將勝而陰道負也非戰鬬有勝負乎用六利永貞象曰用六永貞以大終也用六義見乾卦此亦上六辭陰動極矣用之者使之還歸乎静此永貞也此所謂大終也三為内卦之終曰有終故此為大終文言曰坤至柔而動也剛至靜而德方後得主而有常得主即卦詞得主有常即彖詞得常程傳謂主字下脫利字誤含萬物而化光坤道其順乎承天而時行明張元冲傳載晉王易本作順承乎天而時行則順承連字正與乃順承天合較似有理積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣漸義與積同隂柔之害多以小戕大以卑凌尊故詞及此由辨之不早辨也易曰履霜堅氷至蓋言順也順馴也音義並同此即本文積漸小象馴致之義與順承順字有别本義順慎同則慎字在小象三爻不合直其正也方其義也陽主仁陰主義君子敬以直内義以方外敬義立而德不孤此以人道明地道直方大不習无不利則不疑其所行也上曰直其正下曰敬以直内與義方相承不同或謂正是敬字之訛深衣直其政以敬政形似故訛敬作政而後遂易本文以正字雖似有理第古文變換處多不拘此不必穿鑿隂雖有美含之以從王事勿敢成也地道也妻道也臣道也地道无成而代有終也天地變化草木蕃天地閉賢人隱蘓軾曰方其變化雖草木亦蕃及其閉也雖賢人亦隱易曰括囊无咎无譽王艮曰龔勝之有名不如申屠蟠之无譽蓋言謹也以卦例言之震為草木為賢人以其為乾之肖子也假化為震則雷出地奮草木蕃可以從王而豫天下矣否則純隂不化因之有括囊之象君子黃中文在中通理地道通達而有條理正位居體以中正之位居體美在其中而暢于四支發于事業美之至也又以人道明地道隂疑于陽必戰隂動極類陽為其嫌于无陽也故稱龍焉隂動則不知有陽若不言龍戰則幾于無陽矣故特以戰歸龍焉荀氏以嫌作兼謂隂兼陽故稱龍則當言兼于陽不當言兼于无陽矣鄭𤣥以嫌作慊謂快于无陽又作溓溓雜也謂隂蛇氣雜似龍皆非正義猶未離其類也故稱血焉血為隂類崔憬謂乾為大赤則反屬乾矣非是夫𤣥黃者天地之雜也天𤣥而地黃震下坎上四易卦一名分卦後同易觀上來初往臨二往五來又易萃四來初往頥上來五往此兩陽四隂之卦大抵兩陽所分約有六卦而此卦所分一自觀萃以上四兩陽易之坤初以為震一自臨頥以上二兩陽易之坤五以為坎則此卦惟第三爻不易而初二四五上五爻無非以移易為義者所謂易者易此耳餘說見前屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中漢劉修碑作儉字形之通大亨貞雷雨之動滿盈天造草昧宜建侯而不寜屯者重卦之名也重卦惟乾坤六子原名不易而餘則各就其兩合者而别予以名于是六十四卦之名興焉夫坎與震而何以謂之屯哉乾坤甫列即以兩坤交一乾而得震此剛柔相交之始乃坎為再交其距始交不甚逺而動而得險險而成陷說卦坎為險為陷是剛柔始交而難以生比之陰陽相薄萬物初動而驟加險陷則勾芒甲坼一往多難其名之曰屯所固然也第乾元之體既乗震動而又當險陷之中則乾震之行既為大通而震始坎中又極正固所謂既元亨又利貞者誠以震為雷坎為雨隂陽交而雷雨作自能動盪盈滿于天地之間其所以稍有屯難勿用攸往者以坎者水也在下為水在上祇為雨不惟為雨也亦祇為雲雲未為雨雨又未為水則未免屯難故水在雷上則祇曰雲雷屯必水在雷下然後可曰雷水解虞集曰水雷已不及雷水况乎雲雷此正天地初開國家肇造之際所云草創㝠昧者斷宜有承乾出震應運而興之一人葢震雷百里諸侯之象見白虎通由侯而王端在此際特驅除屯難其事方未寜息耳元亨彖作大亨然舊亦作元善之長解見春秋昭七年傳卦唐鶴徵曰震動坎勞皆不寜之象與比不寜方來正同象曰雲雷屯君子以經綸鄭𤣥本以經綸作經論謂撰書禮樂政事此係别解初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也夫屯下為震屯之初則震之剛也震為動為健而震之剛則尤健動之甚者所謂帝出乎震繼天徳而行乾健者于是乎在而無如其屯也屯則難難則遷延焉而不能進其因而磐桓無足怪者磐桓不進與邅迴同宋儒多以磐石桓杙為解非是第初分自觀與上相易又分自萃與四相易上四皆髙位而俱下而易之為初似乎以貴下賤者夫屯難守正固宜居貞而震雷百里又當善建以屯難之卦而推震初為卦主則直以屯之卦辭移之為初之爻辭卦曰貞爻亦曰貞卦曰建侯爻亦曰建侯卦曰利利爻亦曰利利舉卦之兩利而悉歸之爻此真所謂處利出亦利者此豈磐桓之所能已也葢兌為澤初為民萃四之降决兌澤以流于民上為天巽為命觀上之來降天命以受坤衆非大得民者而安有是按春秋閔元年畢萬筮仕于晉得屯之比此初爻動者史廖曰屯固比入吉孰大焉震為土車從馬足居之屯下震初爻變而為比是震為土也震為車坤為馬震又為足今震為坤是從坤馬足行也兄長之震為長子為兄母覆之衆歸之坤為母為衆合比而能固屯安坤而能殺震公侯之卦也此占易法即演易法三易要㫖所藉以傳一綫者全在于此此豈啓蒙變占所謂僅占本辭者觀此者可悟矣六二屯如邅如乗馬班如匪寇婚媾鄭𤣥本作冓註㑹也無理女子貞不字十年乃字象曰六二之難乗剛也十年乃字反常也震行稍進而屯難未解邅迴固其所也特屯有四隂惟六三無所移而二四與上皆與陽爻為對易二四從臨萃對易上從觀頤對易則皆有彼此婚媾之象故乾為龍見九家易為馬見說卦而二四與上皆乗剛爻讀易四法有乗承比應四字乗者跨下爻也承者承上爻也比者上下近也應者初與四應二與五應三與上應也然此祇王弼註易之法漢魏則不止此矣今二與上皆跨陽爻四雖相隔然二三皆隂故皆曰乗剛有似乎乗馬者然乘馬在女以乘剛爻也晉人以女得婿為乘龍龍馬一類即此義鄭𤣥以女乘馬不合謂馬牝牡為乗非是但二之所乘者初也而其所應者五也五本正應何庸乘初乃不幸當屯難之時邅迴不前安能上從則今兹所乗雖曰乗馬而上有正應若别有所駕者然班者别也左傳有班馬之聲註班别也謂九五也夫此九五者雖在坎中坎為寇為盜見說卦及諸家易實則匪寇也此婚媾也當在臨兌時一少女耳臨二不易則為兌二為少女今已居正二正位故曰貞與九五正應為婦則民之初生亦隂陽始交衆庶馮生之首事然且自三而四連三隂為離中之象自一至五為大離象離為大腹見說卦即以互體觀之二四同坤坤亦為腹大傳二與四同功三與五同功皆指互卦言京房易積數以二三四為互體三四五為約象即互卦也坤鑿度曰坤法為人腹則欲求孕字當亦不逺字孕育也舊作許嫁誤第屯難之時貴乎居貞貞即不字亦惟是屯邅而進躊躇乗馬以求上應将必自二而三自三而四歷坤隂之盡而後親九五以成大離二三四皆隂為坤坤盡則九五見矣不十年乎十者陰數之盡繋曰地數十反常者十年而後能反乎常道所謂邅迴也屯也按本義謂許嫁曰字此據禮記女子許嫁笄而字男子冠而字語然已誤解矣謂笄而字者命字也男子焉能許嫁耶自朱子誤解後明代墓状墓誌皆以女嫁為女字而近代字書且引之註字字下按說文字乳也並無許嫁之義而徐鍇原註即以易貞不字為據且說文序篇亦謂文字之義比之物象孶乳而生即左傳大不字小亦作字養如孶乳解然後知近儒猥陋凡引易註許嫁者皆宋後之書如字彚字通等宋前無是也如玉篇廣韻等漢說易家如鄭氏虞氏輩皆註曰字妊育也無别義六三即鹿虞翻王肅本俱作麓以下為倒艮上為互艮六三適兩艮下爻之間為山足故曰麓此最巧合但須改經字且于全文不大合故不從无虞惟入于林中君子幾不如舍鄭本以幾為機往吝象曰即鹿无虞以從禽也郭京舉正以從禽上有何字謬君子舍之往吝窮也夫當此草木勾萌蟄蟲将作之候而未能暢遂此以秋冬之氣而行春今九家易曰屯為十二月卦雷伏地中飛動未發則時當屯三正于此不能無田禽之事第震象為鹿坤為虎兕震為麋鹿艮為狐狼見虞氏易雖可親就而時非纘武虞官不至書爾作朕虞若虞機張皆作掌鳥獸官惟外坎在前坎為藂棘出九家易得敺而入之君子以為雖已幾及寜復舍去葢三爻當下震之終互艮之首震動未畢而艮止先之震為動艮為止動止相尋幾不如舍總是屯難未解往即吝窮耳仲氏嘗曰一爻而具離震坤坎四卦則弓矢車馬旗皷戈兵之象備恒之四明夷之三謙之五離晉之上皆是李贄以即鹿為逐鹿正草昧驅除之象則逐鹿之喻始自漢人文周焉得便有此語大謬按明正德間都御史張嵿敇巡撫保定兼提督紫荆諸闗筮得此爻曰行無虞官何以即鹿吾入林而已時提學李夢陽在座曰不然三闗古鉅鹿地也急即之無虞者不疑也惟入林中惟恐為彬所中耳時宦䜿江彬用事彬有林字後武宗西狩江彬索璧馬婦女不應駕言三闗迎駕軍不至罷職此臆斷倖中然古占法原是有此六四乘馬班如求婚媾往吉无不利象曰求而往明也夫屯為剛柔相交之卦則四與初應陰陽相配有何邅迴但此所乗馬亦初剛也萃兌本四剛而今降為初則剛柔頓反原有不甘婚媾之意况五剛相此乘初頗逺則别有授綏亦其恒事而無如初九正應陽自求隂則從而往焉有何勿利蓋卦體大離離為眀其明于决擇如此九五屯其膏小貞吉大貞凶象曰屯其膏施未光也頥之易由頤之養頥養上九以為屯臨之易竭下澤臨下卦為澤以自潤而成屯是屯其膏也雖君位居貞而得民在初故初之居貞為小貞小貞則吉此之居貞為大貞大貞則凶葢下卦施澤之地易兌為震而倒艮光震倒為艮上卦施澤之人易艮為坎而反離光反離為坎施未光矣何吉之有大抵屯難至此則草昧将闢建侯得寜矣漢谷永傳引此曰小貞為臣大貞為君遭屯難則當開振君吝則凶臣吝則吉此貞字别解然以大小分上下則亦可驗者魏了翁曰周禮有大貞謂大卜如遷國立君等事與此不同上六乗馬班如泣血漣如象曰泣血漣如何可長也此乘馬指乘坎五言然亦曰班如者以初與五相峙不決也葢觀頥之易初與五之剛皆從上剛互易之是已既舍剛以從柔而三六不應初與五又非正應則此一陰陽之父亦終邅迴而不得釋所謂屯也但屯難之至物極必變泣盡繼血以與初與上相别班即别也以為此豈可與為久長者凡陰陽剛柔藴結不解者從此得泮散而解澤生焉故曰何可長言即屯難亦不久耳葢草昧既開奇偶聚散皆在闔闢中卦三言班馬凡三邅迴而一遲一速或合或否皆足徵否泰通塞薄蝕變化之妙經綸者視此矣九家易曰體坎為血伏離為目互艮為手故有掩目泣血之象按國語晉文侯筮反國得屯之豫司空季子曰皆利建侯屯豫皆有利建侯語得國之務也震車也震為車坎水也坤土也屯厚也豫樂也車班内外屯内豫外皆是震順以訓之坤為順泉源以資之屯豫皆有互艮互坎水在山為泉源土厚而樂其實屯豫皆有坤不有晉國何以當之主雷與車内卦為主而尚水與衆上卦為尚坎為衆主震雷長故曰元善之長衆而順嘉也嘉之㑹故曰亨作大亨解說見乾卦内有震雷故曰利貞車上水下必伯車動而上水順而下威發而衆順故伯若夫勿用有攸往小事不濟一夫之行也此釋勿用句震一索得男故曰一夫又震作足行象言一人私所行事未免有壅以晉侯其時尚未反國耳其占象之法如此若震為車坎為衆傳中屢及之此必說卦文而偶脫之者仲氏易卷四
