body:
  text: 仲氏易卷二十八翰林院檢討毛竒齡撰大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒于扐以象閏五嵗再閏故再扐而後挂京房本作卦謂再扐而後布卦篇按班固律厯志衛元嵩元包運蓍引後文天一地二天三地四二十字與天數五一段相接此引經偶參錯處程傳朱本義遂將天一地二二十字與天數五至行鬼神也一段合并之且移之大衍之數之上則以後儒之説改聖經矣至季本作易學四同又將後易曰知變化之道者二句共十五字連天一天五二段總加之大衍之數之上嗟乎聖經之遭厄如此天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也夫如是可以占矣于是倡揲筮之法曰大衍洪範曰卜五占用二衍忒衍者推演也大衍者所以推演揲筮之法而得其大焉者也大衍指筮言舊指天地之數謬矣蓋以天地之數為大衍非大衍即天地數也其數五十即下文天地之數五十五也祇言五十者蓍數五十凡蓍五十莖且亦以天地生成之數止五十也生數止五成數止十故稱五十解鄭康成謂五行氣并故減五不可其用四十有九者謂用之為大衍則祇四十九揲蓍用四十九其法先取五十蓍捨去其一蓋蓍圓卦方見後文蓍數竒卦數偶故分天地五十五數而以四十九數為衍蓍之數六為卦數卦六爻也李鼎祚云大衍五十用四十九而以却一并餘五備六爻之位蓍圓象天卦方象地且五十全數必不可以作七八九六大衍之用謂推之不合故必減也乃以四十九蓍兩分之左右以象兩儀將蓍分左右兩處不言太極者崔憬以捨一蓍為太極或以四十九數合而未分時為太極又挂起一蓍挂懸也分蓍為兩任取兩中一蓍挂之與兩分之蓍配而為三孔穎達曰挂之左手最小指之間以象三才于是以四數數蓍而連撥之連撥為揲象春夏秋冬之四時一蓍為一時四者以四數也夫向之挂一者竒也謂零也今之所揲之餘者扐也謂勒之指間也向已挂奇于指間而今又四揲左右之蓍而仍歸于此是歸奇于扐也虞氏以扐為次小指間宋儒以為三指之兩間何氏訂詁謂别置案間皆與本文不合此象閏也閏者餘也厯法每嵗三百五十四日餘十二日積之三嵗而加一月曰閏以四揲之餘而歸于此四揲象四時時餘為閏則此亦閏也而乃取竒扐所合而并數之而竒偶之數見焉統左右所餘合之挂一或五或九五為竒九為偶以五祇一四九有兩四也此一變也然而卦不一變蓍不一揲當有再數其餘者即再扐也四時更五嵗而得再閏前三嵗一閏尚餘六日以加一月止三十曰而三嵗所餘有三十六日也故兩嵗二十六日合前六日又加一月再閏兹之蓍筮者合兩分一挂二揲宋儒以二扐為二節則無兩分矣扐即揲中事耳為五節可當五嵗而亦得再閏是再變也再變雖亦有竒偶而尚未成爻則再扐者其次而既扐而後又復挂一為三次而三變以成再變祇言扐三變祇言挂此互文也總是二變三變並如初法是或謂初挂後二變不挂非三變成而一爻定焉合三變所餘觀之如三次皆竒則為老陽三次皆偶則為老隂老則當變矣如二次竒一次偶為少隂二次偶一次竒為少陽此即一陽為男一隂為女之例一爻成止得一畫一畫三變故六畫十八變按隂陽老少之説起于占筮家以占筮有動變故不得不用其法考崔憬立説謂説卦云幽贊于神明而生蓍參天兩地而倚數明揲蓍當倚數也乃其云參天則謂陽數從三始順數而至五七九不取于一也其云兩地謂隂數二起逆數而至十八六不取于四也乃以其數配八卦則艮為少陽數三坎為中陽數五震為長陽數七乾為老陽數九兑為少隂數二離為中隂數十巽為長隂數八坤為老隂數六合上八卦所配數計之剛有五十故曰大衍之數五十也不取天數一地數四者八卦之外大衍所不管也蓍取四十有九者法長陽七七之數也卦取六十四者法長隂八八之數也所謂蓍圎而神象天卦方而智象地也其説頗悉但天一地四大衍不管李鼎祚嘗非之況少隂少陽祇及七八而不及五十則漏義不止一四矣要之老少之説占筮家有之後人附會多失本意耳乃若所云數五十者非他即天地生成之原數也五為天地生數十為天地成數合稱五十此夫子自解與崔憬諸説不同夫天數地數分布五位虞氏易曰天數五謂一三五七九地數五謂二四六八十五位五行之位也而隂陽各合五位相得而各有合有二説一曰甲乾乙坤合木丙艮丁兑合火戊坎已離合土庚震辛巽合金天壬地癸合水一曰一六合水二七合火三八合木四九合金五十合土由二五分之以合為五十有五一三五七九為二十五二四六八十為三十合之五十有五而統名五十即凡鬼神變化皆在于是而況區區大衍乎哉按鄭康成注大衍之數其于五位相得而各有合最為明晰如云天一生水于北地二生火于南天三生木于東地四生金于西天五生土于中此五生數也然而陽無耦隂無配未得相成也于是地六成水于北與天一并天七成火于南與地二并地八成木于東與天三并天九成金于西與地四并地十成土于中與天五并而後五位以成蓋天地之數有五即五行之數此天地數五即天一地二天三地四節意而稍異其説者一水天數合地六為一匹二火地數合天七為二耦三木天數合地八為三匹四金地數合天九為四耦五土天數合地十為五匹故二五隂陽各有合焉五匹故二五各有合此本注天地五十五數而用之為大衍之數之説乃準其數目核其次第析其方位詳其分并儼然一二三四金木水火中邊奇偶四正四維灼灼在目雖漢晉唐儒凡説易者從無繪圗之事易圗繪起于宋而儼然有一圗存于目中因之華山道士陳摶者竊之為圗且隱其所來不曰大衍之數圗而曰河圗以為隂與大衍之數合使人可信乃以圗注衍數者反曰衍數合圗并取乾鑿度易緯書名太乙下九宫法出乾鑿度下篇見之後漢書張衡傳中者張衡奏疏注中載其法竊名之曰洛書而于是經學乃大晦焉夫大衍之數雖亦易學所固有即太乙下九宫法亦衍數之最有據者然總非圗書蓋太乙九宫顯然為漢儒所遵然並無名洛書者故張衡疏中盛稱律厯卦候九宫風角而疏末又另舉河洛六藝篇名並不溷及可驗也如此注為康成所撰凡漢晉唐儒皆宗之如虞翻荀爽王弼李鼎祚諸易俱本此説然並不曰此河圗之數況康成于下文河出圗洛出書注又别云春秋緯云河以通乾出天苞洛以流坤吐地符河龍圗發洛龜書感河圗有九篇洛書有六篇此數語并見之漢書及列史志中是大衍之數本康成所注而康成自云此非河圗河圗有九篇則他人不得攙一語矣況自摶授圗後其徒劉氏與邵氏各相抵牾考宋史諸書摶授圗李溉溉授許堅堅授范諤昌諤昌授劉牧摶又授先天古易于种放放傳穆修修傳李挺周敦頤挺傳邵雍敦頤傳程皓程頤劉以五十五數為洛書今之河圗也四十五數為河圗今之洛書也而邵氏反之其時學者無所適從而胡瑗門人阮逸者乃偽造關朗易傳袒邵辟劉于是南宋儒者多是邵説然終涉疑義乃又假為蜀山隱者所授作龍馬旋毛文其説始于鄭樵通志而成于蔡元定今其説盛行矣襲司馬君實潛虛畫數甲文即洪範皇極改易星點思鏝飾其隟而不知紪漏益甚蓋河圗久亡自尚書周康王時有天球河圗在東序語河圗有九篇故書與赤刀大訓相對而其後遂不可考故漢世緯書妄倚河圗立説者凡百十家列史志中多載之如河圗著命河圗玉版河圗稽命曜河圗括地象類皆無所稽驗而孔安國曰河圗即八卦此亦厭世之紛紛故直捷指之而不知其説之又有礙也據聖人則之則非八卦可知耳若大衍之數原配八卦故其後卦數悉從此起如坎為一數則以説卦云坎北方卦而天一生水于北正與相合離為二數以説卦云離南方卦而地二生火于南正與相合推之乾坤震兑皆然故數有一定坎一離二震三兑四乾六巽七艮八坤九此本之夫子之書萬不可易而作偽洛書者竊太乙下九宫法而不得其説誤以坎北離南方位當之而不知九宫方位又自不同九宫明云太乙行八卦先有卦後有法則非洛書又可知從坎北始坎數一故履一也乃自北而南則下于坤宫以坤數九故戴九九非南離數也又自南而東下于震宫震三故左三乃自東而西則又下于巽宫惟巽七故右七焉不然七豈西數哉于是其法曰每四乃還遂還而憩于中央中央者太乙宫也以中央無卦也乃又自此從西北始而下于乾宫乾數六則六為右足又從西北而東南下于兑宫兑數四則四為左肩此與巽為互易者也又從東南而東北下艮宫焉艮八則左足八又從東北而西南下離宫焉離二則右肩二此又與坤為互易者也乃于是不返中央而竟上遊于紫庭有五數無十數焉所謂九宫缺十數者如此是其竊九宫為洛書者豫已詳辨之兹不再贅而即其位數較之太乙行八卦以卦定數不以方定卦故方位乾坎艮震一如説卦而巽離坤兑則又從乾逆推不從震順轉半離半合而宋儒祇從摶受並不識原文祇曉離南坎北方位而不知太乙之行八卦南坤西巽東南兑而西南離四位不同故坤九離二巽七兑四位與數殊而宋儒仍以本位當異數致北宋到今六七百年間以坤數為二離數為九巽數為四兑數為七顛倒悖謬而茫然不之知也故河圗之謬諸不待辨即其所繪圗又有舛者夫康成之演此數以配卦言也其云六與一并七與二并者非疊復而溷為一也并者併也言相肩併也猶隂陽并合而仍然分也幾見隂畫陽畫合并列之而溷然疊復作一畫者説卦有四正四維而大衍之數因之則坎離震兑四正也乾巽艮坤四維也其曰并者以一維聨一正而乾坎西北艮震北東巽離東南坤兑南西相聨並列今摶所授圗一與六復二與七復三與八復四與有正無維有生無成有合數無分數有四卦而無八卦其為無理莫大于是而陳氏誤傳劉邵誤受以致四十五數有正有維五十五數無正無維其中或圗或書或圎或方起水火之爭成戈矛之勢雖以邵氏之能猶然有圗圎書方之説轇固胸中而不知所受之差之又如是也且説卦夫子書也以夫子明云乾者西北之卦巽者東南之卦故乾數之六巽數之七于是乎取而今一并之南北則所云乾為西北巽為東南者謂何且安知坎不為六離不為七而一六二七分屬如此此皆周章之甚者而誤襲其説而誤之又誤何與詳見豫河圗洛書原舛編乾之䇿亦作策二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之又作信與伸同觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐荀爽本作侑神矣故即以大衍究言之陽數九而乘之以揲四之數四九三十六此陽爻之䇿也乾有六陽則當有二百一十六䇿荀爽曰三六一百八十又六六三十六合得二百一十六唐一行謂揲蓍得乾則于四十九䇿中已得二十五䇿所賸者剛三十六䇿䇿者蓍之莖數曲禮所云䇿為筮是也隂數六而乘之以揲四之數四六二十四此隂爻之䇿也坤有六隂則當有一百四十四䇿荀爽曰二六一百二十又四六二十四合一百四十四二唐一行謂揲蓍得坤則于四十九䇿中已得十五䇿所賸者剛二十四䇿則祇此大衍五十而合乾坤所得之䇿二百十六一百四十四合得三百六十可以當三百六十日一期之數以十二月實計當有此數今缺者以朔虛則月不足也合上下二經六十四卦三百八十四爻隂陽相半所得萬有一千五百二十之䇿陽爻一百九十二每爻三十六得六千九百一十二䇿隂爻一百九十二每爻二十四得四千六百八䇿合之為一萬一千五百二十可以當萬物之數仲氏嘗曰禮羽毛鱗介祼蟲各三百六十則萬物應天時之數天官微星萬有一千五百二十則天象已先兆萬物之數萬物以盈數言而皆于四揲求之是四營求也而易儀已成十八變三六十八變而內卦又成以內卦即八卦之小成而引伸推類以及于重卦之大成所以顯其道神其德行而與神明相酬酢者即一大衍而天下之能事已盡于是也子曰虞翻曰諸儒皆以子曰為章首而荀馬又從之甚非至吳澄遂去子曰字移置前神矣下知變化之道者其知神之所舉正作不字為乎易有聖人之道四焉以言者尚其辭以一本無以字下二句同動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有為也將有行也問焉而以言其受命也如嚮虞翻本作響云震為響與巽命同聲相應故如響無有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地一本作下之文虞翻陸績本作爻極其數遂定天下之象非天下之至變其孰能與於此易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研蜀才本作研幾鄭氏本作機也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也以言尚辭者繫辭也虞氏曰聖人之情見于繫辭以動尚變者推易也陸績曰變為爻之變化正指移易以制器尚象者包犧神農黃帝堯舜各有其事如後所云也荀爽曰即結繩為網罟類而總見之于卜筮之尚占然則卜筮可少哉問即筮也命者告也神告之而我受之謂之受命如冠禮筮日宰自右贊命是也如嚮者謂相向猶言如對面也物即隂陽之物謂來事也三人相雜曰參五人相雜曰伍史記引周書曰必參而伍之注三卿五大夫欲更議是也錯雜也綜者三蒼訓云理經也謂絲縷制經可開合也筮法以三揲而得一爻五閏而再扐即參伍也虞翻曰五閏再扐以成一爻取扐之餘數而合計之乘除往復即錯綜也虞翻曰參天兩地以倚數夫物相雜而成文揲三變而成爻此參伍以變也剛柔相錯故曰文通三極之數以定天下吉凶之象此錯綜其數也六爻成則三極見故曰極其數韓康伯曰非忘象者無以制象非遺數者無以極數至精者無籌䇿而不可亂至變者體一而無不周至神者寂然而無不應斯蓋功用之母象數所由立故曰非至精至變至神則不能與于此也夫易之為易其旨極深荀爽曰伏羲畫卦窮極幽深其辭極變荀爽曰文王繫辭研盡幾微極深故通志極變故成務而統以一神該之故聖人道四而一在占概謂此也天一地二天三地四天五地六天七地八天九地十據前漢律厯志及衛元嵩元包運蓍篇引此下與天數五地數五一段相接則此應在大衍之數至再扐而後挂之下而脫誤于此者故李鼎祚亦云此大衍之數五十有五蓍龜所從生者程朱遂移至大衍之數之上則誤耳若虞仲翔注下文易何為句曰問易何為取天地之數也則謂先列此數而後發其義以闡大衍五十所以取數于天地之故並未言脫簡于此故陸績注開物成務句亦曰觸長爻册至于萬一千五百二十當萬物之數則就文觀義亦似可通者漢晉唐儒力衛聖經必不敢移易一字而宋人必毛舉而曲辟之何也子曰夫易何為者也夫易一本無夫易二字開物王肅本作闔物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢京房陸績虞翻本作工荀爽本作功聖人以此洗心退藏于密吉凶與民同患神以知來知以藏劉瓛本作臧往其孰能與於此哉古之聰明睿知神武而不殺者夫是以明于天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫夫聖道有四占雖一道而上興鬼神下開事物通民志以定大業莫切于此故如此而已無他矣蓋占筮之法莫備推易觀春秋史氏尚能理會故夫子三致意而惜乎後世之昧其法也蓍圓者蓍以七為數七七四十九象陽之竒竒則圓也卦方者卦以八為數八八六十四象隂之偶偶則方也如圓則徑一圍三而數竒方則徑一圍四而數偶理有然也六爻者變易而貢之貢即告也見韓康説然而無思無為何思何慮固已退藏于密矣而出其吉凶與民同其憂患而蓍神知來卦知藏往往來既未無不藴徹既作占筮之法以興神物而臨筮則又洗心而齋戒之是聰明睿知神武而不用刑殺者也夫趨吉避凶各知憂患又安所罹刑殺哉或曰鄭玄王肅干寶本俱所戒反則作等殺解不同是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神蓋本於乾坤而極於民用器與道對隂陽為道事物為器前已有通象器神等字而此重釋其所謂耳是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業此為揲筮三致意也夫祇一揲筮而本乾坤而全民用至于如是是故未揲之先合五十之數聚而不分有大中之道焉説文極中也屋極謂之中言不分于一隅也崔憬云捨一蓍為太極是也而于是分之為二以象兩則是太極生兩儀也李氏易解云祇四十九數而未分為太極分之為隂陽是也而于是揲之以四以象四時則是兩儀生四象也虞翻謂四象即四時是也而于是一扐再扐再變三變而八卦成焉則是四象生八卦也荀爽云四時通變為八卦之所由始是也夫如是而所生止八卦已哉吉凶定則大業即于是生而况其他矣所謂生生之謂易如是矣其不及挂一象三歸餘象閏者略言之也猶後文祇言象四時也舊以太極兩儀泛指天地則於易有太極易有四象兩易有不合一謂是伏羲畫卦時則畫卦是作卦本辭作作八卦不是生卦繫詞凡言生如生變化生吉凶生情偽生利害皆是筮卦非畫卦也二伏羲畫卦是由乾而坤而八純而因重以至六十四此夫子本辭自言之並無由一而二而三而四之法三見後太極祇中而不分之義而為圗為説聚訟不決此必不可為訓者四見後四象從來無解五見後且後文明云易有四象所以示也與下所以示所以斷同若指畫卦言則隂陽老少但畫時取資之象謂可以示世告世斷吉凶乎六豫初釋此節凡兩換稿已略有成説忽兒子逺宗字姬潢從南昌舟中寄書謂終狃習見恐是申言揲筮之意反覆舉似豫幡然從之然此亦祕旨不謂其遽見到此漢儒多以四象為四時然不解揲筮則四時安能生八卦今洞然矣若康成以木火金水為四象虞翻以男女長少為四象侯果以神物變化垂象圗書為四象總是不合至趙宋専龍陳摶先天圗謂老陽少陽老隂少隂為四象而世其遵之考隂陽老少仍是揲蓍所用與畫卦不同惟卦有動靜爻有貞變老動少靜老變少不變故立此數今畫圗者先以兩儀為一重一陽一隂則是而畫始非一畫也若又加一虛中夾畫于兩儀之前以為太極則又别一畫非畫卦也且庖犧未嘗有此畫也乃以兩陽兩隂作四象而以為二重夫老之與少並從已成之卦所推故乾為老陽非老陽而後乾也當庖犧作乾畫時雖有二畫然尚未知所成為何等而乃先曰此當為純陽之卦此畫為老陽有是理乎此説之必不可通者也乃作三重畫而并以乾兑離震巽坎艮坤一齊出之為八卦是一畫之後不必成乾已先作兑離諸卦之畫及成乾之後又不必繼坤而反以六子之卦成之坤前將夫子大傳所云成象乎乾效法乎坤與夫乾坤成列因而重之一索再索得男得女諸語顯然抵牾是敢于悖聖而以此解經真鹵莽之甚者也故先天之學創自魏伯陽而道家傳之豫有八誤辨見之卷首兹不更述特是九六七八數復不倫據崔憬立説謂三天兩地陽數從三起隂數從二起乃自三而五而七而九順數之則九為老陽為乾七為長陽為震五為中陽為坎三為少陽為艮自二而十而八而六逆數之則六為老隂為坤八為長隂為巽十為中隂為離二為少隂為兑而其後揲筮法出則計四十九䇿中揲四所餘但有九六七八而並無一四三五十二之數于是祇以七為少陽八為少隂而復以三四立法在純陽則三三成九在純隂則二三成六兩隂一陽則三為一陽四為兩隂而成七兩陽一隂則六為兩陽二為一隂而成八其所為老少者數有如此今既名老少而其為數則乾一兑二離三震四巽五坎六艮七坤八是既非大衍又非參兩又非扐三揲四而公然以此當老少之數是妄也又陳摶授太極圗并圗説于种放放授穆修修授周敦頥者其圗本魏伯陽參同契中坎離匡廓三五至精兩圗而隋唐間道士合兩為一名為上方大洞真元妙經品圗而唐玄宗有御製序冠于其端今所傳一圈一三輪一五行而又足以一小圈兩大圈者是也其圗説不知何人作意亦舊有之觀開句無極二字即參同契三寶章往來洞無極與玄宗序中寶號所稱真元聖主上方開化無極而龍而用之可驗也至若匡廓三五原圗真元圗并紹興間朱內翰子發所進圗其紕繆無理厯有考據詳見豫太極圗説遺議是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立荀悅漢紀立下有象字成器以為天下利莫大乎聖人探賾九家易作册索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大陸德明本作善乎蓍龜以故法象變化各有小大即知崇禮卑不過位分之間猶且以富有之業貴賤之等辨其重輕而况制器之尚象卜筮之尚占者乎釋詁曰亹亹勉也侯果曰吉凶未兆之事物皆勉勉然願知之是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圗洛王肅本作雒出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也是以天生蓍龜即神物加之以法象變化無不可法而可則又况洪荒甫闢神物初開河出馬圗山出器車其可則有不止于蓍龜者是其析乾坤而為四象所以示吉凶之意而于是繫辭以告之凡以為斷也所謂繫辭焉以斷吉凶也所以占也據竹書紀年馬圗出河帝王世紀河出龍圗洛出龜書而班固前漢志曰河圗有九篇洛書有六篇與鄭氏易注同相傳龍馬出河負圗九册神龜出洛負書六册蓋中古用竹板漆字上古未知何物若後儒俞琰以尚書有天球河圗共列東序謂即球石之類非也河圗與大訓對即書册也但孔安國劉歆班固王充諸儒俱以洛書為禹治河時所出則夫子引以為作易所則反無理矣考禹治河所得名為洪範九疇不名洛書觀書云天乃錫禹洪範九疇並不及洛書可驗也若云天所錫者洛書禹因而衍之始名洪範九疇則書又云天不畀鯀洪範九疇是以禹所更定之名而天反豫竊之也可乎餘見前大衍之數下易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又鄭氏本作有以尚賢也是以自天祐之吉無不利也此亦文言之脫于此者大有以夬之上六移為五六而與上以九是尚賢也順者五順上也信者五孚也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神則繫辭要矣然而繫辭者書也書亦有不盡言者繫辭而為書即言也言亦有不盡意者夫不盡則意不可見而易不爾也夫易未嘗不盡言不盡意也以立言盡意而凡卦爻之為情為偽無不盡也以繫辭盡其言而凡通之以利用占卜之以行鬼神無不盡也苟爽曰鼓動也舞行也以三百八十四爻動行相反其卦以盡易之神乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯一本作措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁一本作財之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行而特其所為意言不盡中有蘊奧者則藏于易之為乾坤虞氏曰緼藏也侯果曰淵奧也自乾坤成列而聚卦生焉向非成列則無以考其推移之迹而凡一隂一陽之謂道亦以為止此已矣息止也惟夫隂陽道也而聚之為形形上為道形下為器器即物也所謂物以羣分者也而于焉推之分之化裁為變推行為通夫變化而推行之非推易乎變化推行非即所云剛柔相推而變化見乎而况通于鬼神見于事業乎吾前已言之矣惟恐世之不得其言而又不能以明言一篇之中三致意焉吾前所云見賾見動因物成象立推法以作繫辭非不言也故曰繫辭焉而吉凶生也前所云言天下之賾言天下之動擬議之以成變化非不言也故曰剛柔相推而變化見也特其意則終不可見存乎默成耳德行謂有得于言而能見諸行者舊不得其解以聖人有以見天下之賾一段重見不合妄為改移烏知聖言之神妙如此仲氏易卷二十八
