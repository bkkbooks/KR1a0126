body:
  text: 仲氏易卷五翰林院檢討毛竒齡撰坎下艮上四易卦易臨初往上來觀五來二往又易升三往上來頥初往二來蒙亨匪我求童蒙童蒙求我初筮告再三瀆說文作黷瀆則不告利貞夫以卦言則艮為止坎為通下欲通而上止之是蔽也蔽者蒙也然而蒙必求其通是蒙亨也通者亨也第蒙自觀來者也觀以巽之九五觀上巽下坤降而為坎之九二是上固巽也而今易為艮下固坤也而今易為坎而互于震是此六爻中均為蒙䜿而五以艮之少男當蒙之最幼是童也謂之童蒙二以坎之中男而兼互震長男之任因之統諸蒙以受家政是主卦者也主卦者我也則謂之我顧非我求蒙蒙求我也何也以五來居二非二往居五也所謂禮聞來學未聞往教也然而蒙又自臨來者也臨以兌之初九臨上坤下兌升而為艮之上九是初筮時固兌也兌為口為說見說卦則因而告之宜也至于再則震固多躁二爻為互震之始而至于三則坤又善迷三爻為互坤之始震為决躁見說卦坤為迷見荀九家易是瀆也瀆則何告焉葢蒙之以養正為利者如此鄭氏以蒙為萌謂物之始生干寶以蒙于消息為正月卦為薺麥並生之候皆非正旨彖曰蒙山下有險險而止蒙張元冲傳眀晉府古本止上有能字蒙亨下無以亨字蒙亨以亨行時中也匪我求童蒙童䝉求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也夫蒙之能通者不惟坎為通也夫二與五皆中也觀能舍㢲五之中而趨坎中是時中也謂隨時處中未有時中而不應者也非强之使應志應也臨能虛兌初之告以實坎中是剛中也未有剛中而可瀆者也瀆則匪瀆我瀆蒙也是何也則以中者正位也以中而養中則正養也夫蒙以正養而蒙不通乎聖則無不通非聖功乎象曰山下出泉蒙君子以果行育德君子以剛果之行而行養正之德初六發蒙利用刑人用說桎梏以往句吝象曰利用刑人以正法也初者養蒙之始也養蒙之始貴以發之者通之夫發之而刑之可乎然而扑作教刑多施之童穉而長者殺焉故初為下坎坎為律見九家易則初之發蒙固有以律為用者所謂用則利是也第坎固為律為刑然又為桎梏見九家易夫刑以佐教則刑者擊蒙者也桎梏以錮罪則桎梏者困蒙者也擊則發困則不發夫不發則不通矣獨不有刑則用之桎梏則不用而可以攸往者乎則脫之乎葢初自兌來兌為毁為折故脫之夫脫之而後可以往雖曰歴險尚在前小歉耳小歉為吝虞氏易曰坎為法故又曰正法法與律同虞仲翔謂兌為刑人坤為用以坎為穿木震足艮手互與坎連故稱桎梏兌為脫坎象毁壞故曰用脫桎梏此又以互卦為解者亦通荘程傳脫其昏䝉之桎梏以桎梏作昏蒙之喻此用子解其桎梏語恐三聖不宜有此若孟子梏亡則梏作亂解謂之亂亡與桎梏不同九二包陸德明本作苞鄭康成云當作彪文也不可解蒙吉納婦吉子克家象曰子克家剛柔接也坎能藏垢二又當埳藏之間則凡為諸蒙無不在其度量中所謂包也第蒙本貿昧而加之隂柔則猶是蒙也而孺與婦兼之故二上兩剛既主蒙求為發蒙擊蒙之長則五為二應三為上應未免以嫗畜之情而通乎匹配其或稱納婦或稱取女宜也苐此所云納非汎汎而應之也又非以我之剛致彼之柔也夫貞悔陰陽誰不相配而此則二從觀來移觀之陽五而易為蒙二似乎出乎彼而入乎此者是納之也夫蒙而能包吉矣乃以包之者而復為納之又吉矣是何也則以授室者即承家者也故曰此克家之子也此主器者也是非孺子之愚與婦人之暗所能間也夫孺與婦皆柔也以一剛為諸柔之長而包之又納之自非剛柔接而何以有是六三勿用取女見金夫不有躬无攸利象曰勿用取女行不順也夫蒙自頥來又自升來者也以升之九三而易為上九是前之上六固為我所取女也而今勿用矣閩黄宗伯道周招姜司徒一洪入閩得此爻曰妄動之婦将不為人所取矣何以行為道周曰非彼勿取我我勿取彼也夫我不取彼而不當往耶葢三為上應我剛彼柔則我将取彼而以我之剛而易彼之柔則彼将取我然且升本互兌兌少女為金而艮當少男正金夫也不幸兌易成艮若欲見金夫之美因甘變躬之九三而不之有何其蒙乎則安所利乎夫坤順也身本上應而今復為他所有是既不能取又不能嫁逆矣何順之有六四困蒙吝象曰困蒙之吝獨逺實也四于互為震之終于上為艮之始介動震止艮之交而不能决是困也夫剛中者實也坎中滿也而四處衆虛之中隔于三而不與之比是逺之也此非衆逺之獨逺之也王蒙曰卦凡四隂而初與三為二比五為二應故惟四為獨逺實六五童蒙吉象曰童蒙之吉順以㢲也鄭註㢲當作遜以少男居尊位而惟剛中之是應是順且㢲也順者臨之坤㢲者觀之㢲也陸績曰六五隂爻故蒙以體艮少男故童蒙上九擊馬融鄭𤣥本皆作繋字形之誤蒙不利為寇利禦寇象曰利用禦寇上下順也四隂皆蒙而惟二與上以陽剛而為發蒙之人第二以中正而為包容上以過髙而行擊斷兩陽相搏而分峙之勢成焉夫上以剛爻而居艮首艮為石見說卦是以石投水有似乎擊蒙然者雖曰坎為盜為寇見前當擊之顧坎以剛中而為發蒙之長是主人也主寇不兩立彼為主則此為寇為寇何利焉或者從而禦之斯已耳夫剛而不中則上不順擊蒙而不能養正則下不順乃以一坤夾兩陽之間二上兩陽爻夾三四五隂爻為坤而上陽以擊發而比于刑下陽以包荒而為其所養則祇一相抗之間而坤之為順上下皆見夫亦以蒙亨無方以㢲育德者固其常而以剛出險者亦其變也是皆求通之法也乾下坎上四易卦易大壯四往五來中孚上來三往又易大過四來初往大畜上來五往需有孚光亨貞吉利涉大川歸蔵易以需為溽鄭康成又讀需為秀云陽氣秀而不直前者畏上坎也然不知所據彖曰需須也說文需須也即待也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利渉大川往有功也石經位乎作位于養蒙必有待需之序也健于行而險在前需之由也第需則漸進逺險安而近險危此言内卦而需必出險剛可陷而柔不可陷此言外卦則此卦四陽固為隂主而一陽正中當又為諸陽之主故躁動叵測遲重可信卦義固然而以象言之則兩卦相合中有虛契便為有孚仲氏曰孚者剛柔相合彼此心信遙應而帶心象者側合之孚隨睽萃升之孚是也一卦而兩心相叠者正合之孚坎離中孚是也况中心可信則皦然坦白合互離上坎日月交互之際而日月並而光自生非光亨乎若夫貞則天位正中正則必吉不待言也且夫坎之在前也人第以為此險耳不知徐視之實川也險但以不陷為義而川則又以利渉為功有如此之孚且光孚光且貞而尚患涉乎忠信可行昧險無渡詩曰忠信涉波濤又公無渡河刺昧險也利害與功過瞭然矣蓋此卦凡四易一自中孚易三作上則向為正合今為側合故有孚象一自大畜易五作上則向為大離今成正離故有光象一自大壯易四作五則向一剛中今二剛中故有貞象一自大過易四作初則向為大坎今成正坎故有涉川象虞翻曰大壮四之五蜀才曰此本大壮卦九四升五皆四推之一也象曰雲上於天需君子以飲食宴樂雲升于天而雨未降亦需也干寶專主此說此需之别義飲食宴樂以九五言張杉曰需無所事則飲食宴樂而已此處需之法初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也郊尚逺于水未犯險也况初九在大過為初六體當大坎則其遇坎難固恒事耳常與恒同九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也鄭氏易沙作沚孟喜本沙下有衍字九二當互兌之始兌于地為剛鹵見說卦即沙也兌為說為口舌見說卦即小有言也夫沙者水石之交瀕于水矣所恃者二位正中其為寛衍猶在耳楊慎曰衍者寛平之地左傳有昌衍漢書有鄜衍皆此義若兌之為說小有人言進前即離矣謂互離離即致譽何患不終吉九三需于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也鄭𤣥王肅本寇俱作戎泥則見水矣需遲之久覬覦必生况坎險逼臨原屬寇盜見前而身處互離以負垂而當兵戈之間離為兵戈見說卦則外至之災豈止泥中然而不敗者九三在中孚為六三孚合之誠自能敬慎敬慎者不敗理也六四需于血出自穴象曰需于血順以聽也坎為血為穴見說卦及諸家易此在坎中矣陷于血或姑聽之若夫穴則尚須夫出之者耳坎為耳故有聽象九五在前即出險者也需至三四皆有不能姑待之意然無大災者需故也金汝白曰四上為坎之二隂故皆言穴猶坎卦初與三皆言坎窞是也九五需于酒食貞吉象曰需于酒食以中正也五一易自艮一易自兌由兌口見前艮手艮為手以入乎互離之復離為大腹俱見說卦是酒食也夫以酒食為宴樂在國家則釃酒速客以俟升平在士君子則飲醇自放以全患難此最善于處需者所謂中正之需也故貞吉干寶以需為坤遊魂之卦故曰坤者婦人之職也凡百穀菓蓏禽獸魚鱉皆為所生而遊魂變化復能烹㸑腥實以為和味之具虞翻謂坎水兌口為飲變體噬嗑為食哀苟爽謂五互離坎水在火上酒食之象按春秋傳九年宋公伐鄭晉趙鞅救鄭陽貨筮之遇泰之需曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也若帝乙之元子歸妹而有吉禄我安得吉其云帝乙歸妹則秦之五也其云有吉禄則需之五也酒食為禄貞吉為吉禄上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也坎陷之極竟入穴矣然猶以身居險中效九五酒食之需請召賔客則客誰至者惟前此三陽漸進不召而來雖極濡滯亦應至此此當需極而進進而出險之際而猶泄泄燕樂柔弱不振所謂需者德之賊也語見左傳故曰此剛中之事指九五爾非其位也然而不大失者以需也彖曰剛健而不陷正在此時以此時在利涉不在需險耳其言敬者以上六自中孚來與九三言敬正同此又望九五以出險之事坎下乾上四易卦易遯三來二往中孚初往四來又易无妄初往二來大過三往上來訟有孚窒惕中吉終凶利見大人不利涉大川九家諸易皆以中吉作句今以中句作鄭氏易窒作咥覺悔貌馬融云讀躓猶止也彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也内險而外健所以訟也第訟多虛辭而易逞暋不知畏而究極于不可止是必孚以窒之惕中以息之而後訟不成而不至于凶今訟所自來一自中孚中孚本正合而改四作初中虛稍實然其側合者自在也正合側合見前則有孚也一自无妄无妄以大離而近噬嗑訟口善噬而今以剛横坎中是塞也則窒者也一自大過大過體大坎坎為憂為勞見說卦而今易三上而坎仍見焉合大坎小坎而憂見于中是惕中也一自遯遯三上俱剛三上為兩卦之終而健不可止必致終訟今以三易上而上下相應不成不終是吉也終則凶不終則不凶也故訟雖凶德而反加以吉以諸卦所變無非剛來得中者耳若夫三乾在上而剛中元吉大人見焉一坎居下雖為大川而壅而成淵不利涉焉夫大人在上而可以訟乎大川不利涉而訟可終乎侯果曰大人謂五也訟是隂事以險涉險故不利蜀才曰此本遯卦象曰天與水違行訟君子以作事謀始健險成訟一義天水違行又一義天左旋水東注見九家諸易此違行一義天上浮水下流見陳氏捷解此違行又一義夫天爲三才之始水為五行之始故法之見王畿說所謂有德司契而訟自息者謀始焉耳見王弼說初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也此初作訟人少不更事者但初本中孚之兌兌為說見前則烏能無言所恃者互離在前一辨即明耳離為明六爻自九五外皆訟人也然皆曰吉曰終吉豈非以不終故即按後漢永元五年梁相訟節王暢不道暢上疏謝詔曰易不云乎雖小有言而終吉亦指不終訟言九二不克訟歸而逋漢諸家易皆以此句今不從其邑人三百户无眚象曰不克訟歸逋竄也自下訟上患至掇也此健訟者也二以剛爻居坎險之中此真健而險且得位者則其為訟主固也但三剛在前何能訟勝至訟之不勝而逃坎為隱伏故逃逃而至盡破其諸家之産一身逋負而不能償其亦至不幸矣然而猶無大災者不終也坤為邑見諸家易下二坤即其邑也三百戸者合三爻言之是通一邑之戸也凡逃亡而負人之物者曰逋是人健訟預斂諸邑之所有以訟而不勝而逃遂至逋負眚災也書曰眚災肆赦謂以不幸致輕罪者而今既已逃則并其輕罪而无之坎為眚見說卦二能以剛中出險故无眚葢此九二一自无妄之震來震為言為動則訟然又自遯之艮來艮即止矣則不終訟不然以下訟上患如掇拾豈能无災乎大抵易例以陽為七以隂為十若汎及數目則皆稱三以爻數在三如三品三狐三驅三錫類荀爽謂坤有三爻曰三百戸九二為下體之君君不爭則百姓无眚矣蘓軾曰二逋則其邑人之三百戶无眚矣此皆以无眚屬邑人言六三食舊德貞厲終吉或從王事无成象曰食舊德從上吉也三一由初易祇訟黨耳一由上易則雖亦訟黨而尚為我應且能以乾剛而據髙位是我所自來之處即舊德也今我忽為二所脅而将上訟有似乎食其德者食如史食墨書食言皆噬没之意故食蝕同又吐而復吞曰食左傳伍員曰後雖悔之不可食也漢外戚傳妬而相噬曰對食悉以敗創毁蝕為義六三忘其舊德似欲銷没其生平而與上讐訐此又一訟也然上不可敵而三當互㢲之中㢲為順為從則貞以固守而厲以惕中改心從上則上終為我所應所謂從上則吉者且此一訟人大非逋逃戸中人也身當坎極位在離腹此出險而能眀之際而坎為勞卦三又終位則又有從王而可成之幾是雖係訟黨而或從王事容亦有之然而無成也成則有終吾懼其以終王事者終此訟也總以終凶之意處之葢初為始事三為終事俱就爻位言之特既係訟卦則但當慎始不當成終故象如此此爻舊德舊字與彖剛來來字若非推易則夢囈久矣此皆辭之當玩者九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也四從中孚之初陽入居互巽要其初實正㢲也正㢲互㢲無非順敬亦何一可用吾訟而無如其據剛爻而處隂位也則此亦一訟人矣第此一訟人近尊而有應力能出險斷非終訟者故訟既不勝則必返而聽命曰渝矣吾改行矣是已安于正而何勿吉焉即就也謂俯而就聽訟者之命因㢲為命令見虞氏易返復柔巽則将有聽命之象渝變同有謂命為天命則與㢲為命令不合且即命曰復専指㢲命侯果謂初既辨眀則四為妄訟故須變其訟命亦未是何楷曰渝如春秋鄭人來渝平之渝謂變也九五訟元吉象曰訟元吉以中正也大人中正以聽訟故元吉王肅曰以中正之德齊乖爭之俗上九或錫之鞶王肅本作槃帶終朝三褫鄭氏易作拕謂得意而頻拖之也又一解之象曰以訟受服亦不足敬也上從大過之三來改陰成陽化大坎小兌以成一乾訟勝之人也然而乾為言為衣故當以訟勝受服見九家易并侯果說而互離為腹為革則其所受服或有似乎鞶帶者見說卦及唐氏易鞶帶大帶也奈上應在三三處離中而以離火尅上乾之金雖則錫之必将褫之葢其訟多端故褫之亦不一也夫初固畏罪三亦悔非惟二四與上三陽互結而一以不勝而逋逃一以不勝而歸命惟此獨陽陽受賞束帶自得而又傾刻而奪之奪之不已至于再至于三訟庭之褫辱于衣赭然則訟亦何利乎可以省矣翟𤣥曰三陽皆剛交爭不譲各一奪之為三褫則九五為聽訟之主列作諸陽不合坎卞坤上二易卦易剝上來二徃復初往二來師貞丈人李氏易解作大人誤吉无咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣夫以坤為田土為國邑見說卦及諸家易而險即存乎其間謂坎在地中似乎畫井里而藏兵甲如所謂寓兵于農者古之師也葢師者衆也坤衆水亦衆見白虎通而坤為大輿震為小車坎為弓為輪俱見說卦及諸家易皆有兵象且以一陽綂五隂與古者五人為伍五伍為兩二十五家為師之說又復相合見熊過說况九二一陽獨尊為衆陰之長凡兩變而成一自復來復之震長男也一自剝來蜀才但言自剝來而不知有復便不能盡合剝之艮少男也今又見為坎坎中男也以一爻歷三男而在復為長在剝為髙位之長今在坎為互震之長則無往非男無往非長儼然一丈人矣陸績曰丈人聖人也鄭𤣥曰丈人長人之稱若子夏傳作大人王者之師此是偽書而李鼎祚遂謂丈人者大人之誤妄矣揚雄太𤣥衆首擬師卦者其贊曰丈人摧挐正取易丈人之稱誰謂古本非文人也丈人者帥師之人其陽剛而中五復得應自能出坎險而遇坤順所謂秉軍正以正衆而衆因以正真王者之師也夫毒荼苦也五刑之用斬刺肌體六軍之鋒創殘城邑皆所以荼毒天下之具也見干寶說而民能從之則戡暴亭毒詩曰亭之毒之毒藥雖攻病而可以活人天下歸往吉又何咎焉象曰地中有水師君子以容民畜衆陸績曰坎在坤内故曰地中有水師衆也地中衆者莫過乎水容民畜衆地德如是井象亦如是古者師出于井井以容民而師畜其中故曰畜衆管子作内政以寄軍令亦即此義初六師出以律否臧凶象曰師出以律失律凶也坎為法為律而初自復來以震易為坎而師象成此出以律也然而非其位也否也否則恐失律雖臧亦凶矣此李鼎祚說黄鍾為律本而位乎坎故坎為律史遷作律書以十二律與兵事並言即此義按春秋傳宣十二年邲之戰智荘子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤不行之謂臨有帥而不從臨孰甚焉必有大咎此亦解易之法大抵師律不一如甘誓攻御牧誓步伐周官司馬法坐作進退有常魯侯誓費出師馬牛臣妾勿逐皆是也見捷解而此獨以順成為律重從主之義以五爻皆坤坤為順為從而邲之戰則又以不從主令見敗故以此說若其爻主動變則以師之臨是初陰變陽坎化為兌故云夫師本五陰為衆而今變其一則衆散而弱矣師本坎為流水而今變為兌則川壅而澤矣况師本復之震來震為行為動而今化為兌兌則不行不行之謂臨臨則不從而致敗其解斷之法一如仲氏之為易漢晉大朝猶能僅存其大概而今盡亡矣故略識于此以見遺法若其并入化象者則原非占筮但連類及之故如此儻僅解初辭則師散川壅不宜豫見漢晉諸儒亦有錯雜解入者則何爻無變其說亂矣此書不取卦變但以成列分聚之例溯所自來而其辭並騐與占變之說大不同觀者詳之九二在師中吉无咎王三錫鄭氏本作賜字形之誤命象曰在師中吉承天寵也王三錫命懐萬邦也剛中主震帥師之人也然禮任不隆則上既失寵而下必不從今二在師中而六五應之錫命不既多乎師中即春秋傳所謂将中軍者以二位正中故以為象周禮一命受職再命受服三命受位大抵錫命以三為度而此則從長男少男以至中男兼長而合為文人一若至再至三者是在上得天在下得民承天寵而懷萬邦吉何待言卜子夏曰王者天下為念用兵非以怒也平寇非善䇿也三錫命非私也懷萬邦而已受又曲禮一命受爵再命受服三命車馬六三師或輿尸凶象曰師或輿尸大无功也中為次舍三過中不當乃乗剛而為出師之佐上下無應此偏裨致敗之象也坤震坎皆輿見前而坤又為迷為死見諸家易全坤在前震動致喪則敗而輿尸有何功焉輿車也尸陳也程傳以輿尸解作衆主蘇氏傳亦然蘓程同時此必宋人早有作是解者夫輿人輿皂祇指下役即左傳輿人誦亦然自後人偶去人字祇稱輿誦遂有以輿訓衆者若尸從卧形陳是正義故死人稱陳人即毛詩誰其尸之亦是陳設祭物不必季女主祀也若左傳有作主字解者亦後人借用字耳三聖行文豈得兩字俱用别義且三聖未必讀左傳也况師中輿尸正冩凶象何等儆動若作衆主與象何渉以衆指三三不獨受以衆指衆何必在三且師者衆也若輿又訓衆則衆或衆主矣况同一衆字而長子帥衆則曰師弟子衆主則曰輿且弟子即衆也既弟子又衆其于修辭之義謂何六四師左次无咎象曰左次无咎未失常也春秋傳三宿為次左次退舍也三十里為一舍兵家尚右故以退為左如上將軍居右偏將軍居左類又八陣圖以前衝為右後衝為左亦同今四不及中而五上為右則已為左大抵兵法有可殺而不可使處不定能度德量力則退不為怯此皆兵法中常度故曰未失常六五田有禽利執言郭京舉正謂王弼本作之以行書向下引脚似言字遂誤今按王原本並非之字郭氏妄誕多如此无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也蒐狩征伐皆師也田有禽者為民除害也利執言者有罪可聲也化坎豕于坤中是田中害稼之禽也互兼畫之大震即聲罪致討之衆也葢震為鼓又為厲言故也然而師出有名則必擇将若能用長子坎智淵深震勇奮起老成諳練無忝帥師如其不然則諸柔皆弟子也暗不更事萬一以剝復之來而誤任之則伏震車之軫而尸以歸者必是役矣然則中行之使其可忽乎哉上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也此用師已畢論功行賞之候也大君謂王也開國封諸侯也承家立都邑也見干寶說或析土地或定采食皆指丈人言文人有功則正之若小人諸柔非失律即輿尸勿用之矣用之則亂邦矣葢坤為國邑上為宗廟見諸家易命將獻功皆在此地如書所稱用命賞祖頌所稱獻捷告廟者况上在剝時本為艮陽艮為門闕見說卦正屬廟象所謂衆正而可以王者至此始見若以專位言則隂柔已極暗迷無應否臧渝次總是小人但順極不抗定無他咎則其分亦止于勿用已耳此以汎設王命兼專演之辭另一象例正功專指帥師言勿用專指小人言本文自明諸家易既雜錯無實指而程傳本義謂小人雖有功亦勿可用但優之金帛禄位夫既是小人失律輿尸何嘗有功乃忽以小人攙入正功之内固已竒矣乃既已有功則勿用難解于是又添以金帛禄位試問此金帛禄位在三聖辭内幾曾有此且又多為囘䕶謂金帛無礙若禄位則當如殷設三監虞設庳吏之制使不得自便此等補救從何說起至朱子語録則又云開國承家是公共的小人勿用是勿與謀畫如光武功臣在左右者只鄧禹耿弇數人則又并諱其金帛禄位之說竟将小人亦攙入封國之内而第云勿使謀畫則不知此等優典在易從何處看出真不可解矣易通曰開國承家實是兩事師中錫命不必一人雖丈人帥師而取勝克敵與論功行賞是豈一人所能為不必曰九二開國則承家無人定當屬之初三四上也初三四上是小人斷然以勿用絶之所云正功者亦第從九二正之而凡有功者自在耳仲氏易卷五
