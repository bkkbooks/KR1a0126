body:
  text: 仲氏易卷二十一翰林院檢討毛竒齡撰離下兌上四易卦易遁上來初往大壯二往五來又易大過二來初往無妄上來三往革已日乃孚元亨利貞悔亡彖曰水火相息説文作熄二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉革者兵也更也離下火鍛乾互兌上之金以為兵或以離火革兌澤熟物為言則侵鼎象矣而觀者因之得更革之義以為兌當毁折改象生焉獨夫子為傳則不然夫子曰昔者文王之序卦也以反對為法顧反對有三以義對耶則革與鼎對曰革去故而鼎就新也以畫對耶則革亦與鼎對曰離畫同而巽兌倒也獨不曰有卦名對乎澤火之革對之為火澤之睽吾即以澤火火澤為睽革較觀夫猶是水火猶是水火之二女而睽止相違革至相蔑則以睽為火澤火炎上而水潤下相違而已而革為澤火澤之潤下者必及火火之炎上者必及澤相搏也已而相息息與熄同即滅也俗儒以相生回護則五行生尅尋常有之此處不及耳二女亦然夫二女同居本皆失志而睽中女上而少女下長少不紊猶不能無同憂相恤之心至于革則女兄在下女弟居上孤嫠既不堪而復以晨夕先後短長錯忤之細相對詬誶其勢不至于不相得不已此夫子為傳所以獨取睽之水火二女與革相發明以為卦固有反觀焉而可反見若是者也若夫彖之演革則不問水火不問二女且不問兌金與兌澤而祇以革論則將欲革之必先孚之天下無不信于人而可言革者夫庚者更也更革之義也以十幹言之則先于庚者己也甲乙丙丁戊己庚辛壬癸庚欲革必先之已日而乃可以革六二已日乃革之庚欲孚必先之已日而乃可以孚乃孚乃革俱只如此若漢晉儒者皆作已革之日解固于爻詞已日乃革有礙若謂已日乃十干之後半與已日為庚後之十日俱以不急革為言則過于紆緩反非正旨如以火之革金中有已土故夏火秋金必隔戊巳離火兑金必隔坤土則調和之説非革義矣諸説非是所謂事必豫而後有立者況己位在中于德為信革而信之其藉于己者正多也如第以卦言而下離文明上兌順悅大亨以正此夫子改定斷語必不可雜入乾元坤貞諸解所謂畏聖言也則革之而當與革之而信無勿同者蓋天地革而四時成乾坤變而為巽互春木離下夏火為兑上秋金坎體大坎冬水也湯武革命順天而應人大壯之二升而順乎天五為天道無妄之上又下而應乎人也三為人道夫庚必先己固已豫定之為革之時而不知革之時大復如此象曰澤中有火革君子以治歷虞翻李鼎祚本作厯明時作厯授時凡作訛成易寒暑晝夜推遷遞代皆革也俗儒止以更定嵗差為言失全義矣初九鞏用黃牛之革象曰鞏用黃牛不可以有為也初未當革時一若有物束之者所謂鞏也説文以韋束物為鞏第鞏用韋束而初居離剛即用離牛之剛革而黃其色者離為牛剛其革也黃者黃離色也於以為鞏則既堅且韌而急不能革故曰此不可以有為者特革者革也獸有皮而改去其毛因以名革則牛之為革正革象之所由名而特其所革者皮焉耳初易自大過以二改初故雖革而不革如此六二已日乃革之征吉無咎象曰已日革之行有嘉也二未革而位處離中離為日納甲在己此正彖之所謂已日者夫革之必先庚而乃可孚者此己日也向以為庚日為更主更革之義必庚日乃可為革已日第孚耳而以今觀之庚也乎哉必已乃革之所謂以不革為革者他日之革具此矣二易自大壯以五改二則五本二偶故曰有嘉嘉者偶也凡卦中言嘉皆二五應如隨之孚于嘉遁之嘉遁皆是見何氏訂詁九三征凶貞厲革言三就有孚象曰革言三就又何之矣三則將革矣顧位當改卦之交兩宫相隔未可頓前且三四五三乾遞行身雖乾健不能越四五上行則征之見凶固無足怪第乾為言見九家易三乾雖遞行而我為乾始則先行而發之為言于是有所謂革言者夫猶是當革之令約之與父老更始而既下為令未下為言則時苟未至當必有令未下而言先就成也者然豈易就哉乾之言以乾成之人第知九三之言從革始耳而不知有成于先者當在遁時為下卦互乾之一是今之乾以遁之一乾成之其就一在大過時為下卦互乾之二是今之乾以大過之二乾成之其就二在大壯時為下卦正乾之三是今之乾以大壯之三乾成之其就三夫祇一乾言而歷乾之一與二與三而後得以冀于成其中外之相夾前後之相信有如此者如此而猶有未孚焉又何之矣三就多作就正解則本文無正字不合若禮器繁纓一就注疏以五采一匝為就此與士喪禮馬纓三就解同何氏訂詁以其有三就字即引為據則尚書五宅三就亦應及矣亦或以三就指本卦三乾言則三居一乾較少一就未妥無又何之矣猶言走逗處也九四悔亡有孚改命吉象曰改命之吉信志也四已改卦且又當兑金方革之初故不曰革而曰改改者革之至也但合卦以三四為中四又為互乾之中中可為主且以推易言五爻皆改而獨此九四一爻合遁壯大過無妄而並無一易不易者又改易之主故革莫大乎革命而即以改命二字歸之傳所稱改物改命非歟夫互乾為言互巽為命而此云改命則天命之命當又在文詞誥命之外與彖之所云湯武革命者正相合是非孚乎人而信乎志不至此彖重有孚而象凡三乾之爻三稱有孚則尊乾可知況四又乾之中乎又卦自二至五為大坎凡言志言孚皆坎象九五大人虎變未占有孚象曰大人虎變其文炳也九五大人則又兼創繼而為主者故改命之後益復創制立法更朔易服考車書而定禮樂其乘乾嚮離文明飾治如馬季長所云周公修文德者因不名改而名變以為變則并無改之迹也第五以乾金合兌金之陽而易從壯來往來皆兌大壯五為互兌則虎為金獸而宿在西方正與乾兌金行位西之象相合然且毛文烜燦如變化然夫黃牛之革去其毛而不以為改此革猶不革也虎豹之皮華其文而即謂之變此不革猶革也況乎已日乃孚不在革後九五有孚斷之未占此又合革言之孚與改命之孚而歸于一者故曰此大人之業也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚説文作斐也小人革面順以從君也至于上六則鼎革既定創制復新賢者識大不賢者識小天下孰敢或外其化理者故以遁之上九而變為此爻則肥遁之賢誠君子也肥遁遁上九詞君子而豹變被虎餘文作國華焉以無妄上九而改為此爻則行眚之夫本小人也行有眚無妄上九詞小人則革面回面嚮化不止革心焉革至面則心可知矣俗釋革面不革心非是然而更創之後務在休息張而不弛盛世所忌動則凶居則吉上六兌脫象固如此夫非常之舉更革之行可以處變而不可以處常惟可處變故當其未革雖用黃牛之革而猶厭其固惟不可處常故及其既革則雖虎豹炳蔚偃然文治而猶恐其遽動時使然也揚子雲曰貍變則豹豹變則虎陸公理曰陽爻稱虎陰爻稱豹虎大而豹小王湘卿曰虎文疏而著曰炳豹文密而理曰蔚巽下離上四易卦易遁五來二往大壯初往上來又易大過五往上來大畜初往四來鼎元吉程頤本以吉字作羡文本義作衍文皆無據而元吳澄本明季本本竟從而刪之何其妄也亨彖曰鼎象也以木巽火亨亨烹通字下亨以大亨俱同飪也聖人亨以亨享通上帝而大亨以舉正無而大亨三字謬養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨以巽木炊離火而夾乾金兌澤于其間二至四為乾三至五為兌故知演易亦早有互卦矣則謂之鼎而夫子曰此象也鼎有足有腹有耳有鉉而卦文俱象之下畫偶似足二三四畫竒皆中實似腹五畫偶似耳上畫竒似鉉如第據卦名則以木巽入也火不過為烹飪之用已耳然而烹飪匪細事也古人造鼎所用惟祭祀賔客二事而祭祀以享帝為大饗賔客以養聖賢為大故烹人掌鼎其享上帝大抵煮牲體于鑊既熟而脀于牲鼎已耳九家易曰牛鼎受一斛羊鼎五斗豕鼎三斗皆三足天子飾黃金諸侯白金大夫惟羊豕二鼎飾銅士惟豕鼎飾鐵而至乎養聖賢則饔飱牢醴水火調劑當具品物故享帝曰烹養聖賢曰大烹禮以簡為貴而情以繁而浹用有多寡而事無隆殺以為烹飪之所司固如是者且夫彖之稱元吉亨也非謂乾元之德必得吉而後能通哉夫事神饗賔以致福為吉而旦明自治即又以作德為吉今所下見者祗巽耳而上離為目目既能明且復以體當大坎自一至五為大坎藉坎耳坎聰而周通于上下之間將書之所稱亶聰明作元后者誠不是過乃以大壯之初柔升之為五而進而上行以遁之六五易之為二而得中而應乎剛此即古王定鼎改易神器所謂以德不以物傳鼎不傳璽者悉見于是是雖乾元之德不并言吉而胡勿亨焉象曰木上有火鼎君子以正位凝翟玄本作擬命林栗曰位者木火之位置也蘇軾曰革以改命鼎以凝命初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也卦以初為足況巽股兩開如雙趾然則以象鼎足固其位也第初以大壯之上柔大畜之四柔易而為初則其為趾也皆從上卦倒易之是倒而為趾即顛趾也夫鼎趾亦原有可顛之理以為鼎之未實則必先顛之以去其汚凡祭先一夕溉鼎滌濯則倒趾向上以傾其穢積所以致潔也故以新舊之迹言之則因新却舊謂之出否否惡也猶汚也雜卦鼎取新也以卑髙之位言之則由卑居髙謂之從貴繫辭卑髙以陳貴賤位矣髙貴卑賤出否從貴則雖顛而猶未悖蓋初在巽陰巽為順勿為悖耳且夫鼎也者烹飪之器也有其器將必有主其事者間嘗因巽離二女觀其所主則初本巽陰巽為長女而以顛趾之象求之實倒兌陰也因顛及倒則得妾得子皆有實落從來夢夢夫以大壯三五之兌與大畜二四之兌皆兌也而皆易之為倒兌之陰兌為少女為妾是自此一易而欲得一主飪之人者今第得其妾求主得妾頗為顛倒乃革之與鼎無非女索並無有三男之形見于上下而大壯之兌與長男相互上震長男與兌合四五兩爻大畜之兌與少男相互上艮少男與兌合二四兩爻得妾而并以其子有如母以子貴者是得一主事者而主器之人并得之又何咎也夫顛趾非為利而出否則利烹飪非為子而得妾以子鼎也而家人之道備焉蓋鼎與革以卦畫反對其與家人則又以卦名反對一風火一火風此與革彖之不對鼎而反對火澤正同火澤睽澤火革鄭康成解是爻謂足所以承鼎喻君夫人之事君若失正禮是踣其為足之道則當以和義出之以和即利字之誤如否者嫁于天子雖失禮無出道似以出否出字為大歸之出則廢逺之而已坤為順又為子母牛在后妃之旁側妾之例有順德子必賢賢而立以為世子何咎按此甚難解漢儒説經甚不易得況王學既行鄭學全廢易木書此愛不忍釋因附此以質解者九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也二當鼎下腹而得陽爻則中實第二從五來大壯之五剛為二所易則五者我匹也仇匹也子夏傳君子好仇今已居離中而伏坎位之病于其心是有疾也有疾則焉能我即哉夫鼎在烹飪既失主飪自當慎所之人之不來兮終無尤兮此亦以家人之象而反對及之九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也三當下卦將革之時又鼎制凡鼎既實則以鉉貫耳而扛近食前儀禮所謂扃鼎是也若未實則撤鉉脫耳謂之耳革今二中有實而未盈四則盈實而兹尚未逮是三亦猶在耳革之際夫鼎行在耳扄其耳將以行也乃耳之既革如漢五行志云鼎以耳行耳革則行塞虞氏易曰鼎不以趾行而以耳行耳革行塞故失其義則其不可行豈顧問哉第祗以鼎觀上離為雉離與三不相及而三居互兌之足越卦而上又不及口故雖升雉于鼎可以為膏而亦不能食古膏以雉為貴如天問彭鏗斟雉類膏者汁也一似違水火之宜亡烹飪之節所云失其義者義者宜也節也而以觀乎行其為行塞祗以三在三乾之中乾為行而蔽于兩乾故塞之也此與革四征凶正同然而三又在大坎之中且又在顛倒兩兌之中坎為耳而兌革之坎為雨而兌又缺之變之夫行之方雨所以阻行而塞而能缺塞而能變此又耳之所可行而虧與悔之所為未盡失也兌為缺虧缺也見夬卦悔變也見乾卦故終吉也九四鼎折足覆公餗其形渥舊本或作刑剭鄭玄本渥亦作剭凶象曰覆公餗信如何也四當鼎既實之候而復以乾剛居之剛則必盈盈則必覆而特此乾剛者本大畜初剛所升而初則自安于柔而為之足則四之過剛夫亦初之過柔致之故曰其覆也非鼎盈也折足之故也此豈四之好移辜而初之甘受過哉亦曰初固四所易而非有他耳且鼎實維何公食之餗也李鼎祚曰四為諸侯上公故曰公餗鄭康成曰鼎三足有三公象餗者美饌具八珍之食公餗既覆則全鼎之體尚皆淪濡而況乎足之僅在初也夫趾虛不折則顛不及覆耳實既革則塞不致折今果如何矣言不意其至于是唐李綱在隋仕宦不進筮之得鼎曰君當為卿輔然俟易姓乃如志仕不如退折足為敗綱後顯于唐數稱疾辭位去韻志退敗皆叶字按其形渥謂鼎覆則全鼎淋瀝其形渥如此演象至切處舊有作其刑剭者釋文剭重刑京房云刑在頄為剭又周禮司烜氏屋誅謂所殺不于市而以適甸師屋讀如其刑剭之剭則剭本與屋同其後新唐書元載以罪誅傳贊引此謂即司烜氏屋誅之刑則舊早有作剭解者實字形字聲各相傅會之誤宋朝以道作偽古本周易改作刑剭而本義從之不知漢谷永傳又有以刑剭為刑渥謂加以厚刑則同刑字而剭與渥又不同將安從焉六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也五以偶畫居鼎端象鼎之耳而其爻固離中也離有伏坎坎為耳黃離中色而貫耳有鉉所以關舉此鼎者説文云鉉舉鼎具馬云扛鼎而舉之也儀禮謂之扄周禮謂之冪金亦黃色也五耳非實鼎之地而亦曰實者二為五所易遁五之剛易居于二是二之所有亦即五之所有也故二曰鼎有實而五即曰中以為實此猶彖之得中而應乎剛者雖無實實在其中焉上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也上一畫則正關鼎之鉉也橫關于耳以舉鼎者顧鉉為耳設不能離耳故五有黃耳而鉉即及之今無耳而亦言鉉是豈一鼎有二鉉哉耳可兼鉉而鉉不可以兼耳猶之金可兼玉而玉不可以兼金玉不任為鉉必金為之而飾之以玉曰玉鉉故五曰金鉉則兼言鉉也而此曰玉鉉則又兼言玉也蓋剛柔之際尊卑繫焉剛尊而柔卑則剛用柔柔尊而剛卑則柔反藉剛今五上相比耳鉉相藉而剛柔相反則剛之助柔原欲兼柔而必使之柔兼剛者大寶之形亦正位凝命之所在也夫水火相齊亦猶陰陽之相接烹人掌共鼎鑊以給水火之齊齊猶節也今以鼎為象而天下之所為相齊者皆莫之過則剛柔相兼正以云節況大過五上九六對易尊卑錯互正與君臣之一德有相類者誰謂離上之剛非即前兌上之柔而相節而後有此仲氏易卷二十一
