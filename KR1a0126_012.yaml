body:
  text: 仲氏易卷十二翰林院檢討毛竒齡撰震下艮上子母易卦易觀五來初往臨二往上來此卦惟侯果虞翻得推易之法宋儒多言從觀臨來指變卦言耳與此不同頥貞吉觀頥自求口實彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉頥以養為義顧卦無所為養也祗以艮止在上震動在下上止而下動比之頥然鄭玄曰頥口輔車之名也上止下動故謂之頥乃就頥觀之則四隂互坤有養象焉説卦萬物之致養莫如坤但養以靜為主禮記所謂口容止者故下三爻以震動得凶而上三爻以艮止得吉雖上下兩陽同一輔車亦同一卦主而吉凶判然特其所為吉者則一歸于正無兩義耳且其所為兩陽者一從觀來移觀之九五而為初九是以觀艮之兩觀而觀其養也觀上艮為門闕有兩觀之象故名觀一自臨來移臨之九二而為上九是以臨兌之口實而觀其養之有自也臨下兌為口舌鄭玄曰頥中有物曰口實夫降艮觀以觀頥而升兌口以觀養誠以得一在天得一在地而養隂衆于其間見翟玄説乾為聖人艮為賢人而養坤民于在下見虞翻説頥養之義有如是其大焉者此非他之時而頥之時也侯果曰此本觀卦初六升五九五降初而成頥虞翻曰以臨觀四隂二陽之例言之則臨二之上兌為口故有口實此漢晉以來推易遺法朱升會通亦云卦自觀來以五陽易初成頥此以變卦偶合之耳象曰山下有雷劉表曰山止于上雷動于下頥君子以慎言語節飲食言語從口出故旁及之苟爽曰雷為號令故有言語初九舍爾靈龜觀我朵京房本作瑞疑垂之誤頥凶象曰觀我朵頥亦不足貴也頥之初則頥之下車也以下車統下頥而動而得震則急于求食固亦有之特初自觀來當在觀時內卦以純隂而見離位説見前離為龜而初又早承離照之靈是靈龜也乃以一剛填下頥而離隱矣離隱則靈龜亦隱矣人第見易觀為頥而下頥俯出如樹之下垂朵朵然説文云朵樹木垂朵朵也朱升曰言下頥而垂其涎也而不知舍靈龜而觀朵頥去爾之聰明而爾自以為我有口腹何足貴也爾我皆指初言侯果曰初本五也謂觀之五五互體艮艮為山龜象義曰艮有龜象損之六五是也自五降初則為頥矣是舍爾靈龜之德來觀朵頥之饌也此靈龜又一解亦通六二顛頥拂子夏傳作弗云輔弼也經于丘頥征凶象曰六二征凶行失類也經音徑去聲吭也舊作常解非二仰吭求食但以半口加下頥之上有似乎倒提其頥者夫近頥之口下通于吭所謂經也口之所食每緣氣以為出入莊子所謂緣督為經熊經鳥伸者漢書以經死為絶吭義同徒以求食之故往往仰其吭而抑搔之朱升曰拂摩拂也即抑搔也而不知臨二之剛已移上九是其反而提下頥者正其往而為丘頥者也艮為丘丘則不動而乃以震動而得震行不其凶乎蓋上九固我類而今已失之失則何可行丘頥即髙頥謂上車也于往也詩于茅于耜是也六三拂頥貞凶十年勿用無攸利象曰十年勿用道大李鼎祚本作德悖也三當頥之中為上之應而不幸處震極而為艮所逼夫頥之中宜有食為上之應則并宜得食而迫于艮止則或反以動之過而發憤不食拂頥而去猶之染指而出也見左傳夫如是則凶矣雖曰吾守正不食亦何利矣蓋三當互坤之中坤為民衆在養萬民者或未必不思用之而必歷坤盡而後有用已十年所矣此非頥之時也傳曰地數十六四顛頥吉虎視耽耽其欲逐逐子夏傳作攸攸漢書作浟荀爽本作悠猶漸也劉瓛易作跾逺也無咎象曰顛頥之吉上施光也四以半口綴上頥之下有似乎倒傾其頤者然而吉何也蓋四本艮止之始而下與初應止不急食應則不泛食而今為倒頥則懸之而不即食故其求食也不苟食也此其象有如虎艮為虎見説卦艮位寅亦虎艮東北卦寅方也寅屬虎艮統寅以為正亦虎夏易連艮而以建寅為正朔以艮虎下視虎行垂首而下視而出大離之目以視之卦體大離相擇而食耽耽然豈易見其欲哉視之又視不一耽也漸之又漸不一逐也大離至是有光矣雖倒而上施而亦又何咎逐逐漸漸也今俗云逐漸是也世不識逐字但以逐逐為趂逐作解則于六四止食之吉大有乖舛不得已而強文之曰為賢求食不得不急則養人自養起于後儒在前此未有此解且六爻本文亦並無養人之義按漢書引易作其欲浟浟而子夏傳作攸荀爽九家易作悠三字並同則悠悠者正漸漸之謂也但悠字與逐字義同而聲殊及觀劉瓛易則又曰跾跾據説文跾音式六則音本同逐且其義作悠逺解則又與悠悠義合是跾逐二字在當時未知所從然總解作漸無可疑也不然耽耽逐逐過于朵頥十倍矣而必強曰吉曰無咎寃哉六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也五又以喉吭當上頥之下雖艮止而下無應亦未免有仰吭抑搔之意而猶幸其居于正也居正則養正吉矣特五位坎中四五六坎位在觀巽時則以一剛掩其坎而今移之初則頥見而川亦見焉夫艱食可求何難涉險而不知其不可也以口腹之故而輕其身以試非頥也即非正也正養無是也五本尊位而依庇上九似乎不順但頥主兩剛而二五之互坤俱從之隂之從陽猶輔之從車坤為順此其順耳上九由頥厲吉利涉大川象曰由頥厲吉大有慶也于是推易者曰吾乃今而得所自焉夫臨之二即上九所自來也由者來也二往為艮則曰于二來為上則曰田蓋由是而得為頥則以頥厲物亦以物自厲而砥厲之義見焉有勿吉乎且臨上為坤以純隂而坎位見此大川也今以剛填之而涉之矣山以止之川以通之天地萬物何養不得而况養賢以及民其為正養者方未艾也故曰此頥之時也巽下兌上子母易卦易大壯初往五來遁上來二往大過棟撓利有攸往亨彖曰大過大者過也棟撓本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉大過非過之大者乃大者之過夫澤與風合而有何過且澤與風合而何以為大者之過大者乾也陽也剛也澤風一合而四剛并列大不過乎此専以象名卦者故即以象言之四剛相并有似一木而兩端受竅有似乎木之為棟者乃象之所至而義即隨之蓋巽為木為楊九家易見本義而兩巽相背顛倒皆木然且兩兌上下亦顛倒相背以滋之合觀之則成一大坎坎為宫為棟九家易見本義則以楊作棟熊過曰齊民要術白楊堪為屋材于義于象均有之奈四剛兩端附以兩柔則本末俱弱向秀曰撓由初上始終皆弱是棟撓于下理所固然第四剛雖過而盡居于中其自遁來者則上來居二以外剛居內卦之中其自大壯來者則初往居五以下剛居上卦之中而三四則又居諸剛之中雖剛大者過而過不失中內巽外悅不行則已行則所往皆利雖有棟撓之凶而旋有棟隆之吉所以亨也則過非細事也象曰澤滅木大過君子以獨立不懼遁世無悶不言澤風而言澤木以重在木也蓋四剛皆木也二五木之體三四木之用也獨立不懼者由大壯來也遁世無悶者由遁也初六藉用白茅無咎象曰藉用白茅柔在下也剛至大壯錯地可矣柔從上來以藉之巽為柔為白藉用白茅潔誠之過也又何咎乎九二枯楊生稊鄭玄本作荑云木新生也老夫得其女妻無不利象曰老夫女妻過以相與也夫以遁之上九而改為四剛之棟是質本楊也而已枯矣第剛雖多與而二居剛中得與初柔為比附則在三與四反為獨陽不生而二殊不然是三四為棟而二尚楊也楊雖枯猶可生也蓋天下顛倒之事不少今大者既過則不能無顛倒于其間故猶是澤風而大過之澤與大過之風皆上下相背顛之倒之傳所謂大過為顛非無義也周易皆顛倒相對獨乾坤坎離頥大過中孚小過八卦不然而頥大過中孚小過又內外二卦自相顛倒故雜卦于大過特發其例曰顛也此皆周易大關鍵向非推易亦安能直抉隱祕如此夫枯菀異形老少殊質枯可生菀則老可配少乃遁之上九本來無應此未娶之寡夫也而今併四剛而五仍不偶其亦老矣何意巽之長女可相與也夫未與女也既與妻也女可為妻則得之剛乘柔故得妻得之誠過也所謂顛也初二在互卦為姤姤為遇故有斯象夏小正正月栁稊稊發荂也與荑同故鄭康成作生荑劉琨勸進表云生繁華于枯稊即此義程傳注稊為根非是九三棟撓凶象曰棟撓之凶不可以有輔也夫猶是四剛之中而二五無應而反有應三四有應而反失其應此顛倒也然九三九四同在剛中有何顛倒之可尋而三為棟撓四為棟隆則又何説曰此正所謂顛倒也夫九三者順巽而倒兌者也夫風自下上順則轉髙澤自上下倒則傾竭以轉髙之風而當傾竭之澤則在巽為髙為躁而在兌為脫為毁折棟不撓乎撓則凶雖剛輔甚多而有不可也虞翻曰本弱故撓然輔之則益撓輔指四剛言九四棟隆吉有它吝象曰棟隆之吉不撓乎下也夫九四者順兌而倒巽者也夫澤順則由微至盈微則滋盈則滅風倒則背小向大小可受大不可受以可受之風當方滋之澤則在巽為順為入而在兌為悅為附決棟不隆乎隆則吉雖别有所吝而下不動也它亦指四剛言四剛皆在險故有吝九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也乃以大壯之初九而為剛棟之五亦枯楊也其剛中與二同其比于上柔亦與二同則夫以大過之顛枯而復生亦其理也第時有不同而由來亦異大過之時進而轉甚向之生稊者今且生華而五以大壯初九而居于兌中少陽居尊不礙士夫郭氏舉正以士夫為少夫今不從而上六在前則竟以兌之少女而居垂暮之地少艾之姿居然老婦一何顛倒然且兌悅在中説成在外上六為兑口互夬獨行一往不決夬有夬夬獨行語以士夫而不能得婦反為婦得隂乘剛故夫為婦得則顛倒極矣然而無咎也以大過也無譽也以大過也大過則何可以久也大過則醜亦可也按漢武伐胸奴筮之得此卦太卜因謂胸奴不久當破占用何可久也一語乃遣二師伐胸奴後巫蠱事發二師降武帝咎卦兆反謬蓋當時既失周史之占如春秋傳所記而後儒籠統論理則又謂占者有德則吉在我占者無德則吉在彼如此則但修德可已用五用二筮人太卜一切可廢此正後儒最籠統最無著落一語而舉世遵之及略按易理并略按春秋傳占法則象辭觀玩休咎瞭然如此九五則在本卦為兑中在大壯所來為震中兌為剛鹵而震以出之此北伐之象但大過通視合為大坎而互當重乾之未進承坤上龍戰玄黃正在此際幸乾坎二位皆居北方我以南向北則我南為凱彼北為敗所以能破胸奴兵乘勝追北至范夫人城者此也奈身在坎中尚未出險而兌為口舌又為毁折非因令誤當以間敗乃詛呪事發而脫身降矣兌者脫也夫枯楊之華不入寒地身為士夫敵醜非偶乃既降單于則身己為人所得而單于又妻之以女此正匹配反常一若老婦之得士夫者其卜筮之精占驗之確孰過于此假使得周太史者將此斷文出以韻語即是春秋繇詞矣今易理具在此間所注一循其法鄭玄荀爽皆非所云則仲氏是書謂非秦漢以後直接周史之周易不可也上六過涉滅頂凶象曰過涉之凶不可咎也以遁之陽上改為兌之上六則涉澤而過在通卦視之則巽為木謂之滅木在本爻視之則乾為頂謂之滅頂乾為首虞氏易有乾為頂豈非凶乎然而不可咎也大過也大過非過苟行有攸往則大過之時即從此而建大過人之業無不可耳仲氏易卷十二
