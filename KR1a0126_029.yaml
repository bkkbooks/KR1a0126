body:
  text: 仲氏易卷二十九翰林院檢討毛竒齡撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命孟喜本作明之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝姚信本作稱者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確說文作寉然示人易矣夫坤隤孟喜本作退董陸姚本俱作安然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭此皆就上傳而復贊之其分上下以是也八卦成列則不止乾坤定也而彖象生焉彖者言乎象者也因而重之謂因純卦而加重卦于其上如純乾重乾為乾純乾重坤為泰類宋儒以陳氏先天圗為畫卦因重次第大謬詳見卷首及四象生八卦下若重卦亦自伏義始漢晉說易俱然惟鄭康成淳于俊屬之大禹司馬遷揚雄皇甫謐屬之文王則皆不可據觀𫝊中因而字則正指伏羲他可不辨耳不止畫卦有卑髙也純卦用畫重卦不用畫而爻象在其中焉有重卦始有六爻于是推移之以見變化向所謂剛柔相推而變化生者此是也此推易也于是以推易為繫辭而吉凶悔吝動于中向所謂設卦觀象繫辭焉以明吉凶者此是也此繫辭也然則吉凶悔吝皆生乎繫辭之動而剛柔相推為之本焉其以推易為變通而占以趣吉以繫辭為吉凶悔吝而占以正乎其勝貞勝即貞吉言正乎吉也韓康伯云貞者正也是即所謂觀天觀地日月著明與夫見天下之動而歸本于一隂一陽者而皆有以貞之是乾坤一易簡而天下之理得有如是者乾剛故確然坤卑故隤然占之爻象不過其法是者耳動乎內見乎外者耳焉能與推易之變聖人之繫辭爭功業較情僞哉天地之大德曰生聖人之大寶孟喜本作保曰位何以守位曰仁陸德明釋文作人宋作僞古本從之致朱氏本義以後多改人字誤甚何以聚人曰財理財正辭禁民為非曰義吳澄疑天地之大德至此與上文不相屬而龍氏仁夫則曰此五句恐是他經誤入者季本作四同遂以後將叛者三十七字移置此下另作一章何無忌憚至此古者包一作庖犧一本作羲孟喜京房本作戲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地王昭素謂與地之間多有天字按司馬貞史記補引此亦無天字之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃一作田以漁一作魚蓋取諸離包犧氏沒神農氏作斫木為耜揉木為耒陸德明云一本揉木為之耒耨非耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通一本無此三字通則久是以自天祐一作佑之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤刳陸德明本作桍木為舟剡陸本作掞木為楫鄭本李氏本作楫下同舟楫之利以濟不通致逺以利天下一本無致逺六字蓋取諸渙服說文作犕牛乘馬引重致逺以利天下一本無以利四字蓋取諸隨重門擊柝說文作柝以待暴鄭本作􅀈客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬第揲筮之法則既已詳言之矣乃即以制器而尚象者觀之不曰乾大生坤廣生乎此大德也不曰貴賤以位列貴賤者存乎位乎此大寶也乃王天下者以顯仁守位以富有聚人以道義之門理財正辭禁民為非則制器要焉而要皆本于庖犧之作易然則制器之取象于易匪一端也即罟猶然也佃畋同離有兩目而中爻以巽繩牽之如網罟然耜者犁之入土者也耒即耜柄以曲木為之益上巽下震中為艮坤巽木入坤土而前動以艮手後動以震足是耕象也益初爻以農事為辭此是也古有三市朝與夕與日中而日中為盛故言市者多該之噬嗑上離下震即日中之動也翟𤣥曰市井交易為飲食之道故以為義合沙鄭氏曰十三卦始離次益次噬嗑所取者食貨而已洪範三八政一食二貨黃帝堯舜並稱者孔穎達曰略舉五帝之終始而少皥顓頊帝嚳皆在其間焉徐仲山曰後世聖人概指五帝言是也蓋典禮文物至五帝始備故孔子曰後世雖有作者虞舜為弗可及矣當時垂作㑹之衣絺繡之裳而天下治單指虞舜并不及黃堯可驗通變以制作言然皆本之易故仍以易之通變實之乾為衣坤為裳見九家易刳木使空剡木使鋭渙上巽下坎以木乘水行舟之象故彖曰利涉大川𫝊曰乘木有功以此水有舟楫陸有牛馬可以行天下矣隨兑上震下兑藏坤牛震行乾馬以兑為坤之終震為乾之始也而艮手震足俱隨之互艮隨與豫雖尚象而義亦具焉蓋牛馬可相隨擊柝宜豫戒此卦義卦象可並觀者九家易曰豫上震下坤中有互艮而從外視震復為倒艮兩艮對合則重門之象也鄭康成又曰艮為門震日所出亦為門故重門若擊柝則震木而艮手持之三五為坎坎為盜即暴客也待暴客與威天下則皆有禁民為非之意杵臼與小過無象而虞氏謂艮下震上下止而上動為杵臼之義然震仰盂似臼故震象嘗稱缶而艮為倒震亦臼也若通象作臼則中二陽其杵耳張弦于木則為弧剡木鋭頭則為矢睽上離下兑而又互坎離坎為弧離為矢至其義則亦以睽違而取威伏焉棟屋脊檁也宇櫩也考工記棟尊而宇卑則吐水疾而霤逺是也大壯上震下乾風雨動于上而棟宇承之如乾之健此亦無象而取義者古葬以薪裹尸如衣然不封土為墳不植木為識居喪之期無日月之數後始易之以中棺外槨或曰禮有虞氏瓦棺夏后氏堲周殷人棺槨則有虞夏后皆用陶埴而殷始用木謂之棺槨以棺槨非有虞以前事殊不知用瓦用木帝王或殊若其名棺槨則黃虞早有之觀其瓦棺亦名棺可驗也若其取象大過者虞仲翔謂巽為木為入處兑為口乾為人木而有口乾人入處棺槨之象若康成云初六在巽體巽為木上六位在己巳當巽位東南已位巽又為木兩木在外以夾四陽有似棺槨俱為近理結繩而治者相事大小結繩以為約事大大其繩事小小其繩各執一端以相考信見史記與鄭氏九家易說蔡虛齊謂另有記號何據後易以書契則以刀筆畫木簡為文字之書凡言有不能記并書識之刻木為一二三四之畫而中分其半豫者執左取者執右以為合約之契其取象夬者以義言則夬者決也可決事也以象言則兑為口乾為言而用乾兑之金以刻木其五爻比列有似乎契畫然者是故易者象也象也者像孟京虞董姚本俱作象也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也是故易之尚象不止制器為然也材者材度一卦之義也楊慎云彖者茅犀之名以犀能知幾故云蘇氏傳云爻者折俎也六爻排連有折俎象陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也此後雜論卦爻而總歸之推易屬辭之意崔憬曰陽卦多隂謂震坎艮一陽而二隂也隂卦多陽謂巽離兑一隂而二陽也虞翻曰陽卦一陽故竒隂卦二隂故耦也王氏易是曰德行謂卦爻之有義理者故以一君二民與二君一民較觀之陽為君隂為民若仲長統傳引此作一君二臣二君一臣注陽為君隂為臣易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信韋昭云古伸字也屈信相感而利生焉尺蠖之屈以求信也龍蛇陸德明本作蛇李氏易解同之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也此下十一節亦文言之脫于此者吳澄本竟刪之矣李氏易解曰蠖屈行蟲郭璞曰蝍􅠸也所仲氏曰此亦推易法也又曰此言無用憧憧也易曰困于石據于蒺藜一作黎入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期陸德明本作其將至妻其可得見邪虞仲翔以咸三之二為陽名之辱亦推易法易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也括者矢受弦處書曰往省括于度則釋是也動而不括謂雖動而不築矢于弦以明藏器于身待時而動意從來誤解語言也子曰小人不耻不仁不畏不義不見利不勸舉正作動誤勸與懲對待文也不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰德薄而位尊知小而謀大力小而任重鮮陸德明本作鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉漢書引此有凶字之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望此皆斷節取義者與本卦辭義不必同子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祇悔元吉天地絪緼一本作氤氲說文作一㚃李氏易解緼作紜萬物化醇男女搆鄭氏本作覯云合也精萬物化生易曰三人行則損一人一人行則得其友言致一也一則得三則疑所以取象于偶也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與舉正作輔也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶子曰乾坤其易之門一本又有户字邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越說文作􅫝於稽其類其衰世之意邪夫易彰往而察來而微顯闡幽朱氏本義云當作顯微而闡幽此臆度之說開而當何氏訂詁以此句名李氏易解以此斷節辨物正訂詁以此句言斷辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隱因二鄭康成云二當為式以濟民行以明失得之報此重提屬辭之意而切指之夫所謂物者非他即隂陽也觀此則以情向事物注方物者謬矣隂陽諸名分于衆卦中雖若錯雜而究不越乎二者名祇以隂陽言若指卦爻之名則羲易非周易矣于下衰世之意何居若泛言名象則又與稱名當名不合惟恐類聚之分隂陽互爭則君子小人錯處未免衰世有憂患耳彰往察來微顯微者顯之闡幽當名辨物當名則辨物益信名為隂陽兩物與下文稱名取類同義類亦物也正言斷辭各以二字成章開者開隂陽也稱名取類即辨物㫖逺辭文言中事隱即斷辭二疑也疑則卜失得即吉凶此句以筮言應上吉凶生而悔吝著句易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修馬融本作循也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權處憂患者莫備于易故以易卦九德翻覆言之辨别也鄭康成曰君子固窮小人窮則濫德于是别也德之地者井為行德之地也復小而辨于物者虞翻曰陽始見故曰小乾陽物坤隂物也以乾居坤而能别故辨于物據此則凡繫傳言物未有不指隂陽者此亦一證也恆雜而不厭者荀爽曰夫婦雖錯居不厭之道也長裕不設謂天施地生其益無方也居其所而遷韓康伯曰改邑不改井井所居不移而能遷其施也巽稱而隱崔憬曰巽能申命行事是稱揚也隂助德化是微隱也九卦依次列上經三下經六亦偶然録及不必有意宋儒多狡獪之說謂上經自乾至履九卦下經自恆至損益亦九卦自履至謙五卦自益至困井亦五卦自謙至復九卦自井至巽亦九卦自復至恆八卦自巽至乾亦八卦可謂巧合矣但上經首乾下經何以不首咸若謂恆卦見録故首恆則乾未嘗見録也若謂乾為卦始與遞數不同則上之自復至恆遞數冇八卦下之自巽至履遞數當有十七卦矣何為復至乾作八數乎此皆徒亂人意者勿理可也易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行此重提推易而切指之夫易之為書其辭雖賾其名雖雜然求之豈在逺哉祇一遷焉盡之矣遷者移也即推也易之所以為推即易之所以為易故又曰向所謂剛柔相推者非他即相易也特其義難明其事肆而隱其道則默而成之不言而信所謂書不盡言言不盡意不可顯然作典則立要㑹耳然亦有度焉前所云稽其物類若有憂患者苟能明于其故而因屬辭而揆其方則類聚羣分各有法度吾固曰神明默成亦存乎其人爾豈虛行哉六虛六爻之位也以隨所變易原無意必故曰虛易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰鄭氏本作算德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣易學四同以噫字至此二十三字移置其剛勝邪之後二與四同功而異位其善不同二多譽四多懼近也郭京舉正謂王弼注懼近也誤將近也二字作經案京所據謂是韓康伯王弼原本今王注已無懼近也句而康伯所注仍有四近于君故多懼語則直是經文豈可妄為誑誕如是柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶乃重提彖爻而切指之原始要終此以全卦言即彖也若夫六爻則向所云陽物隂物以時上下者而特取其相雜之爻以為初上中爻之分彼初上二爻本末易曉不難屬辭惟此六爻相雜之時物較德行而辨是非則非去初上二爻而單取中四爻觀之其法仍未備也徐仲山曰觀非中不備語則必别有事于中而其法始周不然初上未嘗云已備而曰非是不備誰云六爻止初上乎蓋上下六爻但具兩正而中四則又兼互體之用兩卦分上下而中四交互又成兩卦所謂雜物猶是隂陽之為物而雜其中焉故以卦爻本辭言原有互辭如坤坎為師則中互坤震其在六五曰長子帥師長子者震也二四互震為長子五與二應故五辭及之坤艮為謙則中互震坎其在初六曰用涉大川大川者坎也二四五坎為大川二在初前故初爻及之爻辭如此甚多不可枚舉此二條出何氏訂詀漢儒多闡互卦兹不載以史氏占辭言亦有互辭如左傳陳敬仲筮初生得觀之否觀為巽坤否為乾坤而觀上否下皆有互艮則太史占曰風為天于上上山也有山之材而照之以天光所謂山指艮也國語晉文筮反國得屯之豫屯為坎震豫為震坤而屯互艮坤豫互坎艮則司空季子曰泉源以資之土厚而樂其實所謂泉源者指艮杜注屯豫皆有互艮水在山為泉原所謂土厚者指坤也坤土也屯厚也豫樂也屯無坤而曰土厚以屯有互坤也則夫互卦一法在文周爻辭與周太史占辭均有之故夫子于中爻于二四同功三五同功明明切指而王弼淺陋不用互卦遂使後世行王學者反謂易學無互體妄矣時鍾㑹亦有無互卦論此漢學將變之始故夫子又云果善觀易則就居見前觀彖亦庶有得而無如中爻雜物必不可泯也二與四本兩卦界隔而同其功用即互也若祇論其位則雖同功而亦有異二每多譽四每多懼以四近五也五君位近則懼雖隂柔倚上不利于逺而二要無咎者以其中也三與五亦然三多凶五多功位實使之但多凶之中柔則益危意者剛或較勝耳觀此則王學所云以隂柔處剛位而凶者非本解矣易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉故初上中爻不止初上二爻與中四爻有分也蓋就三畫純卦言之則謂之參天以六畫重卦言之則謂之兩地而要之祇天人地三者分屬其間如三畫卦則初地二人三天六畫卦則初二地三四人五上天此謂之三才之道即吾前所云三極是也然而以是為爻則仍本之分聚之物與推遷之文惟推遷而不相當然後吉凶以生易之興也其當殷之末世周之盛德邪當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也吾前所謂易興于中古則殷周之際也前所謂作易有憂患則文與紂之事也前所謂易在屢遷內外知懼平陂不常而安傾有故則推易屬辭之道本如是也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能說諸心能研諸侯之本義以侯之二字為衍文慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情僞相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之辭其辭遊失其守者其辭屈是何也則以乾坤二物示易示簡以易簡而知險阻樂天不憂無思遂通貞變化而生亹亹者祇此吉凶與制器尚象卜筮尚占之三事所謂引伸觸類而天下之能事畢者而要皆以剛柔雜居之推易與言情告象之繫辭盡之則此繫辭者豈止生情生僞生利害悔吝已哉即以凡為辭者觀之其雜居變動言情告象者往往如是而況于繫辭諸侯之慮即天下之慮與前後天下字相應謂諸國也愛惡逺近情僞俱指推易言愛惡猶言宜不宜也逺近所移之位也情僞虛實也虛者實之謂之情實者虛之謂之僞凡此皆移易之法故曰凡易之情近即移就之謂則凶句或害之又句韓康伯注情近不相得在則凶句下仲氏易卷二十九
