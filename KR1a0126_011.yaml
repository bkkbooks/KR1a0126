body:
  text: 仲氏易卷十一翰林院檢討毛竒齡撰震下坤上聚卦一陽五陰復亨出入无疾朋京房本作崩誤來无咎反復偽古本作覆誤其道七日來復利有攸往彖曰復亨剛反反動連下至順行七字句漢魏讀皆如此如虞易曰剛従艮入坤従震反故曰及動是也後儒以此作句本屬杜撰而朱升旁註竟増也字于反字下彼亦以世無剛反句法也然増字則益妄矣動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎復者反本之稱見何妥說羣陰剝陽至坤而全失其位説見剝卦所藉震之反生見說卦以復乎其初故剝則蔑而復則亨雖一出一入出入即往來出為往入為來陰陽恒理而復則無病王弼曰疾即病也或以疾速解非六陰反一坤朋尚來坤卦西南得朋曰坤朋坤變為復而外坤不變外為來如泰之小往大來類俗以陽盛為朋來如二陽臨三陽泰則陽非朋往非來于易義易例盡失之矣而復則無咎苟能反乎震以復陽之道一隂一陽之謂道泰否君子道小人道皆是反即反動復即來復俗以反復作反覆謬甚則七日已復七日者自剝至復也剝行至坤而六陽已盡乃隔坤陰之六爻而陽已復生則従剝數起以至于復自剝上一爻連坤六爻為七日凡天行之度以七為限何閩儒所謂厯家建破以七日而更醫家傳經亦以七日而變者葢易有義例臨卦八月以臨觀倒對臨觀従臨至觀則厯泰大壯夬乾姤遯否觀為八個月今復之七日亦以剝復倒對剝復從剝至復則厯剝上爻坤六爻合為七日臨觀以卦計每卦直一月則為八月剝復以爻計每爻當一日則為七日雖剝直九月坤直十月剝之至復相距有三十五日而週月之間總以日計六爻之日即六日也虞易謂陰消乾六爻為七日則自姤至復之說是月也非日也即有鄭亨仲補救之謂復當陽生故變言日臨當陰長故實言月則臨自泰至乾何曽只陰長乎侯果謂五月姤卦専屬七月以周之七月即夏之五月也其不言月而言日者以豳風一之日為一月二之日為二月也此仍是虞說而何𤣥子訂詀又補救之謂七日單指姤一月言則纔遇姤而即已復更無理矣若王弼李鼎祚鄭𤣥諸說皆以分卦直日之法相為配衍謂三百六十日分配六十卦每卦以六日七分為度所云七日者正指坤一卦言坤六爻六日合復一爻為七日則直日之法十二辟卦直十二月而一月之中又管四卦坤十月卦尚隔未濟蹇頤中孚四卦而後至于復則復不接坤坤不接剝不惟日不合即卦亦不合矣後有補救者謂専以候言凡二至二日必七日之前先積其氣而後及于至則單論厯法其于易義何居焉雖陽従内生而有似乎外來者葢此之一剛従剝艮上爻入坤而今反乎震震為動是反動也反動連下勿斷說卦震于稼也為反生宋衷謂一陽在下為反生即反動之義既反動而外坤仍在坤為順震為行是順行也内卦反動外卦順行動與順對行與反對則不宜以剛反句明矣是同一天行剝復俱曰天行而剝之所謂順而止者今已順而行剝之所謂小人長者今已剛長則剝之所為不利有攸往者今不宜利有攸往乎夫陽長陰消君子長而小人消道也天行也而天心見焉雖陰陽遞代消長並行君子小人互為進退無非天心而此其見端也心在此行亦在此即曰天地之心在此不在彼亦何不可象曰雷在地中復先王以至日閉闗商旅不行后不省方至日即月令冬至之日古冬夏二至俱閉闗不行以陰陽絶續之交忌妄動也不省方不巡狩也虞書十有一月朔巡狩此言不巡狩者指至日也初九不遠復无祗祗一音祈即地祗之祗一音支適也九家本作多音支又作㩼與多同但也適與但同義王肅本作禔則亦與祗同如韓長孺傳與司馬遷傳祗取辱俱作禔取辱可驗若王註云禔妥也則不可解矣又古文易注云祗作祗从衣是祗禂短衣也非是則詩祗攪我心亦作祗漢書竇嬰傳祗加懟顔師古特註曰字从衣祗祗通字耳至程傳朱義皆訓作抵則従無此義不知所據悔元吉象曰不遠之復以修身也七日來復不遠之復也雖方未復時羣陰剝陽一何有悔今已無多矣祗者多也左傳多見疏也服䖍註祗見疏論語多見其不知量也正義作祗見不知量葢一陽始生而元善之長具焉故曰元吉復之六爻皆言復然所復者止初爻猶之剝之六爻皆言剝而其所欲剝者止上爻也若諸爻皆復則二即臨三即泰矣且陽惟絶而復生故謂之復若二三四五則即就一陽而漸進漸長以馴至于乾何復之有後儒因文立義但見每爻有復字以為在在可復于二曰美其復于五曰厚其復寃哉如易義何六二休復吉象曰休復之吉以下仁也少息則如所復矣葢一既復則二自隨之而進而未可遽也有待也夫四徳于元屬仁四時于春四方于東皆屬仁而初以震剛而居東春之位謂之无吉則有仁在下矣仁在下而我乗之雖少息亦無礙耳六三頻古本一作嚬鄭𤣥本作卑俱不可解或曰卑當是顰蹙之顰去頻存卑省文耳虞易解頻作蹙即此義復厲无咎象曰頻復之厲義无咎也三與初相連固為一體而陽既漸長則他日自連類而進頻者連也而此時未能也時既未能則三位多凶而震終成恐于此不能無惕厲之事然三陽果進則陽氣見地卦𨽻正月正行陽令者震動恪恭之際其轉而為厲義也何咎焉六四中行獨復象曰中行獨復以従道也復之四即剝之三也復之四應初即剝之三應上也兩爻相應每倒觀而皆見之故五陰上下各二而四居其中謂之中行猶剝之五陰上下各二而三居其中謂之失上下穀梁子所謂三有中五亦有中者葢參兩而三中名參四而五中名焉第此時四固非復而嗣此而進則又将不止于四而曰獨復者吾敢言復哉吾獨有一復者若在吾中行之間彼固以我應而我将與為従也道在故也六五敦復无悔象曰敦復无悔中以自考也居尊位而與復稍遠若嗣復至此則復亦大矣敦者大也敦者髙也大也舊字書無厚義第艮卦敦艮與中庸敦厚俱訓厚另一義然而能大否也當考也向秀曰考察也鄭𤣥訓考為成非是上六迷復凶有災鄭𤣥本作烖陸徳明本作灾俱與災同眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也上與初甚遠則非不遠而迷矣坤先行即迷以無主也此坤正無主無應則無陽以為之主而復陽至此則又過盛而将絶則復之五陰獨此為遠陽之位絶陽之地也凡上卦位坎純爻則見說見前今以純坤加坎位之上而坎之災眚坎為病為多眚無不畢發坎之冦盜弓輪無不畢出坎為盜為弓輪是以行師之衆而當前軍之迷不大敗乎坤為國震為君非以國君乎自此以往陽盛陰生将必厯姤坤之盡而後得以復其位已十年矣陽復以七七陽數也坤迷以十十陰數也陽復幸其速故曰不遠坤迷惡其遲故曰十年按春秋傳游吉如楚有迷復之告其義甚明左傳襄二十八年游吉如楚歸告子展曰楚子将死矣周易有之在復之頤曰迷復凶其楚子之謂乎欲復其願而棄其本欲歸無所是謂迷復能無凶乎楚不幾十年未能恤諸侯也若晉楚鄢陵之戰筮卦遇復太史所占有斷無解成十六年晉楚遇于鄢陵晉侯筮之史曰吉其卦遇復曰南國蹙射其元王中厥目國蹙王傷不敗何待公従之及戰吕錡射共王中目惟杜元凱註頗亦明析註云復陽長之卦陽氣起子南行推陰故曰南國蹙也南國勢蹙則離受其咎離為諸侯人為目陽氣激南飛矢之象近閱何𤣥子訂詁别有解斷似于杜注之外更饒義例惜其中亦仍有未合處如云震坤相拱有巽離在中間楚正南國今有東方震西南角坤而無巽與離即坤又僅得南之小半為南國䠞不知本卦兩體内我外敵東方之震我也即晉地在西而春秋戰國往以秦為西陲楚為南服而燕齊晉鄭皆稱為東方之國西南之坤敵也楚正南國而偏近于西然總稱南國夫復従坤來南勢甚盛今一陽乍復而即已掀全坤之半據有其地不南國䠞乎所謂䠞者以全坤而割半坤若有物躡䠞之者也如此則在坤已䠞何必以無巽離為辭無巽離是卦外支説非卦中義也又云巽為白眼離為目光无離无巽豈非喪目乎震為蒼筤竹豈非矢乎則又不然巽離不上卦何足取象凡卦兩體必有六卦不上者若以此為義不勝演矣此除巽不議外惟離坎為凡卦之位一二三離位四五六坎位爻純則位見坤為純陰則離位顯然説見前而我以來復而忽加一陽之矢横集于南離之目間震為君而離亦南方之卦則亦為楚此又觀合體不分兩體故如此此楚共王之目也至又云只就兩體言貞我悔彼初九元吉在我上六迷復凶至災眚大敗以其國君皆屬之彼且以震木克坤土射之義也以災眚而致大敗眚為目疾即中厥目之象也則真杜註所未逮者易義近情苟能悉心觀玩則辭象具在何患古史占法不再見于今日也震下乾上子母卦易遯三來初往中孚二往四來子母卦者謂卦従遯中孚易之為子而又可轉易之為訟離睽革諸卦之母也葢无妄大畜頤大過萃升六卦雖係分易而仍然類聚如所云環聚者故仍可轉易如此後五卦同无妄史記作望馬融鄭𤣥王肅本皆仍作妄註作望則望者聲通字耳元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主于内動而舉正有愈字誤健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐馬融本作右連下云天不右行陸徳明本作佑行矣哉无妄者不罔也天下惟虚則有罔而天之與雷雖若至虚而自有至實者存乎其間實則不虚不虚則人何㒺第至實之行必當以至虚之心出之故以乾元而當首出之震自宜大亨而利之以正而特其所為利正者惟正故利非正則勿利也夫外為坎位爻純則見説見前今以純乾而覆外坎之上坎為多眚説卦雖曰震行當往而亦无所利是曷故哉葢无妄之推一自遯來以遯艮三剛在二爻之外者今已自外來而為主于内蜀才曰此本遯卦來其說甚合若程𫝊謂坤初變震為外來不知變即非來且安所云外也外乾如故而内變為震是内動而外健也一自中孚以上巽下兌兩中不應者巽九五兌九二兩剛不應而乃易四柔而為二柔李鼎祚謂四陽二陰非遯則大壯而不及中孚此推易未全者是使剛中在上者可使下而與二應也此方是剛中而應若止以遯言易三為初剛不中且不應矣若俗解謂无妄無應則彖詞非乎凡此者所謂正也一以主内為正一以應中為正天之命也非正則非天矣非正則妄矣妄則有眚行何利焉夫震行也乾天也行而至于天又将焉往雖曰天行之健震為肖子法天行健固有天命然天命已不祐矣行也乎哉朱子本義謂卦自訟變九自二來而居于初似亦推易之法但訟之九二既已分移焉可再分此變易非推易也觀者審之象曰天下雷行物與漢後易家皆以天下雷行為句物與无妄又句如九家易之物受以生无有災妄是也後儒有以雷行物與句者張清子云天雷而物應胡旦演聖通論云物物相與以應雷行又王畿焦竑錢一本皆以此句无妄先王以茂對時育萬舉正無萬字云今本見王弼注中萬字誤増皆屬臆見物初九无妄往吉象曰无妄之往得志也卦惟初與四皆以柔易剛惟二與三皆以剛易柔故初之與四兩偏不應初九九四既非正位而又兩剛不相應而不以為眚重剛也二之與三當位而應二當正位而六二與九五應六三與上九應而不以為亨抑隂也故不正則不利攸往而初則利往有眚則不可以正而四則可正初與四其旁翰兩柔而為无妄之剛幹如此故此初九也彖以剛來内為言而爻以柔往外為言若曰初以遯艮之下柔而往而易以震剛是无妄之往而得其志也六二不耕穫陸徳明云或依註作不耕而穫非下句同不菑畬則利有攸往象曰不耕舉正有而字誤穫未舉正作求誤富也二與三則皆示之以妄之之象以為无妄無他第識其所為妄而无妄見焉猶魯語言辨惑不言所辨也祗言其所為惑而辨惑明焉夫二不従中孚推乎二本中孚之兌剛而今易為柔使妄人當此必謂柔則得柔剛則得剛使不剛者而得與以剛不柔者而得與以柔是猶不耕者而使之穫不菑者而使之畬也夫震為耒耜又為禾稼見諸家易而互艮為手耒耜入手則為耕禾稼入手則為穫又下卦大離上卦伏坎水耕火耨為菑田一嵗治曰菑為畬三嵗治為畬而我于是乎設一妄象夫不耕而求穫不菑而求畬世以為妄然而非妄也耕而不求穫菑而不求畬人亦以為妄然而亦非妄也大凡妄境之生不患無誠而患求誠之太速亦不患有妄而患去妄之太過拘牽迫陿加以執錮夫然後膠拄鼓瑟刻舟求劍之妄生焉彼夫耕而不穫菑而不畬世以為妄則夫耕而穫菑而畬之為非妄可知不耕求穫不菑求畬之皆以為妄則夫必耕而穫必菑而畬之為非妄更可知而不知必耕而穫則不耕者勿穫矣必菑而畬則不菑者勿畬矣不耕者勿穫則男不通工女不易布而于是並耕而食饔飱而治之邪說得以横行不菑者勿畬則厥考作室子勿肯堂前人播敷後勿疆畎而于是世爵勿承兄祿不食之矯行得以雜進夫祗此用力得報積勤有獲之恒理初亦自以為其說之必無有妄而不知天下之大妄即在乎是夫不有非柔而可為柔非剛而可為剛者乎則不耕穫乎夫不有初柔而可繼以剛初剛而可繼以柔者乎則不菑畬乎此推移之精通觀之要也可以往矣夫四民各業工商異營推其所得本欲致富今毋論菑畬治田尚未有穫象專指耕穫言而即以耕者推之彼通工易事互相得食其所推移不過秷秸之間耳以言乎富則未也奈何其不之也六三无妄之災或繋之牛行人之得邑人之災象曰行人得牛邑人災也惟三亦然三以遯艮之剛而易為震柔則三已震柔非艮剛矣有妄者于此謂此固艮也剛也吾當終求之艮剛以踐實境而于是妄境頓生所謂无妄之災也夫无妄之災何也坤為國邑二陰為坤或以艮手二四互艮牽巽繩三五互巽而繋之大離之牛九家易離為牝牛此在邑人未嘗為利然亦未嘗為害也而無如行人之得之也是何也震在下也夫得牛之人不必顧擊牛之人繋牛之處不必即得牛之處行人得之亦行人求之有何不可而无妄者曰吾向之繋之者固邑也繋在此則求亦在此而于是行人之得邑人之災焉此述爻詞此非妄之災无妄之災也夫求物者而求之繋物之處原未嘗妄而妄乃滋甚夫行人之得邑人之災也此述象詞而非妄也乎就震柔而求艮剛何以異是九四可貞无咎象曰可貞无咎固有之也四則可正者若曰四得中孚之二陽而易居于四四即非正然而可正者以正吾固有者也二也九五无妄之疾勿藥有喜象曰无妄之藥不可試也五居坎位純乾則見坎為病是疾也然其為疾母亦位遇之偶然而无妄者遂信之而加之藥此非妄之疾无妄之疾也其惟勿藥謂勿加以藥舊說不必藥則不可試不通矣則庶乎有喜不然是試也夫无妄之藥而何可試也上九无妄行有眚无攸利象曰无妄之行窮之災也无妄至此而震動窮乾行亦窮矣不可往矣此非妄之行无妄之行也卦之所謂有眚者在此所謂不利有攸往者亦在此乾下艮上子母卦易大壯四往上來中孚五來三往虞翻以大壯之上為其徳剛上亦推易法大畜歸蔵易作􅬦畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新鄭𤣥虞翻管輅崔憬諸儒皆以篤實句此又句李氏易解亦以此章惟王弼本以其徳章句而宋人宗之非是其徳剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大畜者大者為所畜也夫大陽也小陰也見小畜卦陰為陽畜則以大畜小曰小畜陽為陰畜則以小畜大曰大畜夫小而何以能畜大也哉天下之陽孰有大于乾者乃以三乾蔵艮山之内乾欲行而艮止之則艮雖有陽而亦總入之艮止之間一若以兩陰而畜四陽者則大畜矣向秀曰止莫若山大莫若天大畜非大正不可矣故利貞且其所謂大正者豈非以其徳也哉乾則剛健其徳也艮則篤與實其徳也見虞氏易乃合而言之以山之材而又照之以天光則謂之輝光輝光又其徳也數語見左傳然且内卦離位純陽則見一二三即陰陽陰為離位説見前今以三乾居内位則離見離為日而人三至上為大離離不止一見則離又為日新輝光日新又其徳也而不特此也大畜者大壯之所易者也移大壯之九四而易為上九則其徳也以下剛而進乎上是為尚賢以上剛之賢而能畜乾是為止健尚賢能止健而不大正乎而不特此也大畜者又中孚之所易者也移中孚之九五而易為九三則在九三本震也而今易為兌兌為口舌在上九本巽也而今易為艮艮為宫闕見李氏易解是其所為畜止者又将通之為畜養使諸陽伏處皆得出兌口而食艮闕之食不家食矣不家食而不吉乎且夫能畜之者必其能通之者也夫互兌在前川也離位見而得互坎亦川也當其畜時山阻川亦阻而苟其通之則川且能涉而何有于山此其中有天焉乾為天以一艮之乾而應三乾之乾一若川甫涉而天應之登天闕食天祿子不云乎君子不以小言受大祿不以大言受小祿易曰不家食吉言得天也上九之荷天荷此而已蜀才曰此本大壯卦以九四之陽升為上剛而為主于外上九卦主所謂陽剛居上而尚賢也此推易之法也本義謂大畜従需來則需非類聚卦焉能移分此卦變之所以不可訓也若據舊法則需亦従大壯來本義自不解耳象曰天在山中大畜君子以多識劉瓛作志義同前言往行以畜其徳虞翻曰乾為言震為行坎為志識初九有厲利己象曰有厲利己不犯災也甫畜而求進則有厲厲者健之過即乾三所謂惕若厲也夫如是則不如己之為便矣己者止也即艮止也虞氏易曰體有坎故災九二輿說輹說脱同象曰輿說輹中无尤也畜不可進故乾為大車伏坎為輪而二當互兌之初兌為毁為折則說之輹者車下縛木說之解之也停不進也輹與輻不同說見小畜三爻下尤者過也九三良馬逐利艱貞曰鄭氏虞氏諸本俱作目閑輿衞利有攸往象曰利有攸往上合志也畜至三則畜已至矣可以行矣雖然猶未也夫以乾行之健而加之震動之迷乾為馬震亦為馬馬良矣良則何為不可逐然而艱也雖三與上應上之尚賢與下之養賢中外合志貞則利攸往則亦利而尚有待也故居乾之終乾本大車而履震之始震亦警衞見虞氏易每曰閑之哉閑之哉可以行乎夫如是而後攸往焉庶或利耳所謂志在則然耳離為甲胄為戈兵震為馬足考工記周人尚輿車有六等之數戈也人也殳也㦸也矛也軫也皆衞名葢有馬則有輿有衞六四童廣蒼作犝說文作僮皆通字牛之牿說文九家易作告誤元吉象曰六四元吉有喜也乃以所畜之陽而進觀之畜之之隂彼二隂者亦何能畜陽也哉小人不能厲君子而君子自厲之小人不能養君子而君子自養之請譬之畜夫國之畜賢與家之畜牧等也初以乾之初陽而為伏離之初剛離為牛初為童是童牛也乃四以艮之下柔而内與初應将以應之者畜之而無如四陰所易本大壯之震剛也向以一陽横震足而今移之于艮端原其意若欲械童牛之角而加艮之堅木于其首艮為木堅多節上九一陽横于上有牿象使之一仰視而知所畏而不知其不然也夫童牛者無角之牛也無角曰童曾童牛也而牿之也乎則何勿喜乎陽不自進則不待畜如牿童牛然喜者為陽喜也侯果曰牿楅也以木為之而横施于角以止其牴觸詩曰設其楅衡是也六五豶豕之牙吉象曰六五之吉有慶也二以乾之中陽而居伏坎之初陰坎為豕而以陽居陰則奪其陽是豶豕也豶豕劇豕也乃五以艮之中柔而下與二應将以應之者畜之而無如五陰所易本中孚之三剛也向以一陽横巽中而今移之于乾上原其意若欲縶豶豕于牙而推離之槁木于其前離木科上槁九三横亘于二前有牙象使之一舉足而知所戒而不知其無庸也夫豶豕者無勢之豕也豕無勢則不躁曽豶豕也而加之牙乎則何勿慶乎豕多躁故多突制勢則否以比陽之不躁進者故為陽慶埤雅曰牙杙也海岱之間以杙繋豕謂之牙賦曰置牙擺牲是也伏坎謂伏位互坎也伏位坎離互位離坎純爻則見上九何天之衢亨象曰何天之衢舉正有亨字誤道大行也畜之極而大通矣上九本在外不受所畜而三陽遲久亦将進而與上合彖之所謂不家食而利涉川象之所謂閑輿衞而上合志皆其時也夫震為大塗即天衢也大壯之上本震初而升為艮艮為倒震一若反大塗而背負之所謂荷也夫以尚賢之人當養賢之任而其所為負荷者無非開艮闕以闢震塗若所謂天衢也者是陽氣方升君子並進之一時也有勿亨乎葢畜養者其徳而大行者其道也按何荷通字與噬嗑何校滅耳商頌何天之休同若靈光殿賦云荷天衢以元亨則直以易文更作荷字可驗王輔嗣註易誤云何語辭而程𫝊引胡安定說遂謂何是誤加之字以至季彭山作易學四同欲改何字為向字妄矣若本義作何其通達之甚解則何其天衢無此辭例仲氏易卷十一
