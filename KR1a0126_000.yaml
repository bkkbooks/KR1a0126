body:
  text: 仲氏易易類提要臣等謹案仲氏易三十卷國朝毛竒齡撰竒齡一名甡字大可號秋晴一曰初晴又以郡望稱西河蕭山人康熙己未以廩監生召試博學鴻詞授翰林院檢討初竒齡之兄錫齡邃于易而未著書惟時時口授其子文輝後竒齡乞假歸里錫齡已卒乃托文輝所聞者以己意潤飾之而成是書或傳竒齡假歸之後僦居杭州一日著一卦凡六十四日而書成雖以其兄為辭實即竒齡所自解以理斷之或當然也大旨謂易兼五義一曰變易一曰交易是為伏羲之易猶前人之所知一曰反易謂相其順逆審其向背而反觀之如屯轉為蒙咸轉為恆之類一曰對易謂比其隂陽潔其剛柔而對觀之如上經需訟與下經晉明夷對上經同人大有與下經夬姤對之類一曰移易謂審其分聚計其往來而推移上下之如泰為陰陽類聚之卦移三爻為上爻三陽往而上陰來則為損否為陽陰類聚之卦移四爻為初爻四陽來而初陰往則為益之類是為文王周公之易實漢晉以來所未知故以序卦為用反易以分篇為用對易以演易繫詞為用移易其言甚辨雖不免牽合附會以詞求勝之失而大致引據古人不同于冥心臆測純用空言遂謂能契畫前之易者是亦可備一家之説也乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
