body:
  text: 仲氏易卷二翰林院檢討毛竒齡撰乃若演易與繫詞則正有周作易之本事也雖夏商有易在前此未必無辭朱子易贊曰傳歷夏商有占無文似文王始繫以詞然考桓談新論云連山八萬言歸藏四千三百言連山藏于蘭臺歸藏藏于太卜則夏商非無詞者鄭夾漈亦云連山亡矣歸藏有司焉膺注十三卷觀左傳國語每有商易占卜若無詞何以占之特周易彖象則文王實始為之故孔子曰作易者其于中古乎中古者文王與紂之時也漢儒謂伏羲上古文王中古孔子下古繫詞又云作易者文王與紂之事雖其所演爻詞或問及牳野伐紂之後則謂文王作卦彖周公演爻象亦無不可卦彖者卦下彖詞如乾元亨利貞是也爻象者爻下象詞如初九潛龍勿用是也按史記世家謂文王益八卦為六十四卦而揚雄云文王附六爻則繫詞演爻皆文之事祇馬融陸績皆謂周公作爻詞又易文有箕子之明夷帝乙歸妹與王用享于西山諸語遂疑伐紂後所作故云獨其繫辭則于序卦分篇之外又特創一法以為吾欲演易則必使易之為義行于辭間取六十四卦之已成者相其隂陽之各萃與夫隂陽之相間者而兩判之其各萃者則謂之聚謂隂與隂聚陽與陽聚也以中無間之者也如剝復則一陽自聚不與五隂間臨觀則二陽自聚不與四隂間類其相間者則謂之分謂分隂于陽分陽于隂也若因其已聚而分之者也如移剝之一陽于二而為師則分隂為兩矣移臨之九二作九三而為明夷則隂分為兩陽亦分為兩矣雖師原不從剝分明夷原不從臨觀分而一似因其所已聚而分之者而于是就已成之聚與已成之分者而為之移易焉在羲畫之時未嘗先畫聚而後畫分也即序卦之時亦未嘗序聚先而序分後也而文以為吾演卦演爻則必從其已聚之卦而移而易之而然後繫之以辭故其分卦之為彖則必與聚卦之所移有相發者如臨為兌之初九所移則為初筮比為剝復兩卦所移則為原筮類原者再也分爻之為象則必與聚爻之所移有相應者如屯以臨之九二移作九五則六二與九二隂陽對易有婚媾之象蒙以升之九三移作上九則六三不能以上九為配有勿取女之象類而無如文王演之孔子贊之文王演之而繫之以詞孔子贊之而復申之以傳其開卷發端諄諄啓迪若惟恐後人之少昧其㫖而上傳首言之下傳又首言之而世讀其文而不之察也上傳首章不云乎天尊地卑乾坤定矣此言羲之立乾坤也卑高以陳貴賤位矣此言羲之設重卦也動靜有常剛柔斷矣此言文之為易必先使隂陽之分聚有常度而無疑情也而于是曰方以類聚審隂陽之從類者而先為區之所謂初率其詞而揆其方此亦大傳語方者位也而于是曰物以羣分順隂陽之羣處者而于焉分之所謂乾為陽物坤為隂物爻有等而謂之物爻相雜而謂之時物者皆大傳語物者族也就其族而分易之也一曰物即畫也射禮畫地以置足謂之物故畫即為物隂物陽物猶言隂畫陽畫也然猶未言繫詞也于是又曰聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化夫卦彖爻象謂之繫辭乃以文王之作彖作象而皆屬之剛柔之相推是分明以推易之易為演易者所有事矣蓋推即移也所謂推而行之也亦大傳語屈平有云吾聞聖人不凝滯於物而能與世推移推移者移易之謂也乃猶未己也其於下傳之首章復曰八卦成列象在其中矣則申言伏羲之畫八純因而重之爻在其中矣則申言伏羲之生六十四卦此與上傳之乾坤定而髙卑位同一義也伏羲為易止此也而于是論有周之為易則仍曰剛柔相推變在其中矣與上傳之剛柔相推而生變化無異焉繫詞焉而命之動在其中矣與上傳之繫詞焉而明吉凶無異焉則因而斷之曰演易繫詞用移易豈有誣與閒嘗讀類聚羣分與剛柔相推之文而不得其解及讀隨之剛來而下柔與賁之柔來而文剛而解之夫隨本三剛賁本三柔其為剛與柔亦固其因重之所自有又何嘗謂伏羲畫卦時與文王演易時取他卦之畫而置之此以為兩有所從來而彖傳云然則明明以隨自否移以否之上九移而為隨之初六而剛下分賁自泰移以泰之九二移而為賁之上九而柔下分矣他如訟之剛來而得中蠱之剛上而柔下晉之柔進而上行無妄之剛自外來而主于內類不一而足故易有往來未嘗言占推行不窮推而行之謂之通往來不窮亦謂之通非以云畫借否泰之小大謂小往大來大往小來示剛柔之上下每一移易間而辭義生焉故易有五易謂變易交易轉易對易移易而實有不易之理該乎其中乾鑿度云易不易也生平讀易見從來為易說者言人人殊並鮮一致即就彖象而細探之亦且如夢如囈滋悵惘而罕歸宿因疑三古作易千聖同揆豈無一定之義理可示人指的而乃薦賔假廟行師折獄建侯取女以及涉川伏莽驅禽即鹿諸繫詞無不彼此回惑前後迷貿按之無實情析之無定旨强辨曲釋一往鶻突其所謂不易者安在且易者筮也周官司筮掌三易而春秋史氏每以筮法禪羲文之祕如秦伯伐晉晉獻嫁姬諸筮其見諸傳者往往布詞斷事炯若神明此豈有意為妄誕者乃易義既亡而史氏之司筮亦且風流歇絶而不可復見豈易之果善易與抑亦說易者多蒙昧而未之覺也乃以推易之法一準諸爻則爻不可易一準諸詞則詞不可易一準諸占則占不可易故自推易法出而春秋之筮其可疑者悉不疑其可信者則益信以之而核之漢晉唐明其占存而斷失者無不按驗親切動若影響是三古不傳之藴至今日而長夜始一旦者漢後說易回惑迷貿至今日而始曠若發矇洞然若觀火者第其說所自開則漢焦贑著易林有一隂一陽之卦自姤復來五陰五陽之卦自剝夬來似早已啓發其端而其義未備嗣此而蜀才侯果輩已得舊傳如需自大壯卦來九四升五位為位乎天位而不竟其說虞翻解諸卦亦偶得舊傳如訟自遁之二三相易為三來二中而亦不竟其說需訟大壯遁乃當時不立推易名色且其說雜出雖未嘗言變卦雜卦變于其中致王弼言易推其說而不盡合則槩掃棄之而于是辭象變占茫無所據唐時李鼎祚見當時奉敕撰疏遵行弼書急搜虞翻蜀才諸所說列之卦首而彼伸此詘闕略未備虞翻蜀才侯果荀爽盧氏蔡景君諸儒各有師承每卦取一說而彼此未備暨五代北宋間不能行其書宋慶歷壬子相府䇿賢良六題一出此書素未嘗見賢良多下者惟陳氏摶之徒劉牧李之才輩稍知其概私畫之為圗而誤名卦變如今所傳變卦反對圗類且參以己意補苴所不足而程頥蘇軾諸儒在北宋說易家則復以卦變却之至南渡以後有朱侍讀震力持其說曾于紹興間輯劉李諸圖進之御覽其書名朱漢上易傳并易圗叢說而朱文公熹則又以彖傳諸辭其不可解處非卦變不解極言程氏不取卦變之非朱子云伊川不取卦變之說至柔來而文剛剛自外來而為主于內諸處皆牽強說了去又云只是換了一爻非是聖人合下作卦如此自是卦成了自然有此象于是就朱震所進圗而恢擴以盡其變其于推易祕㫖可謂十得八九矣惜其圗概從一卦所推而所著本義每卦下己旁及他卦然究非夫子所云類聚羣分之㫖故南渡諸儒雖已遵之若蓍蔡而終難盡合疑議多有元時朱升又復從而參訂之有十辟卦變六子卦變之說此皆得乎漢晉諸儒之各體者虞荀諸易原有臨觀遁壯震㢲坤乾兩變之說然而六子之說疏焉以六子為卦母不合至明代來氏知德專以反對諸卦釋夫子彖傳所云而改卦變曰卦綜然于彖傳諸辭仍有未合暨何楷作周易訂詁又稍變其說以為諸卦俱本乾坤所生以求合于程氏蘇氏本乾坤不本他卦之意程氏謂乾坤變泰豈有泰復變賁之理蘇氏謂剛柔相易皆本諸乾坤然究非了義總由彖象不明無所依據即不能不仍取其說而再三致意而不得要領屢更不定亦安知夫子大傳明明言之所云書不盡言言不盡意默而成之存乎其人原謂其說難傳當從悟入而歷漢唐宋元明縱橫上下各欲盡其義而纍求不得乃不意今日而竟得之也夫大傳之曰變曰化為羲易言之也其曰遷曰推則皆為周易言之也推遷者周易之易也第夫子讚易分作三翼而以雜卦贊反易序卦贊對易其于上繫下繫則專以剛柔相推作推易之贊而印之彖象質之卜筮繫辭演繇所至悉合則夫序卦分篇皆演易之所偶及而専以移易一法為彖為象即曰演易用移易而不易之義存乎其間又何疑焉若夫漢儒諸說暨宋元明諸家圗本詳載豫推易始末一書兹不具述文王演易繫辭圗不易卦謂無可移易也大傳所云乾坤成列者也乾坤聚卦謂隂陽各聚于一方以待移易大傳所云方以類聚是也剝陽一一陽隂五五陰復觀陽二二陽陰四四隂臨否陽三三陽陰三三隂泰遁陽四四陽隂二二隂大壯姤陽五五陽隂一一隂夬此漢儒所稱十辟卦也京房祖田氏舊易立時日卦法以此十卦并乾坤作十二月卦謂之十二辟卦辟者君也及行之推易則又去乾坤而以此十卦為聚卦曰十辟卦焦贑有云一隂一陽之卦自姤復來五隂五陽之卦自剝夬來正指此也半聚卦一名環聚卦謂陽聚于中則隂兩分隂聚于中則陽兩分祇半聚而半實分焉然不名分卦者以其卦祇可分移與他卦而不受他卦所分移故也其又曰環聚則以所分者初與上可環接也小過二陽隂四中孚四陽隂二此漢儒所稱四幹卦也六十四卦皆可反易對易而惟此中孚頥大過與乾坤坎離八卦祇可以伏羲變易之例行之故上經以此二卦與坎離終篇下經以頥大過與二濟終篇如牆幹之夾持于兩端謂之幹卦今此與十辟對峙而復與頥大過子母之聚夾持于二陽二隂之傍一如文王之位置于上下篇者此豈偶然也耶子母聚卦一名子母易卦謂本卦為他卦所移為子然又可移之作他卦之母者也大傳所云分隂分陽迭用柔剛是也一陽隂五無二陽隂四頥萃升三陽陰三咸恆損益四陽大隂二過無妄大畜五陽隂一無此傳是齊日記所稱子母之卦如周官冢宰同五官為卿而又統五官以為之長正指此分易卦又名分推卦謂移所聚而易其畫則隂陽俱分大傳所云物以羣分是也第聚卦與易分卦受易與易者每一卦可易四卦至九卦止受易者則每一卦可易二卦至四卦止往來推移神明存焉大傳所云往來不窮謂之通又曰剛柔相推而生變化此之謂也一陽隂五剝復每卦可易四卦剝上移二師移三謙移四豫移五比復初移二師再易移止三謙再易移止四豫再易移止五此再易止二陽隂四觀臨小過每卦可易八卦觀五移初頥移二蒙移三艮移四晉上移初屯移二坎移三蹇移四萃臨初移三升移四解移五坎再移上蒙再二移眀三夷移四震移五屯再移上頥再易止小過三移初震再移二解再移五萃再易移止上晉再四移眀再初夷移二升再易移止五蹇再移上艮再子母頥萃升每卦可易六卦頥初移二蒙三移三艮三移四晉三上移眀三三夷移四震三移五屯三萃四移初屯四易移止二坎三移三蹇三五移初震四易移止二解三移五晉四易止升二移明四易移初夷止五蹇四易移止上艮四易止三移四解四易移止五坎四易移止上蒙四易止三陽陰三否泰每卦可易九卦否四初移益移二渙移三漸五移噬初嗑移未二濟移三旅上移初隨移二困移三咸泰初移四恆移五井移上蠱二移四豐移既五濟移上賁三移歸四妹移五節移上損子母咸恆損益每卦可易八卦咸三移初隨再移二困再四移既再初濟移二井再移上漸再五移初豐再移二恆再易移止上旅再恆二移初豐三易移止五咸再易移止上旅三易止三移歸再初妹移五困三易移未再止上濟四移五井三易移止上蠱再損初移三蠱三易移未三易移止四濟止五渙再二移三賁再移噬再四嗑移五益再易止上移歸三易移四妹止五節再益初移二渙三易移止三漸三易止五移二損再易移止三賁三易移噬三易止四嗑止上移二節三易移既三易移止三濟止四隨三易止四陽隂二遁大壯中孚每卦可易八卦遁三移無初妄移二訟四移家初人移二巽五移初離移二鼎上移初革移大二過大壯初大再易移移五過止上鼎再二移五革再移上離再三移五兌移上睽四移五需移大上畜中孚初移三巽再移四訟再二移家再三人移無再易四妄止五移大再易移三畜止四睽再上移三需再移四兌再子大母過無妄大每卦可畜易六卦大過二移初革三三移初兌三移上訟三四移初需三移上巽三五移上鼎三無妄初移二訟四易移家三止三人五移二睽三移三離三上移二兌四易移止三革四易止大畜初移四鼎四易移止五巽四易止二移四離四易移家四易止五人止三移四睽四易止上移五需四易止五陽隂一姤夬每卦可易四卦姤二移同初人三移初履四移小初畜五移大初有夬二移同再易上人止三移上履再易止四移小再易上畜止五移大再易上有止一隂五陽與一陽五隂同二隂四陽與二陽四隂同然前移陽後不移隂者以隂無主移之理也另有折衷圗見推易始末演易全圗此一二三四者皆經文序卦中次第也上下上經下經也泰否一層聚卦也咸恆一層子母聚者也已下皆從上分移之屯蒙等卦則從觀臨等卦分移者需訟等卦則從遁大壯等卦分移者餘倣此演易全數主易之數二陽一乾隂一坤聚卦之數十二上經六泰否臨觀剝復下經六遁大壯姤夬小中過孚子母聚卦之數十三陽三隂二咸恆三隂三陽二損益二陽四隂三萃升頥二隂四無大大陽三妄畜過分卦之數四十一陽五隂四師比謙豫一隂五小陽四畜履同大人有二陽四隂九屯蒙坎晉明夷蹇解震艮二隂四陽九需訟離家人睽革鼎巽兌三陽三陰七隨噬嗑困漸旅渙未濟三隂三陽七蠱賁井歸妹豐節既濟全易之數六十四不易聚卦十四乾坤泰否觀臨遁大壯剝復姤夬小中過孚兩易之卦十八師比小畜履同大人有謙豫無大妄畜頥大過咸恆損益萃升三易之卦十四隨蠱噬嗑賁困井漸歸妹豐旅渙節既未濟濟四易之卦十八屯蒙需訟坎離晉明家夷人睽蹇解革鼎震艮巽兌仲氏易卷二
