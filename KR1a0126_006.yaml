body:
  text: 仲氏易卷六翰林院檢討毛奇齡撰坤下坎上二易卦易剝上來五往復初徃五來比吉原筮元永貞无咎不寧方來後夫凶彖曰比吉也郭京王昭素皆謂誤増也字朱本義直謂比吉也三字俱衍非是比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也水附地曰比下從上亦曰比出九正易因夫比則必附比則必以下從上有何勿吉但比自復來以初剛之偏而居五中又自剥來以上剛之偏而亦居五中是其得正中以為上下之應必再筮而始得之再筮者一推自初來一推自上來也筮者推也繫剛柔相推洪範衍推也原筮者再推也原再也禮曰未有原左傳原田漢書原廟本草原蠶皆是葢推戴必筮猶舜禪禹曰卜不習吉也原義多誤解惟唐氏易謂内卦曰初筮蒙是也外卦曰原筮比是也祇以内外分初原則于筮義何居若謂卦曰筮則凡外卦皆原筮矣且蒙之初筮未嘗指内卦也若内卦曰初外卦曰再則再三凟有三卦乎周禮太卜三曰原兆謂卜兆也與筮不同再推而居中則為元剛中為乾元居正則為永貞統衆貞為永貞元以合乾而貞以嫓坤有何咎焉蓋上坎為勞而體當大坎則益勞下坤為順而加以互坤則益順是其遺艱大以抱不安張氏玩辭以不寧為不臣如考工記不寧侯之稱則屯卦建侯不寧不可通矣統下國以俟方來書作兄弟方來言從諸方來也下國坤也上與下應有何勿比上下應非上六之上謂上卦與下卦應五與二應也而獨此後一人向之所稱為夫者陽為夫指剝上爻也唐易謂五為夫後之者上爻也此本虞氏説然亦知六稱夫不合故云特不悟推易故不識為剝上爻耳若他解稱夫稱人茫然不顧但取防風後至譚子不來以為善談毋怪乎周史之占千秋永絶也倚疇昔之剛而不甘内附容或有之然此係上六以隂處髙位而又乘剛而抗陽是道窮矣夫道窮則凶君可再推夫不可再襲則亦徒自居於凶地已耳夫初與上同此筮也其筮而得五又未嘗謂一當輔一不當輔也然而吉凶懸殊順逆相反者何也初向而上背初逺而上近初卑而上亢初承柔而上乘剛初自復而上自剝也按左傳子服惠伯謂上美為元衞孔成子將立元稱元亨何疑皆指比言故元亦仍訓元長為是象曰地上有水比先王以建萬國親諸侯子夏傳曰地得水而柔水得土而流國仲氏曰剝上艮為闕復下震為侯而坤居中因有建國親侯之象初六有孚比之无咎有孚盈缶終來有他吉象曰比之初六有他吉也夫比者孚也韻書比附也孚亦附也惟孚故比而復以震之初剛而升為坎中中誠相附几卦有坎離者皆有孚象以中相合附也則實有所以孚之而非苟比也比之何咎焉夫其有所以孚之者則又非偶然相附者也夫震為仰缶缶者汲器也鄭𤣥謂爻辰在未上值東井缶汲井之器今第仰勿汲而坎水之下注者雖無缶而嘗至於溢缶此何如附者吾嘗疑初在二應之外五與二應且坤為國初為民見諸家易下卦為坤則民處國中而反以互坤而處國之外互坤二四同功外之者他也初既為他則其所謂方來者或疑其不必來而吾則終以為來何則以其孚也六服交孚不止要荒他皆我有矣仲氏曰終來者言究竞來猶俗稱到底也有他故吉易㑹曰有他吉也以他字句六二比之自内貞吉象曰比之自内不自失也二為内之主而比之則内皆比矣二為五應正也正又何失焉六三比之匪人王肅本有凶字象曰比之匪人不亦傷乎三以陰處不正之位而其所乗與所承所應者又無非陰類乃亦欲比之而不知非其人也可傷也六四外比之貞吉象曰外比于賢以従上也四為外之首而比之則外皆比矣五為四所承雖所居不正而以之従上何勿貞焉九五顯比王用三驅鄭本作敺失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誠上使中也郭氏舉正以舍逆二句作失前禽舍逆取順也則順與中無韻大誤且夫所為比者非隠芘而私暱之也葢顯者也離中暗而坎内光位居坎中則正處光明之地昭然示所比于天下雖衆比之中猶有不比如後夫者亦明明舍之如三驅然古軍禮驅禽在前舍其逆來者而取其背我而去者據古註凡驅禽而射三則已發軍禮也其禽在前來者不逆而射之不殺降也傍去又不射奔者不禁也唯背我而去則射之故自膘逹肩為上殺而傷者勿以獻此較著者程傳謂三面合圍前開一面使之可去其不出而反入者則射之去者皆免本義亦然是非舍逆而取順是舍順而取逆也與易義軍禮俱不合矣之取如仲虺之誥取亂侮亡之取舍如孟子始舍之舍前如國策王前之前若去則非前矣況數往者順知來者逆來之為逆軍禮亦易象耳徐咸清曰彖言失即象言舍也坎班固曰禽者鳥獸之總名坎唐鶴徴曰為禽易于有禽無禽皆于取象今上六以剝艮之剛不甘内附雖背我而去亦等之為禽之前縦逆我而反舍之不與校也其自復來而有他者皆邑人也坤為邑初已在諸坤之中與邑人稠處顧未嘗曰是邑人者當誡之使來也而已無不來一若上有以使之者書曰民心罔中惟爾之中有使者然也則是顯比之世不求其不比者而亦不強其比昭融坦白任其自然葢坎主隠伏而艮則主指其去來順逆向背未明者坎之隠伏而不使而若使之則艮之指也五居坎中而據互艮之剛故云東漢永建三年立大将軍梁商女為貴人筮之得坤之比正此爻也當時解之者但曰元吉坤五爻詞位正中而已比五象詞其後進為后順帝崩進為皇太后以無子立他妃子臨朝即冲帝也冲帝崩質帝立又臨朝及兄冀弑質帝然後迎桓帝立之而于是有兄冀擅權宦官亂政之禍今推之則坤五后也之比而變剛君也臨朝也所謂顯比者也三驅者立三帝也失前禽者無子也猶無前星也舍逆取順者信宦官殺忠良也其最可異者一推自復以震初之剛而易比五一推自剝以艮上之剛而易比五震為長子為兄艮為門闕為閽寺俱見説卦合兄冀與宦官而皆與九五有參易之跡因之有弑帝亂政之禍何推易之神一至是也向使漢之太史能不失周史推解之法則必唾而置之矣此皆虞翻蜀才輩所心知而未明言者而宋人言易率以先後天方圎兩圗造占變諸法而不識周史三易之祕宜其相去益河漢耳上六比之无首凶象曰比之无首无所終也上六以剝之艮剛而易為坎柔是无陽也夫首者陽也乾為首見説卦无陽即无首无首而苟能終來則无成有終是亦臣道乃但效乾之无首而反失坤之大終故爻曰无首象曰无終兩者均无利焉夫上每言首以卦之上下言也亦每言終以卦之内外言也夫九五一陽同為初上之所推乃初曰終來而上反無首祗一順逆間而吉凶相去至于如此可不戒哉子夏傳曰道窮而比戮斯及矣何終哉上馮竒之曰自下觀之初始而上終自上觀之首而初足乾下巽上二易卦易姤四來初往夬四往上來小畜歸蔵易作毒畜亨宻雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也以大畜小者謂之小畜以小畜大者謂之大畜畜者蔵也又止也大小者陰陽也陽大而陰小故泰卦陽在内而陰在外曰小往大來否卦陰在内而陽在外曰大往小來夫以一陰居衆陽之中為其所包蔵而櫽止之則以大畜小其名曰小畜宜也惟畜小故繋以為寡諸解以一陰畜五陽非是第既名小畜則小為卦主而此六四者一従姤來以初六升四一従夬來以上六降四則向之為陰爻者一居内一居外而今以四爻而為外卦之首則盡居于外小往在外陰位也此得位也且四為偶位向之初與上一以剛居柔一又以柔居剛而今則適以柔爻而居柔位此又得位也且一巽二離三兑皆陰卦也向姤初為巽陰夬上為兑陰而今則正居巽陰而又兼互離互兑之陰是一位之中三陰並見此又得位也然且身居兑柔而上之為兑柔者應之身居巽柔而下之為巽柔者應之仲氏曰此與比卦上下應也不同彼以上之九五與下之六二應故曰應也此曰應之則止初一是應上何得有應若非推易則此亦一闕解矣是柔一得位而上下皆應是何如蔵乎況下健上巽上下皆剛中謂九二九五也諸解單指九五非是而四志行凡離坎皆有心志之象豈非亨乎而無如其多櫽止也夫坎為雲雨故屯以坎震而名雲雷又名雷雨此易曉也今小畜以姤之初六升為六四是在姤時止得坎之下半以夬之上六降為六四是在夬時又止得坎之上半而今則四居互離在下半上半之間是皆徒有雲而不成雨之象也夫姤夬小畜所在皆雲則雲亦已密矣而畜而不雨然且在姤時下為巽風而今則上為巽風無處非風則無處非止髙唐賦所謂風起雨止是也在夬時上為兑西而今則下為兑西向為衆之西郊而今為我之西郊四為卦主則我之䝉之以九二為我是也此與小過宻雲不雨自我西郊西為互兑正同若朱升易註謂四為西郊以大衍之數四九在西為據則小過九五為難通矣夫宻雲不雨雖止而尚往也自我西郊既已施而但未行也則夫今之藴畜以止之者亦正以助其往之而行之者耳何為勿亨鄭氏易以畜為養即蔵義也然于止義多齟齬若唐氏易謂一陰止五陽理有不足乃云合五之剛中而畜道成則矛盾矣一陰畜五陽而一陽反助之畜何耶宻雲不雨正畜止也本義反謂畜未極而施未行不知所解象曰風行天上小畜君子以懿文徳四為卦主而獨居離中離者文明之象也程傳謂文徳為小故小畜則虞書帝乃誕敷文徳豈小徳乎初九復自道何其咎吉象曰復自道其義吉也夫其所以包蔵之而櫽止之者非謂強為制而力為沮也夫初自姤來則初與四本相應而今與之為對易是今之以初剛而畜夫四者即向之以四剛而來夫初者也夫往來者道也往有自往來有自來者則自道也剛自彼來今復自此往即此剛亦即此畜然則初剛之畜四亦祗還夫向之自四剛而來初者耳還所自來即復所自道道在是義亦在是吉矣何咎之有此爻従來不解或以復為自初至上或以復為自上還初俱周章不明非推易㡬夢囈矣九二牽復吉象曰牽復在中亦不自失也二與四非應非對易而亦以剛而畜四一如初之復之者何也有所以牽之也二與初同為地道則同為畜復況二在姤時原居巽中巽為繩見説卦因而牽之雖九五無應而不失為中則亦吉耳不失以初言初不失則二亦不失所為牽也三則失矣九三輿説輻夫妻反目象曰夫妻反目不能正室也此不能畜小者也夫三與上應上在夬時以六柔而應九三之剛今易居四爻而反乗其上用柔凌剛是乾反坤輿離反坎輪三之所乗亦且當互兑之脱而毁折而不能行而況能畜有四乎夫四従上來固向之所謂正應者也夫妻也今已降為四而仍相比而同處人道之中則猶是正室而實則乖錯不應如反目然葢離為目見説卦三與四同居互離之半目多偏側況四居巽陰巽為多白眼見説卦則在輿為脱輻而在夫妻為反目雖三四舊應而今自有夫固室也而不正久矣輻輪中直木所以搘輪者惟輿壞故輻脱與大畜輿脱輹為輿下縛木可自脱不同呉澄謂輻即輹今人多非之謂輹伏菟也在軸之上承輿者車不行則脱之矣輻輪中直木老子所謂三十幅共一轂必輪破轅裂然後可脱與大畜脱輹不同然鄭康成註即以輻為伏菟謂與軸相連鈎心之木則仍以輻為輹矣古文無定字或輻輹亦原可相通字耶俟考六四有孚血晁以道偽古本作恤不通去惕出无咎象曰有孚惕出上合志也離有孚象見前今四居離中體與坎反故坎為疑見諸家易而此則有信坎為血而此則血去坎為憂為惕俱見前而此則惕出雖衆陽迫束優游不害互兑正巽倍加悦順一若承九五之有孚而上與合志所謂剛中而志行者此不止初二之復道已也此畜之成也九五有孚攣如富以其隣象曰有孚孿如不獨富也五亦在離中而與四同其有孚所謂合志者且復牽巽繩而為之攣則四真為所畜矣夫畜者養也又聚也田養與積聚非富不可而五居正巽之中巽為近利市三倍見説卦此是富者富則可畜畜則不以隣而誰以乎夫既以四為攣如矣可獨富乎中孚九五亦有孚攣如以大離也故此互離亦與同上九既雨既處尚徳京房虞翻子夏傳俱作得載婦貞厲月㡬唐一行本作既誤望君子征凶象曰既雨既處徳積載也君子征凶有所疑也上本兑六合四六而成坎象坎為雨雖不雨亦既雨矣坎為隠伏雖不處亦既處矣處者畜也畜則在上者以尚自居積乾徳而成巽富見上爻甌窶滿車畜聚一何盛也在四以離中而兼巽長巽至上剛雖女也而已婦矣婦貞且厲畜養一何摯也夫以諸陽畜一陰而望其成而以當體之大離易姤夬之大坎姤夬合則上兑下巽成大坎坎藏離中離負坎背隠月魄而就日光離日坎月此與中孚九五有大離而無坎正同互光偏上離為互卦與上爻稍近故偏有似乎㡬望然者則是陰類如月亦得充其光以圖滿志是何如畜也夫稂莠樗櫟總成名材宫闈婦寺并洽大化倘于斯尚不盡孚致生攜貳以為陰為小人當以君子之道進之則天下事其以疑致敗者正不少耳或問仲氏曰一陰畜五陽固為非義然五陽畜一陰不太勞乎曰小人難制共驩在朝合虞廷二十二人尚未能畜至有姚繼世而終至流放何言易也夫西京冀啇東京操卓未嘗多人而爾時之為君子者適如林如蕡充朝溢野然而究不能畜何也又曰君子黨疏始患其不結連故牽復反吉所以連之也既患其太分别故君子征凶惡其别之也又曰説易最忌以厯朝事實抵掌娓娓此真宋人作論惡習不可不戒試思此卦以君子畜小人以小人畜君子何代不可説然于易理有釐毫得當乎如此上六何雨何處何婦何月總不可問只君子征凶一語假曰一隂畜衆陽則諸陽受制亦已極矣行至上九正畜極而亨之時尚往志行庶或於此時得一大展而反曰君子征凶其能通乎兑下乾上二易卦易姤三來初往夬三往上來凡二易之卦俱從姤夬剝復來皆以中爻與初上相易故演辭有意顯示蹤蹟多在初上如師之出律比之盈缶小畜之復自道履之其旋大有之无交害豫之由豫皆是也特其中要義處處皆見如此卦與同人特于五爻示其意此尤其匪夷者觀者審之履虎尾不咥人亨陳氏捷解謂履讀按卦名原有不必讀者如否之匪人同人于野類彖曰履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚陸績作疾形誤光明也離巽為東南之卦皆夏令主禮而此以乾兑之義下兑上乾皆西方卦主義兼互巽互離之禮二四同功為互離三五同功為互巽禮者履也禮由義起而履以禮行推姤下之巽夬上之兑而並易之為天澤之三則巽嫺素履正姤之所自往而兑應乾金亦夬之所自來也然而曰履虎尾何也夫姤夬兩陰推易之祗一柔也以一柔而居五剛之間其在下者為我所踐踐固履也此指初二也蘇傳程傳誤以履剛為乗剛單指初二非是其在上者為我所躡躡亦履也此指外三爻也本義單以履為躡外三爻亦非是上下環列無非剛健而以區區之一柔踐之躡之有似乎履虎尾者然虎属金為西方之獸而乾與兑皆位金故乾之五爻兼言龍虎雲従龍風従虎革之上兑并及虎豹大人虎變君子豹變履虞翻以坤為虎艮為尾震為尾朱升以離為虎三履二為履尾蘇軾以二為虎三為履尾既又以三為虎四為履尾唐鶴徵以乾為虎兑為履尾來知徳以兑為虎初二為履尾則坤虎不合離虎無據二虎三虎無理惟以乾兑為虎則近是然單指乾則九四何以履單指兌則六三何以履總無是處特乾為首兌為口首舉而尾隨口向則必咥所幸兌悅而應乾以柔馭剛雖其間履之所及或凶指六三言或吉指九四言而以概視之則固不咥而亨者葢履非一履第就六三為辭則為柔履剛而人各有履若推之九五之履則為剛中正所謂履帝位而無所于疚何則以光明也五互巽向離巽為命令而離為光明皆南面之象許衡曰卦言不咥人爻言咥人以三為衆所忘也唐鶴徵曰卦以柔履剛故不咥爻以柔居剛故咥總是卦與爻原有不必同者惟捷解曰有卦吉而爻凶者履是也有卦凶而爻吉者歸妹是也此得之象曰上天下澤履君子以辨上下定民志上下以天澤言辨與志以離言坎離有心志之象初九素履往无咎象曰素履之往獨行願也夫此履也勿謂其初履兌剛遂以為非故履也方其本姤而來倒兌為巽以巽柔而易兌剛兌悅而巽順則今之履兌初而上悅者乃其舊之履巽柔而下順者也素也素不願外雖獨行初為民故獨行可以往矣九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也此則履之最正者兌為鹵鹵地廣衍需之下兑曰衍在中也坦坦然進無應謂九五而退有比謂初九非幽人乎幽亦兌象兌位西周禮所謂極西多陰是也葢剛在兌中二本正位貞而能中則所履自不亂耳來知徳曰上爻為離明則下爻為幽如歸妹三爻離明則二爻亦稱幽人是也殊不知歸妹下卦亦只是兌故然耳六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也夫三居兌柔兌主悅而以互視之則倒兌且居五巽之柔巽主順而以下視之則倒巽是悅不終悅順不終順也况巽固多躁巽為躁卦而兌亦附决見前陰僣自用其在夬上為不全之離夬上兌口得離之半離為目此目眇也及履乾而補離目于隔界互離之半正在外卦則以為能視在姤之下為正巽巽為股見説卦以易兌而折于乾兌下為陽無足此跛也乃藉兌口而強續互巽之足以為足六三為下兌之口即合為巽足則以為能履而不知其實不能何也不足故也乃眇固已矣而跛則不伏尚欲恃其跛之履而履虎尾以為柔能悅剛可以不咥而不知巽足所加即兌口之所向也兌口反向反則必咥何其凶乎夫此一柔也陰也武人之象也武在右陰象而以離為戈兵為甲胄為嚮明而治肆其威武謂可以南面而稱大君俱見說卦其志非不剛而位不當也夫武人也而可以為大君也乎九四履虎尾愬愬馬融本作虩虩與震蘇蘇同終吉象曰愬愬終吉志行也夫虎尾不専在剛也履之者亦不必専在柔也雖曰柔履剛惟三有然而四與三為同才不中不正並處于人道之中三履虎而四即隨之然而三多躁而四多懼吉凶分焉葢愬愬者懼也傳云雖處危懼終獲其志已愬愬而志行矣時未吉終吉耳九五夬履貞厲象曰夬履貞厲位正當也乃以剛卦剛爻而當此剛位所應所輔皆莫有以柔濟者此其為履所以多剛果而少従容也夫大君貴斷而決則能斷既貞且厲大居正而嚴天威于此位見之故演易者曰此推卦之従夬來者也吾欲明指其所自來以為推移之本而難竟其説曰獨不觀履與同人乎夫履與同人則皆従姤夬初上而推之者也夫自姤夬初上而推之者其卦有四而履與同人居其二則欲藉此以類推其説九五可按也夫五卦君也同人之五曰大師克相遇遇者姤也同人而姤何哉非易姤而何以姤哉履之五曰夬履夬夬也履而夬何哉非易夬何以夬哉上九視履考祥其旋元吉象曰元吉在上大有慶也諸陽無應惟上獨有應而其相應者則正對易之六三也三居巽初為眼巽為多白眼可視我所履而又居兌上為決見前則可以考我所履之吉與否葢祥即吉也苟従其所來而考視之向以下乾之三剛易而為上乾之上剛特未能旋其剛而復之三耳其旋之乎則以兌従乾者而更為純乾雖居履卦之終而實為乾卦之首乾元善長吉莫大焉吉而在上不其祥乎則不大有慶乎夫履無定位隨所易而各得其義素履之往視履之旋即一履而往來備焉故繋曰履不處此之謂也虞翻曰三上相易故曰其旋則推易之説前儒原有示一班者惜其不全著也李䞇以旋為回視其履與唐氏象義同來易謂旋如周旋折旋之旋即禮也亦近是惟朱升易註謂考祥為父喪祥祭上爻當乾父之終将以復寝曰其旋其者将然之詞則不知何據且何以解斷至此若程傳謂旋者終始周完之意則誤以周旋為周全矣旋者還也轉也疾也繞也周旋也安得有周完解耶仲氏易卷六
