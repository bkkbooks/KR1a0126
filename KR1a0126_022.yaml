body:
  text: 仲氏易卷二十二翰林院檢討毛竒齡撰震下震上四易卦易臨二往四來又易頤四往上來萃五來初往小過三來初往震艮對卦虞氏以震為臨二之四艮為觀五之三皆以正推言震歸藏作釐亨震來虩虩荀爽本作訴訴笑言啞啞吳澄以震來八字係初九爻詞竟以己意刪去季本作四同從之何無忌憚至此震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也吳澄以震來十六字係初九象詞刪去季本四同從之震驚百里驚逺而懼邇也郭氏舉正此下有不喪匕鬯四字王昭素據徐氏説云宜有此四字范諤昌亦為此説云受之許堅堅受之李溉溉受之陳摶而陳氏傳從之朱氏本義即謂程傳有此四字至吳澄季本直增之矣出可以守宗廟社稷以為祭主也震本雷也而雷動必驚故祗就雷言則為震動而就聞雷者言之則為震驚第震祗一雷而重雷而亦名震者以為雷雖再來索無二震故六爻兩剛皆為震主而必專歸之下震之剛出震者主器之所尤重也是以易例往來自下而上者為往自上而下者為來而此兩震剛則一從下往臨二上為四三從上來頤上來為四萃五來為初小過三來為初三來一往而皆謂之來即剛之攝柔下以初往上以四往皆以下爻攝上爻而亦皆謂之來以為出震在初而五爻居外一切洊至無非外來之震動而主震者不震焉故震來甚恐而言笑如故即驚至百里而匕箸不失此何如主耶雖曰恐懼非徼福之藉而常度從容可為法則則執匕奉鬯正宗廟社稷君主躬親之事禮凡上牲體薦鬯酒皆主祭者身親之詩曰百神爾主矣不止祭則寡人已也虩虩恐也舊注恐懼也與訴訴同故説文虩虩訴訴皆注恐懼或以虩為蠅虎非是啞啞笑聲也震為聲為言故有笑言震雷百里諸侯之象也見白虎通匕者撓鼎器也匕以棘為之將薦之時撓鼎中牲體出而升之于俎上鬯者灌也秬釀鬱草為酒而灌地以降神互坎為棘為酒醴故有匕鬯仲氏嘗與張南士坐聞雷南士曰雷震何以喪匕鬯曰不過如當飲墮杯當食失箸等廣譬及之耳曰其象何居曰一剛載二柔鼎肉尚在匕匕不喪也互坎于仰盂之中所酌尚在斚鬯不喪也南士起謝書之去近從南士集中録此一節因附載此象曰洊雷震君子以恐懼修省洊再也初九震來虩虩後明張氏所出晉王本無後字笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也彖之所為詞與象傳之所為詞皆以是也此全用卦文而增一後字者明非震前也仲氏曰彖之後震後也象傳之後笑言後也六二震來厲億偽古本作噫以干寶解作嘆詞虞翻解作惜詞也不知億字原有作詞解者何必改字喪貝躋于九陵勿逐七日得象曰震來厲乘剛也自此至上皆震驚而有所喪者二下乘震剛震來固厲而又自臨之大震而易乎此臨六爻統為兼畫之震則尤厲且當在臨時四坤鱗次如貝然貝形腹排齒與四陰兩兩排對相似況漢志大貝壯貝么貝小貝等皆以二枚相次其象亦同乃以二易四頓使一剛間四坤而貝形大喪然且二本兑剛易居于四而成艮二四互艮為丘為陵而以陽剛居之陽為九則為九陵而乃自二而升之曰躋有似乎多所喪而逐之焉者則夫二之為震驚端可知也然而勿逐也夫一卦之推不及他卦六爻之易不及他爻今兹所喪歷一卦六爻而喪已盡矣則自二而三而四而五而上而初而又至于二七日也而即已復得何用逐為卦為月爻為日又夬為兌口夬缺則全乾皆復故凡兌口皆稱復如睽之初九既濟之六二皆是億者多也十萬曰億秦增至萬萬皆以多為義多與大通故象傳六五以大釋億夫子解之則不容更立解矣推易重正推故爻于臨卦所易尤致意如此六三震蘇蘇震行無眚象曰震蘇蘇位不當也蘇蘇即虩虩蘇訴音之轉訴與虩同字則蘇即虩可知矣故馬融陸績俱注恐懼惟虞翻以死而復蘇為解而後人誤認為吳澄之説然總北復字本旨三當下震之末而接互坎之初故可效震行而未有坎患坎為眚九四震遂荀爽本作隊泥象曰震遂泥未光也四從臨頤來而居之互艮之末互坎之中艮以倒震而坎以陷之得不勝失故震驚之極遂至丁水坎土坤之合身居泥中而不自振拔若徒負震剛而反陷于四坤者何如震也夫震可下上亦可上下二之躋陵與四之遂泥此正上下有相互者若象曰未光則坎與離反既居坎又何光焉遂隊同六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也五本從萃之初往故曰往然震卦例不及往而此兼言往者曰此推易也五之震與二同且以坎末居震中故危于行然其無大喪而可有事者震驚在初來繼此則習以為故而不復震故曰其事在中言所事在上中即與下中有異耳事即祭祀之事國之大事在祭祀見虞氏易若以恐懼修省為事則夫子大象爻詞安得先有之上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也上則震稍逺然猶索索然索索即虩虩索與訴同音同義即虩字也雷有先後而震來則一故至目視矍矍如驚駴而未有定則其為征凶所固然也特震從外來實從下起初為震主則上位遼濶然且初四兩剛皆隔二五則毋論上震下震主從稍殊而第言乎震洊至之厲未嘗親承也所矍矍者祗震鄰之恐耳鄰有同患戒備乃免矣戒如孟子豫有戒心之戒若上從頤來頤之四柔本初剛之妃也婚媾也今易上以柔而初剛四亦剛兩剛相敵俱有震言則姻婭之情較鄰尤切然亦何咎哉震而能恐雖震無害故六爻各震而其各不同也如此艮下艮上四易卦易觀五來三往又易頥初往三來升二往上來小過四往上來艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止朝氏謂當依卦詞作背朱氏本義從之熊過謂古文背作北與止形近故訛止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也艮山也惟山故止程氏謂陽動而上已極則止則陰上極不止乎故兼山亦止但止以義言而以艮之止而推之于象則艮形為人古人字作坰即艮形也故三正以乾屬天以坤屬地以艮屬人夏正建寅為人正其于易首艮名連山即是故也人身皆動而惟背不動有如山然故以卦觀艮艮山也而以人觀艮則艮其背也夫身有向背向則得而背則失以背求身則安能得其身哉不惟不得其身而已夫艮為門闕而兼則兩之兩門之間即庭也庭之象見則人之形隱于庭求人則又安能見其人哉李鼎祚謂純艮重其門闕兩門之間庭中之象虞翻謂坎為隱代故不見其人文王之演艮止此其演止也亦止此而夫子釋彖則又以反對之象參互言之曰不觀艮之與震對乎反震為艮反艮即為震故震為倒艮而艮為倒震如第以艮言則艮止也獨不曰時止則止時行則行乎艮為止而震為行止即靜也行即動也靜有時而動亦有時靜不可久也時亦不可失也惟有時則止固靜而行亦為靜惟有時則靜固止而動亦為止此其兼艮之光即左傳山光與倒震之火即左傳雷為火反覆對觀而止之為道光明如此如曰艮者其止焉而已止字不宜改背字止其所而已上下相敵不相應與而已凡六子重卦俱有敵無應彖之所謂不獲其身行其庭不見其人者惟是之故而又何勿止焉艮與震對震兩剛以下剛為主艮兩剛以上剛為主故震六爻皆動而惟初與彖詞合艮六爻皆止而惟上與彖義合正同象曰兼山艮君子以思不出其位初六艮其趾荀爽本作止通字無咎利永貞象曰艮其趾未失正明張氏所出晉王本作止字也此皆不獲其身者夫卦從初起猶身之先于趾也乃初以頤之下剛移之與三而自居于柔而安于趾苟能貞久則亦不失其正者顧趾耳安能止哉六二艮其腓不拯陸德明作承其隨其心不快象曰李鼎祚本此下有其心不快四字不拯其隨未退李本作為字虞翻亦曰坎為耳故未為聽也聽也腓上于趾猶二之上于初也乃二以升之下剛不自居而推之于上此亦能安其止者顧身居坎窞坎為心為病揣其心一似有不快焉者以為推二于上當必有隨之而上者則也今腓隨足動隔于下剛不能上舉而承其所隨是用怏怏而夫子曰既已上矣彼亦何能退聽焉夫我欲上承而彼不能為退聽上下之間亦可云各止其所而無如其腓也腓隨足動不在上豈無在下者拯拯也上舉也與􅶚同黃氏韻會引古易不􅶚其隨而丁氏集韻又别出承字故陸德明本作承此正拯拯承􅶚同音同義並無别釋之驗俗第曉拯救一義而強作傅會遂至救三救四終無著落寃哉按左傳襄九年載穆薑筮往東宫事得艮之隨正指此爻以艮五爻俱變而為隨惟此爻不變故以商易推之謂得艮之八以商易少陰不變八為少陰則此二之不變當稱八是也但易學啓蒙謂五爻變當以之卦不變爻占則正宜占此爻辭而當時但引隨彖以元亨利貞為言曽有一字及此爻辭否事有明明實據開卷即了而故為臆斷且又仍引此傳文以為之證不審何解九三艮其限列其夤鄭玄本作􅘡説文引易作胂荀爽本作腎云互體坎為腎厲韓詩外傳引易作危薰荀爽本作動云互體有震震為動虞翻本作閽云閽守門人坎盜當門故厲閽心心象曰艮其限危薰虞本作閽心也三則居艮剛而當艮背者乃一從觀五一從頤初並移之上下卦相限之間比之人身之腰胯所云腰限者俗名腰眼漢儒皆以為腰帶處雖腰限在背有似乎艮背而實非背也第從後以觀祗見夾脊之間分為背夤夤者夾脊肉即背腎也儼然橫一剛而排四坤于兩旁有似乎擺列然者此豈艮背哉背與心反而心在身前亦祗以乾陽之厲反炙之已耳坎為心薰者薰炙之義漢書馬廖傳聲薰天地是也夫腰可折夤亦可分列以是求止是向心求背也況心又極動者耶六四艮其身無咎象曰艮其身止諸躬也此則艮其身者夫身在背前彖之所謂不獲其身者而兹反獲之蓋上為艮背而四以小過之剛移之與上是以背與人而以身自與也則其艮也亦其身而已身與躬同六五艮其輔言有序虞翻李鼎祚本作孚悔亡象曰艮其輔以中正朱氏本義云正字羡文叶韻可見意謂正字與前後躬終字不叶故也至姚小彭本竟改作正中以就韻不知古韻東冬庚青蒸俱通正者三聲字也如周禮小司徒施其職而平其政讀征楚詞九歌荃獨宜兮為民正叶星類故訟卦彖傳剛來而得中也與尚中正也叶正與此同例況經史歌誦如此叶者甚多見豫古今通韻一書因已不識韻而欲妄改聖經恐不可也也五以剛易柔而承上九之一陽如一首兩頰所云口傍之輔者則其不能止可知也第輔以夾口有口輔必有言説輔動言亦動祗五當互震之末震言至此或稍有序耳上九敦艮吉象曰敦艮之吉以厚終也此艮背也爾雅丘再成曰敦敦者兼山之艮也見何氏訂詁以剛實居上而為艮主則直以艮山與之山即背也又孟子盎於背盎有厚義而説文曰厚者山陵之厚則敦與厚皆取義于山而背象因之有周二聖其用字明確如此艮下巽上三易卦易否四來三往又易咸四往上來益初往三來漸女歸吉利貞彖曰漸之朱本義云之字疑衍或是漸字張氏所出明晉王本作漸注云以漸重文文故誤之也進也女歸吉也舉正謂誤增也字王肅本有利貞二字吳澄本竟刪也字增利貞字可謂無忌憚矣進得位往有功也進以正可以正邦也其位則得中也止而巽動不窮也咸恆漸歸妹皆以震艮巽兌作男女之象而惟咸為得正惟恆為得常漸與歸妹則不無乖互之形故歸妹以兄娣為變象而漸則長女少男義近蠱惑山風蠱正風山漸之對必欲取配非漸不可蓋澤山兩少男可下女巽艮非匹豈容自歸澤山咸為取女風山漸為女歸況女大以擇配為急而男小以待時自阻則上巽下止不過以巽止立漸進之名而其為少男為長女象無與焉然而曰女歸吉何也曰惟漸則女歸亦吉也非女歸之吉漸吉也曰利貞何也曰豈惟漸哉又必貞而後能利非漸勿利非貞又勿利也乃夫子于此則又以推易之法為女歸斷夫女歸何與于推易程傳曰乾坤之變為巽艮巽艮之重而為漸以漸體言在中二爻交由中二爻交然後男女各得正位而吉夫以巽女交艮男男女儼然而其釋女歸反不曰巽女歸艮男艮男取巽女而曰男女之交在中二爻則在宋儒不講推易程氏不道變卦者尚確見及此諄諄以在此不在彼為辭則其不在卦名之二女而斷在推卦之兩爻亦可知矣故虞仲翔曰否三之四謂之漸女者四也歸者由否坤之三上而歸于四也三進四曰得位陰陽體正爻與位合故吉也功謂五四進承五往有功也五多功三與五同功巽為進也剛得中者以三在外體之中故稱得中實則三四皆得中此以剛中故指三文言曰中不在人謂三也其言之詳盡而明決如此是以傳若曰漸之進也王弼謂之于進也不遽為進也巽女不遽下艮男不遽上各以漸也漸而後進始吉也人亦不知其所進為何等耳漸之三四皆有所自來而進而得位進而與五同功是三乾既正而可以正三坤之邦亦惟得所進故如是也且夫所謂得位者此其位何位哉不過此三剛所推進而得其中焉耳其位又重釋進得位位字正恐誤認為巽艮之位故也不然艮巽焉能得中耶如僅以卦言則下止上巽漸義已盡即曰倒震為動互坎為通繫辭往來不窮謂之通通則不窮進則進矣其于女歸何用焉象曰山上有木漸君子以居賢本義云疑賢字衍或善下有脫字德善郭氏據王本善下有風字俗初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也巽為鸛九家易艮為黔喙即烏喙加之互離飛鳥而集之互坎水窪之間此其象當為鴻鴻者雁之大者也鴻以時至而其飛有序得漸之義而惜所漸之非其地矣初艮山之足而推自三來由坎中以出坎畔若所云河之干者而于以漸次也之漸之猶近也而非所安也夫鴻之不得水猶夫男之不得女也夫艮男者小子也倒震者言也小子不取女而徒有辭説喋喋焉不其厲而然而無咎也漸也六二鴻漸于磐史漢武紀引作般裴龍駒注云水涯堆也楊用修云水涯堆之訓為是鴻固不棲石也不知磐本山石並無水涯之訓此正見所次非宜之意不然陸陵亦水涯乎飲食衎衎吉象曰飲食衎衎不素飽也二當坎水之濵而居艮石之正中則水傍石磐也磐盤同石之平者磐較干不安而于以漸之但當飲坎水而唼震稼震稼為反生雁水鶩稻衎衎然自得已焉雖曰志不在徒飽而漸固如是九三鴻漸于陸夫征不復婦孕荀爽本作乘不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也三則愈進而愈覺不安以坎水之間而合之艮山之背在水則填之在山則夷之有云髙平曰陸者而于以漸之在否四益初而合推之為三剛則此三夫也今已征進于此而不復返矣其推剛于此而自草居于柔者婦也婦一在離中一在坤中離與坤皆腹而一當巽虛一當艮止四在互離中而當巽陰之虛初在半坤中而值艮足之止皆宜孕而未即育所恃者身居坎中坎為寇而出艮剛以禦之則猶利以為剛固可用耳夫以女歸之吉剛中得正而彖以為吉爻以為凶何也演卦例顧爻剛柔相交者爻之吉也演爻例顧卦巽艮相配者卦之凶也故夫子于此特著曰離羣之醜夫推易之法非以類聚羣分為分合之大致哉而三本否乾與連乾為羣初本益乾與環乾為羣而一旦分其羣而不之復陰固失道陽亦出醜是以進苟失漸雖觀之推易而猶未吉也故曰凶也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也鴻之棲也以跖不以爪焉能漸木而漸之巽為木四當巽之陰稍開平者因變名曰桷桷如榱桶可容跖而或則得之然而未安也然而無咎者以漸故四為益坤三所移故順以巽九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也陵則山之髙出者重丘之上加以覆敦因之有陵駕陵轢之義今三艮為丘而五剛復髙出之此陵也曽陵而可以漸之也乎而漸之是毋論巽剛非夫難以言征而即以婦孕觀之四居離腹尚不能育今五居巽中歷二三四爻而坎與離反則并其腹孕而亡之夫三止不育而此且不孕二四同功亦越三嵗自兹以往又孰能勝其任而為之孕者是孕而不育者固失其道而歸而不孕者反得其願也何也漸使然也上九鴻漸于陸胡瑗程頤本皆云陸當作逵注云逵雲路也按逵者九達之名即路也凡爾雅説文諸釋字書並無雲路之注蓋路字加雲起于詞章家如杜詩自慚雲路得翺翔類而以此訓逵固已可笑至朱本義又復以逵儀韻讀為然則爻詞用韻或無或有乾卦二五田天大人固是叶音至九三若厲九四躍淵亦曽有韻乎否也至吳澄季本直改逵字六經至此蕩盡矣其羽可用為儀吉象曰其羽可用為儀吉不可亂也既漸于陵復漸于陸以巽為進退巽極則進而又退然此亦漸之至也上與三為表裏上巽極即三止極故復漸于此然而何之矣鴻漸至此第可用其羽為舞具而已儀舞也書鳳凰來儀文舞用羽名羽舞故云不可亂謂羽舞有次第如鴻序然皆漸之有象者如以儀為法謂儀法其次第則其羽字可用字皆不通矣鴻水鳥與陸反故他書亦多以水陸比言如詩鴻飛遵渚為鴻所宜鴻飛遵陸不為鴻所宜此是確證況兩言于陸正是古文變換法漢晉唐儒傳寫傳讀字畫形聲實多異同然猶僅作音注不敢改竄今勒石鏤木板册儼然而輒以己意擅改經字聖言之侮自此日甚吳澄季本罪可勝數耶仲氏易卷二十二
