body:
  text: 仲氏易卷十翰林院檢討毛竒齡撰震下離上三易卦易否五來初往又易益五來四往損二往四來此在盧氏虞翻侯果諸家俱謂従否來與推易合若本義謂従益來則又従變言與此不同噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分句王弼注直下連動而明六字作句以為剛柔分動不溷乃明則于震動離明義例盡失之矣大謬動而明雷電合而有章柔得中而上行雖不當位利用獄也噬嗑象也噬者齒決物也嗑者合也初上二陽為齦剛上下相向而填諸物于其中名為噬嗑但賁象倒見與此並同噬嗑賁而不名噬嗑則以上開下動與上止下開有分殊也離開震動上噬下嗑賁則艮止離開不能合矣夫開而能動中有決斷自能亨通而即以其象旁推之上下兩剛同于犴狴決斷諸有兼類折獄則噬嗑既亨即因而用獄亦有利焉是何也卦象類頤而中決諸物因名噬嗑三陰一陽俱在頤中則俱謂之物舊祗以九四當物且謂四剛間斷上下必須決去則按之爻詞殊不其然謬之極矣第物以類聚而後始従而分之凡陰陽剛柔皆謂之物傳所謂陽物陰物是也今卦従否推又従益與損分推則當未推時剛柔皆聚而不分否三陰三陽對聚損益三陰内聚三陽環聚自九四互易而剛柔分焉三陰三陽自相分隔所謂物以羣分者而于是下動震上明離下雷震上電離相合成章但以否卦推之則初柔易得五中而柔従上行盧氏虞氏易侯果諸儒俱謂卦従否來以否之坤初升為乾五為柔得中而上行與推卦合第諸家不曉損益分推得半而止故不能全解推卦之法而以益與損分推則亦以四柔易得五中朱元晦本義以為本自益卦六四之柔上行以至于五而得其中為得中上行亦與推卦合第不曉否損之推仍是半解且得中上行單指否卦與損益分推無與以三柔易得二中皆柔之得中而従震而上行者震為行此上行與否柔上行不同雖五中以陰居陰殊不當位而開明決斷自能出離光之照以為震雷之決雖以之用獄尚有兼利而況噬嗑乎象曰雷電雷電似宜作電雷但泰彖宜言地天交而曰天地交此固易例況彖已明言雷電合矣蔡邕石經本李鼎祚易解皆作電雷此必以己意强正之者程傳朱本義皆謂此文有互非是噬嗑先王以明罰敇亦作勅法電故明罰雷故敇法初九履校滅趾陸徳明本作止无咎象曰屨校滅趾古本此下有止字不行也噬嗑以初上兩剛為斷物之具其取象噬嗑而復以用獄為義者雖坎為刑律亦以噬嗑之剛能斷決也但初剛従否來當在否時本坤柔之一而今易為震剛而陰没于陽之中似震足震為足下垂見剛木震為陽禾而不見趾一若以校木為屨緉者校者足械也夫如是則不行矣震為動為行而前當互艮故有此象六二噬膚滅鼻无咎象曰噬膚滅鼻乗剛也二柔與三柔皆在噬嗑之間而體當大離一至四成大離離火炎上則近上者為乾腊而近下者為革肉膚者革也禮所謂膚鼎是也禮别實一鼎為膚鼎第此六二本損之兌剛兌口上向而二剛隆然于兌口之上所謂鼻也今易以四柔而隆然者亡矣雖二四互艮艮為黔喙見説卦為鼻見荀九家易而二當艮喙之根但見喙而不見鼻一似従根而噬噬之深而滅其鼻者所謂没鼻之噬也夫艮之所以得稱鼻者徒以一剛踞口上與兌口同而今已滅去則凡為剛者皆魚肉之矣可乗剛乎宋政和末平江入解者筮之得此爻曰離為戈兵艮為門闕又以艮東北之卦而介乎南離必東北敵人南冦犯闕且將不利乎君矣鼻者君祖也後徽宗果北狩明正綂間魏文靖驥上卦事有云藩籬既虚冦得深入以唇亡之羞來滅鼻之禍六三噬腊肉遇毒小吝无咎象曰遇毒位不當也三于大離稍近上則為腊肉腊者火所乾也周禮腊人有腊鼎是也田獸脯鼎實以兔之薧為腊鼎但三入互坎之内坎為隠伏為病則厚味腊毒見五行志容亦有之然故小吝耳何咎焉或曰腊固有毒張協七命云甘腊毒之味此即甘脆肥膿所謂腐腸之藥者與遇毒不同九四噬乾胏說文作􅳨从内仕聲揚雄說今作胏若子夏傳作脯虞氏易亦稱乾脯則又另一字不同得金矢利艱貞吉象曰利艱貞吉未光陸徳明本有大字則與當字不協矣大謬也離為乾音干卦以一陽而夾兩離上離大離之間則其所噬者直乾胏而已然四従損來損下為兌又従益來益上為巽而皆易之為互坎之中是坎本弓也見說卦而兌金巽木合之作金矢而貫于坎中雖離火未光四為離初故未光而離兵離為戈兵之用早見之則我之所噬不過殘肉胏者食之遺而已得利器此飲食之道吉凶相循所謂於味必思其毒于利必思其難者太平御覽載王肅解云金矢所以獲野禽故食之反得金矢君子于味必思其毒于利必備其難也金矢之得所由必艱貞而後為利也葢剛噬固艱噬剛尤艱明罰敇法端必由此舊以此爻為所噬之物不通即以中四爻全指獄訟牽強傅會亦殊不合此言噬嗑耳金矢本箭鏃今食田肉而得九鏃者往有之朱本義引周禮鈞金束矢獄訟所入者為解其於金矢固巧合矣然于噬胏之義何居且得金矢與遇毒得黄金一例黄金無矢毒又何物況文王演易禾必用周禮也季彭山曰鈞金束矢先入之而後聴訟並不見他書恐前古必無是例不可訓也黄東發謂先取其金而後與之聴訟雖昏亂之世不為況成周之治哉此皆以臆見論周禮殊為不合葢此専解易謂易解不如是則可謂周禮不是則不可學者當自省耳六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也其噬乾肉同而此又得黄金者以五柔為否乾所易乾為金而位當坤五之中則為黄金天下事何常以意外之獲而守以恐厲之心雖以剛決剛以柔決剛事有不同而貞厲與艱貞一也何咎之有上九何古本亦作荷校滅耳凶象曰何校滅耳聰不明也初剛為足為屨校則上剛在首為荷校荷校者項械也夫三五同功者坎也坎為耳見說卦而此踞坎上而荷械于項則并坎耳而滅之矣夫離為電為明而滅耳而不聰即不明矣以不聰不明者而使之用獄不其凶乎夫猶是罹刑而屨校无咎荷校即凶者剛固不可成也離下艮上三易卦易泰二往上來又易損二往三來益五來三往此前儒荀九家易虞氏易皆謂従泰來與推易法同惟本義謂従損來則推易亦有之特朱子主變卦言故異耳賁亨小郭京舉正作不云不字草書勢如小字致誤不知易例原有小字如巽小亨既濟小利貞類利有攸往彖曰賁亨賁亨與比吉同例朱本義疑衍非是柔來而文剛故亨分剛上而文柔故小利有攸往郭京舉正據王弼本有剛柔交錯四字今考王弼本並無四字但以四字釋柔來文剛剛上文柔二句耳増此妄矣天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁者飾也衣裳以飾躬而五服五采則又繪山于上衣繡火于下裳以為衣裳之飾則是山火者天地之大文鄭𤣥曰離天文也艮地文也而上山下火尤前古迄今后王君公藉以飾躬之善物也據易黄帝堯舜已制衣裳書五服之制天子諸侯惟日月星有殺而山火不殺為后王君公之共飾第賁固以飾為義而賁之為色則其質本白而或間以黒或間以黄京房云五色不成謂之賁鄭𤣥王肅皆云賁者黄白色也其在卦色則為巽白為坤黒黄而在方色則見之東西南之間巽東南坤西南故是卦所推自泰自益自損皆有坤巽泰上坤益上巽損倒巽皆有互坤有黄白而既易而皆去之所幸火與山合則山石火照亦間有黄白之色孔氏正義云艮為山離為火以火照山之石有黄白色揚雄太𤣥礥首次二曰黄不純屈于根注易賁卦山下有火黄白色也故曰黄不純惜其色不純所謂白不白黒不黒黄不黄孔子之筮賁而愀然者以是也吕氏春秋孔子卜得賁曰不吉子貢曰何謂也孔子曰夫白而白黒而黒賁亦安吉乎家語孔子筮得賁愀然有不平之色子張進曰師聞卜者得賁吉而子有不平之色何也曰以其離耶在周易山下有火賁非正色之謂也夫質也黒白宜正焉今得賁非吾兆也今第觀其飾而不觀其色則色必有質而飾當用文彼柔來而文剛者非泰與損乎以泰之上柔損之三柔來而皆飾乎二之剛荀虞諸易皆謂自泰來而不知又自損此剛柔之相飾也分剛上而文柔者非益乎益上本二剛乃分剛上之一而文三之柔朱本義知卦自損來已得之矣而不知又自益且謂又自既濟來剛自五上而文上夫既濟非聚卦無分推之理且兩剛相比分一以文謂之分既濟三剛皆不比何以分乎此物之以文分也夫卦有兩離自三至上為大離以其在上為天文自一至三為離以其在下為人文夫惟天文則互震為動動即不窮亦惟人文則上艮為止止必有節震動而不窮則必變因而察之艮止而有節則必成艮為成因而成之則夫賁之為亨葢将察時變以化成天下所謂垂衣裳而飾至治者端在乎此豈止震動艮止小利有攸往已哉象曰山下有火賁君子以明蜀才本作命庶政无敢折獄賁與噬嗑為反對故无敢折獄初九賁其趾古本一作止舍車鄭張本作與而徒象曰舍車而徒義弗乗也夫飾不止在衣裳已也當益未推時下震為足而初當震足之下此趾也今易震為離則既以離文而飾其趾矣苐益下為震而泰之下實為乾乾為車震又為車俱見前則有車可乗原不用趾乃盡易為離則并乾與震之車而盡舍之以為初居民位所當徒行此豈矜屨緉之華忘安車之適哉義固然也六二賁其須象曰賁其須與上興也且飾有近在身者夫損兌上口口之下為鬚二至五為互頤頤之下亦為鬚須者鬚也而二之為位適當鬚間則夫頰上之毫所以飾面而離中之文又所以飾鬚也葢泰之與損則皆従上三之柔而文二之剛是二柔之所與為興起者不在上乎興在上則飾亦在上所謂初與二同道而初飾下足二飾上首有如此或謂須賤妾之稱天官書有須女四星離中女無正配故取其象此别是一義九三賁如濡如永貞吉象曰永貞之吉終莫之陵也三居卦末而當坎之中此以洗濯為飾者雖推従損益皆易二五之至正以趨不正而能守坎險之中即正也永能守正則卦位已終又誰敢陵其上者明嘉靖中先聴齋司馬講易浮峯書院有問陵義者曰艮在上得母陵乎然何以莫陵曰剛能陵剛而不能陵柔濡者柔之至也地以濡自文而陵免矣彖之所為文柔者于斯見之六四賁如皤鄭𤣥陸績本俱作燔以為四将應初進退未決故燔如此與下卦離火闗會另一義如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終无尤也四以後皆以賁之色為飾賁有白黄黒三色而益當未推上卦皆巽故四五與上則皆有巽白之色白者巽色亦賁色也雖四當互震為馬而本之巽白則為白馬陸績云震亦為白馬未知所據白馬翰然将以與初為婚媾而三四同道又九三六四適陰陽爻位剛柔相當則配合之際若于此不能無疑而不知弗疑也初九六四實正應也即或四居坎中坎為冦盜見前而白馬之出又近戎事禮戎事尚白故乗白馬擅弓所謂戎事乗翰是也其乗此文翰下尋賁趾翻有似乎為冦者冦指本爻不指二三従來誤解曰匪冦也乃婚媾也无尤也鄭𤣥曰翰白也又髮白曰皤馬白曰翰此皤不止髮以通體言之而翰則指馬葢商人乗翰本亦時色文之演賁或者取時色以却黒黄未可知也六五賁于丘園束帛戔戔子夏傳作殘殘吝終吉象曰六五之吉有喜也五為君位而以陰居之且下又無應則第如處士之可自飾者其所飾丘園而已艮為山為菓蓏而五當山半而填菓蓏于其中半山為丘蔬圃為園處士所居也乃泰本上坤益本上巽坤為帛見荀九家易而巽繩束之此聘幣之禮張衡東京賦所云聘丘園之耿介旅束帛之戔戔者而規模減小草野羞嗇不其吝乎然而聘幣到門究亦可喜葢帛者白也以白繒為束故謂之帛子夏傳五匹為束三𤣥二纁此帝王之後肆覲三帛之物非聘幣矣傳固後儒所作者此又以禮為飾者而何勿吉上九白賁无咎象曰白賁无咎上得志也上則單以色飾矣不言所飾以無所不飾也葢此本泰乾之二而上飾坤柔則自此一上而大離炯然藉此作天文之飾非得志乎賁本雜色而到此已純其無所不白較之四之止白其馬五之苐白其帛端有進者天文在上合人文而化成焉艮為成艮之上剛則成之時也此賁終也坤下艮上聚卦一陽五陰剝不利有攸往彖曰剝剝舉正增一落字謬也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也此十二辟卦之一也漢儒以十二辟卦分配十二月枝辰之數如一陽復配子十一月六陽乾配巳四月一陰姤配午五月六陰坤配亥十月類復臨泰大壯夬乾六陽卦姤遯否觀剝坤六陰卦為十二辟卦詳見臨卦彖下分配秩然第諸卦名義各以因重及分聚起見而獨剝與復則純以陰陽往來消息盈虚為卦名卦義葢剝為陽之将盡復為陽之始生易惟重陽故于一生一死間消息盈虚明明指揭以為君子小人所當儆戒者在此際也夫剝者削也落也以陰柔而變其陽剛是剝其陽剛也夫陽往則陽剝陰陰往則陰剝陽往則息剝則消往則盈剝則虚此天行之顯然者今陽之止而待剝已及五矣尚安往乎雖下坤上艮坤順艮止其止而待剝觀象固然然不曰有天行在乎夫止而不往者人之行也而消而復息虚而復盈小人之進而復退者天之行也君子所尚者天行而已往與止何計焉象曰山附于地剝上以厚下安宅此仍以因重之義釋之初六剝牀以足蔑荀九家易本作滅義同貞凶象曰剝牀以足以滅下也夫其所以欲剝而尚未剝者止此艮之一陽耳夫艮之一陽以坦然平直而横陳于衆陰之上有似乎牀而剝之是剝牀也牀屬上爻足屬初爻従來誤解然而尚未剝也葢當剝之初必自近乎地者始牀之足則近乎地也所謂下也初二為地道為下剝牀者何以以此而已夫剝者削也蔑與滅亦削也廣韻剝削也王弼云蔑猶削也陸徳明云楚俗有削篾之言雖剝下非正而剝陽則剝正矣剝正則凶六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也足之上為辨謂屈伸之際有分辨也鄭𤣥曰謂近膝之下屈則相近伸則相遠故為辨辨分也而牀梐亦然崔憬曰以牀言之則辨者牀梐也在笫足之間孔穎達云牀身之下牀足之上足與身分辨之處是也大抵兩物交縫俱謂之辨如革之中絶為辨類若孔安國謂為牀幹則在牀棧之上樹以懸物者與梐不同牀有笫有足而笫足之交復設梐以當分辨之處故亦謂之辨則辨之加于足猶之二之加于初也初以足則此以辨矣夫二為五應亦賴五之為我與也今五陽已剝而不我與則二五正位雖與初異而剝陽滅正則正與初等其凶也視之初可耳六三剝之陸徳明本去之字反謂有之者為非大謬无咎象曰剝之无咎失上下也三則有與矣上九相應為有與第其所與者則即其所剝者夫四陰無應而祗此區區之一陽下為我應而尚忍剝之然而與者三所獨剝者衆所同也衆皆欲剝吾何獨不剝則亦曰剝之而已初不言其所剝者何物也牀也廬也且不言我之所以剝之者何所以也以足也以辨也以膚也以宫人也一若為衆所逼而陰為避嫌陽故若不覺者夫如是則何咎矣雖上下四陰皆無所與而我獨有與則所得者一而所失者在上下此即坤之所為得主為利喪朋為安貞者陰類小人其宜離而不宜合如此六四剝牀以膚京房本作簠謂祭器不可解凶象曰剥牀以膚切近災也牀之有薦席猶獸之有皮毛也見崔憬說故獸以皮毛為膚而牀亦以薦席為膚四之剝牀則漸與上近矣雖牀終未剝而剝牀以此故曰災不遠耳六五貫魚以宫人寵无不利象曰以宫人寵終无尤也五亦剝牀者也且切近于牀牀膚既剝則此正剝牀之際而無如牀未可剝也何也以剝之為象將及乎坤而猶未坤也斯時也五陰排連駢頭而進有似乎貫魚然者夫魚本陰類五坤是也下坤互亦坤故五坤乃以艮手艮為手牽巽繩五以觀之上巽剝而為艮故牽巽而貫而穿之将何以哉夫魚陰類宫人亦陰類見何妥崔憬說與小人同而大小一貫一若后夫人嬪婦女御次第而進按禮注一后三夫人九嬪婦二十七世婦八十一御妻以次當夕凡十五日而遍如貫魚之有序者此非以膚以辨以足者可同年語也葢以宫人寵矣夫盈虚消息全藉天行天行未至不虞不待此正小人之欲剝而時尚未至伎倆有限故止蔑為寵止凶為利此在小人亦無如何者而昧者謂設一轉變之㡬夫爻義所在何容設變若謂此即消而轉息虚而轉盈之際則何以處夫坤亥之盡剝也善觀易者于此當自省耳後漢梁皇后曰願陛下思雨雲之均澤識貫魚之次序正引此辭夫梁氏亂政此剝牀之尤者然漢祚未盡猶能受寵而順止如此此可監矣後儒因文立義動摭史事如此二爻雜引四皓邵平伏生浮丘以為博談而至于易義所在曽不之顧此禍易之學與此間所引據絶不相同不可不察上九碩果不食君子得京本董本俱作徳誤輿董本作車小人剝廬象曰君子得輿民所載也小人剝廬終不可用也夫此一陽也必致于剝而時尚未剝則于此有危㣲之㡬焉試觀艮之菓蓏艮為菓蓏至剛而碩上一剛爻為碩祗此碩果縣之于衆陰之上而羣欲食之而不能食可謂幸矣然而禍福之端得失之數皆蘊于此浸假君子居此則以坤為大輿見說卦而我乗其上而得之小人居此則以艮為門闕而我居其下而必欲剝之夫得時則駕君子之行乃以非所攸往而不得與民為周旋厚下安宅亦順止之義而小人道長凡艮之安止象牀又象廬者一陽為覆有廬象而必欲盡剝之而不可為用此剝之所以不終剝此君子得輿而自此以往所由繼之以坤亥而不可救也此小人剝廬舊謂二占不分用非是按漢五行志引京房易傳曰小人剝廬厥妖山崩兹謂隂乗陽弱勝強則以艮為山艮剛剝則山崩此平實了義後儒解易多傅會謂牀為陽所居廬為陰所居既已可怪未聞艮剛之牀復有一陽居其上者且謂剝牀為使陽失所居剝廬為自失所居不成坤亥之月六陰皆露處乎此皆說易之最可笑者仲氏曰碩果不食第以艮剛未剝取象耳必謂果有仁可再生則鑿矣説詩者不以詞害志說易亦然使此果仁可生得毋復之一陽即剝之未盡者乎且坤不盡剝乎仲氏易卷十
