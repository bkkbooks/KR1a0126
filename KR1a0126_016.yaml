body:
  text: 仲氏易卷十六翰林院檢討毛竒齡撰離下坤上四易卦易臨二往三來小過四來初往又易頥上來三往升二來初往蜀才謂此本臨卦九二升三六三降二虞翻謂臨三之三而反晉此是推法與朱氏㑹通卦變不同明夷利艱貞彖曰明入地中明夷內文明而李鼎祚本無而字外柔順以蒙大難文王以鄭𤣥荀爽本作似王肅本作能又文王上有惟字之利艱貞晦其明也內難而能正其志箕子以鄭荀本作似之乃由晉反之而明夷矣離日之傷傷于入地向非歷艱難而守正固亦又何利夫子曰吾于斯見文王焉夫所謂明夷者蒙難者也明離在內而坤順在外于以當互坎二四同功而蒙險難惟前互坎險故蒙難蒙者冒在外也苟非體明夷之全處憂患之極恐未足以當此也此非文之以而誰以也且于斯見箕子焉夫所謂利艱貞者晦其明者也外位為坎四五六純爻則見而箕子以坤五明夷六五為箕子明夷坐坎中而反離照本其明也而于以晦之然且文之坎難在離外箕子之坎難在坤內謂互坎在下離之外坎位在上坤之裏商辛至親發為內難而終能正其坤五坎中之志苟非履利貞之爻六五利貞秉艱貞之德或未足以幾此也非箕子之以而誰以也按彖傳為夫子所作而是卦爻詞以六五有箕子字故疑非文王所作而歸之周公然則六五箕子乃周易舊文而彖傳文王則夫子特揭之以與箕子並者故文王屬全卦而箕子止屬六五非偏也易文固如是也朱氏㑹通謂舊說易者以六二為文王明夷六四為武王明夷皆弇陋無理之言不特武王不明夷即文王明夷亦夫子贊易之言周易舊詞豈宜有此近儒巧托文王事實以合諸爻且有分配殷臣以初爻為夷齊四爻為微子此皆稚劣之甚者世有通人不可不鑒也象曰明入地中明夷君子以蒞衆用晦而虞氏易作如明蒞衆以坤言用晦而明以離言初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也夫明夷者必見幾者也見幾則必實審其夷于何所而夷不可見往往于飛鳥見之彼日有飛鳥離象固然離為雉天為鳥以日有鳥也見李氏易解而初上兩剛以健羽相夾而為之翼則初固離之一翼也而頽然下垂有似乎夷其翼者夫初為離剛本君子也以四應而成互震則又震行也君子于行則正可比之離鳥之飛乃小過及升凡經兩易而皆廢兌口以成離虛蔑口而枵腹離為腹坤亦為腹則皆有不食之象而離日三爻正當三日君子何往乎夫行者亦謂其可以往也我既有應則我之所往者亦即我之所應者也乃以彼應我則我為主人以我往彼則彼又為主人我甫欲往而主人之應我者紛紛有言則我將安行主人指四以四為初應也荀爽以衆隂在上為主人朱升以三為主人俱無理四互震為行又為厲言震二五來厲初上有言師卦互震利執言皆是故曰于行曰有言乃行之既夷則于其言無論已而即以其食觀之夫子曰其不食也夷也義亦如是焉夫身居暗朝而食其食可謂義乎荀九家易曰有明德者恥食其祿按左傳昭四年叔孫穆子疾其子豎牛置饋不進叔孫不食卒初穆子之生其父莊叔筮之遇明夷之謙以示卜楚丘曰是將行而歸為子祀以讒人入其名曰牛卒以餒死其筮詞止此祀死兩韻此古法也後解斷稍參他人臆見錯雜有脫漏非楚丘原文故從仲氏說略為補解成十六年叔孫避僑如之難奔齊及庚宗遇婦人宿焉襄二年召歸立為卿庚宗婦人攜其子獻雉問所生曰能奉雉矣召見號曰牛使為豎有寵長使為政乃以讒殺長子孟又譖而逐仲至是叔孫以不食餒死解之者曰此仍是傳文而易其詞明夷日也日之數十而當十位謂日中當王位食時當公位旦時當卿位雞鳴當士位類今明夷之謙明而未融其當旦乎故曰為子祀旦時當為卿則莊叔之卿有嗣矣嗣故為祀當三在旦非食時也故三日不食旦數第三故三日非食時故不食餒死而仲氏曰方避難而奔此于行也之謙而有終謙亨君子有終則歸嗣也夫庚宗之婦固下離之中女也離者别也而初變為艮變謙之下艮而少男生焉艮為小子彼豎牛者繼孟仲之嫡而為庶子非少男乎顧變艮而猶本乎離則猶奉離雉離為雉號離牛焉離為牝牛乃離上為震震有言也見前變艮而艮亦有震艮上互震閽寺之為言則讒言也艮為閽寺夫離為腹腹下敗則餒矣謂無下一爻去離日而就鬼門則餒死矣鄭𤣥易以艮為鬼冥門故前之不食為于行也離廢兌口故不食故叔孫遇婦使私為食而宿焉亦傳文後之不食為絶饋也艮敗離腹故不食故山有果蓏則反虛器而出焉艮為果蓏置饋故反虛器其義之精博而可類推概如此六二明夷夷子夏本作睇鄭𤣥陸績同云旁視曰睇京房本作胰不可解若明張氏所出晉王本則無此字于左股馬融王肅本作般云旋也日隨天左行也姚信本作右樂云自辰右旋入丑用拯子夏傳說文俱作拯音氶馬壯吉象曰六二之吉順以則也六二之明夷則明之中也其夷也第二夷字于何見之于字夫此之離二非即升之巽二乎巽為股鄭康成云九三體在震震在東方爻在辰辰得巽氣為股此由不曉推易之簡捷故曲取之然其義亦通而以右前而左後推之則為左股師卦左次以後為左如後顧曰左顧類此以巽初在下爻故曰左若蘇子瞻謂外左內右則六四左腹在外卦不通矣程𫝊謂左足不便用為不害行則足與手異無右任用左不任用者且左腹何解也明夷夷于是可不拯乎夫二四互坎為美脊之馬美脊者壯也馬壯可代足用以拯之而吉矣是何也則以六二本巽來巽為順則順乎拯而前當互坎坎為法則拯之又有法也則者法也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也若三之明夷則無所夷也夫離者南方卦也離為戈兵本可以狩而三固日盡時也日盡于冬故三當出行有似乎狩傳所謂冬狩是也然而明夷之傷于身見之則幸而不傷而或有得亦復于身見之初翼二股三首四腹俱以身示象而各有得失故當揭出當三以頤艮之剛橫据上爻上為首而剛橫之如大首然今降而為離三之剛是彼失大首而我得之矣夫我所傷者或翼或股而我所得者反在乎首則自此一行而已大有得雖復居坎中亦有何疾蓋坎為心病險難多有而三以震剛而出大險則縱欲疾之而有不可者此非他之志南狩之志也離與坎皆為志六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也四在卦中為腹心況離為腹坤亦為腹以內外言之則坤右離左而以上下言之則坤五右而離四左今入于左腹矣夫明夷有心吾由翼而股而首而及于心若惟恐以傷吾明者傷吾心而吾之正其志而反得之者亦在是焉當四以小過之剛据兼畫之大坎于其心而今易坤柔而奪窞中是既入其腹又得其心也夫此心非他明夷之心也而我乃得之而于以出行則艮為門闕雖向之為行者必先庭後門而今以倒艮之故而先于門而後于庭干寶曰一曰室二曰户三曰庭四曰門倒行逆施不礙逺引是非自正其志而獲其心并獲其意何以有此離與坎皆為心為意九正易因謂吕仲木蔡介夫云心在左腹見醫書但易左字不如是解六五箕子蜀才本作其子漢儒趙賔解作荄兹後遂有作荄滋者不通之明夷利貞象曰箕子之貞明不可息也若夫六五則不言其明于何夷于何也亦不言其為所夷不為所夷也直曰箕子之明夷夫箕子以諸父之尊不得已為商辛所囚至武王入殷而囚始釋夷亦極矣然而箕子之處此或披髮或佯狂或囚或奴艱而能貞晦其明而能正其志以視推易凡四推而皆不可易五爻四易皆不及有如箕子之處此者則直曰此箕子明夷而已蜀才本以箕子為其子其箕古通字若謂不敢顯稱箕子之名但稱其子而孔子逆知文意始于彖傳明指之則穿鑿矣高宗帝乙尚可斥言何況箕子若漢書儒林傳蜀人趙賔為易飾易文以為箕子明夷萬物方荄兹也又晉鄒氏家諱云訓箕為荄詁子為兹漫衍無經不可致詰以譏荀爽則漢後儒者多有此說祇以文王演易時不宜豫及箕子事故云但劉向云今易箕子作荄滋則在前止為訓詁而此時竟有改此二字者然曰今易則明非古本且夫子已明明實指箕子與文王並而後儒尚從而紛紜之何也上六不明晦舉正以不明二字合作至字謬初登于天後入于地象曰初登于天照四國也後入于地失則也此明夷之極也夫明者日也日登則明日入則晦者明晦之理也然而登嘗在初謂朝也即初爻也入嘗在後謂夕也即上爻也與比之上爻稱後夫同者又明晦之時也今不明而晦矣以三離當三坤坤盡而初亦登之今後矣入于地矣然不曰後仍有初乎晉則出地明夷則入地晉為晝明夷為夜然而晝必入夜夜又必入晝晉與明夷一反視間耳故以推易之法觀之當在頥時上居艮剛使卦成大離而明極于天以照四坤于其下謂之登天宜也今已易為坤而墮其在天之明以入于地是夷之也夫六二之以拯馬為順則者能附坎也坎為律為法則此之以入地而失則者由坎位蔽也外卦坎位而蔽以坤離有時失則坎有時得然則處此者何得何失何貞何吝亦惟守其則正其志以俟明之自復焉可矣此爻無吉凶悔吝字以此鹽鐵論引易曰小人處盛位雖髙必崩不盈其道不恆其德而能以善終身未之有也是以初登于天後入于地此數語連易引入似韓嬰傳詩例何𤣥子疑此必易緯文字良然離下巽上四易卦易遁四來初往中孚二往三來又易無妄四來三往大畜二往五來虞氏易以遁初之四此推易之一也家人利女貞彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣風與火無家人之理仲氏曰有謂風自火出出乎內者可以風乎外故為家人則直以風詩風字解易象矣文王時尚無國風況包犧氏耶祇以離巽二女同室而居謂之家人則于離兌二女之名睽較有未通反家人即睽曰二女同居其志不同行彼獨非二女耶何也曰此則風火之所為家人者也離之與兌水與火不相合也而惟巽與離則風從火生火因風發兩相入而兩無間如家人然曰家人然而由卦觀之則止有二女故文王曰所利者止女之正焉已矣馬融曰家人以女為奧主而夫子曰不然此其中有男焉不觀爻之以二隂而間四陽乎文彖以卦言孔傳以爻言離巽皆隂而離與巽之二剛則皆陽也故卦之有位原分隂陽一三五者陽位也二四六者隂位也而卦之有爻則又各各以隂陽實之初為陽則陽當位也二為隂則隂當位也位字實落從來不解而至于卦有內外其以分卦言則下為內上為外而以合卦言則中間為內兩際為外此如序卦轉易所云隂內附陽外向者元蕭漢中作讀易考原以剝復遁大壯晉明夷漸歸妹巽兌渙節六對為隂內附陽外向之卦是此之二為隂四又為隂者女正位乎內也初為陽上亦為陽者男正位乎外也六雖隂位當實隂而以外位言之則又當陽故上九亦為當位人第知家有夫婦陽竒隂耦之謂耳三五謂夫則二四謂婦已耳而不知家之中有嚴君焉父稱君母亦稱君如女君小君太君類上本天也父當之而其位在六上為第六爻為隂則母同于父父稱嚴母亦稱嚴如有慈父必有嚴母類初本地也母當之而其位在一初本第一爻為陽則父同于母故上與初同為家人亦同為嚴君而男女夫婦不及焉此無他父母之謂也夫上為父則初為母李氏易解以五為父二為母荀爽謂五父四子三兄初弟五夫二婦俱不合至朱子以上為父初為子則于三五外又多一子矣若吳幼清云上象父亦象母者儀禮饋食篇妣配考同位不别設位也然以初為子與朱子同五為兄則三為弟五三為夫則四二為婦父子兄弟如父子兄弟夫婦如夫婦而家人之道不其正乎此天地之義而天下之所由以定也象曰風自火出家人君子以言有物而行有恆馬融謂木生火火以木為家則以巽為木東南卦也初九間有家悔亡象曰間有家志未變也此陽之正外者也遁之下為艮門闕也門闕開而兩柔露矣乃以四剛易艮初而為之間之一牡外橫而二柔之居正者得位乎內焉是間有家也夫內卦以之卦為外四剛本外卦而間乎內此素志也今一易在初又復以外爻而間內爻一如彖傳之所謂正乎外者爻雖變志何變焉六二無攸遂在中饋貞吉象曰六二之吉順以巽也二在離之中本中女也然移大畜之乾中而上之五既不敢居尊以畜下剛且移中孚之三柔而歸之已又不敢専澤兌澤以承上命巽命是迄無所遂楊震所謂婦人不得與政事者也後漢永寧元年楊震上疏引此詞曰婦人不得與政事宜速出阿母令居外舍夫婦無遂事大戴記云婦人從夫無所敢自遂而有常職婦職饋食孟母云婦人之職冪酒漿精五飯今二以離中而互坎初則以火承水而中饋之職成焉鄭康成謂爻體離互體坎火在下而水在上飪饋之象也是上本巽也而我以黃離之順承之有勿吉乎九三家人嗃嗃荀爽作確確難通若劉瓛作熇熇鄭康成亦云苦熱意則以離火為解耳悔厲吉婦子嘻嘻張楫作嬉嬉陸績作喜喜皆通用字終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也離火聲不常或咷或笑同人先號咷後笑下離也或嗟或歌離卦不鼓缶而歌戚嗟若此恆態也今三以一剛跨兩離之間下與互皆離本家人也而時或呵之婦子也而時或嬉之一呼一笑了無節制于其中雖三位多厲如乾之若厲復之頻復厲類而坎律有節坎為律不失家節乃以互坎互離之際而憂樂相雜律節不一則得之與失未免相半儻所謂吉厲悔吝均有之者非耶三在無妄為震三震鳴有聲在大畜為乾三乾則其聲嚴嗃嗃者嚴也在遁為巽二巽風亦有聲在中孚為兌三兌則其聲悅嘻嘻者悅而笑也正家者嚴不失節而逸樂而後失之故說文云嗃嗃嚴酷貌侯果曰嘻嘻笑也此是正解何氏訂詁謂嚴之甚曰嘻以為嘻者歎懼之聲則又杜撰矣陸公理以嘻為喜雖古字本通然亦嘻近于喜耳六四富家大吉象曰富家大吉順在位也家人至六四而巽臨焉又一女也然而身居巽柔巽利市三倍此其家本不貧然且在中孚為外巽之一在無妄為互巽之二在大畜為倒巽之三是巽有全利而四皆周之尚謂非富家女乎故夫子曰其富也則以巽在位故也順也九五王假有家勿恤吉象曰王假有家交相愛也顧勿謂家人止家事已也夫所謂家正而天下定者王者也五本尊位而以大畜之乾中本大畜下乾之九二升受巽命巽為命令則其所有者不翅二應而自上及下凡為家人皆有之夫初曰有家而止于家則間之間者限也此曰有家而不止于家則格之格者通也故男女正位中外交歡即相愛家道之成比之廟格如王假有廟公假于太廟類其在大畜為乘乾之長大畜下乾而在家人則為嚮明之治家人下離嚴君也而可以王焉雖互坎在前類有憂恤而王者勿之曰今而後吾可無內顧憂矣假格通字言感格也與詩奏格書平格並同上九有孚威如終吉象曰威如之吉反身之謂也六雖巽剛然本遁與無妄大畜中孚之四剛而終不易則亦威矣夫治家貴嚴內卦之終嚴與縱並用而人或失之今以外卦之終當全卦之終而反身有節自視肅然人有不信之者乎蓋坎離多孚家人之上則坎離之極致也自初至五一坎二離上以威自律而自初至五其為家人皆孚之五之相愛而生感與此之威如而生信一雍一肅家道正矣夫三曰終吝非終吝也終之者吝也此曰終吉非終吉也終之者吉也初以正始而上以正終所謂男正位乎外者如此或曰此嚴君也威如者嚴之謂也三陽皆正家而惟五與上則一以愛而為歸往之王一以嚴而成畏威之君家道正天下定矣然夫子于此特于反身致意焉將大學所云修身齊家而天下平者復于易道有相發與仲氏易卷十六
