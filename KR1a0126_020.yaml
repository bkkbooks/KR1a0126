body:
  text: 仲氏易卷二十翰林院檢討毛竒齡撰巽下坤上子母易卦易臨初往三來又易小過四來二往升鄭玄本作升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也惟升以升進為義故臨初之三尚有臨象見易解臨曰元亨此亦曰元亨小過四之二為連乾即有乾象四本乾而易為三則二三四皆乾矣乾曰見大人此亦曰見大人此其中有離坎焉坎以純見當有恤而戒使勿恤離不以純見不利南征離南方卦則冀其南征凡此者以云遷也故夫子于此明推易之法曰以剛遷而人知之也以柔遷而人不知之以初剛遷三而人知之也二柔遷四而人不知之亦知夫剛以時升柔亦以時升者乎柔升從來莫解或指巽或指坤多少不合時之所在而巽遜坤順二剛五中皆備焉坎已伏而勿恤互有震而志行其因時升進有如是者象曰地中生木升君子以順王肅本作慎非是德姚信本作得誤積小以髙大順德坤德也若慎德非卦爻中所有之字王肅誤作慎字而本義反遵之何也初六允升大吉象曰允升大吉上合志也以初升三則信乎其升之矣初升上也三當半坎之交合志也九二孚乃利用禴無咎象曰九二之孚有喜也小過以四剛而易二柔非升也然而柔已升彖傳所為柔以時升是也夫升剛事人升柔祀鬼而乃以柔升之時用升柔之祀當必有時祭焉為之交孚而下位伏離離為夏非夏禴乎舊言薄祭無理兌口尚食巽臭達氣互兌下巽巽為臭曽孫至是有喜矣夫萃以聚人為祀而升以升鬼為祀卦象如此九三升虛邑象曰升虛邑無所疑也坤為邑虛者髙也詩曰升彼虛矣自初登三即初所稱允升者初己信矣三何疑焉六四王用亨亨享通字下同于岐山吉無咎象曰王用亨于岐山順事也四本小過之剛也而易之而甘居于柔此正二之所謂升柔而祀鬼者則四之為祀固也乃以其地當兌上互震下互之間震為倒艮艮山也而兌方在西當為西山西山者岐山也六四為西山之祀而九二以大人而升而享之王用享之也推易者曰不觀吾先王之遷岐者乎夫遷者移也猶夫易象之推移而遷徙之也乃去邠就岐本非擇取而辭強大而居小弱當此流離搶攘之際一推一遷真有似乎却剛而居柔謝陽而反就陰者而西岐之祀至今益大升柔者可知已故同一升象而以全卦言則南征吉以此爻言則西遷亦吉彖象所演各有分屬不然夫猶是因重之卦凡六十四中其為六四者何限乃忽曰岐山忽曰王享與呆人説夢久矣崔憬曰太王避狄徙居岐山之正順于時事之意六五貞吉升階象曰貞吉升階大得志也三坤六排如雁齒而五由中以升之坎為志此得志而升階之時也夫初為震足二亦大震之足也乃臨以左足而升之三小過以右足而升之四循次拾級若升階然及升四而五巳屆矣五上各不升而五以比四而臨于階故其象如此上六冥升利于不息之貞象曰冥升在上消不富也此則無所升者冥者息也第坤為永貞升可息而貞不可息巽為利市富可消而利不可消吾故于坤巽之合柔升之盡而仍于利貞示之意焉蓋升之為卦一從臨來臨曰元亨故此曰元亨此前己言之者也乃一從小過來小過曰利貞小過彖詞彖不曰利貞也而于此爻終發之曰利貞其一應于始一應于終有似乎推易之法必不可暫忘所自而必為之致意焉者此固文王之志亦孔子之志也吾故曰推易者周易之要也坎下兌上三易卦易否上來二往又易咸三來二往恆三往五來困亨貞大人吉無咎有言不信彖曰困剛掩也險以説困而不失其所當以此句郎顗引此句不連亨字亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也水能漏澤則困柔能掩剛則亦困特卦主剛掩以柔困剛而觀之諸爻則不無剛柔俱困之理所賴困而能通善乎處困則惟陽剛君子所稱貞大人者為能不失其所耳故坎險兑悅二五剛中皆足濟困苟徒恃兌口冀以言辭相抵攔此則小人之處困者窮可知矣虞翻曰否二之上荀爽曰此本否卦陽降為險陰升為悅皆推易之法若虞氏謂震為言折入兑故有言不信則并以恆卦推易為解此尤近代所罕識者恆上震以巽剛易五為兑象曰澤無水困君子以致命遂志致命猶言委之于命也遂志適志也皆處困之道初六臀困于株木陸德明作术謬入于幽谷三嵗不覿象曰入于幽谷幽舉正無幽字謬不明也夫困則俱困是豈獨陰困陽也陽亦困陰矣夫下體為臀兩陰豁然正象坎初陰之位乃一畫當前比之堅木坎木為堅多心有根株而無枝葉木在土下為根土上為株今止在初地上故為株木後既不可為據坐而前若關牡動輒有礙是臀之困于此株木也夫既不能出當觀所入坎有重窞而此當最下如幽谷然一入其中則歷坎之盡勢必三嵗王昭素曰自初至四歷三爻為三嵗雖二四互離張目下視而究無所覿是無故離為明不幽即明幽即不明耳郭京于幽不明也欲去幽字妄甚九二困于酒食朱紱鄭玄本作韍韍紱同方來利用亨享同祀征凶無咎象曰困于酒食中有慶也此真陽之受困者然其困與陰不同二固士位而又以陽剛居之當君子而為大人之際其困也醉飽之過也夫坎酒也兌者口食也何氏曰未濟與坎皆言酒需中爻兌兼言酒食可驗酒食愆尤不無或失而且二從否來以坤裳之飾而蔽以離朱否下為坤為裳紱者裳也互離朱色方且來而加諸互巽之股間二正承互巽之股紱所以蔽股者詩曰赤芾在股芾紱同此其困于衣冠為何如者所藉坎為伏神則用之享祀朱芾斯皇尚亦有利蓋衣帔束縛酒食厭飫登降饗餕固不為苦特從此而以為可征焉則處困之時居困之地輕舉妄動或恐未得其所耳按紱韠也蔽膝之服與韍黻同字左傳黻珽杜注作韋韠可驗特説文天子赤紱諸侯朱紱各不同陳氏捷解引天子純赤諸侯黃朱士赤朱此二在離中為黃朱亦通惟漢儒注易則概曰祭祀之服無所分者若鄭氏謂初辰在未未上值天廚故有酒食四辰在午午離氣朱赤故有朱紱俱不可解六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也三上為四卦凡三易而四終不動如石然且亦否之艮剛也否下坤互艮虞仲翔曰二變正時三在艮山下故困于石此非推易乎若坎為蒺藜則三之據之而困固其所耳且三居互離之中而前後掩窒此非中空若房世俗之所稱離宮者哉夫坎男之陰亦即離女之陰也三為坎之三陰爻即互離之二陰爻既為坎男而已入離宫即欲再求所為離女者而何可復得只一陰爻不能兩用俗以六三為夫則六非陽爻以上六為妻則二陰不相配且亦無不見之義從來未解九家易曰此本否卦二四同功為艮為宫而入宫無妻非常之困此亦推易法漢儒説易家多見及此按左傳襄二十五年崔杼欲娶棠薑筮之遇困之大過陳文子曰夫從風坎為中男故曰夫變而為巽故從風風隕風能隕物妻不可娶也且其繇曰困于石往不濟也據于蒺藜所恃傷也入于其宮不見其妻凶無所歸也後果驗九四來徐徐子夏傳作荼荼翟玄本同云內不定之意王肅本作余余未詳困于金車吝有終象曰來徐徐志在下也雖不當位有與也四未嘗移而下者夫下移者來也未嘗來故曰來緩緩也第四固陽也君子也君子則駕車者其緩緩也匪懈也亦困于金車焉耳蓋困干初四兩爻俱未嘗易四不下來初亦不上往然而非無與者志在下則來終在上故易例于三于上每曰有終四非終而亦曰終者以初為始則以四為終而已兌為金坎為車虞氏曰否乾為中之應歷坎故困于金車此亦以推易之解解之九五劓荀爽王肅陸績本俱作臲刖荀王陸本俱作甈京房本作劊説文云斷也鄭玄云劓則當作倪㐳未詳困于赤紱乃徐有説如字利用祭陸德明作享誤祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也九五之困亦君子也以恆之三剛而易之為五其在恆時五方以震足而兼倒艮之鼻乃以一剛割其間而既劓艮鼻復刖震足則其受困之至有難言者夫坎為刑律兌為毁折不幸而皆及于身而猶幸剛中儼然居不失所則刀鋸非常勢不再及而祗以手足束濕被服絞急為君子之困則夫君子於此又豈能無説哉夫逞口語以惑人而有言不信即彖傳詞小人之窮也正言詞以自解而困德有辨繫辭困德之辨也君子之通也今所困者特赤紱耳施伏坎之赤坎為赤于離韋之紱紱以韋為之離為革仍舉而加之巽股之端五為巽剛凡兌口所及為巫見説卦為説不過飭章服修詞命駿奔嘏祝以進為宗廟享祀之用則夫咸中有慶祭則受福得毋五與二有同觀者耶此君子之困也上六困于葛藟于臲説文作劓薛本同卼説文作􅝨云不安也薛本作杌曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也若夫小人之困又不然初為株木既為蒺藜今復為葛藟以弱絲而糾纍于巽木之顛以小加大以卑居髙其困也于葛藟乎亦于此危然自尊杌􅑾不自安己耳則因而告之曰毋動動則悔矣悔者愧也乃徐而察之果有悔矣有悔者變也夫悔而能變則困極必通何止君子故君子居困時未可行則雖朱紱之方來而猶曰征凶小人之處困苟當其時則雖葛藟之杌􅑾而可曰吉行臲卼即杌􅑾不安也書曰邦之杌􅑾蓋困之必亨固有君子小人所共勉者傳曰困窮而通又曰困以寡怨惟通故不窮亦惟悔故無怨也巽下坎上三易卦易泰初往五來又易咸四來二往恆四往五來井改邑不改井無喪無得往來井井汔至亦未繘井羸蜀才本作纍其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井舉正此下有無喪無得八字乃以剛中也荀爽李鼎祚本此下有無喪二句汔至亦未繘井未有功也荀李本此下有井字羸其瓶是以凶也井以巽木取水為義下巽上坎以巽木下入而取坎水于其上汲井之象故名井但古無木器取汲水者鄭康成云巽木桔槹也按桔槹即轆轤莊子所謂鑿木為機後重前輕挈水若抽者當是也而文王演彖則專以推易之法演之為辭以為推易者改易之謂也故井從泰來以泰初之五而改名為井是泰者坤乾之卦也改乾初之剛而填之坤土之中坤土成坎而乾以剛金而生坎水則坤本邑也而今改為井是改邑也然而井者坎兌之卦也改坤五之柔而反之乾剛之初坤改坎水而乾以陰金而改巽木是乾巽皆非井也而但改坤邑而即名井是不改井也虞仲翔曰泰初之五為井卦乾坼坤五故改邑初為舊井故不改井荀慈明曰此本泰卦剛得中故為改邑柔不得中故為不改井故以乾之剛而改為柔乾不為喪以坤之柔而改為剛坤不為得虞仲翔曰無喪泰初之五無得五來之初荀慈明曰陰來居初有實為無喪失中為無得惟是陽上而往往固為井陰下而來來亦為井往來井井虞仲翔曰往謂之五來謂之初荀慈明曰陽往居五為井陰來在下亦為井將傳所謂井居其所而遷者雖復遷改猶居其所其謂是與徐氏易東曰往來井故不改井特井以養人為義者也水上出井則能養人水不上出井則不能養人故以象言之上坎水也井也五剛為井上為口四為腹而合兩體而觀之則一坎三爻儼轆轤之橫陳于井端而二四互兌為缺口之瓶纍以巽繩非即彖之所為繘爻之所為收而垂瓶綆于井幹者乎而無如巽為倒兌而瓶底且下漏也故井有三截初二為下井井雜塗泥此不能出水者也三四為中井井已貯水然猶未出也五上為上井上則出之向使汔至于井而不得水亦猶之不繘井也汔者幾也汔幾也涸也見説文或作仡以勇壯為解則易一字矣書仡仡勇夫與詩汔可小息是兩字蘇軾作燥解則猶近涸義耳繘者綆也況已繘其瓶而敝而下漏是羸也羸者毁也言毁敗也若作係縲解則與繘重矣羸非凶乎蓋井以養人為德傳所謂井德之地貴出水不貴入水有如此漢儒説易猶顧義理至宋則專務鋪張並無實義如不改井則謂所性分定無得無喪則謂大行不加窮居不損然試問何謂不改井則茫然矣若汔至是進鋭羸瓶是退速非不整齊然已錯認一别字矣有謂古人立邑必相水泉所在不得水泉則當改邑以就之亦杜撰無據且于易義改邑不改井何干涉耶象曰木上有水井君子以勞民勸相坎以勞之巽以申命而勸相之初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也初二皆地道而初尤土下井底之近泥者也兌為口兌口倒矣其能食乎夫初本泰乾因移為坎井而虛其下則初非井也而亦名井如所云井泥是也乃既名為井而反以改移之故更名此地為舊井舊井與井從來無此分解夫新泉可食舊水不可食後漢禮儀志引古禮云立秋浚井改水淮南子云八方風至浚井取新泉四時皆服之向使泉水新生滃然上浮則禽鳥亦時時下之何玄子云如杜詩鸕鷀窺淺井是也今忽為舊井井眢下缺即巽為山雉離亦飛鳥互離並無反而顧之者此其棄置為何如者也故曰時舍也象義云北方謂轆轤之軸曰禽杜撰無據崔憬解作擒言獲也亦不合九二井谷射荀爽本作耶未詳鮒甕説文作甕云汲瓶也鄭玄本作瓦云停水器也敝漏象曰井谷射鮒無與陸德明本此下有之字誤與字是韻增之則失韻矣也二猶在井下而內水不浮外甓不治儼溪井之在山谷者莊子所謂缺甃之崖是也夫二居互兌之底倒兌之中兌澤有魚見前況井類溪谷則中多水蟲今嵓澗之間有物穿水來往如射謂之射鮒鮒小魚也少牢饋食曰魚用鮒十有五而俎言細小也若吕子洞庭之鮒莊子涸轍之鮒則皆大魚又一類矣陸佃謂小魚相即而行名鯽相附而行名鮒説似可信至子夏傳注為蝦蟇此竊莊子坎井之蛙伏缺甃之崖一語而誤之同知子夏傳偽書也以射鮒而生井中此固非恆汲之水可養人者而且倒兌下缺有如翻壺身敝底漏一如彖之所謂羸其瓶者此豈可與乎夫汲之引之必有所以與之者顧誰則與此九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也三在井之中而居剛乘剛下鮮漏敗井之泄去其汚者泄者泄也史記屈原傳井泄不食是也乃兌口顛倒一在二下一在三上皆相隔不及則雖泄不食亦其恆事夫清不見亮賢不見收當必有代為之恤者所幸三五互離離日之明則五與三共有之夫五王位至尊王能明則凡共處離位與不共處離位者皆得受福所謂井養之德在一人而井養之利及天下非歟夫不食而惻非我惻也有惻之者也王明之求非我求也有求之者也並惻之並汲之亦並求之則其福也非並受之而何六四井甃無咎象曰井甃無咎修井也四居井之中即離中也以離中之火燒坤土為甓而甃之四傍馬季長之所謂以瓦治井者修之象也夫四為兌口口已及水而中不汚敗外得甃甓水可以上矣九五井冽寒泉食象曰寒泉之食中正也此上水時也坎水正中冽也不泥也寒也坎北寒地乾金又寒德也説卦乾為寒泉也有本也上坎下又坎也二至四為大坎食也兌口正向也上六井收荀爽本作甃誤勿干寶作罔幕有孚元吉象曰元吉在上大成也如是則水已出井可以養人矣坎水上達而巽繩之在下者井面無有是井收也兌口已決而坎口之上向者仍見其缺是勿幕井也夫轆轤有繘所以汲水井幹有幕所以止汲今汲者已稀而井之待汲者仍勿之止求之者窮而與之者不竭是非履坎半之孚乘乾元之吉而由舊而修而成而進于大成不至此此井養之不窮而汔至之所以未有功也仲氏易卷二十
